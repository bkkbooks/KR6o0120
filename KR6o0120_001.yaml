body:
  text: 唐西京太原沙門法藏述疏終南草堂沙門宗密録注宋秀州長水沙門子璿修記清錢塘慈雲沙門續法會編順天府府丞戴京曾閲定大乘起信論疏記初標論疏題目也題是一部大綱不得不預知悉故須略解題中五字可對天台五重玄義天台凡解經題皆約五義今言大者體也乘者宗也起信用也論者教也一論所詮唯體宗用五字合故即是名也大謂體者此有總別總以一心為體論之主質無出於斯謂信所緣故解所了故行所趣故證所入故因所感故果所顯故故論初標以為法體文云摩訶衍者一法二義所言法者謂衆生心是心即攝一切世間出世間法依於此心顯示摩訶衍義等此是直目其法名之為大謂豎窮橫遍無礙圓融當體受名不因待小故涅槃云不因小空名為大空涅槃亦爾不因小相名大涅槃別者約義所論即有三種謂體相用即開前一心以為三義即大涅槃三德是也如下文云所言義者則有三種一者體大謂一切法真如平等不增減故二者相大謂如來藏具足無漏性功德故三者用大能生一切世間出世間善因果故故大之一字通於三也乘謂宗者即從因至果以取體故乘者就喻彰名運載為義如世舟車可以運重致遠也即喻菩薩乘此大法越生死野度煩惱河到菩提鄉登涅槃岸故下文云一切諸佛本所乘故一切菩薩皆乘此法到如來地故此中能乘是始覺所乘是本覺能所冥符始本不二名究竟覺即是所至之處一相一味究竟平等更無三異於一體中義分能所爾亦名一乘亦名無上乘也起信謂用者以此論中能破疑執生正信故起即顯發信謂忍樂謂於前大乘一心三義境上顯發忍樂之心名為起信故論云為欲令衆生除疑捨邪執起大乘正信佛種不斷故此信起時必內由本覺為因外由師教為緣因緣和合內外相資故能顯發下論云因緣具足者所謂自有熏習之力又為諸佛菩薩等慈悲願護故能起厭苦之心信有涅槃修習善根等然信之一法為衆善之緣萬行之始解行修證皆悉由之證極之處名得涅槃苟非其信焉辦斯事故華嚴云信為道源功德母長養一切諸善法斷除疑網出愛河開示涅槃無上道然此論中不唯起信亦兼解行謂五分論文二三是解四五是行既含多義普協輿情欲令自淺之深是故但標起信論謂教者教即聖人被下之言教愚成智教凡為聖故論議論也即假立賓主自問自答循環研核究暢真宗謂商議論量如上法義教誡學徒也然論有宗釋之異此宗論也以馬鳴大士宗法華涅槃楞伽思益等百餘部實教大乘之所造故真可謂義豐文約無法不收故下文云如是此論為欲總攝如來廣大深法無邊義故應説此論又云如是摩訶衍諸佛祕藏我已總説又云諸佛甚深廣大義我今隨順總持説等然此論文是證真大士後得智中宗經所造後人不思綆短却謂泉枯往往謗之言非圓實下文勸信非不殷勤聞思修益備彰功利不信毀謗受苦彌劫豈不勉哉如上五字即法喻因果解行理智能化所化能詮所詮無不具足括盡一論以立此名也疏者踈也決也謂踈理法義旨趣決擇文言章句令悉通暢也然上大等六字約六釋分別總成五對一能乘所乘對謂人為能乘大為所乘所乘即大能乘之大大之乘故持業依士依主三釋兼通二能起所起對謂大乘為能起信為所起即大乘之起信依主釋三能信所信對謂信為能信大乘為所信所信即大乘大乘之能信持業依主二釋四所詮能詮對謂大乘起信為所詮論為能詮五能釋所釋對謂疏為能釋上五為所釋二皆依主也筆削記記次出記家題目也此文之作本乎石壁石壁慈甚蔓於章句凡伸一義皆先問發次舉疏答後方委釋雖不妄本母之體而有太過與不及焉講者用之未至穩暢今就其文取要當者筆而存之其繁緩者削以去之仍加添改取其得中俾後學者不虗勞神智照無昧也故曰筆則筆削則削因以筆削命題云爾西太原寺沙門法藏述疏記後詳疏記人名先疏主也西太原寺者即長安崇福寺也以天下有五寺俱名太原為揀餘四故言西也東即揚州南即荊南府西即長安北即太原亦名崇福中即東都今之福先俱稱太原者以則天生于太原此既皆彼捨宅所置為敬生處故以為名沙門者釋衆之通號此云勤息謂勤修戒定慧息滅惑業苦故受斯稱法藏者俗姓康氏華嚴第三祖敕諡賢首大師德業隆廣如傳録述者明非造作也如仲尼云述而不作信而好古明已勞謙故云述也草堂沙門宗密録注記次録主也草堂寺名在終南山宗密者姓何氏諡為定慧禪師是乃學窮內外道映古今盛德大業備所聞見録注者先以論疏二本別行致其學者不能周覽既成互闕功進難前今列疏文以就於論既論下有疏論上有科文義昭然章段備矣學者披繹得不荷其優賜乎長水沙門子璿修記會後記主也長水地名子璿諱也修者古記多種未免有繁簡之失故大師重為修定名筆削記令得其中也將釋論疏大分為二初總敘宗旨二開章釋文初總敘宗旨記中印度境有噳羅尾儞者此方翻為馬鳴於佛滅後六百年內破邪見幢樹正法寶宗諸實教造茲一論名曰大乘起信説有五分大判為三初因緣分即序分也明論發起由八因緣非同率爾無利益故後之一分勸修利益即流通也勸於此論生信思惟修習得大利樂流至後代益衆生故中間三分即是正宗謂立義一分略標綱要立一心法列二種門舉三大義因果俱運略為下文而張本故解釋一分由前略標義理未暢是宜廣釋令義昭然以生解故信心一分説四種信五種修行令諸衆生信根成熟入不退故此上三分是前因緣所起是後一分所勸由是俱號正宗已知論文三分大節應知能解疏文若何以疏前有序為序分開章已下為正宗分後文既無申述回向乃闕流通既而三分不具即分為二初總敘宗旨二開章釋文今初總敘也序記此即疏主所撰也序有二義序者敘也謂敘述一論之大意故又訓緒也即製疏入作之端緒故今是初一義也序中分二初敘論大意二造論因由初敘論大意四初敘一心法二顯真如門三明生滅門四二門不二記所以列此四者蓋敘一論之大意莫越於斯從始至末攝無不盡初敘一心法記初敘一心法者立義文云所言法者謂衆生心是心則攝一切世間出世間法依於此心顯示摩訶衍義解釋文云顯示正義者依一心法有二種門乃至二門不相捨離等故此敘之也夫真心寥廓絶言象於筌沖漠希夷忘境智於能所記夫者發語之詞也如云夫孝德之本教之所由生又云夫易廣矣大矣或句中句下皆助語詞也真心二字正指法體真謂真實揀非偽忘心謂靈鑒要妙中實凡言於心然有其四一者梵語訖利馱耶此云肉團心即人之心藏也其色赤形如蓮華上有七葉色法所攝二者質多此云集起即第八阿賴耶識以能集諸種子起現行故三者緣慮心此通八識心王以各能緣慮自分境故四者乾栗馱此云堅實心謂如來藏自性清淨不生不滅心也今所明者正是此爾所言真者揀餘心故若稱實言之但是一心貫於真妄以論標立為大乘法體即總相心也於一心中方開二門今雖云真乃是以別顯總此心若在初門但名真如若在後門但名本覺應知真心是總真如是別寥謂空寂廓謂曠大空即中無妄染寂乃其性湛然曠謂德用無邊大則體周法界故下文云從本已來一切染法不相應故此心之空義也又經云妙覺湛然周遍法界斯寂義也又經云覺性遍滿圓無際故當知六根遍滿法界乃至八萬四千陀羅尼門遍滿法界斯曠義也又下論云是一法界大總相法門體等則大義也既而清淨本然周遍法界湛然常住妙德無邊由是乃云真心寥廓故華嚴疏云寂寥虗曠沖深包博總該萬有即是一心也問太虗空界亦空寂亦曠大與心何異答太虗則以無為體故云空一向凝然故云寂闕其德用曠義不成為心所包大義無準豈同真心彌滿清淨中不容他德用無邊性起為相沖虗妙粹炳煥靈明越彼太虗方之海印耶此上則顯心之德相也絶言下明心之離過絶謂斷絶於辭也言謂語言即聞慧境象謂似像屬於義也即思慧境故繫辭云聖人有以見天下之賾而擬諸形容象其物宜是故謂之象筌是捕魚之器即網兔之具此二即言象喻也今顯真心不可思議言語道斷心行處滅故云絶也謂心體離言非可以言語取心體離念不可以識情求口談詞喪心緣慮亡故下文云從本已來離言説相離心緣相又云非色非心非智非識非有非無畢竟不可説相等皆明心離過也筌喻言象者能網兔喻言能取象筌能捕魚喻象能取意今法喻雙舉者為成文故然筌之語是周易略例正文故彼文云言生於象故可尋言以觀象象生於意故可尋象以觀意意以象盡象以言著故得意忘象得象忘言猶者所以在兔得兔而忘筌者所以在魚得魚而忘筌然則言者象之也象者意之筌也存言者非得象存象者非得意象生於意而存象焉則所存者乃非其象也言生於象而存言焉則所存者乃非其言也然易中舉此明尋言得象尋象得意得意須忘象得象須忘言苟不能忘皆非得旨此乃約人以明勸人捨筌今文但約本性直就法體説離言象非約勸修雖借彼文不同彼意沖漠下別約橫豎以顯心之德相沖謂深也此明心之體性豎窮三際而洞然無底故經云甚深法性諸佛行處又云幽邃深遠等漠謂沙漠此顯心之德相橫遍十方而曠然無邊故經云覺遍十方界本性圓滿故此乃窮三際而三際不遷遍十方而十方無外又沖謂剛柔得所漠謂名目難及以此心性雖體離相而隨緣成事雖隨緣起而本性不變此隨緣不變之體不可以智知識識名言名目故云沖漠也經云不染而染難可了知染而不染難可了知希謂無聲夷謂無色老子云聽之不聞曰希視之不見曰夷此乃重顯深廣之相深故聽之不聞廣故視之不見謂此心體唯證相應非是見聞之所及故忘境等者此亦顯心離過忘謂於法不記斯亦絶無之義境謂所證之理智謂能證之心凡言境智能所者蓋約反迷從悟對染説淨皆屬生滅今此顯示非染淨之一心絶迷悟之極致尚不可立真妄之名豈存乎能所境智故楞伽云無有佛涅槃亦無涅槃佛遠離覺所覺又圓覺云覺所覺者不離塵故以一心之體絶凡聖亡因果離性離相不有不無焉可更言境智能所故云忘也楞嚴云性真常中求於去來迷悟生死了無所得斯之謂歟二顯真如門記前門但約絶待亡詮旨離性相故云寥廓沖漠等今門約對生滅顯不生滅待妄立真故云真如門即下立義文云是心真如相即示摩訶衍體故解釋文云心真如者即一法界大總相法門體所謂心性不生不滅乃至云以離念境界唯證相應故今疏敘彼也非生非滅四相之所不遷無去無來三際莫之能易記非無也不也然生滅與不生滅須約三性分別且約三性自相説者謂遍計妄法一向生滅圓成實性一向不生滅依他假法相同遍計似生似滅性是圓成不生不滅若稱實言之則三性皆無生滅雖然且無義不同何則謂遍計即無法可生無法可滅如繩上蛇依他乃即生無生即滅無滅如麻上繩圓成即中無前二生滅之法如麻上無繩無蛇唯識頌云初即相無性次無自然性後由遠離前所執我法性圓成實性即是真如故云非生滅也然此但明圓成當體不生不滅亦不和會泯於生滅之法故圓覺云如來寂滅性未曾有始終故下文云所謂心性不生不滅又云非前際生非後際滅畢竟恆常等此即顯真心不變也四相等者四相有三種一微細四相謂一剎那有九百生滅但是有為皆為所遷即生住異滅也二果報四相即生老病死涅槃經中名為四山如彼經云有四大山從四方來欲害人民當有何計而能免彼波斯匿言設有此來無逃避處唯當專念持戒布施佛讚善哉我説四山即是衆生生老病死常來逼切人等三一期四相謂始從迷真終至造業八相生滅通束為四謂生相有一住相有四異相有二滅相有一若反迷斷時始從初信止滅相終至十地斷生相如下具明今言不遷者即微細四相兼於餘二以四相但遷有為之法心是無為非所作性故不能遷文中略舉初後以攝中間故云非生滅也無去來者謂此真心不向前際去不從後際來亦不現在住現在住者即是諸有為法故唯識云住表此法暫有用今不同彼故云無也三際等者際時限也莫無也易謂變改三際雖是能易之法但能遷變有為令其改易心非有為故不能易淨名云但以文字數故説有三世非謂菩提有去來今三明生滅門記敘生滅者即下立義文云是心生滅因緣相能示摩訶衍自體相用故解釋文云心生滅者依如來藏有生滅心所謂不生不滅與生滅和合乃至此非心識分別能知以真如自在用義故今敘之也但以無住為性隨派分岐逐迷悟而升沉任因緣而起滅記文中初句標生滅所以餘句釋生滅之相但者語詞也以由也此性雖寂寥虗曠沖深包博非生非滅不垢不淨然不住此一向寂滅非染淨中而隨彼能熏成一切法隨染即九相生滅隨淨即三乘聖道皆由真如以無住為其種性亦由性是無住故能然也淨名云從無住本立一切法楞嚴云本此無住以立世界及諸衆生非同他宗明真如體一向堅密猶如玉石不受熏習不能隨緣但説賴耶為染淨本受熏持種也隨派句喻明也水分流謂之派路分徑謂之岐今取岐派共為一喻謂如一源之水隨何岐路分流成派真心亦爾隨何因緣作凡聖等如下即明逐迷下正辨生滅之相逐隨也任從也迷則背覺合塵悟則背塵合覺然其迷悟各具因緣迷中以無明為因境界為緣悟中以本覺內熏為因師教外熏為緣若隨從迷中因緣即沉於生死則一切有漏染法起一切無漏淨法滅滅即隱滅若隨從悟中因緣即升於覺路則一切無漏淨法起一切有漏染法滅滅即亡滅如下文説無明為因生三細境界為緣生六粗即沉淪五道是為逐迷也本覺內熏為因師教外熏為緣發解起行即超升佛果是為從悟也迷之與悟皆是性為迷悟雖殊不思議一故經云無始時來性一切法依止由此有諸趣及證涅槃果華嚴經中性起法門即斯義也又涅槃云佛性隨流成衆味等楞嚴云譬如虗空體非羣相而不拒彼諸相發揮日照則明雲屯則暗等皆顯真如不住自性隨緣成法也四二門不二記上説真如生滅其義迢然雖行相不同然理歸一揆二而不二故有此門即下解釋文云復次顯示從生滅門即入真如門所謂推求五陰色之與心六塵境界畢竟無念乃至若能觀察知心無念即得隨順入真如門今此敘之也科中分三初法二喻三結初法二先正明不二次釋成無礙先正明不二雖復繁興鼓躍未始動於心源靜謐虗凝未嘗乖於業果記文中四句前二句明生滅不礙真如後二句明真如不礙生滅既互不相礙即不二之義也今初明生滅不礙真如雖復者詞含縱奪貫下二句繁多興起鼓動躍跳也繁則染淨多途興則新新生起鼓則體非常住躍則相不久停以染淨因緣繁多興起鼓動跳躍念念生滅未曾暫住雖不暫住而其體不變不變之性即是心源心源即未嘗有動故下文云覺心初起心無初相圓覺云覺者如虗空平等不動轉又下文云雖念因緣善惡果報而亦即念性不可得故云未始等靜謐下二明真如不礙生滅謐亦靜也靜中之靜故名為謐靜則相非生滅謐則體絶有無虗乃無礙圓通凝則寂而常照又無惑之喧煩曰靜無業之遷流曰謐離色之質礙曰虗非心之生滅曰凝雖真體若是而用常隨緣隨緣之用為業為果善惡樂苦形影不差故云未嘗乖等嘗曾也乖違也業因果報皆通善惡漏與無漏即不動真際而建立諸法故淨名云無我無造無受者所作之業亦不忘下文云雖念諸法自性不生而復即念善惡苦樂等報不失不壞次釋成無礙故使不變性而緣起染淨恆殊不捨緣而即真凡聖致一記故下先釋真如不礙生滅故使者因前起後之詞亦通下二句故者所以義使令也由前真如不礙生滅所以令其不變之真體任運隨緣起成染淨染淨二字無法不攝從來不同非適今也故云恆殊然此染淨全性所起故下文云譬如種種瓦器皆同微塵性相如是無漏無明皆同真如性相不捨下二釋生滅不礙真如由無礙故所以令其不捨差別妄緣即是一真如性妄緣差別凡聖收盡凡聖相異而體是一一體之內本無凡聖故云致一致理趣遂也故下文云一切凡夫聲聞緣覺菩薩諸佛非前際生非後際滅畢竟恆常等圓覺云於實相中實無菩薩及諸衆生又云衆生國土同一法性二喻其猶波無異濕之動故即水以辨於波水無異動之濕故即波以明於水記此中前喻真如不礙生滅其者指法之詞猶如也波動喻生滅染淨不同水濕喻真如一體無異波以動為相水以濕為性初句反顯以喻生滅門中無有異真如之染淨也故云波無等故即下順喻由不異故遂能即於一心而辨生滅故云即水等即喻前文不變性而緣起染淨恆殊也水無下二喻生滅不礙真如初句反顯以喻真如門中無有異染淨之一心也故云水無等次句順喻由不異故遂能即彼生滅而顯真如故云即波等此喻前文不捨緣而即真凡聖致一也三結是以動靜交徹真俗雙融生死涅槃夷齊同貫記是以二字結指之詞動靜等三對説有通別通則不出真如生滅兩義謂動俗生死即生滅餘皆真如別則動靜約喻真俗約諦生死涅槃約染淨此諸二法本不相是法相迢然今以一性通之令動靜無別真俗不殊染淨同體一無所異良以性起為相境智歷然相得性融身心廓爾故下文云如大海水因風波動風相水相不相捨離又經云二諦並非雙恆乖未曾各又大集云生死涅槃二界平等即是佛界此中交徹雙融夷齊一貫等正顯前二法不二之語徹通融和夷平齊等貫通也對文可見然上四門旨趣微妙初則標本以彰末使萬有星羅於義天後則攝末以歸本俾羣象泯同於性海乍舒乍卷或存或亡法乃同時義無前後由是阿鼻依正全處極聖之自心毗盧身土不逾下凡之一念圓實之旨在此顯焉問初敘一心後辨二門不二亦即一心初後何別答初之一心心當能起後之一心心當所歸雖前後體同且始終義異以本是一心離名絶相由其迷悟萬法隨生生法本空一切唯識識如幻夢但是一心由是論依法説疏約論明次第四門故無所越一論之旨其在茲焉二明造因由二初反顯二正明初反顯但以如來在世根熟易調一稟尊言無不懸契記反顯者欲顯菩薩造論先明不假論時如來在世即時勝緣勝根熟易調即根勝行勝謂牟尼釋尊成道已來未涅槃時法化流行聖賢輔贊人根成熟性行調柔非一佛所種諸善根於無量劫久植德本一稟下明根行勝相不須再聞故言一承順聖旨故云稟尊言者八音四辨金口親宣故聞而獲益逮無生忍故云懸契又懸者遠也不必親從金口但展轉傳聞如身子聞馬勝因緣目連承舍利轉教此之根性尚不藉結集之經豈假菩薩造論故下論云若如來在世衆生利根能説之人色心業勝圓音一演異類等解則不須論二正明二初序謬述迷二興悲造論初序謬述迷二初總敘二別顯初總敘大師沒後異執紛綸或趣邪途或奔小徑記大師者德業高勝可軌可範即十號中天人師一號也緣終息化佛日韜光故云沒後即時緣俱劣也爾時則昏衢失照世皆暗冥正法陵遲故名為劣異執下明根行俱劣顛倒計著名為異執亂於正理故曰紛綸紛亂綸理也此有三類執計不同故名為異一凡夫依於鈍惑執五蘊色心計為常樂我淨二外道依於分別於五蘊上計其有我或即蘊離蘊著斷著常起六十二見等三小乘雖破我執而起法見不知真常而計無常等四隨自見解各立己宗分為二十餘部互相是非此即俱名異執或趣下明其劣相或者不定之詞此等根性既劣或隨利鈍使成凡外或聞權淺教為小乘也凡夫外道非佛正法故名邪途宗習歸向名之為趣小徑者已離我執不名為邪未得法空不名大道趣理偏僻猒心勤勞切募化城不求寶所唯貪自利豈能運他既匪大途故云小徑二別顯二初迷理二迷教初迷理遂使宅中寶藏匿濟乏於孤窮衣內明珠弗解貧於傭作記遂使者躡前起後之詞由前根緣既劣異執仍繁遂令迷本真心逐妄流轉功德法寶本有而無用圓解神珠垢覆而不現孤窮生死之路傭賃涅槃之門動經塵劫飄然浪迹三德祕藏莫之能入也此中二喻各出一經一貧家寶藏喻即如來藏經九喻中之第五也彼文云譬如貧家有珍寶藏寶不能言我在此中既不自知又無語者不能開發此珍寶藏一切衆生亦復如是如來知見大法寶藏在其身內不聞不知耽惑五欲輪轉生死受苦無量等匿隱濟救乏闕也少而無父曰孤無財之極曰窮合法可知二衣內明珠喻即法華五百弟子受記之文廣説如彼賃力曰傭給使曰作餘文可解二迷教加以大乘深旨沉貝葉而不尋羣有盲徒馳異路而莫反記加下初明大教綱頽言如來滅度之後雖不親承金口然有結集教文可以尋言見象尋象得意衆生根性雖劣多起異見苟能聞於大法自然改正今又不能尋繹廢置敷宣圓理既而蔑聞邪見於焉離革聖人既滅根行仍微圓實之教抑又不行故云加以教非小道運至無上故曰大乘終極圓實揀異權淺故名深旨貝葉者即多羅樹葉也猶此方竹帛簡牘之類載能詮文可以披取見所詮理如説而行反迷歸悟今隱廢不行故云沉也羣有下二明迷者難改羣有者即前凡夫外道小乘類各衆多故云羣有無正法眼不見佛性故曰盲徒馳謂奔趣異路即邪途小徑也既不能就之於有道正之以圓乘迷謬日深習以成性服藥不瞑眩厥疾何瘳還復無因故云莫反二興悲造論三初悲歎人法二述造論意三正造諸論初悲歎人法爰有大士厥號馬鳴慨此頽綱悼斯淪溺記初二句能歎爰曰也謂如來滅度已六百年人根雖劣正法尚存聖人示生興我真教故云爰有大士謂馬鳴論主本成正覺號大光明迹居八地為法身菩薩發大心信大法解大義修大行證大道趣大果非其小流故云大士也馬鳴者謂此菩薩生時及説法時感衆馬悲鳴故受斯稱如下廣釋慨此下二句所歎初句歎教無聲之歎曰慨頽綱者喻也圓實之教尋繹既罕沉廢不行如大綱既頽綱目何整人天魚無其潦漉佛彼岸何由得到遊泳苦海無能出期道之不行職由斯也悼斯句傷迷悼傷淪沉溺沒也大士見教網綱沉頽而不舉知彼迷途沒溺而不升歎之傷之寧不思救故經云我以佛眼觀見六道衆生貧窮無福慧入生死險道相續苦不斷乃至不求大勢佛及以斷苦法為是衆生故而起大悲心等二述造論意將欲啓深經之妙旨再曜昏衢斥邪見之顛眸令歸正趣使還源可即反本非遙記文中六句初二句明教顯理將者當也且也欲謂希願啓謂開發了義大乘名為深經終實圓理故曰妙旨佛親説時利根者得入如人有目日光明照見種種色滅度之後昏鈍性障諸阿顛迦其猶昏衢昏衢之體是謂二障大士思欲發揮圓實旨趣令彼迷者去無明暗佛昔曾破今更重明故云再曜次二句破邪歸正斥謂指破心行理外總名邪見非但不信因果而已此乃凡夫外道二乘俱名為邪故迦葉言我等自此已前皆名邪見人也顛頂也以頭向下故名顛倒或顛者病也眸即目瞳此舉喻也如人眼之有病妄見空華毛輪二月等又顛即心狂由心狂故目覩諸物皆悉不正謂非親見親等彼邪見者亦復如是於性空處見生死涅槃於妙明中成分別見妄正趣者真菩提路也往而却還曰歸衆生迷見不依正道旁行五趣縱出三界亦落無為坑中今欲令彼不循異轍還向直道無諸委曲也後二句結成頓益初喻次法水初出可以濫觴曰源即者人也如人溯洄窮其水本名為還源以喻行者反生死流歸於本際也得本際者名覺心源故下文云覺心源者名究竟覺若準他宗説三無數劫修習廣大行願方成正覺如挹流討源也今言可即非遙者謂只於生滅之處示彼因緣無性四相本自不生處即真實如下論云四相本來平等唯一覺故又云一切法悉皆真故皆同如故圓覺云知幻即離不作方便離幻即覺亦無漸次又南嶽云道源不遠性海非遙肇公亦云道遠乎哉觸事而真聖遠乎哉體之即神斯皆可即非遙之義也如示萬派之水即是本源之水無二別也如是則一念契真即名為佛豈待多劫而遠求耶頓益之義昭然可見三正造諸論二初廣論二略論初廣論造廣論於當時遐益羣品記廣論者謂甘蔗論釋中本楞伽經義味豐美故立斯稱又造一心遍滿論融俗歸真論真如三昧論等一百餘部如來滅度方六百載人根稍利堪受廣説故云當時遐遠羣衆品類也即普該衆類遠及未來凡是當機皆獲斯利故云遐益羣品二略論三初出所以二正造論三彰功益初出所以既文多義邈非淺識所窺記即者已也即印前之詞文多諸甘蔗論六百卷或云一百卷此方無本難定是非邈遠也文句既多義又深遠後代雖有圓頓根性心力劣者於此文義廣博之論不能備覽非謂一向權小之機名為淺識以此略論正為大乘頓根令悟入故故下文云自有衆生復以廣論文多為煩心樂總持少文而攝多義能取解者又云為欲解釋如來根本之義令諸衆生正解不謬故為令善根成熟衆生於摩訶衍法堪任不退信故等斯則正為大乘信解位人而作因緣反知於此廣中但無心力名為淺識二正造論悲末葉之迷倫又造斯論記悲謂菩薩造論之心菩薩發心體有三種謂大悲大智大願悲則度生智則求證願則總攝今為拔衆生苦與究竟樂而造斯論故須悲也下論云所謂為令衆生離一切苦得究竟樂非求世間名利恭敬故末葉約時迷倫約類以佛滅後二千五百年去解脫智慧多聞禪定俱不牢固但隨迷見唯起諍論如斯類也誠堪慜之故造此論令其悟入葉世也倫類也三彰功益可謂義豐文約解行俱兼中下之流因茲悟入者矣記文有二初略能含廣可謂者印歎之詞論唯一軸二十四紙故云文約約略也所詮之法義備河沙故云義豐豐多也斯則攝盡十方三世諸佛法藏故下文云諸佛甚深廣大義我今隨順總持説又云如是摩訶衍諸佛祕藏我已總説解行等者解即立義解釋二分所詮令生解故行即修行信心及勸修利益所詮令起行故又云於真如法中深解現前所修離相又云知心妄動無前境界修遠離法等俱即是兼義意無別解行兩足故曰俱兼亦可俱則具於解行兼則解中有行行中有解目足更資方到清涼池爾中下二巧被根緣謂中根已下之類皆由此論開示而得悟入佛之知見若約位説悟當信解入當行證若依天台兼於開示總對圓教四十位人即住行向地如次以配開示悟入也今以深該淺故云悟入然此中下之言非謂對大指小名為中下以大乘圓頓之根自有上中下別今是圓根之中下也如圓覺經三根之義正同於此今言中下悟入以讓上根廣論被故二開章釋文二初懸敘義門二隨文注解初懸敘義門二先略標次詳釋先略標將解此論文分二章初懸敘義門二隨文注解義門有六一辨教起因緣二約諸藏所攝三顯教義分齊四明教所被機五論能詮教體六示所詮宗趣記懸敘六門蓋有綸緒何者夫聖人所作必不徒然茲論發興有何所以故受之以教起因緣也名教既興已知由漸釋氏之學三藏統收約法約人如何攝屬故受之以諸藏所攝也論藏通乎大小菩薩有其權實不以義求罔知旨趣此論詮法分齊至何故受之以教義分齊也教所詮義以知至極未委何等機宜於此悟入故受之以教所被機也所詮所被既已昭然未審能詮以何為體故受之以能詮教體也教體既明教下所詮宗於何事宗之畢竟趣向於何故受之以所詮宗趣也凡是教興悉須具此故今懸敘止斯六門謂論所因故論所攝故論所詮故論所被故論所依故論宗歸故然原本疏中開章具列十門前六同此但於此後更列四門謂釋論題目造論時代翻譯年月隨文解釋如次至十也今録本疏中不依彼列者以是懸敘義門不欲雜於別解文義故將後四合在隨文注解之中由是懸敘但有六段次詳釋六初起因二藏攝三教義四被機五能詮六宗趣初起因二初總標次別釋初總標初辨教起因緣者有十徵釋以顯十因記十徵釋者十段之中皆初一句是徵餘皆釋也顯十因者謂有十翻先問後答以顯造論十種緣起也次別釋十初智辨二法化三巧示四顯明五依本六藉力七為義八因緣九由起十機益初智辨一依何智謂依論主洞契心源之智隨機巧妙之辨記一句徵也依何智者起論之體莫先於智無智不能起論故佛法中智為根本也斯則因明論六因之中智生因也以有智故有義有義故立言故此十中先責其智謂依下釋也然菩薩之智有權有實實智詣理虗通往來符會真體名洞契心源心源即無相真理也契此理故名無生忍即根本智也權智幹事建立佛法成就衆生隨其根性授與法藥令得服行名隨機巧妙之辨謂順其根欲上中下品故曰隨機言無疏拙曲成萬物而不遺故名之為巧巧無巧相不可以言議思度故名妙也此智騰之於口故名為辨此辨有四有七四謂四無礙辨即法義詞樂説也亦名四無礙智但在心在口用處不同故得智辨之名其體一也七辨者一捷辨卒答不思須即言故二無斷辨相續連環而無竭故三迅辨明於理事心無癡暗言音迅疾如懸河故四隨應辨應於時機無差異故五無疏謬辨所説契理無差失故六豐義味辨名數理事皆無量故七一切世間最上妙辨此辨有五德一甚深如雷二清徹遠聞三其聲哀雅如迦陵頻伽四能令衆生入心愛敬五若有聞者歡喜無厭具此五者名最上也此上四七之辨皆因本智證理而後得故名後得智巧妙之相在三四兩門然聖智圓通必須理事雙照隨闕一種則非圓智今論主迹居八地正證無生入真如門即根本實智照生滅門隨彼事量一一觀察知機設化應根巧説即後得權智權實二智隨用雖殊然體無二依此一體圓智而建立論文故十地論稱歎説者有三辨才智謂真實智體性智果智前二即根本後得後一即後得之用謂依體性起巧妙説故言果也今此所明通前三智也二法化二示何法謂一心二門三大四信五行等法記示何法者已知論主所依非是下凡有漏之識但依二智無漏建立凡所有言盡合真理契會時機必無過矣如其所示是何法門令彼信解修斷入證耶故此徵之謂一心下釋也然大乘法體是衆生諸佛無二真源不分染淨真妄差別而能具攝一切諸法寂焉不動靈鑒無昧故名一心而此心體非真非妄能真能妄故開二門門者無壅虗通往來出入自在開闔無妨之謂也依心無相立真如門依心具法立生滅門二門互通開闔自在俱以一心為源故云心真如心生滅也三大者即二門下所示之義謂真如門唯示體大生滅門具示三大故下論云是心真如相即示摩訶衍體故是心生滅因緣相能示摩訶衍自體相用故四信者謂信真如及三寶也信心是一信境有四故成四信故下論云一者信根本所謂樂念真如法故乃至佛法僧常念親近修習如實行故五行謂行布施持戒忍辱精進止觀之法成就前來四種信心令成根不退入正道故如下廣明所言等者法相至多今疏從一至五增數略列不及多云故言等也若具言之即二覺四位四相四鏡三細六粗等不能廣引然疏列雖少無法不該以生滅一門具明世出世間一切法故此等皆是所示之法雖通云示然示義有別謂於上諸法示令信解行斷證等配文可見由是疏中通云示也三巧示三云何示謂以巧便開一味大乘作法義二種分一心法復作二門析一義理復為三大由此善巧而得開示記云何示者上之所列但是所示之法未知作何方便而顯示之巧謂權巧便謂方便此屬論主能示之智一味大乘即一心真理不分染淨因果凡聖空有等異故云一味揀對二乘故名大乘此之法體以智冥符離諸分別乃云一味若依言説示即開為二謂法義也故論云摩訶衍者總説有二種一者法二者義仍開法為二門演義為三大故論云依一心法有二種門一者心真如門二者心生滅門又云所言義者則有體相用三種等備如前引由此下結指善權謂論主以一實智證無分別一味真理以方便力為衆生故善用巧便而開一味成多法門多無多相不違一味故名善巧開即演一為多示即顯令生解也四顯明四以何顯謂妙音善字譬喻宗因能令義理明了顯現記以何顯者意責前之善巧乃是展彼義門令一成多今欲令此義理皎然可見由何方便而得顯明以由顯明也音即音聲字即文字聲無聲相字無字相故云妙善謂論主於權實無礙智上流演聲名句文是無漏善性所攝不同凡夫屬於無記故淨名云夫説法者無説無示斯則唯為開導利益衆生不依文字也華嚴十地品中喻空中風畫等皆顯聲名句文非有非無也斯皆謂之妙音善字譬比也喻曉也即以近事比類令於深法得曉了故無著云喻者見邊義謂以所見邊與未所見邊和合正説名之為喻師子覺云所見邊者謂已顯了分未所見邊者謂未顯了分以顯了分顯未顯了分令義平等所有正説名為立喻然有二種一者同法二者異法同法者若於是處顯因同品決定有性謂若所作見彼無常譬如瓶等異法者若於是處説所立無因偏非有謂若是常見非所作如虗空等然離十過方為正喻同喻五過謂能立法不成所立法不成俱不成無合倒合異喻五過謂所立法不遣能立法不遣俱不遣不離倒離宗謂所成立法因即宗家因由所以與前譬喻皆為能立故因明論云由宗因喻多言開示諸有問者未了義故然宗者有體有依依有能別所別依體之上共離九過方為正宗謂現量相違比量相違世間相違自教相違自語相違能別不極成所別不極成俱不極成相符極成因有三相謂遍是宗法性同品定有性異品遍無性然因有二種謂生因了因生因如種生芽了因如燈照物然此二因各有三種生因三者一言生因二智生因三義生因了因三者一智了因二言了因三義了因廣如彼疏然此因支離十四過方為正因謂兩俱不成隨一不成所依不成猶豫不成共不定不共不定同品一分轉異品遍轉異品一分轉同品遍轉俱品一分轉決定相違法自相相違法差別相違有法自相相違有法差別相違然此三支共離三十三過并諸闕減等今非正意不能具陳然今論中雖説宗因譬喻不同因明三事合集成於比量但今文中或單舉宗義或雙舉宗因或舉宗喻或舉因喻如下論云一者法二者義此之法義但是因明前陳後説有法及法如立量云一心是有法定具三大故為宗因云以有真如生滅二相故此但舉其宗因而不引喻或云真如是有法定不可立不可遣故為宗因云以一切法悉皆真故皆同如故此亦但舉宗因也餘皆例知若以此論對五性宗具足三支應立量云一真如性是有法定能隨緣故為宗因云是有為法平等所依故同喻如虗空能令下結指謂前妙音等為能顯法義理趣為所顯由前巧便遂令義理明顯可見也此上二段即前洞契巧妙之相上之巧便即前智也同記心輪此之音顯即前辨也同佛正教神通輪矣五依本五依何本謂依佛聖言及正道理定量為本記依何本者此徵菩薩造論必有所憑若無依據便同虗誕佛聖言即至教量正道理即比量定量即現量至教者謂一切智人無所不鑒具足五語言必誠諦依此立論決定可信無有虗妄故取為本聖言之語通於三乘餘人有所不知由是揀之故言佛也次先標比量者以論宗經故比量者謂藉衆相而觀於義衆相者謂因三相由彼為因於所比宗義有正智生了知有火或無常等今言正道理者為簡一切邪謬因故若因不正宗義亦邪由是故言正道理也現量者謂無分別若有正智於色等義離名種等所有分別現現別轉故名現量此有四類一五識身二五俱意三諸自證四一切定心此上四種皆現量也今言定量者以此四義緣色等境是決定故亦可前正道理中具含二量謂比度生解及自證知俱無謬妄咸正道理定量一句總指三量俱是決定取此為本可信從故六藉力六藉何力謂歸命三寶請加承力記藉何力者此責論主依經造論上欲契聖下欲利凡流至後代破邪立正俾世世不絶燈燈無盡為用自力為假他威耶歸三寶者謂三寶吉祥一切衆生最勝良田有歸依者能辦大事生諸福智能離生死得涅槃樂故佛滅度凡諸弟子所有著述皆歸三寶示學有宗不自專己離過失故今乞威加承力而作必至後代人無不信然加有二種一顯加謂現身説法二冥加但暗增智慧今通此二也能歸所歸如下廣釋七為義七為何義謂助佛揚化摧邪顯正護持遺法令久住世報如來恩記為何義者此責既假三寶威加造立茲論有何義意切慕此耶助揚化者如助謂贊輔揚謂發揮化謂教導是則贊輔如來發揮法門教導羣品以十方諸佛迭為師資互相贊弼令法道流行衆生受化今論主示居因位師我牟尼宗經造論故云助化摧邪顯正者謂如來在日邪見者佛自調伏佛滅度後苟有斯類人無制止今論主為摧彼邪徒令邪教不興立我正法令生正見故下論中顯示正義對治邪執是也護持遺法者謂佛所説法門至滅度後總名遺法今造論發揚令無墜地者名為護持展轉弘傳燈燈不絶以至來劫名久住世報如來恩者佛留教法意在傳弘展轉度人令至大果若不傳演逆佛本懷是謂辜恩苟能顯發妙門光昭大教衆生獲益不絶大猷斯則順合佛心雅稱宗祖名為報恩也故智論云假使頂戴經塵劫身為牀座遍三千若不傳法利衆生畢竟無能報恩者若有傳持正法藏宣揚教理度羣生修習一念契真如此是真報如來者然上五句説有二意一則各自別説一句是一意謂助佛揚化故摧邪故顯正故等二則躡迹通論從一至五展轉相由即助佛揚化者為摧邪故摧邪為顯正故乃至報如來恩故八因緣八以何因緣謂令衆生離一切苦得究竟樂記以何緣者此責如上所為本緣何事耶令衆生者三聚五性一切衆生也離一切苦者離三苦八苦分段變易二生死苦也得究竟樂者謂得無上菩提覺法樂無上涅槃寂靜樂一得永得更無退者揀異人天二乘故云究竟九由起九由何起謂由菩薩大悲愍物迷謬記由何起者此責菩薩造論之心因何而起大悲者即同體無緣揀非愛見故云大也愍謂哀愍即能悲之心物謂衆生即所悲之境凡夫戀生死執常樂我淨故云迷二乘愛涅槃著無常等四非其正趣認以為正故名為謬造論為彼令反迷為悟捨偏入圓也十機益十機何益謂令生信得聞思修慧證入因滿記機何益者既為衆生造論其有被此化者得何利益謂令下有四益信謂十信聞思修慧即三賢證入即十地因滿即究竟位此則未信者令信未解者令解未行者令行未證者令證未涅槃者令得涅槃始從凡夫終至等覺受斯化者咸得利益本疏則云六益謂信及三慧證入因滿大同小異開合兩通然上十因意義相續若不料簡寧免混然今近取譬令無所惑如構大廈先要有解起造之解合二智也次列所造廳堂癢序等合一心二門三大等三明其相間架向背等合分三大等四能造器斤斧墨尺等合妙音善字等五有所憑準依經依匠合三量等六旁藉陰功禴祭先靈合三寶加祐七上安所尊父母等合報佛恩八下癊來裔子孫男女合為衆生九念情深厚有恩有愛合大悲愍物十各得所安隨彼穩便合信解入證如上配合顯然不同由是十文無相濫矣又此十中有因有緣有通有別通則因緣不分謂此十段總是造論因由緣起故別則第九為因第八為緣前六則因緣所資七十則因緣之果又此十中不出悲智謂第一是智第九是悲二三四五六七是智之相八十二門是悲之相也然論文之中自有八種因緣與此有同有異同則疏論兩文不出悲智二種異則論中但直述自己所懷為法利物疏則具敘論主化智巧便妙權開示承力護法上報下化問論中何故不具敘耶答疏敘他意故可具陳論主述已但明所為若同疏中便成自伐故不具敘二藏攝二初標門二釋義初標門二約諸藏所攝者記三二不一故云諸皆能含攝故名藏謂明此論於三二中攝屬何藏二釋義三藏之中對法藏攝二藏之中菩薩藏攝記三藏者經律論也此約所詮戒定慧學增勝而立謂詮定增勝名為經藏詮戒增勝名為律藏詮慧增勝名謂論藏言增勝者以一一藏通餘二故第一經藏者梵云欲底修多羅或云修妬路素呾纜此云契經契謂契當所詮法義契合所化機心經謂貫穿所説義理令無散失攝持所化物機使無顛墜故佛地論云貫穿攝持所應説義及所被機故契經即藏持業釋也第二律藏者梵語毗奈耶或云毗尼或云毗那耶義翻為律以明持犯法則軌度有如此方條法之制取此類也律法也古翻為調伏謂調鍊三業制伏過非調鍊則通於止作制伏則唯明止惡或翻為滅謂身語意惡焚燒行人義同火然戒能止滅故或云清涼以能息惡炎熾相故此則俱就所詮之行彰名調伏之藏等依主釋也第三論藏者梵語阿毗達磨此云對法法則所對之境謂無為涅槃及四真諦對即能對之心謂理量二智此二對彼妙盡理源揀擇法相分明指掌如對目前名為對法即對法之藏依主釋也此論屬彼定非經律故云對法藏攝問瑜伽論説謂諸一切了義經典循環研核摩呾哩迦據此則對法藏攝亦是佛説此論既是佛滅度後菩薩所造何得亦入對法藏耶答佛所説法有其三種一佛自説二加他説三懸記説今則後説也故摩耶經云佛記馬鳴然正法炬滅邪見幢善説法要既蒙懸記即同佛言故得此攝問若言懸記故得入論藏者豈佛滅後一切造論菩薩盡是懸記耶由斯難故今助一解以佛所説雖有論議並屬經藏以十二部俱名經故菩薩造者但名為論或宗彼經或隨解釋故此所攝亦不相違二藏者此則約人所立也謂於三藏之中詮示大乘理行果故名菩薩藏詮示小乘理行果故名聲聞藏故莊嚴論及攝大乘説由上下乘差別故有聲聞及菩薩藏然約人説人有三乘合分三藏以緣覺人多不藉教出無佛世或出佛世即攝屬聲聞以四法之中理果同故由是但立二種藏也若據教行有別亦可開為三藏故普超三昧經及入大乘論説以約別義開為三藏今依莊嚴等論約於同義合為二藏開之與合各隨一意耳然三藏之中各具二藏二藏之內各有三藏但約人約法分此二三廣如圓覺疏所辨菩薩藏攝者以是大乘非詮小故故此所攝三教義二初總標二別列初總標三顯教義分齊者有二記教是能詮義即所詮以所詮義顯能詮教即知此教分齊所至也二別列二初教二法初教二先開章次釋義先開章一約教詮法通局顯分齊謂以義分教教類有五記詮法通局者通則大乘終頓圓以被機廣故詮義深故局即小乘及大乘始教以詮法淺故被機狹故又深必該淺故云通淺不至深故云局又一經能含多教故云通一經唯詮一教故云局以義分教者由諸家多約時分教有所未允遂招諍論敘彼如別所明今以義分故無舛謬此則義為能分教為所分得知教之淺深者由所詮義有近遠故次釋義二初總敘諸教二與論相攝初總敘諸教五初小教二始教三終教四頓教五圓教初小教一小乘教但説我空縱少説法空亦不明顯但依六識三毒建立染淨根本未盡法源故多諍論記小乘者運小根至小果故如羊鹿車但能引輕不能致遠故名小也但説下釋相也即正辨所詮之理但猶獨也唯也我空者此教所明凡有所為皆因緣力中無主宰故為我空縱少説者阿含經云無是老死無誰老死既言無是老死即是法空之義雖有此説以百無一分故云少説但標而已更不解釋故不明顯以非教之正意故今望大乘分明顯了義邊故名為但如河少水亦名無水故但依下所依根本六識者即前六識彼教三宗所説有異謂經部無別心所有部有別心所覺天所説唯一意識隨六根轉無別六異三毒者貪瞋癡使害物最深能損法身慧命故受毒稱染淨者若以此三為能熏現在色心為所熏造業受生輪轉三界此為染根本若以無貪等三為能熏現在色心為所熏斷煩惱出三界此為淨根本染之與淨由三有無除此更無所依故云但也未盡下結成不了不達如來藏心本具無漏功德故未盡淨法之源不了根本不覺是有漏因故未盡染法之源此教尚不詮七八二識豈況無明法性耶故云未盡等多諍論者二十部分宗各不相與如羣盲摸象紛然是非故云諍論苟盡其源安見如此二始教二大乘始教亦名分教於中但説諸法皆空未盡大乘法理故名為始但説一切法相有不成佛故名為分記大乘者運大根至大果故如牛車引重可以致遠故名大乘下四雖權實有異以通對小乘故總名大乘也始分二教者且標兩名此中二教各詮一義是謂空相非謂一教而有二名但説下明所詮理即諸部般若明心境染淨等並空始自色心終乎種智無不如幻故云皆空般若云無色無受想行識乃至無智亦無得等又經云若有一法勝過涅槃我亦説為如夢幻等未盡下判為不了大乘法理不空不有而空而有既但説空當知未盡故法鼓經云一切空經是有餘説中論云空是大乘初門故言始也又云以有空義故一切法得成但説下即分教也一切法相者明所詮法然一切言不出五位一百法謂一者心法有八二者心所有法有五十一三者色法有十一四者不相應行法有二十四五者無為法有六縱説真如無為是諸法性亦墮法相之數故云但説有不成佛下判為不了謂五性之中定性二乘無性闡提及不定性中三分之二必不成佛既不皆成即名為分三終教三終教亦名實教説如來藏隨緣成阿賴耶識緣起無性一切皆如定性二乘無性闡提悉當成佛方盡大乘至極之説故名為終以稱實理故名為實記終實二教者標名也此只一教以對前二故立二名非同於前二教異也説如來下順明緣起即生滅門故下論云心生滅者依如來藏故有生滅心所謂不生不滅與生滅和合非一非異名阿黎耶識等即前云不變性而緣起緣起下逆明緣性即真如門故論云心真如者即是一法界大總相法門體所謂心性不生不滅乃至一切法不可説不可念故名真如即前云不捨緣而即真也斯則從本起末故云隨緣末即同本故云無性如範金為器器即是金定性等者三聚五性一切衆生皆有如來藏心總皆成佛故涅槃經云凡有心者定當作佛圓覺云有性無性齊成佛道上皆明所詮之法方盡下判為了義詮法窮源故云至極也對前未盡終於始故名為終教非同法相故云實理分教不了乃屬於權此中了義故云實教四頓教四頓教總不説法相唯辨真性亦無八識差別之相訶教勸離毀相泯心但一念不生即名為佛不依地位漸次故説為頓記頓教者標名也一直而談更無委曲不歷階漸唯指本源故稱為頓總不下釋相也法相者謂遍計依他色心假實法相雖廣不出於斯此既不説故名為總不説即揀分教但説法相唯辨真性者此揀始教但説諸法皆空今説不空妙有即圓成實性也此性圓滿成就凡聖因果平等所依只談此法故云唯辨此二句且略標揀也下即廣示亦無等者釋不説法相也八識是法相之源一切最勝以勝攝劣故唯舉此然識如幻夢唯是一心故云亦無此中舉識以影所緣也請教者斥其無實肇公云名無得物之功故圓覺云修多羅者如標月指若復見月了知所標畢竟非月下文亦云一切言説假名無實但隨妄念不可得故勸離者令不執教使其捨詮也故下文云從本已來離言説相離名字相淨名云乃至無有文字語言是真入不二法門又云至於智者不著文字文字性離即是解脫達磨云我法以心傳心不立文字等能詮教既亡所詮義亦遣故但訶教勸離也毀相者凡所有相皆虛妄故此則亡所證境也泯心者心生則種種法生故此即亡能證智也經云幻塵滅故幻滅亦滅又云亦無能證者此乃妄識妄緣能詮所詮能證所證一切都泯故下文云一切法從本已來非色非心非智非識非有非無畢竟不可説相但一念等者念生既是凡夫相現性隱不生宜名為佛性顯相亡是故剎那登妙覺等佛於一朝故觀師云一念不生前後際斷照體獨立物我皆如更不假餘方便故云但也此則釋前唯辨真性不依下結成頓義既一念成佛豈立位焉位既不存不亦頓乎故思益經云得諸法正性不從一地至於一地圓覺云知幻即離不作方便離幻即覺亦無漸次五圓教五圓教所説唯是法界性海圓融緣起無礙相即相入帝網重重主伴無盡記圓教者謂此教中該收前四圓滿具足性相俱融剎海塵毛交遍互入即華嚴宗也所説下一真法界也謂所説理事心境人法聖凡染淨等法以要言之未有一法離於法界故云所説唯是法界或可此句是總標下皆別列性海圓融者理法界謂理性深廣故如海也理體周遍無有一法而不融攝故云圓融緣起者事法界謂衆緣所造心境染淨情器因果大小一多各不同故無礙者理事無礙法界也謂緣起事法皆是理之所成緣起無性不礙於理理能隨緣不礙於事故得理事二無障礙相即相入下事事無礙法界也謂諸事法各全攝理即理之事互不相礙故得一一事法相即相入一即一切一切即一一入一切一切入一互為主伴重重無盡如天網珠光影互入無礙無盡也然上五教所詮不出性相性相相望料揀應成六句一唯相非性小乘教也但説法相不言性故二唯性非相即頓教也唯辨真性毀相泯心故三相多性少即分教多説法相少説性故四性多相少即終教多説法性少説法相縱説法相亦不離性故五非相非性即始教但説諸法皆空未顯真如性故六全相全性圓教也謂説一真法界全體而起成染淨法即全相也染淨起時性體不隱全是真如即全性也又此五教與天台化法四教相望但開合有異而大況是同彼則開前合後此則開後合前四教者謂藏通別圓也且如此中初小乘教即彼藏教第二始教此有二類一始教但説諸法皆空即彼通教也二分教但説一切法相即別教也第三終教明如來藏隨緣成諸染淨緣起無性一切皆如即彼圓中雙照義也第四頓教唯辨真性即彼圓中雙遮義也第五圓教明性相俱融即彼圓中遮照同時義以此三教所詮唯是一心具一切法即彼圓教不思議中道也故此三教皆屬圓收此即合彼通別為一始教開彼圓教為終頓圓三彼即開此始教為通別二合此終等為一圓教雖開合有異而法無異也然彼更約化儀論四約時論五廣説如彼二與論相攝二初定分齊二明相攝初定分齊若於五中顯此論之分齊正唯終教亦兼於頓記正唯終教者以有生滅門説如來藏隨緣作阿賴耶成諸染淨義故兼於頓者以有真如門顯體離言依言辨德故然雖説兩門以真如門中但略顯法體而已如其生滅門中説迷悟辨聖凡論染則二礙三細五意六粗論淨則二身三大四信五行具辨染淨熏習廣明四位階降説斷證明解行但是一切世出世法皆在生滅門中所明既而廣略不同故於二教以判兼正也二明相攝若將此論與五教互相攝者五唯後三攝此此唯攝五前四記五唯下以教攝論五教為能攝此論為所攝也後三攝此者終頓圓也謂此論中説如來藏緣起是終教説真如門是頓教又真如門是理法界生滅門是事法界二門不二理事無礙法界一心是一真法界此即圓教故後三教攝得此論若以理推此論亦有前二教義亦應前二攝得此論此唯下以論攝教此論為能攝五教為所攝也攝前四者此論備有前四義故不攝圓者以四法界中唯有三種而不明事事無礙以圓教宗於事事無礙義既不全故非攝彼然以義推亦合攝彼彼文四種統唯一真法界今論一心之體正是一真法界是彼圓教之宗耳又彼事事得無礙者皆由真如隨緣故也故知真如隨緣是彼事事無礙之由故得攝也若以前科望於此義前文合云正唯終教兼於頓圓也音釋協音亦合也又和於十衆也研音年磋磨窮究也核音核考校也綆音梗汲水繩也諡音益應用諡音示誄行立號以易名也諡非音魁寬大貌繹音亦解也又翻閲經書尋究之也璿音前美玉印度此云月氏國名噳音語儞同你緒音序綸緒也頭緒也筌音詮捕魚器音弟兔網陀羅尼此云總持咒名粹音瑞精純也賾責宅二音深也雜也沖音充深也邃音遂幽深貌波斯匿翻勝君王名岐音其路旁出也屯音豚聚也迢音條相遠各別也揆音葵等齊也謐音密靜也安也躍音藥舉其身而上也跳糶迢二音並足起也韜音叨藏斂也傭賃音庸任雇役於人也瞑眩音冥衒飲藥之毒而閉目也瘳音抽病痊也悼音道歎也爰音元曰也慨開上聲無聲之歎也罕音喊希有也撈漉音牢六同撈摝沉取之也泳音永遊也眸音牟目瞳也阿顛迦此翻無善心斷善根者觴音傷杯名濫觴者謂泉之始流不過杯水泛溢而已溯洄音素回逆流而上也挹音邑酌也抒也蔗音遮甘蔗邈音渺高遠也幹音干辦也拙音執鈍也捷音夕敏也迅音信速疾也迦陵頻迦此云妙聲仙禽也壅音雍堆塞也闔音合閉也析音息分剖也誕音但虗妄也揮音輝發揮迭音狄遞代也弼音鼻輔佐也辜音孤負也猷音猶道也謀也構音姤造也廈音夏房舍也庠音祥序也架音駕屋之間架也斧音府斧鉞禴音藥祭祀名廕音蔭覆庇也裔音衣後嗣也呾音怛哩音里舛音喘差錯也摸音模手摩也闡提華言信不具無信心者
