body:
  text: 唐西京太原沙門法藏述疏終南草堂沙門宗密録注宋秀州長水沙門子璿修記清錢塘慈雲沙門續法會編順天府府丞戴京曾閲定二別解一用大二初總明二別釋初總明二初對果舉因二牒因顯果初對果舉因三初舉本正行二舉本大願三舉大方便初舉本正行記正行慈悲波羅蜜等行也復次真如用者所謂諸佛如來本在因地發大慈悲修諸波羅蜜攝化衆生記初句牒前以標起也所謂下依義以解釋也本在因地等者為菩薩時所行諸行以慈悲為本也攝化衆生者無不先以利他為首也波羅蜜者謂以諸度攝令附己化令從善也以布施攝貧窮持戒攝毀禁等此通二利故維摩經云資財無量攝諸貧民奉戒清淨攝諸毀禁以忍調行攝諸恚怒以大精進攝諸懈怠一心禪定攝諸亂意以決定慧攝諸無智二舉本大願立大誓願盡欲度脫等衆生界亦不限劫數盡於未來疏盡欲度脫者廣大心也不限劫數者長時心也記廣大心者即四弘中中生無邊誓願度亦同金剛中佛令發菩提心人普度四生九類彌勒所釋亦云廣大心長時心者此同華嚴行願經說衆生界盡我行方盡以衆生界無有盡故我此行願亦無有盡上則約處橫說故云等衆生界此則約時豎論故云盡於未來三舉大方便疏謂舉悲智大方便也以取一切衆生如己身故而亦不取衆生相此以何義謂如實知一切衆生及與己身真如平等無別異故疏如己身者悲深也不取相者智深也兼上亦即不顛倒心亦可釋前長時所以何義者徵悲智深之所以也謂如實下依真如門答以顯深也記悲深者直見衆生如父母等亦不但見如同己身方為至深智深者了唯心故知諸衆生本無性故元無念故舊來涅槃不待滅故小乘權教不能亡此相者蓋緣智淺今實教菩薩反之故云深也兼上謂兼悲深不顛倒者衆生本與己同同皆無相故見異相即成顛倒今皆反此也長時所以者兼釋廣大所以疏文之闕略也若不能了同己身亡其相者豈能如此普度永度耶徵所以者意云以何義故得如己身而又不取衆生相耶依真如等者以此門中顯一切法皆即真故皆同如故故得彼身我身平等無二豈不愍之而欲度耶又既同一真皆悉無相誰為能度誰為所度故不取其衆生之相亦可以取兩句釋上廣長所以而亦句舉本大方便智此以下徵釋不取相之所以二牒因顯果以有如是大方便智除滅無明見本法身自然而有不思議業種種之用即與真如等遍一切處又亦無有用相可得何以故謂諸佛如來唯是法身智相之身第一義諦無有世諦境界離於施作但隨衆生見聞得益故說為用疏以有下一牒前因除滅下二自利果自然下三正顯用即利他果於中三一明業用甚深非待作意名自然業如攝論云如摩尼天鼓無思成自事等即與下二顯用廣大稱理之用故又亦下三用而常寂也於中先正顯何以句次徵難佛具三身何以乃云無有用相謂諸佛下三釋通若廢機感論如來唯是妙理本智更無應化世諦生滅等相但隨緣起用用即無用如波即水故用恆寂也涅槃經云吾今此身即是法身等梁攝論云唯如如及如如智獨存名為法身但隨下雖真理妙智本來常湛而隨機感益用無邊即寂而恆用也記方便智者說有通別通者方便即智復有二義一者謂隨順出離之智皆方便故此通金剛無間已下不唯地前故十地位後名為滿足方便圓覺亦云雖有多方便皆名隨順智二者此智是大悲之方便故若無智為方便則非大悲墮愛見故故前說衆生而不取衆生相疏中釋為智深也然有因智而起悲知物同己方欲度故或因悲而起智不知所以裁之學方便故兩說兼通別者證真名智涉俗為方便即根後之異名也謂斷根本無明見法身是智之功起不思議業化利羣生是方便力也今此通別兼具自利果者同於智淨相也果位法身即是因中本覺舉因顯果故云見本法身前舉果顯因則云依法身說本覺與此互相顯也不思議業相微妙難解心言罔及故云業用甚深不用先謀而後起化故曰非待作意攝論等者具云若佛果是無分別智所顯離分別者諸佛何得依衆生作利益事如理不顛倒無功用作事故重說偈曰如摩尼天鼓無思成自事如此不分別種種佛事成此顯如來三業皆無功用而作俱不思議摩尼梵語此云離垢亦云增長舊云如意此喻如來身意二業若隨其所對現像不同即喻佛身業若隨人所須出種種物即喻佛意業也天鼓即天帝所有修羅軍來其鼓音中自然出聲則言賊來去言賊去喻佛口業也此之二物雖有其用而無思慮故可喻佛自然之三業爾成自事者現像發聲各隨其用而辦事業亦可取珠鼓自事但喻身口皆無思慮同喻意業也稱理用者以即體之用體遍用亦遍俱無有方所故遍一切處若不然者豈曰真如用耶又亦無相相者前無所化衆生相此無能化應用相望於前文故云又亦用常寂者無用之用用即無用故雖現種種身不動真實際雖說種種法常住無言理徵中三身者言雖通舉意責化身化身是用相故三釋通中分二段初約理智以明無用是用即無用也法身即法性身下云法身無有彼此色相智相身即智身下云色體無形說名智身又以此二身合之即為真身也以理智無二故此則約二身以顯體寂也第一等者約二諦以揀用無也意明是無相故非世諦也是無為故離施作也廢機者不對衆生說也妙理即法身本智即智身凡是有相皆屬世諦以從機感緣所生故今既廢機故云更無但隨等者有感斯應也既逐緣生緣無自性用則常寂故云無用此有二義一者屬因言無用因即悲智然有親疏疏即是智親即是悲依智起悲故故論云從後得智流出大悲心若無其因化終不起如二乘無悲凡夫無智何有化耶二者屬緣言無用即根熟衆生若無其緣化亦不起以十方土中有無佛世故斯則二義相須因緣具足乃得成辦既屬因緣何有化體而可得耶如波下喻故用下合寂即體也故還源觀云用則波騰鼎沸全真體以運行體則鏡靜川澄舉隨緣而會寂涅槃下引證此身者化身也等者彼文具云吾今此身即是常身法身金剛不壞之身以三身皆有常義故復言法有以揀濫也恐人不曉法身之相故乃舉喻猶若金剛不可壞也如如即法身智即報身獨存者法報合故重牒如如表無二故名法身者攝智歸如約本立稱然涅槃即攝用歸體攝論即直顯真身雖言說不同而義意不異但隨等者二隨機感以明有用誠無用之用也雖真下經云佛真法身猶若虗空應物現形如水中月寂而常用斯之謂也二別釋二初標徵二釋義初標徵此用有二種云何為二疏有二標也云何徵也二釋義二初正顯用相二問答除疑初正顯用相二先直顯其用次重牒分別先直顯其用二初應身二報身初應身二初約識舉人二釋其所以初約識舉人一者依分別事識凡夫二乘心所見者名為應身疏一下凡夫二乘不知唯識計有外塵即是分別事識義今見佛身亦謂心外順彼事識分別計度故說依分別事識見也亦可此人雖覺六識不知彼七八識故但云依事識也名應身者依此粗識分別但見應化粗相不見報身細相記依分別句約識也凡夫下舉人中先舉能見人心名為句次舉所見人身亦可依下辨能見名句明所見疏中凡夫下初明凡夫等雖知七八但順事識又二先通明不知諸法唯識凡夫即十信已還一切凡夫也信位雅信真如已知唯識然其事識粗顯猛利任運分別心外法也不知等者謂不知法唯識現即是依順事識義也今見下次別明不知佛身唯心法通染淨諸境佛則屬於淨境亦謂外有迷唯現心也亦可下後明二乘等唯覺六識不知七八二乘迷於本識故是則前以事識為所依今以事識為所覺言所覺者但能知有非謂覺斷既唯覺事識故不依七八也依此粗識等者其猶明鏡對質現像不同豈有質陋而像美耶斯則妍在質而鏡無好惡應身之目由此而立二釋其所以以不知轉識現故見從外來取色分齊不能盡知故疏釋上見粗所以也不知識現者迷於唯心取色分齊者不達即色是心無有分齊記先略消論文也不達者色自心生本無其體元是自心心無分齊故令色等亦無分齊今凡夫二乘不達此義見從外來故作分齊而取也疏問佛身何故唯衆生識耶答衆生真心與諸佛體平等無二但衆生迷自真理起於妄念是時真如但現染相不顯其用以彼本覺內熏妄心故有厭求有厭求故其用即現厭求劣故用相即粗厭求漸增用亦漸細如是漸漸乃至心源無明既盡厭求都息始覺同本用還歸體平等平等無二無別未至心源已還用於識中隨根顯現故云識中現也記次廣陳問答也通有十四初佛身凡識不分難衆生識者以論云不知轉識現故意明佛身是轉識所現而凡小不知今問意云轉識有漏屬於衆生應身無漏自屬於佛何故淨身唯茲染識豈非凡聖染淨不分耶答衆生下二源同派異迷悟答衆生至無二者標本也衆生是妄以對於妄故言真心諸佛是相以對於相故云其體平等者顯無增減無二者一體不分謂衆生真心即是諸佛之體無有增減不分二別但衆生下釋未顯用也以無明有力遂令真如體隱但現染法起於九相真既無力故不能現應身淨用如水為風所擊但起波而不能現像也以彼下出用顯所以也內熏妄心者如前文云以有真如法故即熏習無明令其妄心厭生死苦樂求涅槃等今文通說故云熏妄心厭求劣者凡夫二乘雖有厭求而未能起勇猛精進唯心廣大觀行故所現用但是應身粗而且顯厭求增者三賢已上乃至十地所見報身漸漸微細以隨厭求增勝現故厭求息者無明盡故所證窮故始覺等者無妄可斷故始覺同本覺無生可度故化身歸法身平等者始本平等真應平等故再言之無二無別亦復如是未至下結答既佛身粗細皆由欣厭勝劣此不亦唯識之義耶是故論云轉識現也疏問若據此義用從真起何故說言轉識現耶答轉識即是黎耶中轉相依此轉相方起現識現諸境界此識即是真妄和合若隨流生死即妄有功能妄雖有功離真不立若反流出纏真有功能真雖有功離妄不顯故就緣起和合識中說其用耳記三真起識現相違難意云上說隨流迷真故不起用反流悟理是故起用當知此用是從真起何得論言轉識所現答轉識下四隨流反流相資答依此等者論云以依能見故境界妄現此識等者轉識是真心隨流所成性相不離故云和合和合即黎耶識也離真不立者妄必依真如波依水故論云一切心識之相皆是無明無明之相不離覺性又依覺故迷若離覺性則無不覺離妄不顯者以用不自起必假於緣此有二義一約自體說謂衆生本有真如是用之體若無妄心為所熏緣而此真用莫之能起起之何為以有妄心為所熏故即顯真心有其功力令其厭求漸於自識而現用相也二約佛體說謂佛應化之用若非衆生為緣亦無由起起亦無用彼此推之誠由妄也若離於妄實無用相故真如門唯顯自體及至果海亦泯同一覺故下文云無有彼此色相迭相見也次前疏云用還歸體平等無二故就等者如淨眼人不見空華全失明者亦不見華患熱翳者乃見空華故華嚴云如翳眼所觀非內亦非外世間見諸佛應知亦如是疏問若據此義乃是衆生自心中真如之用云何說言佛報化耶答衆生真心即諸佛體更無差別故華經嚴云若人欲了知三世一切佛應觀法界性一切唯心造又不增不減經云法身即是衆生衆生即是法身法身與衆生義一而名異既從法身起報化用何得不是衆生真心耶記五心佛外佛差別難意云若如前說真如之體假於妄緣而起用者斯則衆生自己真心粗細之用何得說為他佛報化身耶答衆生下六心體佛體無差答意云衆生真心既即諸佛真體當知衆生所起應化即是諸佛應化此即先指體同也華嚴下引證義一者體也真如之體無差別故既從下結答用同據前答問合云何得不是衆生真心之應化耶疏文但結法身法身即是衆生真心故存略也疏問義若然者衆生心佛還自教化衆生何故說言佛悲願力答即此真心是佛悲願謂無緣大悲及自體無障礙化用等即性起大用也記七師資義一文異難意云若言佛法身起用即衆生真心之用者斯則自佛起用還自教化何故復言佛悲願力熏令起用耶答即此下八文異還同一義答意云佛之悲願即是衆生真心之悲願無二無別若就佛說名佛悲願若就衆生說即是真心之悲願也謂無下釋成謂真心即是悲願性故性是佛體佛體所起之用宜名佛悲願也猶如一物本屬大家男女各用皆稱己有性起者性無彼此用何成二耶疏問衆生既無不有心何不早起化用令滅無明答未有厭求故記九心佛不起化用難以前云衆生真心即同佛體諸佛應化即是衆生用故意云衆生真心無不皆有何故諸佛能起化用衆生不能起耶答未有下十未起厭求乖用答以彼本覺內熏妄心有厭求故其用即現厭求不起故但現染相用亦不顯如前第二答中所說詳之疏問既先有本覺何不早熏令起厭求答無明厚薄不同因緣互闕不等此如上說記十一不能熏令發心難如前所說衆生所以能起厭求者皆由本覺內熏之力既若元有本覺何不同他諸佛早熏起厭求耶答無明下十二引前因緣互闕答廣如前自體相熏習中問答所辨疏問若真心即是佛者何故下文云從諸波羅蜜等因生答此約本覺隨染義說然其始覺覺至心源平等一際有何差別記十三真佛何假修因難意云若從行生則本未是佛何得前云衆生真心同諸佛體而論應化之身乎答此約下十四因果無性同源答意云所言從行生者但以本覺隨流成染始覺反流成淨故有行致之說如其尅就真心則與佛體竟無有異此則因果迷悟悉無差別今疏一向約始覺同本覺顯無差別者以果例因也疏上來約終教說若約始教說者即以諸佛悲智為增上緣衆生機感種子為因緣故託佛本質上自心變影像故云在自識中現也餘如瑜伽唯識等論中說也記後權實對辨實教如上所說若權教所明衆生諸佛互為增上緣故在於自識而現影像今此疏中且就衆生一邊而論故假佛悲智為增上緣自識有見佛種子為因緣托佛所現化身為本質然於自識變起影像而見於佛唯此影像是自識現故云唯識若彼本質自攝歸佛識非屬衆生若如此說還是於自識外別自有佛本質何成一切唯心此分教明衆生與諸佛各各有唯識也非同今疏文中所說應化唯是自心所現縱說由佛悲願此亦自心悲願無二無別此是實教明諸佛與衆生唯一真心也故今引彼對辨要知權實有異也餘如下廣指說處二報身三初約識舉人二所見報相三結果由因初約識舉人二者依於業識謂諸菩薩從初發意乃至菩薩究竟地心所見者名為報身疏十解已去菩薩能解唯識無外諸塵順業識意以見佛身故記究竟地即第十地非謂妙覺也順業識者謂業相展轉現諸境界是則境從識生十住已去諸菩薩等深達此理依此修行故見報身佛也初發意言即信成就發心也亦可初信已去名初發心此中但是依三昧心所見者即前平等緣也二所見報相身有無量色色有無量相相有無量好所住依果亦有無量種種莊嚴隨所示現即無有邊不可窮盡離分齊相隨其所應常能住持不毀不失疏身下初正報身無分齊故依色有相相亦無邊依相有好好亦無盡然相以表德令人敬德以念佛好為嚴身令人愛樂欲親近也所住下後依報能依無邊故所依土亦復無邊頗胝迦等殊勝之寶常放光明無礙校飾故離分齊相者異前化身分齊之色由此菩薩知分齊即無分齊故一一色相皆遍法界互融無礙自在難思故也隨下隨其業行所應感者即皆常住非三災等之所壞也記先別明二報中初正身無分齊者無量色即無分齊故經云如來色無盡依色有相者色即是身依彼色身有大相也依相有好者即依大相流出小相斯則身有異相相皆妙好也然相下釋現相好意也楷公亦云表德名相愜情稱好若無功德則不敬重若不敬重則不憶念以念佛者利益深故故現相也世人苟能易彼常情念世美色之心而念無相者則其道可庶幾矣然吾未見好德如好色者也悲夫嚴身者嚴飾佛身令其妙好若不妙好則不愛樂若不愛樂則不親近不親近故則不聞法乃至解脫佛意在茲故示其好智度論云醜人說妙法聽者心不欣肇公云為尊形者亦相好爾豈俗飾之在心乎所住下二依能依等者依正相稱皆廣大故以無邊功德之身住無量莊嚴之土是所宜也莊嚴之相具在諸經不能備引頗胝迦者此云水玉或云水珠隨所下次通明無盡先橫顯無邊此明正報即根根無邊依報即塵塵周遍不可窮盡者以無有涯畔故由此下釋見無分齊所以以菩薩順唯識理了色唯心無有分齊由此解故所見之相稱彼觀心皆遍法界互融自在也地上已去親證此理故無所疑然於其中隨彼智力所見優劣淺深不同如下論云地前少分見若得淨心所見微妙乃至菩薩地盡見之究竟今就通說不分優劣下文自知隨其下次豎顯無窮若常有感佛之機佛則為之常住苟不見者非其器故功過在機不在於佛如月於器不顯現者由器破故如下即明非三災等水火風也如次能壞初二三禪且第四禪未出三界尚不能壞名不動也況佛之果報出超三界依真而住豈可壞耶故法華云常在靈鷲山及餘諸住處衆生見劫盡大火所燒時我此土安隱天人常充滿若準華嚴所說無有一法不是毗盧遮那佛身無有一塵不是華藏世界海今意同彼故依正皆言無量壽等也三結果由因疏結果由因以釋名也記結果等者意令衆生修樂因證樂果也此與前科相次正同華嚴四分之初二也準地持論十信種因十住已去解方便初地分得八地已上圓滿相續佛地究竟如是功德皆因諸波羅蜜等無漏行熏及不思議熏之所成就具足無量樂相故說為報疏如是依正二報無障礙不思議事皆因十度深行之熏及本覺不思議熏二因所成樂相圓備故名報身記如是下結果由因也初一句結上依正二果皆因下有三因諸波羅蜜等是緣了二因總名資熏不思議熏是正因習熏也具足下釋報身名也以報是酬因為義上之依正皆無量者為酬因時無漏不思議所熏修故記二報無障礙者謂依正不相妨小大互相入根根塵塵皆遍法界互現無盡此有六句謂依中現依依中現正依中現依正正亦如是故云無礙不思議事者橫無邊際豎無窮盡不壞諸相一一周遍殊勝清淨豈思議之所及乎十度謂施戒忍進定慧方便願力智深行者皆順性故如下所說於真如法中深解現前所修離相等二因者生了也即緣了二因俱名生因正因即了因也但開合異爾樂相等者報既酬因必須相稱因修既妙得果寧粗故此樂相名為報也次重牒分別記重分別者廣明前之二身隨見差別也亦分為二初應身二報身初應身又為凡夫所見者是其粗色隨於六道各見不同種種異類非受樂相故說為應疏簡凡異小如三惡道習見佛如黑象腳等三尺之身又如提謂等以人天位見佛為樹神及天神身等準此即六道衆生並見佛不同也皆非出世相故非樂也如二乘人等見佛為出世是阿羅漢等聖人身記簡凡異小者此且說凡夫一類所見不論二乘斯則十信已前異生凡夫也黑象腳等者觀佛三昧海經云觀佛相好者如人執鏡照自面像若生垢惡不善心者見佛純黑猶如炭人釋子衆中有五百人見佛色身猶如灰人比丘衆中有一千人見佛色身如赤上人優婆塞衆中有十六人見佛色身如黑象腳優婆夷衆中有二十四人見佛色身猶如聚墨如彼經第三說五百釋子昔毗婆尸佛像法之中有長者子名日月德有五百子不信佛法同遇身病父即教令稱三寶名敬父教故三稱未畢而各命終以稱佛故生四王天天上命盡以邪見因墮大地獄為苦所逼憶然之教乃稱佛名以念佛故從地獄出生貧賤家如是尸棄乃至迦葉佛出但聞佛名不見佛形以聞如是六佛名故生釋種中宿業因緣見佛灰色佛令稱七佛及彌勒名號并稱其父雨淚懺悔乃見如來金色相好成阿羅漢又有一千比丘於然燈佛末法之中出家學道於和尚所生不淨心其師已是阿羅漢果後諸弟子隨壽修短將命終時無所依怙師令一心稱然燈佛乘茲善力得生天上天上壽盡以前虗食信施之業墮餓鬼中八萬四千歲後墮畜生畜生罪畢為貧賤人復因前世出家力故稱南無佛以稱佛故八千世中常值佛世而眼不見乃至今日遇佛釋迦見如赤土正長五尺是時世尊即現𮌎上德字令比丘讀讀已懺悔見佛金色即為授記次第作佛又優婆塞衆中有十六人昔曾於閻浮提皆作國王隨順惡友非法說法墮阿鼻獄由曾聞法今得遇佛而見世尊如黑象腳佛令懺悔並見金色成阿羅漢又寶蓋燈王佛像法中有一比丘入淫女舍持鉢乞食諸淫女等盛滿鉢飯而戲之言汝顏色可惡猶若聚墨身所著衣狀若乞人比丘聞已擲鉢空中現通而去諸女見已悔恨發願由以施食因緣二千劫中常不飢渴以惡口罵比丘及淫欲因緣故墮黑暗地獄由前發願力故今得遇佛而見佛身猶如聚墨佛令懺悔成阿羅漢如是四衆各各異見差別不同由自業故觀佛色身優劣如是三尺身者即瞿師羅長者所見提謂等者佛於菩提樹下初成正覺提謂路過以根熟故佛力制之車馬不進渠謂山林神祗幻作如此遂尋見佛謂是樹神以偈歎問曰容顏甚奇特猶若紫金山未審誰家子種族是何人未知何所證因何此處居不食來幾日未知何所須佛偈答曰我是金輪王聖帝族中子厭俗如涕唾出家證菩提成道來七日無人施我食提謂即以蜜奉施聞法得果證須陀洹以提謂先未識佛疑為是樹神也二乘等者即聲聞見佛為老比丘相緣覺見佛為辟支也此亦未必是出世樂相然於鹿苑說法令其捨俗出家證果得樂即知先見佛為羅漢辟支定信是出世聖人身決不認作世俗凡夫苦報相也二報身復次初發意菩薩等所見者以深信真如法故少分而見知彼色相莊嚴等事無來無去離於分齊唯依心現不離真如然此菩薩猶自分別以未入法身位故若得淨心所見微妙其用轉勝乃至菩薩地盡見之究竟若離業識則無見相以諸佛法身無有彼此色相迭相見故疏十解菩薩等依比觀門見真如理是相似覺故云少分異前十信故復云深異後真證故但云信知彼下以見真如異於凡小是故得知色相等事性無分齊唯依下釋無分齊所以也攝論中地上見報身者彼據證之相應成就處說今此地前菩薩少分見者以知色境界但是識現不離真如即無分齊故得少分見也既非全見故不相違但以異前凡小心外取境見應化故故約唯心少分明見然此菩薩下簡異地上若得淨心下顯於地上所見用相過於地前故云轉勝漸漸微細至金剛後心業相都盡用即歸體故云見之究竟以窮其源故若離業識無見相者要依業識乃有轉相及現相故也以諸佛下若離業識等無明即唯是真如故佛無有彼此分別之見記論分三初住上分見劣四一能見淺深少分見者意明少分見報身之用由此菩薩以深信力入真如三昧能知法界一相所見報身知身無有去來分齊之相故後譯云初行菩薩見中品用見真如者由入似觀見真理故遂見報相無有去來唯心影現不離真如也知彼色相等二所見分齊無來去者不同凡小見佛王宮生雙林滅有來去相性無分齊者知事即理無去來相不可分別如像即鏡無定量故有本疏云性無分別者訛以下文云然此菩薩猶自分別故唯依心現等三釋其所以唯依心者了境唯識也不離真者知相即性也釋無句初正指論意攝論下次牒難釋通先難或問曰準攝論說地上菩薩方見報身云何今說地前亦見耶故此牒之彼據下二通彼論約證相應說今論說此菩薩發直等三心修無住等四方便隨順真如不執色相雖非親證故見而能信解深達唯心故見樂相雖見樂相亦不同地上親見微妙故前但云知彼色相無來去等也既非下三結會重辨若言全見即有相違既言分見足可會通如疏可知然此等四簡異登地以此菩薩雖達唯心猶未覺斷事識事識既在分別不忘不同地上得無分別證相應故若得等二地上分見勝淨心初地名也與證相應過於地前故云微妙從於二地至第十地漸漸又細故云轉勝地盡者第十地也然轉勝之言亦通能見之智以智用勝故所見勝也漸細者十重報相身土不同後後勝於前前故金剛後心即解脫道用歸體者約能見即始覺歸本覺約所見即報身歸法身他受用土歸法性土用既歸體則無所見故云究竟反此則未究竟窮源二字各通二義謂斷窮妄染之源即生相盡也證窮真如之源即法身現也第十地中所見報相最極微細此外更無殊勝之相故云究竟亦曰窮源以次文云若離業識則無見相故此十地正是相盡證窮位也若離下三究竟位無見二初明無見以佛位中更無報身可見之相以離微細念故唯一心在有何可見既無相盡又何證窮要依業識下反顯可知以諸等二釋所以法身無相彼此念絶一真平等何相見之有迭遞也二問答除疑二初問二答初問問曰若諸佛法身離於色相者云何能現色相記報應屬色法身既離於色云何能現報應之色如虗空無色終不能現色此可類之二答二初釋法身能現二釋所現之色初釋法身能現答曰即此法身是色體故能現於色所謂從本已來色心不二以色性即智故色體無形說名智身以智性即色故說名法身遍一切處疏即此下總也所謂下別也謂彼所現報化之色不異法身真心如波與水本來無二色性即智者明色即心顯前不二以色即心故遂令色相都盡故就其本但云智身智謂本覺心智也智性即色者明心即色顯前不二如水遍在波中記法身是色體者意明法身雖非是色而是報化之體故能現色即同虗空體非羣相而不拒彼諸相發揮疏言總者謂總標也別者謂別釋也先統論不二色心不二者性相同如體用一致也疏中法喻可知以色性下次逐明相即二初色即心色即智者報化之色對緣所成自無其性即以本覺法身智為體性法身之體既無形相以用從體遂令報化亦無形相以無形故故名智身智身即法身也故金剛論目法身為智相身化身為異相身顯前不二者謂色與心不二如波即水也以智性下二心即色智即色者法身之智既為色體報化之色現時即是全體起用即此報化遍一切時便是法身遍一切處也顯不二者謂心與色不二也如水等者明體遍在用中有報化處即有法身故華嚴云法性遍在一切處一切衆生及國土三世悉在無有餘亦無形相而可得二釋所現之色所現之色無有分齊隨心能示十方世界無量菩薩無量報身無量莊嚴各各差別皆無分齊而不相妨此非心識分別能知以真如自在用義故疏以彼真心無礙周遍所現之色亦復圓融自在無礙故云所現之色隨心乃至不相妨礙於中無量菩薩者亦是報身作用也亦可即是感報身大用之機緣皆能頓赴以一一根皆遍法界然互不相妨此真如之用非妄識能知記所現下先正釋隨心能現者有兩意一隨彼各各差別之心而現無量差別依正也二一切諸色皆隨真如心性所現遂令依正皆無分齊以心無分齊故世界所依處菩薩因位報身佛果能依人皆無量者橫應則彼彼不同豎說則地地有異故也莊嚴者通佛菩薩及與依報相好珍寶莊嚴之義廣如華嚴各各差別者依正不同身相有異故皆無分齊者正報則根根周圓依報則塵塵遍滿不相妨者顯前差別而無分齊也若有相妨即有分齊非成周遍又相妨故則壞諸根之相等今以不壞相而等遍故皆無分齊不動遍而各異故各各差別故云而不相妨此非下次遮疑恐常情聞此分別欲知及不能知便生疑惑故此遮止如小乘尚不知菩薩境界豈況凡夫能測如來功德耶以真如下出所以既是真如之用安可以有漏心識能知此顯不思議也記疏中二先釋所現等九句又二初約義通明心能示也色所現也以彼二句舉能示現之心所現三句出所示現之色於中下二牒句逐解先菩薩一句又二初約能化釋準華嚴說具有十身之異豈唯菩薩耶亦可下二約所化釋然前正後兼也頓赴者既多機頓感佛亦頓赴是故報身亦無量也此即機應無礙以一下次各等三句對文如次配知即大小無礙也此真下後釋此非等二句前後不次釋者欲彰文義妙故二會相入實顯動靜不異記上來先說從真如門起生滅門今則會彼生滅入於真如前則從本起末此則攝末歸本無不皆從法界流無不還歸於法界即二門不二也亦同智論云若無空義者一切法不成先分別諸法後說畢竟空然說之雖異法乃同時文不頓書故成前後又若不會相焉知此是空故次明也文分三初標二釋三結初標復次顯示從生滅門即入真如門所謂推求五陰色之與心疏色者色陰心者四陰記即入者非色滅空不捨緣故淨名云明無明為二無明實性即是明於其中平等無二者是為入不二法門五陰者三科之初能攝有為一切法故陰謂陰覆能覆真理令不顯現亦名為蘊蘊積含藏有為法故能造所造二具八法皆色陰攝受想行識諸心心所名為四陰俱屬於心又五陰總舉初科色心別指法體色通根塵心通王數皆是所觀境也推求即是觀察能觀心也以先未知今使令知故言推求斯則色之與心總而觀之也二釋二初觀色二觀心初觀色六塵境界畢竟無念以心無形相十方求之終不可得疏先觀色法也境從心起畢竟無體離心之外無可念相以心下非直心外無別六塵就心內求色等形質亦不可得前則所緣無相此則能緣無相記先觀色者五蘊之首最初現故故大般若亦復先明境從心起等者如前云一切諸法唯依妄念而有差別等又云以依能見故境界妄現離見則無境界既離見無境復何可念此約所念說也非直等者恐謂心能生境心外既無心內應有故作此觀以袪彼惑縱令盡十法界心中求之塵相終不可得況心本無形寧存塵相此約能念說也前則等者謂前於所緣境上無六塵相此於能緣心中無六塵相以心是色之根本故約心而求色此文正是觀色未是觀心如因推我空徵求蘊法二觀心二先喻次法先喻如人迷故謂東為西方實不轉記人迷喻衆生不覺東喻真心西喻四陰方不轉者東方不曾暫轉為西但迷人謂為西相圓覺云譬如迷人四方易處其實處不曾易此喻真如無念法界不動也次法衆生亦爾無明迷故謂心為念心實不動疏推求動念已滅未生皆不可得中無可住無可住故則無有起故知心性實不動也記衆生合人無明合迷謂心為念合東為西中含二意一迷東為西猶迷真為妄二認西非東猶執妄為真心實不動合方不轉念受等四陰也疏云已滅等者已滅過去也未生未來也中現在也約過未現三世推求動性無得如於東方推西相不得故前云覺心初起心無初相等三結若能觀察知心無念即得隨順入真如門故疏隨順者方便觀也入真如者正觀也記知心無念者覺知真心本不動也問前標所觀通於心色云何結中但約心耶答心細色粗本末殊等觀色空則未必得入觀心空則必能入亦可念字通所念色及能念心前云畢竟無念謂心為念謂觀知不生滅真如心本無有生滅色心能念所念也方便者能所未亡故正觀者心境雙泯故標中推求五陰釋中色之六塵及心十方心之謂心為念結中知心皆方便觀釋中色之無念無相不得心之不動結中無念皆正觀又前之別辨二門所謂真如觀生滅觀皆觀之方便此之會入一門即是不二觀一心觀是觀之正修也深思之記又此會相之文亦可復次下總標應云推求五陰色之與心無有念相色心從生滅門方便觀也無念即入真如門正觀也六塵下別釋分三初法先觀色六塵別舉所緣畢竟無念者此即正觀生滅色陰歸無念真如也念通能所今皆寂故名為無也非推之使無本自無故故言畢竟以心下次觀心心受等四陰亦能緣也先問難云境從心起故無可念心為法體得可念耶故此釋云塵色有相尚不可念心識無形豈可念耶如前論云心不見心無相可得又此色心同是真心所現真心離形絶相求之終不可得能現之心既然叵得所現陰法又豈存乎此觀生滅心陰歸真如也如人下次喻衆生下三合謂心為念者謂以真如心而為生滅五陰之可念也此則隨順生滅門觀心實不動即入真如觀也若能下雙結此釋稍異義亦大同二對治邪執二初就本總標二別明治障初就本總標對治邪執者一切邪執皆依我見若離於我則無邪執記對句先牒章門乖真曰邪取著名執相形曰對攻擊名治則前正義是能治今邪執是所治正義既顯邪執自亡今則敘釋其相也一切下次釋義相先順明若離下後反顯我是根本起覆由之故云依我而有離我而無二別明治障二初對治離二究竟離初對治離三初標數二徵列三辨相初標數是我見有二種二徵列云何為二一者人我見二者法我見疏云何徵一下列人我者計有總相主宰此是佛法內初學大乘人迷教妄執非是外道等所起也法我者計一切法各有體性即二乘所起也記總相等者不能分別五蘊差別但總相執取為主宰也然其我相有於四種一衆生相是過去衆緣和合之所生故二壽者相是現在一期住壽不斷緣故三人相是未來數於餘趣而受生故四我相是三世之總主故故云我為總相主也此是下揀濫此約學大乘初心凡夫聞大乘教不解佛旨隨自妄心曲裁聖典習以性成故作此見非外道者彼有三宗所計不同如前釋意識中已說今非此類計一切法等者計色等法各自有實體性故攝論云若執法體是有名法我執等以二乘人依二粗事識修行但了法中無我不知法體全空如前云見從外來取色分齊等於染淨境執有自性故名法執其猶翳目既存空花豈滅三辨相二初人二法初人三初標二徵三釋初標人我見者依諸凡夫說有五種二徵云何為五疏此五何別者初一約果餘四通因果餘如科文問此等既並於真如法上計云何說為人我執耶答此有二釋一云此是初學凡夫有人我者作此執故云人我執也二云由如來藏中有二義一是本覺義即是當人於上妄計故云人執二是理實義當所觀之法今據初義故說人執記此下初約義通辨何別者牒外所問初下依義以答約果者於如來法身之上起於執故通因果者皆依如來藏之所執故如來藏性通於因果又於五中初二多是習頓教空教及南宗禪學失意者所執次二多是習大乘法相及北宗禪學失意者所執後一唯是外道邪見所執如科文者如下可見問下二問答釋名問意云真如是法於此生執合是法執云何反名人我執耶此一向約所執以成難一云下約能執者以通此則約有人我者作此執故非約所執得名二云下約所執法以通本覺是人者以所執法中有一分覺照義屬智故名為人執此為我故名人我也理實者約寂體說即當所觀屬於法也三釋二初二於空謬執二三於有倒智初二於空謬執二初妄執事空以為法體二妄執法體唯是空無初妄執事空以為法體記此即世間頑虗之空是識所變由色所顯非是三乘所證理法故云事空執此事空為真法體故云為體文中三初舉起執緣二正明執相三辨對治相初舉起執緣一者聞修多羅說如來法身畢竟寂寞猶如虗空記法身如空者金鼓經云佛真法身猶若虗空華嚴云普賢身相如虗空淨名云不著世間如蓮華常善入於空寂行達諸法相無罣礙稽首如空無所依又經云虗空無中邊諸佛身亦然不生不滅故敬禮無所觀此文至多不能具引二正明執相以不知為破著故即謂虗空是如來性疏以衆生執佛色身之礙相故說法身如虗空迷說意故執同太虗記礙相者謂衆生定執佛有三十二相等色見有去來取色分齊質礙等相迷說意者佛意以空有無相無礙之義喻同法身體不言虗空便是法身斯迷喻為法也法喻不分最為淺近三辨對治相二初虗空妄非真二法身真非妄初虗空非真三初立二釋三結初立云何對治明虗空相是其妄法體無不實疏明下一立情有體下二立理無記空相者以虗豁無礙為相也是妄法者妄識所變故是色所對故生大覺中如一漚故一人發真歸元十方虗空悉皆消殞誠為妄法疏情有者妄情見有理合是妄體無不實者有二意一明真體之中無此不實之妄空故二明空體自無本不實故疏理無者正當初義兼於後義二釋以對色故有是可見相令心生滅以一切色法本來是心實無外色若無色者則無虗空之相疏以對色下一釋情有也遍計情中相待而有妄念所緣故非法身以一切下二釋理無也本以待色為空今既唯心無色何得更有於空記對色故有者空與色法相對待故離色所顯故名為空若無色顯空不得有可見相者以是空一顯色故有色處則見無空無色處則見有空有時無時亦爾令心生滅者有時則見有心生見無心滅無時則見無心生見有心滅既能引心生滅豈若法身若是法身不合令心生滅相待者釋對色故有妄念者釋是可見相非法身者法身異此無有無處無有無時亦無一相可得尚不可以智知豈容妄念所緣今既妄念所及故非法身若無色下正顯體無也以能顯之色尚不可得所顯之空理應是虗楞嚴亦云空性無形因色顯發又云色相既無誰明空質疏文可知二結所謂一切境界唯心妄起故有若心離於妄動則一切境界滅唯一真心無所不遍疏所謂下一結情有也若心下二結理無也唯一下辨法同喻以周遍如空故取虗空為喻記一切境界者即色空俱攝也結情有者亦是釋有色所以又是正釋或名順釋即前依轉相有現相義離動境滅者心無起故境界隨滅也結理無者亦是釋無色所以又是轉釋或名反釋即前離見則無境界義也辨同喻者即因便取喻若據論正意但約為遮情執之有故以為喻非謂表於真如體遍故前論云寂寞如空次云廣大性智非如虗空等二法身真非妄此謂如來廣大性智究竟之義非如虗空相故疏簡法異喻謂是如來本覺性智豈同太虗虗妄法也記豈同等者有三義一實性非妄相故二覺知不覺知故三究竟不究竟故圓覺疏云方之海印越彼太虗華嚴云解如來身非如虗空無量功德妙法身圓滿故問上云正義為能治邪執為所治前既已顯正義此文只應但明邪執何故復有能治之文豈不重耶答前文正義雖是能治以未能約執對顯今此文中逐段別舉教緣執相將前正義別別對破斯則由此邪執顯得前義正真亦由前義明得此執僞妄故須別舉能治文也只如此段對治之文即當前云一切諸法唯依妄念而有差別又云非有相非無相又云依此法身說名本覺又智淨相法出離鏡又以法身為智身等並是此中能治之文也二妄執法體唯是空無三初執緣二執相三對治初執緣二者聞修多羅說世間諸法畢竟體空乃至涅槃真如之法亦畢竟空本來自空離一切相疏大品云乃至涅槃如幻如夢若當有法勝涅槃者我說亦復如幻如夢記涅槃空者圓覺云生死涅槃猶如昨夢真如空者楞嚴云言妄顯諸真妄真同二妄又云無為無起滅不實如空華等大品等者具云時五百天子默然憶念云何說涅槃等亦如夢耶善現知諸天子作如是念而告之言若當有法過涅槃者我亦說為如幻如夢何以故從本已來本自空故二執相以不知為破著故即謂真如涅槃之性唯是其空疏不知為破情計有故即執性德是無記不知等者本為破於有取之心故說為空空者意明離名離相之義不無圓成實體具性功德不了佛意謂同遍計之法舉體全空斯則傷之太甚三對治云何對治明真如法身自體不空具足無量性功德故記自體不空者即前如實不空以有自體義及前體大不增減等具功德者即前所示相大大智慧光明義等是此對治文也二三於有倒智三初執性德同色心二執法性本有染三執染淨有始終初執性德同色心三初執緣二執相三對治初執緣三者聞修多羅說如來之藏無有增減體備一切功德之法記體備等者圓覺云無上法王有大陀羅尼門名為圓覺流出一切清淨真如菩提涅槃及波羅蜜等圓覺即如來藏之異名也楞嚴云陰入界處本如來藏如來藏中性色真空即世間法即出世間法等更有諸經不能具引二執相以不解故即謂如來之藏有色心法自相差別記不解者此是表詮令生信解不同前二遮詮遣執故言不解不曰為破著也下皆如此有色心者廣名一切功德略唯色心二法以無漏色心即依正功德法故自相者色以質礙為自相心以了知為自相謂藏心中有如此差別者是迷理為事誤性作相也三對治云何對治以唯依真如義說故因生滅染義示現說差別故疏真如義二之不二也生滅義不二之二也如上文云以依業識生滅相示等記依真如說者此約真性顯功德也真體本一義說有差既於一體之上說功德義即差別而無差別也二之不二者上云雖實有此諸功德義而無差別之相等同一味唯一真如以無分別離分別相等因生滅說者此對妄法顯功德也既對妄顯故於無差別中而成差別也不二之二者前云若心起見則有不見之相心性離見即是遍照法界義乃至具有恆沙妄染對此義故心性無動則有恆沙功德相義如上等者即略舉能治之文二執法性本有染三初執緣二執相三對治初執緣四者聞修多羅說一切世間生死染法皆依如來藏而有一切諸法不離真如記生死皆依如來藏者楞伽云如來藏是善不善因能遍興造一切趣生楞嚴云生滅去來本如來藏法身不增不減經云即此法身為煩惱之所漂動往來生死名為衆生圓覺云一切衆生種種幻化皆生如來圓覺妙心諸法不離真如者涅槃云佛性隨流成種種味華嚴云三界所有唯是一心又云未曾有一法得離於法性等二執相以不解故謂如來藏自體具有一切世間生死等法疏以不解隨緣之義則謂自性有染記隨緣等者此明真如隨無明緣成世間法以不敏故謂真體中本有此染三對治二先奪破次縱破先奪破云何對治以如來藏從本已來唯有過恆沙等諸淨功德不離不斷不異真如義故以過恆沙等煩惱染法唯是妄有性自本無從無始世來未曾與如來藏相應故疏如來藏下一明淨德妙有以過下二明妄染理無從無始下三明妄不入真也記淨德有者即不空如來藏也大意同前第二能治之中廣如相大中辨妄染無者有二意一真理中無此妄染即空如來藏也二據妄自性道理亦無上云以一切法皆從心起妄念而生又云一切法如鏡中像無體可得等妄不入者即不相應也上云從本已來一切染法不相應故以妄體本空將何入真與真相應次縱破若如來藏體有妄法而使證會永息妄者無有是處記無是處者妄若實有證時不合除滅證者既能除滅當知妄本不有以真體中若有妄法證時畢竟不無故近有人聞性具義不能深究理趣便謂本性具有十界色心漏無漏法起用之時各於本法自體上起名全體之用宛如第八識中含種無異此同前段執性德同色心又說真性除無明有差別義即同此段執法性本有染往往形於簡牘疑誤後生反謗圓文却謂方便菩薩懸知今日垂此對治善哉大士悲救何甚儻無悛意確乎迷情豈唯邪見之門不扃抑亦阿鼻之路尤近也悲夫廣有破𠩋已見別章三執染淨有始終三初執緣二執相三對治初執緣五者聞修多羅說依如來藏故有生死依如來藏故得涅槃疏教執治各二法謂生死涅槃也記教指初科執教緣執次科邪執相治後科對治之文皆雙顯生死涅槃二法故云各二依如來藏有生死涅槃者此是勝鬘經文已如前引又經頌云無始時來性為諸法依止由此有諸趣及證涅槃果寶性論釋此頌云無始時者如經說言諸佛依如來藏說諸衆生無始本際不可得知性者勝鬘經言如來藏者是法界藏自性清淨法身藏作依止者勝鬘經言如來藏是依是持是住止是建立有諸趣者勝鬘經言生死者依如來藏有如來藏故說生死涅槃果者勝鬘經言依如來藏故證涅槃若無如來藏者不得厭苦果願欲求涅槃又楞伽云如來藏者生死流轉及是涅槃苦樂之因若無如來藏者則無生滅大慧五識身非流轉不受苦樂非涅槃因如來藏受苦樂與因俱有生滅等二執相以不解故謂衆生有始以見始故復謂如來所得涅槃有其終盡還作衆生疏聞依真有妄便謂真先妄後故起有始見也如外道立從冥初生覺等既衆生有始依真故證得涅槃者還作衆生成有終之義也如外道立衆生終盡還歸於冥名為涅槃從冥起覺更作衆生此亦如是記不解者佛意言如來藏是迷悟所依之根本迷則生死悟即涅槃然則生死無初涅槃無盡不達此理遂成始終之見聞依真等者謂先依如來藏真心然後有衆生生死妄法故見妄法有始也既衆下有始依真者意謂真後始妄也故證得者意謂妄後還真也還作衆生者向前既爾當來亦應淨後生染染後復淨如是連環往復無際故成淨法有終見也問楞嚴云迷妄有虗空空生大覺中豈非真先妄後義耶答必執真先妄後妄有體時處矣云何經論並謂妄法性自本無從無始來不與真相應耶當知迷妄有空生於覺者乃是妄來依真妄本空無論何終始楞伽云無始習所熏如像現於心若能如實觀境相悉無有定非真去依妄真性本然又何先後楞伽云此如來藏本性清淨客塵所染而為不淨問圓覺經金剛藏言若諸衆生本來成佛何故復有一切無明妄有始也十方異生本成佛道後起無明一切如來何時復生一切煩惱真有終也又楞嚴富樓那言若此本覺與如來心不增不減無狀忽生山河大地諸有為相妄有始也如來今得妙空明覺有為習漏何當復生真明終也此等豈非皆明生死有始涅槃有終耶答彼中興難類此不解故佛答剛藏言譬如幻翳妄見空華妄無始也幻翳若除不可說言更起諸翳亦如空華滅於空時不可說言虗空何時更起空華何以故空本無華非起滅故真無終也生死涅槃同於起滅合無始終又答富樓那言譬如迷人於一聚落惑南為北如是迷妄亦不因迷又不因悟何以故迷本無根云何因迷悟非生迷云何因悟喻妄染無始也又彼迷人正在迷時倏有悟人指示令悟富樓那此於聚落更生迷不不也世尊喻真淨無終也富樓那如來亦爾此迷無本性畢竟空合妄染無始也昔本無迷似有迷覺覺迷迷滅覺不生迷合真淨無終也若爾豈非皆明生死無始涅槃無終耶此答意與下治文同詳之外道等者謂數論師以彼依非想定發世俗通應於邪道知過去八萬劫事過此即不知以生死智通知未來八萬劫死此生彼之事後亦不知也彼之所計冥性是常從此生於世間諸法冥寞難知故云冥性云何而生謂冥初生覺從覺生我心從我心生五唯量謂色聲香味觸從五唯量生五大謂地水火風空從五大生十一根謂五知根眼耳鼻舌身五作業根手腳口大小便根及心平等根爾時名生死成執一神我為受用主我思勝境冥性變生為我受用我受用故為境纏縛不得解脫我若不思冥性不變神我解脫名為涅槃此有二十五諦冥性為初能變起故從冥起覺更作衆生者謂神我解脫入涅槃後設我又思冥又變生覺等諸法如是相續無有窮盡故也此亦句合今謬解終而復始次第遷流意也三對治二初明法體離始則顯生死無初二明法體離終則顯涅槃無盡初明法體離始則顯生死無初云何對治以如來藏無前際故無明之相亦無有始若說三界外更有衆生始起者即是外道經說疏若說下如仁王經云我說三界外別有一衆生界者是外道大有經中說非七佛說也記無前際者前云真如自體無有增減非前際生非後際滅畢竟常恆無有始者有四意一依真名無始如前文云依如來藏有生滅心二無有染法始於無明故無始如瓔珞本業經云四住地前使無法起故名無始無明住地是則顯無明前更無染法為此始本云無始也三衆生從來未曾悟說無始前云以從本來未曾離念故說無始無明四無體故無始楞嚴云迷本無根性畢竟空問既妄依真起真是妄源何云無體若妄有體至證真時何能永息答妄托真起說真為源理實真中本無有妄如第二月託本月起說本月為起二之依而本月實無二輪即是二無其體故諸經論並說諸法生於覺心不說心生諸法圓覺云種種幻化皆生覺心猶如空華從空而有楞伽云垢現於淨中非淨現於垢如雲翳虗空心不現亦爾意等我煩惱染污於淨心猶如彼淨衣而有諸垢染如衣得離垢亦如金出礦衣金俱不壞心離過亦然又昔復禮大師問云真法性本淨妄念何由起從真有妄生此妄安可止無初即無末有終應有始無始而有終長懷懵茲理願為開祕密祈之出生死清凉國師答云迷真妄念生悟真妄則止能迷非所迷安得全相似由來未曾悟故說妄無始知妄本自真方是恆常理分別心未忘何由出生死皆明染法無始有終義也若謂衆生有始豈非是邪解乎仁王等者彼經第一云善男子一切衆生煩惱不出三界諸佛應化法身亦不出三界三界無衆生佛何所化是故我言三界外別有一衆生界者是外道大有經中說非七佛之所說也大有經者彼勝論師說有六句一實二德三業四大有五同異六和合此六句中大有性者謂能有一切法又離實德業等一切法外別有體故故即取此大有一句以立為經名也二明法體離終則顯涅槃無盡又如來藏無有後際諸佛所得涅槃與之相應則無後際故記無後際者即前云所謂心性不生不滅涅槃相應者前云以真如法常熏習故妄心則滅法身顯現起用熏習則無有斷是知如來藏無始無終生死依之無始有終涅槃依之有始無終藏性如方生死如迷涅槃如悟又藏性如濕生死如冰涅槃如水故前文云染法從無始來熏習不斷乃至得佛後則有斷以違真性故有斷也又云淨法熏習則無有斷盡於未來以順理故無有斷也若謂涅槃有終誠為邪謬解矣二法三初執緣二執相三對治初執緣法我見者依二乘鈍根故如來但為說人無我記人無我者小乘藏中所說以根非利故但為分別蘊中無人令證人空也二執相以說不究竟見有五陰生滅之法怖畏生死妄取涅槃記說不究竟者未說法空教名之為半字然亦有多義一行但行自利未能利他二智但得生空智不得法空智三斷但斷煩惱不斷所知四證但證人空理不證法空理五得但得有餘無餘涅槃不得無住處涅槃由此小乘人空教不稱為大乘滿字也見有五陰等者雖於陰中不見人相而見陰等是其實法既執陰法實有生滅故見三界不安猶如火宅希求出離如救頭然望到寂滅安樂之處此即是法我之見相也三對治云何對治以五陰法自性不生則無有滅本來涅槃故記五陰不生滅者法性本空寂也如前同相文云一切衆生本來常住入於涅槃下云以信一切法從本已來自涅槃故又前真如門云一切法從本已來離言說名字心緣等相畢竟平等又云一切法即真實性等會相入實文中皆是此能治也二究竟離記前且據其病狀隨病設藥故對空說有對有說空未能究竟今則直約真理不論藥病一切皆遣言語道斷心行處滅平等一味方名究竟是則對治符於依言真如究竟符於離言真如也文中二初約法明治二會釋伏疑初約法明治二初約法總顯二舉廣類求初約法總顯復次究竟離妄執者當知染法淨法皆悉相待無有自相可說疏中論云若法因待成是法還成待今即無因待亦無所成法等準釋可知相待無相待法體本爾非由悟後方使其然記染淨無自相者所以得名染者以待淨立當知染相非自相也淨相亦爾餘本末有空生佛乃至世出世等倣此而知故淨名云若見垢實性即無淨相順於滅相是為入不二法門因待成者若染法因待淨成即淨法還為染待如是展轉墮無窮過無因待者若本無染為因為待則何有淨為所成法相待無相待下或問曰此諸染淨相待悟後方得即無相待在迷之時那得便能離於相待耶故此釋云法體本爾非謂由悟始得如是以染淨諸法本離言說分別畢竟平等何須待悟方始無耶如下論文自釋二舉廣類求是故一切法從本已來非色非心非智非識非有非無畢竟不可說相疏非智識者顯上非心也非有無者顯上非色也記非色句總以標略無知曰色有知曰心非智下別為顯廣無分別曰智有分別曰識可狀曰有不相曰無即攝盡世出世間一切相待諸法而皆云非者以法法即真絶諸對待故一切法皆無也即前對治離中能治所治空有之法亦俱不立也前則以藥治病此則藥病俱遣究竟離義於斯顯矣畢竟句結也恐人聞此非義便作無解墮於斷見或出於無而入於有又墮常見故今結云畢竟不可說此有兩意一約法非謂法體不可作色心等相說餘斷常一異凡聖因果生死涅槃一切相畢竟不可說故二約時謂明色心等相非唯現前暫時不可說從於過去盡於未來畢竟亦不可說故前真如門云一切法從本已來離言說相離名字相等今則相盡歸如合於本體入真如門也二會釋伏疑三初正會伏疑二辨定聖意三反以釋成初正會伏疑記謂和會佛意以釋疑難也此疑不顯但有釋文伏而不現故稱為伏而有言說者當知如來善巧方便假以言說引導衆生疏疑云聖者了知諸法離性不可說相云何乃有種種言說故牒外難云而有言說者下即釋云當知如來方便假以言說引衆生耳此釋文正會伏難也假言巧引意不在言記離性者本性無故本性既無何相之有如前非色非心等所離之文故經云凡所有相皆是虗妄種種言說者即前顯示正義之文也假言等者如假筏渡河意不在筏以此土衆生皆以聞思修入三摩地故須以音聲為佛事也經云此方真教體清淨在音聞欲取三摩地實以聞中入又云總持無文字佛以文字說二辨定聖意其旨趣者皆為離念歸於真如記聖人假以言說引者意令離前邪執有無等念歸於真如而已故楞伽云不得如言執著於義何以故真實法性離文字故又智論云念想觀已除言語法皆滅如是尊妙人則能見般若三反以釋成以念一切法令心生滅不入實智故記令心生滅者心通真妄但依主持業之異思之實智即本覺能入即始覺十地已還不得入者蓋緣有念故也前云一切衆生不名為覺以從本已來念念生滅未曾離念故反顯不念諸法心則如如不動故前文云若能觀心無念即得入真如門又云遠離微細念故得見心性心即常住名究竟覺三分別發趣道相記前雖正義已顯邪執又亡直論見解苟無偏僻然於發心趣求修證階降殊未諳悉若止而不進則前解何為有解無行如風中燈照物不了亦如有目無足豈到前所苟或進之則復何往故此分別令知知已令進則免其叨濫上流及自輕退屈爾自此已下則釋立義分中所立乘義也文中二初標意釋名二開章釋相初標意釋名記標意者謂標舉發心趣向佛道之意也釋名者謂解釋發趣道相之門名也皆指謂一切已下文亦可意字是誤應云標門指初句牒標其總門也釋名指謂下文釋出其名義也分別發趣道相者謂一切諸佛所證之道一切菩薩發心修行趣向義故疏諸佛句舉所趣之覺道菩薩等顯能趣之因行欲明菩薩發心趣向佛所證道種類不同故云分別發趣道相記覺道者即所證菩提果也佛果圓通故名為道發心即發三種心修行即始從信位終至金剛已還所行二利諸波羅蜜一一皆能趣向上位故欲明等者通敘其意明即分別也種類不同者釋相之一字即發心與行各有不同故名相也如發心橫有真信成就發心等僞學他發心等也豎有淺信成就發心深證發心解行發心通於深淺故行則可知二開章釋相三初標數二徵列三辨相初標數略說發心有三種記發心三種者義有通別通則總名發趣故標云發心修行趣向義故別則前二是發起後起後一是開發又心為所發人及菩提為能發謂人能起發菩提能引發謂此人有內熏為因緣善根為增上緣菩提為所緣境由此衆緣而發其心斯則以能望所名為發心又隨位別有能所發趣之義至文當辨二徵列云何為三一者信成就發心二者解行發心三者證發心疏信者十信行滿入十住位中初發心住也解行者十行位中能解法空順行十度行成純熟發回向心入十回向位也證者初地已上乃至十地也前二是相似發心後一是真實發心記云何徵也一下列也十信等者斯則十信滿心人為能發直等三心為所發又十信滿心為能趣十住位為所趣二位出入心同時義如前說解法空者即下云以知法性無慳貪乃至無無明等知即解也順行十度者下說順性修行檀波羅蜜乃至般若波羅蜜等能所發趣例上可知初地等者此以二地乃至佛果辨能所發趣等義前二下料揀優劣相似者以有分別心故名相似覺真實者以得無分別智故即隨分覺通約證理故云真實然此三中初該信住次該行向後該地果此三種心從因至果一切行位靡不足矣三辨相三初信成就發心二解行發心三證發心初信成就發心三初信成之行二發心之相三發心利益初信成之行疏明信心成就之行也中二先問次答先問信成就發心者依何等人修何等行得信成就堪能發心疏依句一問能修行人修句二問所修之行得下三問行成堪發記何等人者約何位人說發心義何等行者由行何行而得發心據下答意即依十信位人修信進念等十種善行十千劫滿至第十信滿心則能發也故云堪發次答疏前信滿故進後信未成故退記即明此答中有前後兩科意也文中二初正答前問二舉劣顯勝初正答前問二初答三問二結成位初答三問三一答能修行人二答所修之行三答行成堪發一答能修行人所謂依不定聚衆生疏分別三聚乃有多門今此文中直明菩薩十住已上決定不退名正定聚未入十信不信因果名邪定聚此二中間十信位人欲求大果而心未決或進或退本業經中十信菩薩如空中毛名不定聚今依此人明其修行也記多門者謂小乘及權實等異已見前懸談文於此三中今取實教明三聚義如疏分別二答所修之行有熏習善根力故信業果報能起十善厭生死苦欲求無上菩提得值諸佛親承供養修行信心疏有熏習等者謂有聞熏及本覺內熏之力并依前世諸善根力故能信業果報捨惡從善修福德分也厭生死下即成菩提分及解脫分善也上皆辨行因得值佛下明修行緣也謂約此因緣修十種信心行記信業果報者業通善惡果通樂苦果能酬因故名為報此通而言也非約總別十善者即不殺等十非謂十種信心若信等十下文方配謂有下聞熏通師教內熏兼體相善根者若準過去還因熏力所成今望現在且名宿善就因所論故名為根能信下即止滅相義也昔雖有善以創熏故善根微劣方成其種未能起信勤求諸行今以再習再熏及三事併力故能起也是則善根在昔為所成在今為能起正同法華繫珠解珠之譬也福德分分即因義此十善行始成世間有漏福終成出世無漏福故亦即福德中之一分也以福有無量故亦即福德之分齊也顯非智慧故厭生死等者信解漸增故能知三界不安猶如火宅所以厭之知菩提佛果是極清凉所以求之菩提分等並如前說此二分并上福德分至果成就如次為智斷恩之三德也行因者欣厭之事情動於中因此起行故名行因問修十善因已是其行云何目為行因耶答望後出世之行故以世善為因斯則世間有漏行與出世間無漏行為因也問厭生死求菩提豈非出世行耶答雖有此心未有其事厭欲之言思之可見又此厭求但是事善未與理觀相應不名正行然據此文猶在信前作方便也未入十信如世起厭求心欲行善者豈便是十信人耶故疏云上皆辨行因者是此義也次云修行信心方是正十信位值佛者佛即據位合是應身於中隨機現化不定一種謂作父母眷屬等已如前說今但言佛者據本而言也亦可偏舉以佛形得度者說親近承事供給奉養亦可親承者謂親得承受佛之教誨也既為現身必聞法要即聞法生解修行信心行緣者即用熏習中差別緣也謂約等者以前云因緣具足乃得成辦故不可闕十信心者謂信進念定慧施戒護捨願也於此位中具起四種信心行五種妙行修習真如三昧漸入漸深以至成熟堪入初住爾三答行成堪發經一萬劫信心成就故諸佛菩薩教令發心或以大悲故能自發心或因正法欲滅以護法因緣故能自發心疏經劫下一明行成諸佛下二約勝緣正明發心謂發十住初心也勝緣雖多略舉三種於中初一他力後二自力亦可同下三心謂順教故得直心護法故得深心餘同此也記一萬劫者約根利鈍料揀有四句一利根不精進二利根精進此二劫數皆不可定三鈍根精進極遲一萬劫四鈍不精進此乃困而不學何足以議其劫數耶今此論中取第三者故云一萬劫耳故本業經云是信相菩薩十千劫行十戒法當出十信心入初住位又彼經云若一劫二劫三劫修十善法亦退亦出若值善友能信佛法若一劫二劫方入住位行成者本疏云時滿行成時謂十千劫行謂十信心滿至出心也佛菩薩者即前所值佛菩薩等此中既教令發心猶在信位所值之佛或化或報也勝緣者即佛及菩薩衆生苦正法滅皆是勝緣佛菩薩等既垂誨勗焉不發心我等每遇微智片福之人有所勸諭尚自發心況佛及菩薩親授教誨耶或觀一切衆生與己無異但以迷真執妄枉受輪回是故起大悲心咸欲濟度自愧力小事與願違故且發心趣求佛果尅備神用方堪拯濟故十地經云見諸衆生孤獨無侶生哀愍心此如有人見民疲極賦重役繁正令不行罔知所訴自惟無力如何治之因而進德修業求薦取仕務去民瘼令上下無怨以致治也或見佛法將滅衆生無依為欲護持又寡道力故發心修行以希入證隨其力用方能振舉然言法者具教理行果今之滅者但於四中約教行滅理果不滅教滅者且佛垂教意在弘通若沈廢不行即是滅義不必如始皇之煨燼師子之焚燒正如序中沈貝葉之義也行滅者無人修故故智論云法滅者謂修行滅今所護持亦唯修教行即書寫讀誦隨分解說獎勸後學使燈燈相續明明無盡是護教也若尅己修進勗勵有緣令佛種不斷是護行也若復細詳理果二法亦有滅義然與上教行相因而滅由無教故無行無行故無證無證故無果也此四雖皆名滅而滅義不同謂教行唯斷滅理法唯隱滅果約性相兼於二義故涅槃說有二種因緣令正法久住一者內有持戒比丘二者外有篤信檀越又說釋迦遺法最後滅時諸比丘等不是闕乏供養令佛法滅却因四事豐足憍恣心生天魔得便釋迦遺法從是永滅苟或發心趣求佛果豈唯持戒故其佛法無以見滅今論中言或者即不定義於前三中隨當一事即能發心也勝緣下然此菩薩萬劫修行器用非淺因緣發趣豈唯此三故今略而舉之以二利行中緣有無量不可具載故云略也於中下配自他心由他所教出自己心二不同故亦可下配所發心直心者下云一者直心正念真如法故以蒙親教遂能發心正念真如離於沈掉一切邪曲名為直也深心者為欲護法故須創意備修萬行具諸功德即成此心餘同此者即指大悲心也如文可見二結成位如是信心成就得發心者入正定聚畢竟不退名住如來種中正因相應疏如是等者此下有二一不退者顯於下無失謂入十住初發心住位不墮凡小之地二住種者明於上有得謂住習種性位行順內熏之因故云正因又此位已去定當得果故云正因以更不退失故記不墮凡小地者十地論說令護二行謂護煩惱行及二乘行若初心人聞責凡夫行却落二乘行聞呵二乘行却入凡夫行不肯行於中道今得信心成就故不墮爾習種性者本業經中從因至果攝為六種性謂十住習種性十行性種性十向道種性十地聖種性等覺性妙覺性今即初也順內熏者反又與真如體相相順此揀地上無分別心之相應也以地上與理合故名為相應今此地前但隨順故名為相應以未得無分別心故定當得果者由住佛果之正因故謂此菩薩入正定聚與佛正因相應既順其因決定得果故云入如來種性中種即因也二舉劣顯勝疏勝者如前進劣者如此退文二初明微劣相二結成退失初明微劣相二初內因力微二外緣力劣初內因力微若有衆生善根微少久遠已來煩惱深厚雖值於佛亦得供養然起人天種子或起二乘種子設有求大乘者根則不定若進若退疏若有等者此下有二一煩惱厚惑重也二雖值等德薄也於中三一人天者倒求也二二乘者異求也三進退者猶豫大乘也記善根微少者根劣也以夙熏善種不能多故惑重者貪瞋熾然不能制故值佛者此通滅後見佛形像亦得供養故倒求者樂修五戒十善但希人天果報人天不離生死合是所厭而反求之故云倒也約果言因故論云種子異求者謂怖畏生死樂觀諦緣求二乘果雖出三界未能究竟不與三世諸佛同途故云異也進退等如下論自辨此三皆明德行薄劣相也總由善根德本不深厚故二外緣力劣或有供養諸佛未經一萬劫於中遇緣亦有發心所謂見佛色相而發其心或因供養衆僧而發其心或因二乘之人教令發心或學他發心疏或有供等此下有二一未經萬劫行時未滿也二遇緣亦發遇緣不勝也於中有四一以色見佛二住相供僧三隨劣教發心四學他迹此等並非菩薩悲智之心故欲退失記從此或有供養至下墮二乘地盡是辨求大乘者進退之相也時未滿者以約鈍根精進者說故以色見者既以色見聲求是人行邪道不能見如來故前云不知轉識現故見從外來取色分齊或見如來塑畫形像等住相供者不能達三輪體空無住行施也隨劣教者此與前起二乘種子別前則因劣此則緣劣也學他迹者但隨彼而行自無決擇斆他外迹不自照心此則見他退而還退或心闌而自退此等者結揀以悲智是菩提心體故夫大乘行人最初發菩提心要先有智了真性本有無明本空求斷本空無明求證本有真性次須具悲盡於未來度衆生界然後以願要制不令暫捨無致疲勞此三具故方是真正大乘初行既不同彼故云非也然此中發心之言且是信位初心始發求道之意非同信滿發心入住即如今之行人始發大乘信心之者此則猶在信位之初也二結成退失如是等發心悉皆不定遇惡因緣或便退失墮二乘地記如是等下先結前心劣遇惡緣下次正明退墮惡因緣者五欲及二乘也退失者失所發心不入信位退凡夫地此以五欲為惡緣故墮二乘地者此以二乘為惡緣故經云百千萬人發菩提心若一若二至於佛果餘皆墮二乘也又云菩薩發大心魚子菴羅華三事因時多得果者甚少然此前後勝劣相望各有七事且劣之七事者一位次劣十信初心二內熏劣無力三善根劣微少四時限劣未經萬劫五外緣劣色相見佛六起行劣人天二乘七究竟劣退入凡小勝之七事者一位次勝十信位滿二內熏勝有力三善根勝久植德本四時限勝經一萬劫五外緣勝遇佛受教六起行勝直深悲等七究竟勝正定不退勝劣如此進退宜爾也音釋波羅蜜此翻到彼岸沸音廢泉涌出貌愜音怯爽心適意也毗盧遮那此云遍一切處佛名提謂此翻胡苽長者名炭音歎燒木未成灰者毗婆尸此云勝觀尸棄此云火迦葉此云飲光彌勒此云慈氏怙音悟依恃也閻浮提此云勝金音炒熬米麥也乾飯屑也鹿苑養鹿之苑也袪音去拂袖口也叵音頗不可也漚音歐水浮泡也殞音允消亡也簡牘書版也古無紙有事書之於簡牘悛音干止也改也遷也扃音駉窮關戶之木也𠩋音尺破斥也富樓那此云滿慈懵音蒙昏昧也僻音匹偏曲也勗音旭勉勵也拯音整援救拔濟也賦音付稅斂也訴音素告也訟也瘼音莫病也煨燼音威井盆中火也掉迢去聲搖動散亂也呵音訶罵斥也猶豫音由裕獸名性多疑慮者斆音效法效也菴羅此翻難分別王樹名闌音藍衰殘也
