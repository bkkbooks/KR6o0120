body:
  text: 唐西京太原沙門法藏述疏終南草堂沙門宗密録注宋秀州長水沙門子璿修記清錢塘慈雲沙門續法會編順天府府丞戴京曾閲定二寄問列名云何為二一者覺義二者不覺義記云何問也一下列也三依名辨釋三初覺義二不覺義三雙辨同異初覺義疏約淨法明心生滅故記覺是淨法於中有始有本則隨流時體本覺也隱用始覺也廢為滅反流時體顯用起為生文二初略辨本始二覺二廣明本始二覺初略辨本始二覺二先本覺次始覺先本覺二一顯本覺體二釋本覺名一顯本覺體所言覺義者謂心體離念離念相者等虗空界無所不遍法界一相即是如來平等法身依此法身說名本覺疏所言句牒章謂下釋義離念者離於妄念顯無不覺也相者非唯無不覺之暗乃有大智慧光明義等故也虗空有二義以況於本覺故云等一周遍義謂橫遍三際豎通凡聖故云無所不遍二無差別義謂在纏出障性恆無二故云法界一相即是法身者欲明覺義出纏相顯故依此等者既是法身之覺理非新成故云本也無性攝論云無垢無罣礙智名為法身金光明經名大圓鏡智為法身等皆此義也記論謂心下分三初正顯覺體二先標也疏云離於等者心體真實本自靈鑒念想虗妄從來暗昧若心有念是謂暗昧名為不覺心既離念則無暗昧唯一靈知名之為覺論中言體離者當知本無以本無故名為本覺論離念相下次釋也相謂義相即下遍一二義此之二義正是本覺相即相大也等謂齊等本覺之義與空齊等故也疏云非唯等者正釋相義以一一義稱體而周不異不二皆等虗空也此乃海東疏義故今引用二義如下所配橫遍等者若言遍則合云凡聖若言通則合云三際今所異者以三際凡聖互有相通舉三際時一一際中必具凡聖凡聖皆如故云橫遍三際舉凡聖時一一凡聖必具三際始終皆爾故云豎通凡聖蓋欲異於常說橫不該豎故有此言顯無不遍也在纏等者此雖約時豎說語似未盡然理亦該收謂在纏必其情器出障必收身土二俱無二也論即是句二會體同身如來是應身法身是真身如來之法身依士釋意明心體與法身無二故云即是又離真無應應即是真故云即也又如來法身並同真身但以約人標法故曰如來法身亦是即義上三皆持業釋由是即字通茲三用然初一是正餘二是兼也言平等者聖凡情器無二圓滿故疏云欲明等者欲顯在纏之本覺遂舉出纏之法身此則約果以顯因也名雖因果有殊而真實之體無二故論云即是也論依此等者後依體立名也謂心體寂滅無有變改從本已來可軌則故名之為法是體依聚故名之為身今依此體而立覺名者以顯法身非是一向凝然寂滅無知無覺也又顯此覺非是有為生滅之法故約法身以立是則一體之上寂故名法身照故名本覺所言依者但是依約之義不同草木依根有苗分能所也亦不同依如來藏有生滅心有真妄也此乃一體真實但約此體上靈照之義便名本覺也疏云既是等者法身之理三乘教中同許不生不滅是本有之法既目此法為覺是可為本無性下引證本覺即法身義也以此宗中理智無別謂即理之智名為本覺即智之理名為法身如珠即明無二無別不同權宗為無為異二釋本覺名何以故本覺義者對始覺義說以始覺者即同本覺疏何以故者責其立名責有二意一云上開章中直云覺義何故今結乃名本覺二云此中既云本覺何故上文但云覺耶記責意有二者但反覆成難而實無二故本疏云進退成難疏本覺者以對始故說之為本答初意也又以本覺隨染生於始覺還待此始覺方名本覺記本下先正釋責意二初辨名本覺所以以對等者當知染法淨法皆悉相待今此且約對於新生立為本有以始覺從修新生本覺性自元有由是對始以立於本又以下約別義釋前約對始名本今約生始名本原其始覺是本所生內因熏習外假緣力創然而有故名為始生於始故名為本也苟無所生亦不名本如女生子方得母稱疏即同本者以至心源時始本無二相故是故上文但云其覺答後意也又此始覺是本所成還契心源融同一體方名始覺故記即下次辨但名覺之所以以始本既合則無二相無二相故但是一覺故下文云亦無始覺之異以四相本來平等同一覺故又此下約別義釋前是辨一覺所以此即辨始覺所以意謂此始覺者以依本起始始還同本故名始覺以始得無念之覺名真始覺也已前雖亦名始覺以未離念猶名不覺或立相似隨分等名至此念盡已覺初相故名始覺是知直待合同本覺心源故名究竟覺智淨相等並同是始覺也疏問若始覺異本則不成始若始同本即無始覺之異如何說言對始名本答今在生滅門中約隨染義形本不覺說為始覺而實始覺至心源時染緣既盡始本不殊平等絶言即真如門攝也故本覺之名在生滅門中非真如門也記問下次問答通妨異不成始者以前文云是本所成故融同本體方名始覺故同不成始者以前云至心源時始本無二平等一相無所待故既而同異二俱不立如何說言對始立本耶此問因次前疏文中來答意昔日不覺而今始覺若窮其體與本不殊就生滅門相待義邊得名始本也形本不覺者形本覺故立為始形不覺故立為覺也若至心源已屬真如門攝不同前難而實始覺等者無不覺之染緣可形待故無覺名與本平等不殊故無始名但名真如不名始本覺也由是真如門中但顯於體不顯相用故本覺下結成可知次始覺始覺義者依本覺故而有不覺依不覺故說有始覺疏始覺句牒名依下明起始覺之所由也依本覺有不覺者謂即此心體隨無明緣動作妄念也依不覺有始覺者本覺內熏力故漸有微覺厭求乃至究竟還同本覺故下文云本覺隨染生智淨相者即此始覺也此文意明本覺成不覺不覺成始覺始覺同本覺以同本覺故則無不覺無不覺故則無始覺無始覺故則無本覺無本覺故平等平等離言絶慮是故佛果圓融翛然無寄尚無始本之殊況有三身之異但隨物心現故說報化之用下文顯之記始下初別解文義明起等者正明始覺文雖在後轉推其源元因本覺由迷不覺方有妄念妄念即不覺也前云依如來藏有生滅心後云依覺故迷等如依不睡人有睡人也依不覺有始覺如依睡人方有覺人也本覺內熏等者下云以有真如法故能熏習無明以熏習故則令妄心厭生死苦樂求涅槃等究竟同本者下云而實無有始覺之異本來平等同一覺故故下文云引證即隨染本覺中文斯則本覺離染初淨便名始覺此文下二通辨論意此如好人成睡人睡人成覺人覺人成好人顯展轉成立也以同下明展轉泯絶也如以覺人同好人故即無睡人無睡人故即無覺人無覺人故即無好人無好人故平等平等亦不可言平等者無始本異故再言之者亦有二意一則始覺與本覺平等始即本故本覺與不覺平等不覺即本覺故二即始本不覺竟無差別本自平等又差別平等亦復平等離言者欲言始覺體同本故欲言本覺無所對故欲言不覺體即覺故言之不及故云離言以離言故無相可得心行處滅故云絶慮此即泯同真如門也是故下結示也圓融者圓攝染淨覺與不覺融歸一體清虗無纍故曰翛然迷覺中道一不住著故名無寄況有三身異者以三身由始本所成始本既不安立豈有三身之殊此揀權教定說三身差別於中分為無為別及三常之異也但隨下釋疑也或曰下說不思議業相緣熏習鏡報身應身又云無明盡有不思議業能現十方利益衆生此豈非報化之用何言無三身耶故此釋之但約機見有異名為報化之身若約果海實無身說下文顯者即真如用大文云諸佛如來唯是法身智相之身第一義諦無有世諦可見之法但隨衆生見聞得益故說為用二廣明本始二覺二初始覺二本覺初始覺三初總標因果二覺二廣寄四相釋成三結明始不異本記始覺者亦可前略明始覺體今廣明始覺相後始不異本即結相同體也初總標因果二覺又以覺心源故名究竟覺不覺心源故非究竟覺疏心源者染心之源謂性淨也又粗相之源謂生相也究竟者始覺道圓同於本覺故也此在佛地非究竟者不了其源始未同本故也此在金剛已還記染心者即六染心性淨者即如來藏以汙淨成染故說淨為染源故下文云是心從本以來自性清淨而有無明為無明所染有其染心粗相者即轉現二相并六粗等轉現亦是細中之粗並為粗相生相即業相妄中最細者以粗從細生故說細為粗源故下文云粗中之細細中之粗菩薩境界細中之細是佛境界然心源之言疏中兩解初解依士釋次解依士持業二釋俱通或可淨心即源持業釋此解與疏初解俱約所證之極疏之次解是約所斷之極斯則心源二字通於真妄覺之一字即是始覺始覺至於生相生相足以斷除始覺至於性淨性淨足以冥合故下文云覺始覺心性淨初起生相心冥合無初相斷除以遠離微細念上所斷者故得見心性心即常住上能合者名究竟覺能所合已別立此名始覺道圓者道即因義至此位中因滿成果無始本異名究竟覺即佛地也不了等者有生相等之所隔故金剛等者金剛喻定無間已還乃至一切異生即下文隨分相似及不覺等是也斯則究竟是果非究竟是因也二廣寄四相釋成疏前三相釋上不究竟覺後一相釋上究竟覺記前三者即滅異住覺此三相已還名不究竟後一即生相此一相盡故名究竟此約反流故生相居後若約順海則滅相為後文二初正寄四相顯其四位二引經釋成心源無念初正寄四相顯其四位疏此中文意將四相粗細寄顯反流四位以明始覺分齊記此下疏總敘意文分為七今初略標大意粗則滅相細則生相中間相望互通粗細寄顯等者寄托四種塵勞相上顯明始覺功力分齊是則約所覺之粗細辨能覺之淺深也四位者此同圓覺凡賢聖果之四或開為五位即資糧加行通達修習究竟也或合為三謂信行淨心究竟也廣即五十二位疏然此四相約真心隨熏粗細差別寄說為四非約一剎那心明四相也記然下二料揀四相意顯真心隨無明熏從細至粗從惑至業寄此惑業之上說為四義乃是一期之四相也非約等者剎那之中雖具四相非今所辨故乃揀之疏今以二門略辨一總明二別說記今下三正釋本義二初標列如文疏總者原夫心性離念無生無滅而有無明迷自心體違寂靜性鼓動起念有生滅四相是故由無明風力能令心體生住異滅從細至粗經云佛性隨流成種種味等又經云即此法身為煩惱之所漂動往來生死名為衆生此下文云自性清淨心因無明風動等今就此義以明四相既鼓靜令動遂有微著不同先後際異就彼先際最微名為生相乃至後際最粗名為滅相故佛性論云一切有為法約前際與生相相應約後際與滅相相應約中際與住異相相應也記總下次詳釋二初總三先總敘起妄二初正敘原鞠窮義夫語辭謂窮此四相之由本因迷心所成也或二字俱是發語之端心性下敘所迷心體即真如門如前文云所謂心性不生不滅乃至離心緣相等而有下明迷成生滅即生滅門如前云依如來藏故有生滅心等經云下二引證初即涅槃又經即法身不增不減經彼云即此法身為過於恆河沙無邊煩惱所纏從無始世來隨順世間波浪漂流往來生死名為衆生此下下即隨染本覺中文今下二就配四相如文佛性下三引論釋成彼論所說一一有為莫不皆為四相所遷以證今論一期四相疏別說者對彼下文約位別分生相有一住相有四異相有二滅相還一記別下二別二初略配下文約位等者即將此覺四相位但對下六染文便知此四別分各成多少不等如下文云一者執相應染依二乘解脫及信相應地遠離即是此云如二乘觀智初發意菩薩等覺於念異念無異相等又下文云二者不斷相應染依信相應地修學方便漸漸能捨得淨心地究竟離故乃至五者能見心不相應染依心自在地能離故此上四染即是此云如法身菩薩覺於念住念無住相等又下文云六者根本業不相應染依菩薩盡地得入如來地能離故即是此云如菩薩地盡滿足方便一念相應覺心初起心無初相等以此對彼足見四相別分之義但以彼約淨智翻染一向就煩惱道說故不說於滅相今文約覺起始終具論故總明四相也準海東疏配生相有三三細也住相四即七識四惑異相六即根本六煩惱滅相有七即身三口四然彼所說法體即同但開合有異今疏即就當論所辨以要順宗故無以棄近而就遠也疏生相一者名為業相謂由無明不覺心動雖有起滅而相見未分以無明力故轉彼淨心至此最微名為生相甚深微細唯佛能知下文云依無明所起識者乃至唯佛能知故即下文三細中初一及六染中後一五意中第一此等並同此生相攝記生下二廣釋四初生業相者標名謂由下釋相以無明下結成表此先無故名生相甚深下別歎下文下引證即生滅四緣中文即下文下類攝初一即業相後一即根本業不相應染第一即業識此等下都結但以所說為門不同而法體是一故皆攝之為門不同者九相是明不覺五意六染是明生滅因緣但五意是生因緣六染是滅因緣也由義異故名字不同及說處亦別以體同故故通攝也下諸段標釋結攝例此疏住相四者一名轉相謂由無明力不覺前動相即無動故轉成能見二名現相謂由無明依前能見不了無相遂令境界妄現此二及初並在賴耶位中屬不相應心三名智相謂由無明迷前自心所現之境妄起分別染淨之相故云智也四名相續相謂由無明不了前所分別空無所有更復起念相續不斷此二並在分別事識細分之位屬相應心無明與前生相和合轉彼淨心乃至此位行相猶細法執堅住名為住相下文三細中後二及六粗中初二并五意中後四亦六染中中四此等並同是此住相攝記住下二住此二等者已上三細是三不相應心屬於本識此二並在等者此是粗中之細屬於事識無明等者結成也確然不改故名堅住後二即轉相現相初二即智相相續相後四即轉識現識智識相續識中四即能見心不相應染所現色不相應染分別智相應染不斷相應染疏異相二者一執取相二計名字相謂此無明迷前染淨違順之法更起貪瞋人我見愛執相計名取著轉深此在事識粗分之位無明前與住相和合轉彼淨心令至此位行相稍粗發動身口令其造業名為異相下文六粗中中二及六染中初一并五意中後意識此等並同是此異相攝記異下三異此在等者此二是粗中之粗屬於事識無明等者惑妄粗顯能發身口貪瞋等別故名異相中二者即執取計名初一即執相應染以合二相為一染故意識即意之識疏滅相一者名起業相謂此無明不了善惡二業定招苦樂二報故廣對諸緣造集諸業依業受果滅前異心令墮諸趣以無明力轉彼淨心至此後際行相最粗極至於此周盡之終名為滅相下文六粗中第五相是也以果報非可斷故不論第六相也記滅下四滅滅前異心者謂惑至此終極入於業道也如小乘滅相滅現在心令入過去以無明等者從微至著起惑造業業因既成必招來果一期事畢故名周盡以周盡故故言滅相非謂從此不起煩惱如人謀事緣備事遂名為周盡第五即起業相以果下或問曰生等四相於九相中已攝前八何故不攝業繫苦耶故此釋之意云因則未造者不造已造者轉滅即有可斷之義若至果報已當受處即不可斷如已至地獄必須受也故佛令知苦斷集不令斷苦是斯意也故今文中廢置不說第六即六粗之最後一相也疏是故三界四相唯一夢心皆因根本無明之力故經云無明住地其力最大此論下文當知無明能生一切染法此之謂也記是下四總結前說唯一夢心喻也如有一人真如忽然睡著無明作夢業相見轉相種種事現相起心分別智相念念無間相續於其違順深生取著執取為善為惡是親是疏計名於善於親則種種惠利於惡於疏則種種陵損起業或有報恩受樂或遭報怨受苦業繫苦相忽然覺來上事都遣當知此事唯一夢心皆因等者法也九相之興皆依此力如依於睡有諸夢事經云下引證勝鬘經也彼云如是無明住地力於有愛數四住地無明住地其力最大大論云譬如大地有勝力故持四重擔故名住地一大海二諸山三草木四衆生無明亦爾於五住地中此最難除故知力大下文即九相末都結之文疏雖復從微至著辨四相階降然其始終竟無前後總此四相以為一念謂粗細鎔融唯是一心故說俱時而有皆無自立也記雖下五據理融攝先縱牒前文謂細不是粗惑不是業法執非我執本識非事識前位異後位故云階降然其下攝彼粗細差別以為一念所言一念相兩意一則但是一無明之念二則一剎那之念且如一人忽逢一怨便行殺害念業如以為張人王人計名定言於我有怨執取惡心無間相續分別是怨非親智相彼為所見現相已為能見轉相心念起動業相即於一念之中八相具足然於二義中正唯前義亦可一念者即一心也故下文云一念相應即無念之一念也謂粗下出所以或問曰既有粗細前後等差何得說為一念故此釋也謂雖有粗細等差唯是一心而作豈有心在滅相而生相中無心若言無者生何所依亦不可分此一心以應四相既心不可分復無前後如何四相得有前後耶如人是一夢種種事夢事雖多即無前後故說下引證即始覺末文正云而實無有始覺之異以四相俱時而有皆無自立本來平等同一覺故疏然未窮源者隨位淺深覺有前後達心源者一念四相俱時而知經云菩薩知終不知始唯佛如來始終俱知始者謂生相也終者謂餘相乃至滅相也記然下六決通伏難或云既四相同時何故覺者有其前後故此釋之達心下以了四相同依心者方得俱時而知也如人夢中說夢漸漸而知或至覺來方可併悟斯乃得失在人不應疑法經云下引證始者下轉釋所引並可知疏即因無明不覺之力起生相等種種夢念動其心源轉至滅相長眠三界流轉六趣今因本覺不思議熏力起猒求心又因真如所流聞熏教法熏於本覺以體用同融領彼聞熏益性解力損無明能漸向心源始息滅相終息生相朗然大悟覺了心源本無所動今無始靜平等平等無始覺之異如經所說夢渡大河喻等大意如此記既下七結成始覺二初順流釋所覺所覺即不覺也種種夢念即煩惱障轉至滅相即業障長眠下即報障既三障所覆殊不覺知無始至今未曾覺悟故云長眠三界即依報六趣謂正報於此六中數數歸往故名為趣今因下二反流釋能覺能覺即始覺二初明覺起因緣本覺熏者內因熏也覺力冥熏微妙叵測名不思議本覺是體熏令猒求是用此即內因體用也又因下明外緣熏力真如是體所流教法是用此即外緣體用也梁攝論說從清淨法界流出正體智正體智流出後得智後得智流出大悲心大悲心流出十二分教清淨法界即是真如聞熏等者謂以聞慧熏得真流之教反資覺性令彼有力是則本覺所流教法還即熏於本覺以體下二顯覺起功用即指前內外熏力能起始覺也體同即外緣之體與內因體無二相故即真如同本覺也用融即外緣教法與內猒求二相通和無有違拒也領彼等者正顯同融之相若不同融即不領受以領彼故遂能資益內熏覺性起始覺之解解力既增無明力劣故得反流漸向心源也始息下明其漸向之義從初信位止其造惡次了我空漸斷法執覺至本識窮了生相纖塵既盡覺照獨存故曰朗悟即無明夢盡成究竟覺也覺了等者心源常湛本自不動動相既無對誰云面下云覺心初起心無初相故又云譬如有人迷東為西方實不轉等平等者心無二相故再言者平等之相亦復平等故或即本末平等能所平等自他平等以要言之諸相待法悉平等故如經下引證華嚴經云譬如有人夢中見身墮在大河為欲渡故發大勇猛施大方便以大勇猛施方便故即便𭔏寤既𭔏寤已所作皆息菩薩亦爾見衆生身在四流中為救度故發大勇猛起大精進以勇猛精進故至不動地既至此已一切皆息二行相行悉不現前彼經意者說此菩薩從有相有功用入此地無相無功用得無生忍不見我及衆生菩提涅槃生死煩惱故二行俱息以得法無分別故今此約究竟位始覺同本無相可覺平等平等位雖不同大意無異故云大意亦如此也又此大意一句亦是通前總結敘意揀非次後釋文也詳之中又分二先總徵次別釋先總徵此義云何疏且總相攝前徵起也記意問究竟與不究竟覺約人約法其義云何此則躡前總標之文而為徵問次別釋疏正釋四相也於中各為四段一能觀人二所觀相三辨觀利益四結觀分齊對文詳之釋有四一滅二異三住四生一滅如凡夫人覺知前念起惡故能止後念令其不起雖復名覺即是不覺故疏凡夫者一能觀人位在十信覺知下二所觀相謂未入十信以前廣造身口惡業而不覺知今入信已能知惡業定招苦報故言覺知此明覺於滅相義也故能下三辨觀利益今既覺故能不造惡止滅相也雖復下四結觀分齊能知滅相實是不善故不造惡名為雖覺而猶未知滅相是夢故云不覺此但能止惡業故云雖覺未覺煩惱故云不覺記一下十信即劫外凡夫蓋凡夫言通至地前今此既能止惡則非迷倒之類未覺煩惱又非十住已上正在不定聚中故云十信二下未入等者且明所覺滅相未入信位迷倒之時所行之行唯惡是從身有三惡謂殺盜淫口有四惡謂妄言綺語惡口兩舌不了此業定招苦果以不知故熾然造作斯則不識因果罔知罪福之時也今入等者正明能覺功用信於善惡業緣受報好醜如聲響形影必無差忒故覺滅相者方知此相過患如是論文但云覺起知惡而無滅相之言故疏對之三下不造惡者前念雖起但是惑門止後不生終非業道意地既止身口即不為也四下能知等者但知善惡之業不亡不知無我無造由是雖名為覺即是不覺此約當位釋此但下約望後位釋後位已覺惑故此位但覺於業惑與覺義敵體相翻業與始覺猶非敵對故但名名字覺雖名名字覺即是不覺也二異如二乘觀智初發意菩薩等覺於念異念無異相以捨粗分別執著相故名相似覺疏初發意等三賢菩薩也十解初心名發心住舉初等後以此菩薩雖留惑故不證人空然於人空實得自在故與二乘同一位論覺於念異者如上所說二種異相分別內外計我我所貪瞋見愛等此二種人共了知故明本淨心為無明所眠夢於異相起諸煩惱而今漸與智慧相應從異相夢而得微覺故云覺於異也念無異相者既能覺異相之夢彼所夢異相永無所有也以捨著者釋上以成觀益也起貪瞋等名粗分別著違順境名執著相以於異相夢覺故能捨之而猶眠在住相夢中故云相似覺以此位中菩薩未至證位二乘不了法空故云相似覺問覺異相等亦不覺後位何不亦立不覺之名答據覺前不覺後亦得名不覺故下文乃至十地皆名不覺若約覺業不覺惑止名為不覺即此文中以覺了惑正敵對故非同業也記初下一能觀問論文何故不直言二乘而帶觀智者何謂也答二乘偏觀人空菩薩雙觀二空故分大小之別今但就其用人空觀同處為言故得合論此則但約觀智力用分同菩薩而非全同既有不同而同之義須言觀智如或直言二乘者恐成濫失十解即十住之異名彼名發心此名發意名義俱同等之一字意該九住及與行向故云後也留惑者伏而未斷故不證者意為利生故謂此菩薩悟真本有達妄本空隨順真如修唯識觀雙伏二障不起現行但留種子若準法相宗說以止觀力微不斷隨眼若依涅槃經地前菩薩依教起行不可思議惑障不起以悲願力助惑潤業受生死身六道教化正當此義若唯識論初地已上悲增菩薩方有留惑之義今此疏中於三賢位而論留惑者以此是法性宗實教菩薩根性猛利初發心時便能頓了本性達妄體空順性修行諸波羅蜜趣理速疾於惑自在故於三賢便說留也得自在者能入此觀能伏此惑故用觀既齊故同一位覺於下二所觀二先會通前釋二種異者執取計名二相也分別等者於身內計我於外計我所於中具含分別俱生故云見愛然於六根本中除我見是見惑餘皆是愛如常所論此二等者即二乘三賢同覺此相俱能了知此我執故明本下次正解本文先明所覺異相發起因緣謂未起觀智時無明之念與異相和合起諸煩惱熾然不息殊不覺知也而今下次明能覺異相觀照功用謂於無明念中照察人我愛見有無道理知此煩惱由無明生始了粗念故云微覺是覺念中之異義念無下三利益既能等者於無明中如理照察人我之體了無所得故云念無異相斯則我空義也以捨下四結觀心捨等者一是釋前二異相二則結觀例知以於等者以覺我空故不起我執煩惱故云捨粗分別等而猶下釋相似眠在住相等者以未能覺法執故此乃通明二乘三賢俱名似覺以此下釋所以也菩薩未證本分是似二乘雖在自乘名為入證以望大乘但得我空未證法空亦名未證故同似覺斯則望於初地證真故此名似問中引前為難可知答中先縱若約下奪也謂依覺有不覺不覺是惑不覺與覺是正敵對轉依不覺之惑方始造業業與覺義猶隔一重故非敵對以敵對故名為似覺非敵對故名為不覺其猶塵鏡在匣匣與鏡非正敵對塵與鏡是正敵對也此義亦然三住如法身菩薩等覺於念住念無住相以離分別粗念相故名隨分覺疏如句初地證法身遍滿乃至九地悉同證得皆名法身菩薩也覺於念住者覺前四種住相雖知一切法唯是識故不起心念粗執分別然出觀後於自心所現法上猶起染淨法執分別明彼淨心為無明所眠夢於住相今與無分別智相應從住相夢而得覺悟念無住相者反照住相竟無所有以離下異前人執及著外境故今約心但云分別又異後根本無明生相細念故云粗念相也此四種住相中於初地七地八地九地各離一相故云離也下文自當顯耳雖於粗念住相而得覺悟猶自眠於生相夢中覺道未圓故云隨分記如下初能觀十地菩薩皆證真如依真如法為自體故名法身菩薩以十地滿心便成正覺故此位中但標前九覺於下二所觀亦二先會前釋覺前四種者以此菩薩於無明念中次第覺於四種住相謂初地覺相續從二地至七地覺智相八地覺現相九地覺轉相此四俱名為住相也雖知等者意明此初地相續雖亡二地去智相等猶在在觀則無出觀還有雖不故意任運如斯以是俱生修道惑故今言覺於住者但約在觀時及後位說也亦可此文通攝地前行相而說意明在地前時信教修觀知一切法唯是識現不起粗念分別執著此即已離前異相也然未親證法空至出觀後而於染淨法上尚起法執分別即相續相也若至初地親證唯心境界遠離二取分別隨眠覺相續相乃至見相故云覺於念住此則約於後位說也明彼下次解本文中初辨所覺住相生起因緣謂未覺之時無明之念與此住相和合堅執而住竟無所改也今與下二明能覺住相觀照功用謂於無明念中照察法我及能所心境有無道理即轉分別之心成無分別智故念無下三利益無明念中如理照察法我之體了不可得故云念無住相斯即法空義也以下四結觀異前等者揀異前後前云粗分別執著今但云分別故異前也後云微細念今云粗念相故異後也此四下明前九地所覺四種住相多少不同如上所配此諸菩薩以於無明念中各隨其分以始覺力離此念中四種相也然則前不離後後兼離前今且就別意各指一相也下文即生滅因緣六染中義廣釋如彼雖於下釋隨分眠於生相等者然今且約通意而指生相若別而言之初地尚餘智等四相二地至七地餘現等三相八地餘轉生二相九地餘生一相由是隨其智力覺彼多少不同故名為隨分也四生如菩薩地盡滿足方便一念相應覺心初起心無初相以遠離微細念故得見心性心即常住名究竟覺疏十地學窮故云地盡此句是總舉下二句別明方便是方便道相應是應無間道覺心初起者根本無明依覺故迷動彼靜心令起微念今乃覺知也心無初者離本覺無不覺即動心本來寂猶如迷方謂東為西悟時即西是東更無西相故云無初相也前三位中雖各有所覺以其動念未盡故但言念無住相等今此究竟位中動念都盡唯一心在故云心無初相以遠離下業識動念念中最細名微細念謂生相也此相都盡永無所餘故言遠離遠離虗妄故真性即顯現故云見心性也前三位中相未盡故不云見性前三位中覺未至源猶夢生相動彼靜心業識起滅故不云常住今生相夢盡無明風止性海浪歇湛然常住又前未至心源夢念未盡求滅此動望到彼岸今即夢念都盡覺了心源本不流轉今無始靜常自一心平等平等始不異本故名究竟覺也記十下初能觀學窮者十地滿心有學位極故方便道者是證佛果之方便故萬行已圓故名滿足此明行滿無間道者自此相應永無間絶故無間道內以此為初故云一念此則無念之念也亦即始覺合本之一念也此明智圓故對法論云究竟道者謂金剛喻定此有二種謂方便道攝無間道攝然準論文依常所配即此二句是標解脫無間也解脫道證無間道斷今方便則覺染心之源證解脫極無間則覺粗相之源斷間隔極故下從覺心至微細念是釋無間道義得見心去是釋解脫道義尋文可解覺心下二所觀始覺覺彼心體初起之相故云覺心初起即生相起生也根本下明所覺生相謂無始迷時根本無明轉靜令動最初微細名為生相由與無明和合相續不滅漸至粗著起惑造業流轉無窮前位雖覺粗相至此位中微念方現也今乃下明能覺功能謂於真淨心中照察能起有無道理所起生相因緣無不覺知也心無下三利益根本不覺即本覺心本覺心中求於不覺了無所得故云無不覺真淨心體本自不動即動心時亦無動相故云本來寂由無不覺本來寂故故云無初相也此則十地住心猶有微念及至滿心不見微念也猶如下喻明可見前三下對前辨異然覺業之位固不足論即第二位中由有二相未盡第三位中亦有一相未盡既於念中覺念未得言心但於無明念中無住相等唯此窮極洞徹心體真淨獨存更無別法故特言於心也以遠下四結觀念中最細者下文云無明熏習所起識者乃至菩薩究竟地不能盡知唯佛窮了生相者配屬四相也以在九為業在四名生今約四位故須配入又以論中無生相之言故如前凡位亦無滅相之言疏亦配也此相等者前諸位中但言以捨以離等而無遠字今以業相最微更無微細為此相本既能覺了更無遺餘方稱為遠離也遠離下釋得見句真性現者以妄覆故真性不現以不現故不得見性今既離妄性即現前以現前故即得見性前三下對前辨異下云一切衆生不名為覺以從本已來未曾離念故既有念在為念所障豈得云見性耶仁王云始從伏忍至願三昧照第一義不名為見所謂見者是薩婆若前三下釋常住句先敘前位業識為生滅本前既未離豈名常住今生下次辨此位前但夢中覺夢今此夢念都盡是謂大覺方名常住佛地論云如大夢覺即斯義也又下釋究竟句論云究竟覺者正是結名也前三相例此知此有五義故稱究竟一斷究竟即前離微細念二證究竟即是見心常住并前行滿三智圓四故成四矣四事既備即位五究竟也前云菩薩地盡以此疏中先敘前位既言望到則知未至今即下次明此位可知以更無所進故得名究竟也然此十地滿心與等妙二覺義說分三若究其體更無三異是故此文與後相望互出不定此中約斷四相只言菩薩地盡斷於生相便是究竟若下文中又云此無明所起識者乃至菩薩究竟地不能盡知唯佛窮了又云智本業染依菩薩盡地得入如來地能離又不了一法界義者從信相應地觀察學斷乃至如來地能究寬離應知第十地覺生相只一剎那覺生無生便是佛位義說前後也若準纓絡經說等覺照寂妙覺寂照今見性常住即是照寂名究竟覺即是寂照此即一位之中約寂照二義而分二覺無二體也二引經釋成心源無念四初引經以證二重釋前文三舉不覺失四顯覺者得初引經以證是故修多羅說若有衆生能觀無念者則為向佛智故疏若有下在因地時雖未離念能觀如此無念道理說此能觀為向佛智以是證知佛地無念此舉因望果說也記在因等者以因中未能親證無念真理故但能觀無念道理此約地前說耳然以無念是佛地故能觀此者是向佛地之智也亦可智字通於所觀是則向於佛智故後譯云能觀一切妄念無相則為證得如來智慧以是下明引經意經中既言觀無念者是向佛智當知佛果決定無念也此舉等者衆生是因佛即是果能觀無念即是望義望即向也二重釋前文又心起者無有初相可知而言知初相者即謂無念疏又者牒上覺心初起之言無初相者非謂覺時知有初相故也而言下問既無初相何故說言知初相耶故為此答如覺迷方時知西即東更無西相可知言知西相者謂即東也覺心之時知初動念即本來靜故云即無念也記牒上等者恐聞前覺心初起之言將謂真心實有所起之相今方覺此名覺初相今欲釋出故此牒之非謂等者以迷時謂有覺處元無唯是一心何有初相此亦例前位皆無所知之相方成知異住等問下攝前難起故為下指論以答如覺下約喻釋意覺心下合顯論文並可知三舉不覺失是故一切衆生不名為覺以從本來念念相續未曾離念故說無始無明疏不名覺者是前無念得名為覺故即顯有念不得名覺以從下顯不覺所以即金剛已還一切衆生未離無始無明之念故不得名覺然則前對四相夢之差別故說漸覺今約無明眠之無異故說不覺故說無始者結成不覺義也此顯無有染法始於無明故云無始又無明依真同無始故也記是前下釋是故二字即顯下解餘文金剛已還者無間道前諸位菩薩與諸異生故云一切未離等者以生相念盡始得名覺當知前之三位皆名不覺況異生耶然則下對前釋成也以前說隨分覺及相似覺者以約無明夢中四相差別各齊一相而論故有覺義由分淺深遂有隨分等別今約無明眠之不別俱名不覺夢雖有差眠豈有異無明即生相也此顯等者顯無明即為諸法之始以是五住煩惱之端十二因緣之首故故下云當知無明能生一切染法既為能生則知無有先於此者斯則無始屬於他染無始之無明依士得名又無明下約當體釋無始也謂此無明無有初際以依真故斯則無始即無明持業得名故下文云以如來藏無前際故無明之相亦無有始四顯覺者得若得無念者則知心相生住異滅以無念等故疏若至心源得於無念則遍知一切衆生一心動轉四相差別以無念者釋成上義疑云佛得無念衆生有念有無懸隔何能知耶釋云衆生有念本來無念佛既得彼無念無念與念本來平等故云以無念等故是故得知也又釋云以四相念中各即無念故云以無念等也是故得無念者遍知四相諸念也記若至等者此顯始覺覺至心源見自無念亦知一切衆生皆悉轉彼一靜心成四相差別也雖云知四相乃是知衆生同是一心本來成佛也如華嚴說如來成正覺時普見一切衆生悉皆成佛釋云等者佛得無念知念本無衆生雖現在念中佛知彼念亦即無念斯則佛無念與衆生有念義齊故云等也以念即無念故得彼無念始知四相念也此即生佛相望論等義又釋下約四相相望明等義意明四相皆是轉彼一靜心所成所成四相既各無體豈不即是一靜心耶靜心即無念也既一一相皆即無念是故平等以平等故得無念者而能知之如一珠中現四色像見珠體者悉能知之然前以有念即無念為等義此以四相各即無念為等義也上解是海東疏依大論釋義則約覺至心源以己得無念故則知一切衆生生住異滅也據論文只有知心相言而無衆生語今直就文更助一解謂得此無念之時已覺初相本無所起常自一心本來無念由是則知四相皆然即是一心是心之相元未曾起非謂別有生住異滅從心而起也何以故以一一相皆同初相即是無念故云以無念等故無念唯一故云等也故次文云四相俱時同一覺故一覺即無念也後譯云若妄念息即知心相生住異滅皆悉無相三明始不異本而實無有始覺之異以四相俱時而有皆無自立本來平等同一覺故疏而實句標也雖始得無念之覺然其所覺四相本來無起待何不覺而有始覺之異記先標立得無念者謂得覺無念之始覺也本無起者即四相本無念故待何等者因不覺有始覺今不覺既無始覺亦絶也疏以四下釋成上義也以彼四相一心所成鈎鎖連注無有前後離淨心外無別自體無自體故本來平等同一本覺然未至此位隨其智力前後而覺未稱法故不得同本今既四相俱時平等覺知皆無自體同一本覺是故則無始覺之異記次釋成二初正為釋成四相俱時有者以轉彼靜心一念所成一念本無念四相無自性是故皆無自體得成立也如依一水而有千波波無別體皆同一水然未下對前辨異先指昔今既下顯今並可知疏問四相云何而得俱時既其俱時何故上文覺有前後答上已辨竟謂唯一夢心四相流轉處夢之士謂為前後各各隨其智力淺深分分而覺然大覺之者知夢四相唯一淨心無有體性可辨前後故云俱時無有自立等也故攝論云處夢謂經年悟乃須臾頃故時雖無量攝在一剎那此中一剎那者即謂無念楞伽云一切法不生我說剎那義初生即有滅不為愚者說解云以剎那流轉必無自性無自性故即是無生若非無生則不流轉是故契無生者方見剎那也又淨名經中不生不滅是無常義等楞伽又云七識不流轉不受苦樂非涅槃因如來藏者受苦樂與因俱若生若滅此等經意並明真心隨流動作諸法諸法無別體性故唯是真心無有別法是故四相即一真心不覺即同本覺故記問下二問答通妨三初正申問答問中兼難可詳悉答中辨竟者指前正釋是也謂唯下重釋處夢士者即金剛已還及一切異生也大覺即佛位並如前說攝下二引經論證三初引攝論別證四相唯一心先引文前二句舉喻後二句合法以須臾間睡成多年夢如有說言一夢之間經歷三世受身生死此之謂也此中下次明意經年夢事不出須臾無涯生死不出剎那彼論剎那即今之無念故指彼同此也楞下二引楞伽通證心相一心與四相也二無異二初正引剎那生滅流轉也滅即不生義初二句無生即生證一心不異四相也次二句生即無生證四相不異一心也解下二釋文先順明釋第三句意云剎那生即無生以無自性故若非下次反顯釋初二句謂若剎那不是無生即有自性也既有自性即不流轉今剎那既是無生即知無有自性既無自性必能流轉故云一切法不生我說為剎那是故下後總結釋第四句由是剎那即無生故所以契無生者即能見剎那也此即例前四相諸念即無念故是故得無念者方覺四相唯是一心也又下三引二經別證一心成四相先淨名意云無常之法必無自性以無性故即不生滅不生滅證一心無常證四相楞下次楞伽此引宋譯文若唐譯云五識身非流轉總之不論五識七識皆非無生故不流轉圓覺云知是空華即無流轉亦無身心受彼生死如來藏等者以有實體不可泯故故生滅處即如來藏楞嚴云生滅去來本如來藏妙真如性當知前三句反明七識無體非無生則不流轉是帶引也後三句順明藏心有體是無生無性故流轉即將彼流轉無性證此四相無念義如來藏即一無念心生滅等即四相諸念此是正引也深思之此等下三總結大意真心作諸法者結釋第三引淨名楞伽二經意諸法唯真心者結釋初引攝論一意合之則結釋第二引楞伽心相相即意是故下會通此中文旨以答釋也然此前四位文一段及引經後至今文一段正同圓覺經中依位漸證忘心頓證具明此者意令頓悟漸修自然成位其猶學射心唯在的箭有近遠楞嚴亦云理則頓悟乘悟併消事非頓除因次第盡由是若不說漸位則階降何知若不說頓門則終卒難入由是具說以備修行二本覺二初明隨染本覺二明性淨本覺初明隨染本覺記亦可前則略說是體文云心體離念故此段是相文云生二種相故後四鏡是體相雙辨文云覺體相故中又三初總標二徵列三辨相初總標復次本覺隨染分別生二種相與彼本覺不相捨離疏此二既在隨染門中故云生也生已不離不動覺體故記此二下以是本覺不合言生今隨染緣還淨而顯故有生義斯則顯故名生非創然而生也故下文云顯現法身等生已不離者其實即是彼覺今此言是義說也其猶明鏡在塵出塵其體不別二徵列云何為二一者智淨相二者不思議業相疏智淨者明本覺隨染還淨之相不思議業者明還淨本覺業用之相此之二相若離染緣則不得成故云隨染也記明本等者自隨流而還源自垢染而清淨亦即自隱而顯也覺處不覺久被塵染却復本真故云還淨明還等者昔以相隱而用廢今以相顯而用興其猶出塵之鏡形對而像生也此之下總明二相得稱隨染所以也然智淨相離自業識等染緣故不成以無能顯故故下云若離不覺之心則無真覺自相可說等若不思議業相離彼衆生等染緣故亦不成以無能感故故下云諸佛如來唯是法身智相之身第一義諦無有世諦境界離於施作但隨衆生見聞得益故說為用由是此二俱名隨染三辨相二初智淨相二不思議業相初智淨相二初直明淨相二問答釋成初直明淨相二初因二果初因智淨相者謂依法力熏習如實修行滿足方便故疏智句牒章法力熏者真如內熏之力及所流教法外緣熏力此在地前依此熏力修習資糧加行善根也如實修者登地已上行契真如也滿足者十地行終也此在金剛因位極處記真如等者在內為理法在外為教法雖內外不同皆名為法由是論中通言法也此在等者但由熏習力故緣教修行從初信位終至第十回向也資糧者謂十信三賢具修福智為成佛之資糧故亦名順解脫分善加行者即暖頂忍世第一四種加行此在三賢位後十地位前加功用行以求見道故亦名順決擇分善此四加行依四尋伺四如實觀觀名義名義自性名義差別假有實無如暖頂二位同修四尋伺觀忍世第一同修四如實觀暖位修明得定發下尋伺觀無所取頂位修明增定發上尋伺重觀無所取忍位修印順定印前順後發下如實智此有三品下品印無所取中品順無能取上品印無能取言如實智者如實遍知名等四法離識非有所取若無能取亦無也世第一位依無間定發上如實智雙印二空又離所取能除遍計離能取除依他起雙印二空得圓成實猶帶空相非真唯識故彼頌云現前立少物謂是唯識性以有所得故非實住唯識登地已上者初地見道二地已上即是修道以此二位證真起行還契於真也非同地前緣教而修故云如實以地前是教道此名證道故金剛等者於此定位二種道中方便道也義見前文二果破和合識相滅相續心相顯現法身智淳淨故疏由前方便能破和合識內生滅之相顯不生滅之性此根本無明盡故心無所合即顯法身本覺義也即於此時能滅染心之中業相等相續之相不滅相續心體故令隨染本覺之心遂即還源成淳淨圓智成於應身始覺義也然此始覺無別始起即是本覺隨染作也今染緣既息始還同本故云淳淨淳淨智即智德餘皆斷德也記由前等者即方便行為能破生滅相為所破又方便道為能顯不生滅性為所顯此根等者以未至此位之前根本無明與真淨心常相和合成此識相今至此位無明既盡唯一心在照體獨立與誰為合故中論云一法云何合即顯等者此中疏意明今論文是隔句顯發准理論文應云破和合識相顯現法身滅相續心相智淳淨故故今疏隔句顯發論文是依義不依文以釋也謂破和合識內根本無明生滅之相即顯不生滅法身本覺滅染心中業等相續之相成淳淨圓智報身始覺今此且明初段顯法身義法身即本覺隱顯得名今雙舉者要對後始覺故也即於等者以六染心皆依無明與真和合而得相續今無明既盡和合不成染心依何而得相續故並隨滅然諸染心皆相妄而體真故相滅而體不滅故云不滅心體也故令等者比以無明和合染心相續故使本覺曠劫隨流今既無明破染心滅無所拘纍故得此心却復元淨其猶窮子歸家摩尼出垢也成淳淨圓智者不雜故淳離染故淨無缺故圓滅識故智成應身始覺者應有二意一者應字平聲呼名相應身謂始覺智與本覺相應即報身也例如下云自然相應二者真諦三藏呼報身為應身應地前相似名字覺位菩薩名為劣應亦名為化應地上隨分覺位菩薩名為勝應亦名為報此之他報屬下用中今是自受用報修因所感故名為應智德圓淨亦名智身並屬此攝然此始覺與前本覺皆是能成此應身與前法身皆是所成意謂識相破而性在性即本覺本覺能成法身心相滅而智淨智即始覺始覺能成報身此皆義說能所成也然此段文亦是海東疏義疏注參而用之石壁失照作應化解不知下之不思議業相方是應化身故如此則三身義足不爾文中便成缺剩剩一化身缺一報也然此下始本同也以始覺是本之用由有染故本覺起用以為對治今染緣既息用還歸體故轉其名為圓淨智也斷德者除淳淨智外餘三句文悉是斷德識與心相是所斷法法身是彼斷所顯故後之一相即是恩德則三德備矣若依此說前之應身正當屬報文理甚順二問答釋成二初執真同妄問二簡妄異真答初執真同妄問此義云何疏問意云如上所說動彼靜心成於起滅今既盡於生滅應滅靜心記如上等者前云依如來藏故有生滅心仍說和合不相捨離今生滅既滅真亦合滅如何却云滅相續心顯現法身智淳淨耶斯則約相即門以相難性也二簡妄異真答三初法二喻三合初法以一切心識之相皆是無明無明之相不離覺性非可壞非不可壞疏以下答意云業等染心名諸識相此等皆是不覺之相非約心體說記初釋正難前說心成識者但是心相成識今言識滅者亦是心相滅斯則生之與滅皆約心相不約心體故得說言滅相續心顯法身等此則約非一門性相不即而答也疏無明下轉難云既言識相皆是無明故說滅者皆應別有體性離於真如即真妄別體難也故此答云如此諸識不覺之相不離隨染本覺之性記次釋轉難難意云既若起滅不干心體斯則真妄迢然如何前云轉彼靜心成起滅耶此約性相相離義邊為轉難也如此等者意云前雖云相滅但是相融歸性義說為滅以此識相不離覺性故是則真妄元無別體如何難云離真有妄耶此乃約性相不離義以答釋也疏非可下謂此無明之相與彼本覺之性非一非異非異故非可壞非一故非不可壞若依非異非可壞義說無明即明故涅槃經云明與無明其性無二無二之性即是實性若就非一非不可壞義說無明有可滅故涅槃云因滅無明得菩提燈無明滅覺性不壞滅惑之義準此知之記三結前義雙結成前二義也前句結後義相不離性成得轉彼靜心為起滅等後句結前義心相是無明成得滅相續心現法身等非一異等者後譯本云相與本覺非一非異非是可壞非不可壞等生滅門初已曾廣釋今却以彼非一異義成此文中非壞不壞義此即約義總標也若依下引經別釋無明即明故不可壞壞則壞於明體故涅槃具云明與無明凡夫為二智者了達其性無二無二之性即是實性若就等者以識相即非心體故所以因滅無明得菩提也無明滅下結成可壞之義此正顯前文滅相續心顯法身也如正法念經說水乳一處鵝王飲之乳盡水在滅惑準者世人皆謂斷盡惑結然後證真殊不知惑體本真全覺之不覺如迷東為西誰之過耶而欲求滅西相然後見東愚之甚矣二喻如大海水因風波動水相風相不相捨離而水非動性若風止滅動相則滅濕性不壞故疏一水因風動真隨妄轉喻二水風不離真妄相依喻三水非動性真體不變喻此顯非自性動但隨他動也四風滅濕不壞息妄顯真喻此明若自性動者動相滅時濕性隨滅而但隨他動故動相滅時濕性不壞記真隨妄轉者即下淨心因無明風動水風不離者濕是水相動是風相動處全濕濕處全動是不相捨離亦可水相者波動也風相者亦波動也以水之與風俱用波為相故云不相捨離以喻一切染法依真而起由癡所發染法望真波望水是真之相水相若望於癡波望風是癡之相風相如下云以一切染法波皆是不覺相風故又云皆同真如性相水故此喻之真妄相依者即下心與無明不相捨離真體不變者即下心非動性心性寂滅本非動作以不守自性隨他無明故成起滅如水濕性本不動搖由風故動也息妄顯真者即下無明滅相續則滅智性不滅此明等者意謂若自真性是動法者識相滅時真性應滅今既不滅應知非自性動也如彼水性若自性動波相滅時濕性應滅今既不滅應知非自性動也三合如是衆生自性清淨心因無明風動心與無明俱無形相不相捨離而心非動性若無明滅相續則滅智性不壞故疏一心因無明動合水隨風動也以水不能自浪要因風起波風不能自現動相要因水方現動相故風動即水動無別體也所況可知二心無明不離合風水相依也以濕全動故無於水相以動全濕故無於風相心法亦爾真心隨熏全作識浪故無心相然彼識浪皆即是真故無無明相三心非動性合水性不動也四無明滅智不壞合風息顯水根本無明滅合風滅業識滅合動相滅隨染本覺照察之性不滅合濕性不壞也記水隨風動者即前大海因風波動也以水下喻所況句合應云以心不能自生其識要因無明以成識等無明不能自現妄相要因心方現妄相故無明動相即心動相無別體也故前云染法望真是真之相若望無明是無明相也風水相依者即前水相風相不相捨離然於中俱無形相義喻中不言故今疏中約法顯喻以濕下喻明無水風相心法下法合說無心無明相若據疏意即約全奪兩亡之義今於疏外別助一解言心與無明俱無形相者此約真妄各住自位時說也舉此義者要顯真妄之相不相離故以真本無形相約染心以說其相無明亦無形相還指染心以為其相斯則住自位時雖無形相而真妄和合共現染相以此染法亦是真如相亦是無明相故云不相捨離如父母共生一子此子亦是父之子亦是母之兒也問何故前喻中只言風相水相不相捨離而不云俱無形相耶答以前文中但喻不相捨離義不喻無形相義以水不起波相時亦有濕相故風動相亦如是但取分喻故不言無形相也問喻中云風相水相法中云俱無形相法喻豈齊耶答喻中就所起共相波浪說故皆云相法中就能起自相心無明說故云俱無雖無自相之相而有共相染法之相法喻正齊也然喻中約已起故云相法中約未起故云俱無又喻中約合法故云相法中約開法故云俱無也然今法喻正意只明無明之相與覺性不相捨離義不顯無形相義故前喻中不喻此也合中雖有無形相言正意亦要顯不相離詳之水性不動者即前水非動性風息顯水者即前云若風止滅動相則滅濕性不壞一一別配可知根本下釋無明句業識下釋相續句隨染下釋智性句並可見二不思議業相二初依體總標二約用別辨初依體總標不思議業相者以依智淨相能作一切勝妙境界疏不句牒章能作境者謂與衆生作六根境界故寶性論云諸佛如來身如虗空無相為諸勝智者作六根境界示現微妙色出於妙音聲令嗅佛戒香與佛妙法味使覺三昧觸令知深妙法故名妙境界記論云依智淨者是依真起應如依鏡明現諸色像也謂前隨染本覺之心始得淳淨依此智力現應化身與彼衆生作利益故故寶性論云何者成就自身利益謂得解脫遠離煩惱障智障得無障礙清淨法身故何者他身利益既得成就自身利益已無始世來自然依彼二種佛身示現世間自在力行是名成就他身利益他身即應身也唯識論云大圓鏡智能現能生身土智影等疏云謂與等者一切雖多不出六境故標此也寶性下引論釋義虗空無相者即前所依之真身唯是如如及如如智周遍一切無有差別故如虗空為勝智者即能感應化之機深猒生死樂求涅槃故此有二類一地上感勝應身二地前等感劣應身作六根境如文具顯二約用別辨所謂無量功德之相常無斷絶隨衆生根自然相應種種而現得利益故疏所謂下有四一無量相橫顯業德廣多無量二常無絶豎顯業根深窮來際三隨相應顯業勝能無功應機四現得益顯業勝益利潤不虗如此則是報化二身真如大用無始無終相續不絶故記先通釋論文也業德者如下云身有無量色色有無量相相有無量好所住依果亦有無量種種莊嚴等業根者如下云隨其所應常能住持不毀不失斯則橫豎皆依真覺故得無量無斷勝能者如法華云應以佛身得度者即現佛身而為說法等有感斯應不用加功如百水不上升一月不下降慈善根力法爾如此故論曰自然也勝益者或見形以發心或聞法以起行乃至知覺功不唐捐故云不虗此二句別釋此文也如此下通結上義也報化等者報即地上所見亦名勝應化即地前所見亦名劣應又下云依於業識菩薩從初發意乃至究竟地心所見者名為報身依分別事識凡夫二乘心所見者名為應身此二種身皆淨智所顯真如之用也無始等者即前常無斷絶也下文自顯疏問始得自利方起利他之業云何利他說無始耶答以無明盡故始覺即本覺然彼本覺無始世來常起業用利益衆生是故始覺同彼亦無有始以一切佛無差別故無新舊故皆無始覺之異故本覺平等無始無終故故能常化衆生是真如之用故云不思議業也此本覺用與衆生心本來無二但不覺隨流用即不現妄心猒求用則於彼心中稱根顯現而不作意我現差別故云隨根自然相應雖不作意現無不益記次問答釋妨也初問意云始得智淨相以自利方起不思議業以利他故上云以依智淨作勝境界若然者則利他有始何言無始耶答下二答三初約一佛釋本覺常起用者有其兩意一約內熏說即自體相熏習義故下云從無始來具無漏法備有不思議業作境界之性依此二義恆常熏習等二約應化說應化不起者但以妄染覆之非謂本覺無此應用亦非固心抑令不起斯則過在於妄何責於覺實如崑竹有龍鳳之音塵鏡有光明之用如或裁之以利磨之以塵則何患乎雅韻精明而不顯發耶以一下二等諸佛釋通約十方三世諸佛皆以始覺同本故得應用無始終也此本覺下三同衆生釋以衆生真心與佛真心不別故佛應用即是衆生應用用即體起故云無二若就佛說用即屬佛若就衆生說用則屬衆生略同明月現在澄潭此所現月亦是月影亦是潭影下文廣釋二明性淨本覺二初總標二別釋初總標復次覺體相者有四種大義與虗空等猶如淨鏡疏再辨前本覺故標云復次牒云者以空及鏡皆有四義故取之為喻一空鏡謂離一切外物之體二不空鏡鏡體不無能現萬像三淨鏡謂磨治離垢四受用鏡置之高臺須者受用四中前二自性淨後二離垢淨又初二就因隱時說後二就果顯時說又前中約空不空為二後中約體用為二又初二體後二相故云覺體相也又初一及第三明有空義第二第四明有鏡義故舉二喻記論云四種大義者但明覺相有四種義以一一義皆遍法界遂舉二喻以虗空喻周遍故云有大義與虗空等以淨鏡喻四種故云有四種義猶如淨鏡所以具明者若單舉空喻則不顯四義若單舉鏡喻則不顯周遍遂雙舉二喻互相顯發也又據疏云以空及鏡皆有四義則空鏡皆具四種大義也四種者謂無相等現清淨明照也大者謂遍空遍現遍淨遍照也空於平等二無相一義顯故云與虗空等鏡於清淨三明朗四義顯故云猶如淨鏡鏡四大義如疏可知空四大義釋相如何一者無相空經云觀晴明空唯一晴虗逈無所有二者現相空經云譬如虗空體非羣相而不拒彼諸相發揮三者出離空經云出土尺丈得尺丈空虗空淺深隨出多少四受用空經云若築牆宇穿為小竇參合羣器名為異空下論文不釋者例鏡知故一下文二初略配空者此就真體本無妄染如文云從本已來一切染法不相應故猶如於鏡唯有性明故云空也鏡中所現但是影像其相元無亦成空義不空等者雖無妄染然有自體及性功德若無其體將何現物餘二可見此四如次以配四義前雙標而後單釋者以空隨鏡顯也但釋鏡義自挾虗空四中下二料揀配有五對初性淨離垢對二因隱果顯對三空有體用對四體相對五空鏡對一三有空義者然空語雖同而空義不同以第一就因無妄體為空第三據果離妄相為空二四有鏡義者義亦不同二以本來現物為鏡四以隨時照物為鏡然則一三非無鏡義二四非無空義今但取增勝配之二別釋四一如實空鏡二因熏習鏡三法出離鏡四緣熏習鏡一如實空鏡云何為四一者如實空鏡遠離一切心境界相無法可現非覺照義故疏云何句通徵一下列釋如實空者真如中妄法本無非先有後無也遠離等者倒心妄境本不相應非謂有而不現但以妄法理無故無可現如鏡非不能現但以兔角無故無可現也非覺照者有二義一以妄念望於真智本無覺照之功以情執違理故如鏡非有外物以彼外物無照用義故即顯鏡中無外物體二以本覺望於妄念亦無覺照功能以妄本無故如淨眼望空華無照燭之功亦如鏡望兔角此約遍計說下約依他說故能現世間境界記如實句初標名本無等者以從本已來不相應故非同隨相之說未斷則有斷已始無故名本無亦非推之使無也遠下二辨相論中初二句正顯空義無法一句重辨所空疏中法喻對顯昭然可見非覺照句三結名二初正釋二初約妄無真照之功此則以所對能於中先法說違理者理有覺照妄既違理即無覺照既無照用理中豈能容彼妄耶由是前云遠離也如鏡下次喻顯如鏡銅體本有照用外木石物與鏡體違則無照用既無照用鏡中豈能容彼木石物耶以有照與無照非和合故亦猶仁人之家豈容不仁人共住以性相違故二下後約真無妄覺之用此則以能對所於中亦先法次喻並可知圓覺云無知覺明不依諸礙即斯義也然此二義之中雖約妄約真皆就無能照說也問妄屬無明容無能照真性明了教理俱成何言無照答今言真無照者但無能所之照不無性明之照如楞嚴云性覺必明妄為明覺今此但無妄為明覺之照也疏中約所顯能非謂但無所照義爾此約下二通妨或問曰次云一切境界悉於中現云何此言無可現耶故此釋通遍計情有理無依他相有性無故知此言無可現者妄無體故下云現者有虗相故其次云常住一心等即明依他無體唯是圓成則三性之義備矣二因熏習鏡二者因熏習鏡謂如實不空一切世間境界悉於中現不出不入不失不壞常住一心以一切法即真實性故又一切染法所不能染智體不動具足無漏熏衆生故疏因有二因義初能作現法之因二作內熏之因亦可初是因義後是熏習義故云因熏習也記初標名現法因者以次云現境界故內熏因者次云熏衆生故亦可下重辨斯則因義通而熏義局也以現法及熏習俱名因故現法非是熏習義故疏不空此總出因熏法體謂有自體及性功德故記次出體有自體者異妄無自體故及功德者異恆沙煩惱故妄則不唯無功德兼無自體真則不唯有自體兼有功德如前文云以有自體具足無量性功德故疏一切下別釋二因初因境界悉現者明一切法離此心外無別體性猶如鏡中能現影也不出者明心待熏故變現諸法非不待熏而自出也不入者離心無別能熏故不從外入也不失者雖復不從內出外入緣起之法顯現不無也不壞者諸法緣集起無所從不異真如故不可壞如鏡中影非刃能傷以同鏡故住一心者會相同體即真性者釋成同體所由以於心中顯現無出入等故即無體性無體性故本來平等不異真如故云常住一心即真實性記三釋義二初現法因離心無者下云三界虗僞唯心所現離心則無六塵境界明心等者待無明緣熏方變諸法若自出者無明斷後應出法無窮則修斷何益故知不待無明法則不從內出離心等者雖云待緣熏方出非謂別有他法自外而入為能熏耳以是即心不覺之因為能熏故能熏既非心外所現安得離真故非外入又此諸法全心而成非謂諸法從心內出而現於外此即非如人從室內而出名為現也又非別有諸法自外而來入此心中以現其影此即非如形對於鏡而現其像也以心無內外故雖復等者心境歷然染淨宛爾故諸法下法喻者鏡喻真如心影喻法緣無從刃傷喻智斷心鏡上無明塵垢智刃可刮斷而心鏡內法影非智刃可割傷也斯則性起為相故不失相同於性故不壞以心無失壞故此四句揀濫謂內能不出外所不入緣起不失理實不壞又因不出緣不入相不失性不壞又內不從六根出外不從五塵入果不從當來失因不從過去壞又不從自性生不出也不從他性生不入也不從無因生不失也失去親生真因便為無因性故不從共性生不壞也自他各壞其體方可成共性故常住一心者有二意一者以一切法常依一心而住故得不出不入不失不壞也二者諸法當體常住唯是一心一心之外無有一法可為出入失壞也故經云世間相常住此二中前義為正以下有論自釋成故此一句正顯良以常住一心故得一切境界悉皆現也疏文可知釋成同體等者意云何以諸法常依一心而住耶故此釋云以諸法相即是真性體故斯則以此二句近釋上同體義也以於下通敘前文者顯此段論是展轉互相釋成也若欲易明應云一切境界悉於心中顯現者以無出入失壞故無出入失壞者即無體性住一心故住於一心無體性者以一切法本來平等不異真如性故是則此二句遠結前後一段義也疏又一切下釋後因謂以性淨故雖現染法非染所污非直現染之時非染所染亦乃由現染故反顯本淨如鏡明淨能現穢物穢物現時反顯鏡淨豈此穢物能汗鏡耶若不現染則無以顯其不染是故現染釋成不染義智體不動者以本無染今無始淨是故本覺之智未曾移動又雖現染不為所染故云不動如鏡中像隨質轉變然其鏡體未曾移動也具足無漏者謂此本覺中恆沙性德無所少也熏衆生者謂又與衆生作內熏之因令猒生死苦樂求涅槃樂故勝鬘經云由有如來藏能猒生死樂求涅槃佛性論云自性清淨心名為道諦記二熏習因以性下順釋文非直下別顯意先法次喻若不下反以結成以本下約本淨今淨明不動又雖下約現染不染明不動亦先法後喻此本下即下所說大智慧光明義乃至無有所少義等又與下即自體相熏習義勝鬘下引經論證道諦即出世因熏習因也三法出離鏡三者法出離鏡謂不空法出煩惱礙智礙離和合相淳淨明故疏謂真如之法出於二障離於和合故云出離前是在纏性淨不空如來藏今明不空出纏離垢法身如寶性論云有二淨一自性淨以同相故二離垢淨以勝相故不空出法體也即前因熏之法惱礙者粗細染心智礙者所依無明離和合者淨心出障破業識等和合淳者離和合雜相故淨者無惑染故明者出無明故謂大智慧光明等記初標名謂下解釋當文前是下料揀前後性淨即初義不空即二義彼二在纏故通名如來藏但以空不空異耳今明不空者與前不空義同法身者與前如來藏義異體同彼隱此顯故前云依法身說本覺後云如來藏亦名如來法身然法身但屬第三鏡其後一鏡即是報化身也寶性下引證同相者通凡聖故勝相者勝於因故然初淨即前二義後淨即後二義不空下二出體即前法者即是前為二因之法也前明熏因今明離障故重指之惱障下三辨相粗細染心者四粗三細心也下云染心義者名煩惱礙所依無明者根本枝末是六染所依法故下云無明義者名為智礙出障者出前二礙礙即障也二障既出業識等亡心無所合故云離也離和合等三段即翻前和合煩惱智礙成此淳淨明故淳是總淨明為別謂淳淨故淳明故淳淨即滿淨義揀異菩薩等是分淨故淳明即滿覺義揀異菩薩等是分覺故斯則六染盡故謂之淳淨二覺圓故謂之淳明也又此三字即圓三德謂法身解脫般若如次配知備此三點以成大般涅槃四緣熏習鏡四者緣熏習鏡謂依法出離故遍照衆生之心令修善根隨念示現故疏即彼本覺出障之時隨照物機示現萬化與彼衆生作外緣熏力故云依法乃至示現問前隨染中智淨與此法出離何別前業用與此緣熏何別答前約隨染故還淨說為智即明彼智用俱就始覺說此約自性故離障顯法體即明此法用俱就法體說是故前云智此云法前云業此云緣也然法智雖殊體無差別以始覺即本覺故但今就義開說故有境智不同也記論云緣熏習者初標名也緣即外緣為諸衆生而作發起善根之外緣故熏資熏也謂熏成習氣發善根故論云謂依法下次釋相初一句躡前起依於體相也次三句釋本門起於業用也謂依前法體出離惑染遂成三輪不思議化遍照即意輪鑒機示現即身口設化以此為緣熏習力故令修善根也疏中二先通釋論文與彼等者謂與二乘十信作差別緣與三賢十地作平等緣如下用熏習中說問前下次料揀前後二初辨異二義問意可知答中前約等者意明前之二相與此二鏡法體無二為門有殊謂前二相以智為門故云俱就始覺後二鏡以理為門故云俱就法體又前約相說故云生二種相此約性說故二種俱言法又前約對染明淨相故云智淨等此約自性顯大義故云有四種大義與虗空等也又前以顯為門此以隱為門所以有斯二說者恐有人言顯時方淨隱時不淨故說二顯後又重說二隱指法出離緣熏習也又先明二顯者以取始覺之末文便故又亦即是始覺義故亦即隱處難信且就顯處而開示故餘義易知然法下二結同一體此明為門雖異其體是一故此結同也但今下境即是法以是始覺所緣所證故言境也音釋罣音卦挂牽也翛音囂絶無纖纍也漂音飄隨流浮動也確音恪堅住也擔音旦挑在肩也𭔏寤音告悟醒覺也綺音起細花綾忒音慝差失也匣音狹鏡匣薩婆若此云大智慧箭音薦矢也鈎音勾尋伺下音祠謂尋求伺察也覺觀別名淳音純質朴也剩音盛多餘也鵝音荷畜名唐捐下音涓虗棄也鳳音奉鳥中王羽中長也裁音才度量剪割也雅音啞美妙佳也韻音蘊音曲也潭音曇聚水深處築音竹搗也竇音豆孔穴挾音甲掖持帶也刃音忍鋒刃刮音括剝削也大般涅槃此云大滅度亦云大寂滅
