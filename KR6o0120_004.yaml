body:
  text: 唐西京太原沙門法藏述疏終南草堂沙門宗密録注宋秀州長水沙門子璿修記清錢塘慈雲沙門續法會編順天府府丞戴京曾閲定二別疏釋上立義分中何以故二門別義記釋上等者立義文云何以故是心真如相即示摩訶衍體等今此正釋也於中二初別辨二門顯動靜不一二會相入實顯動靜不異記動靜不一不異如次者是前二門與不相離義頓說實難故成前後耳初別辨二門顯動靜不一二初真如門二生滅門初真如門二初顯體離言以明觀智境二依言辨德以明生信境初顯體離言以明觀智境疏釋上立義分中真如義也記釋上真如義者彼云是心如真相今且釋真如兩字也科云觀智境者以體非名相之法故言念之所不及言念尚所不及豈落見聞唯久修觀智方得相應所以說者意令如此用心也故下文云離言說相離名字相離心緣相乃至若離於念名為得入楞伽亦云真實離文字修行示真實於中二初正舉法體二問答斷疑初正舉法體二一正顯如體二會執釋名一正顯如體三一就實略標二會妄顯真三結真離妄一就實略標心真如者即是一法界大總相法門體所謂心性不生不滅疏心真如者牒章即是一法界者即無二真心為一法界此非算數之一謂如理虗融平等不二故稱為一又對下依言有二義故今約體但云一也依生聖法故云法界中邊論云法界者聖法因義故也記即是下示法也初釋上句即無下初釋一字中先約當體釋也無二真心者豎窮橫遍為一切法平等所依依正凡聖唯此為體離實相外更無別法故云無二揀非僞妄靈鑒不昧故名真心此非下揀濫夫言一者見數之首今非此等也謂如下明一之相謂真如之理虗通圓融於一切法平等平等體非別異故云一也又對下次約對二釋斯但對下空不空二以稱一也下但約相今唯顯體亦非算數依生下二釋法界諸有聖法依此生故即菩提涅槃十力四無畏等是聖人所證所得之法故名聖法故圓覺云無上法王有大陀羅尼門名為圓覺流出一切清淨真如菩提涅槃及波羅蜜教授菩薩因義者法即聖法界即是因能生聖法故云法界問據前所說真性是凡聖染淨通依何故此文獨言聖法因義答此中乃是以勝顯劣也非謂揀於凡法聖法尚依豈況凡耶此約終頓教義故作此釋若就圓教事事法界理理法界無礙事理無礙法界相即相入事事無礙法界渾融含攝為一真法界也疏大總相法門體者二門之中不取別相門於中但取總相然亦該收別盡故云大也此一法界舉體全作生滅門舉體全作真如門為顯此義故云體也軌生物解曰法聖智通遊曰門記大下二釋下句三初釋大總相別相者生滅門總相者真如門然亦下釋成大義謂別相之中所有染淨諸法此門收盡竟無所遺故稱大也故次文云一切法離言說相等斯則揀非別故言總收別盡故言大然論總相有於四種謂下中上上上下者謂一切有漏皆苦理通苦樂名為總相不通無漏乃名為下中者謂一切行無常理該三諦名為總相雖通無漏不兼無為故名為中上者謂一切法無我理通四諦名為總相猶是真詮真諦未窮實性第一義諦但名為上也上上者謂真如是一切法之實性遍通凡聖情與非情無所不該故云上上今所明者當於第四超勝前三故云大總相也此一下二釋體字全作生滅即事法界全作真如即理法界既是一體所為則令二無鄣礙即是理事無礙法界也二皆言作者生滅即隨緣變作真如即轉改其名曰作二義俱無能所義言作也軌生下三釋法門軌謂軌則物謂衆生解即智解謂諸衆生內有熏習之力於此法界體上生始覺智智起反照常依法界軌則而修即不空不有無我無人等是法界軌則始覺之智依而行之故下文云順本性故修檀波羅蜜等圓覺亦云流出波羅蜜等教授菩薩然法更有任持之義今以順文唯取斯義聖智等者謂法體虗通以能容彼聖智出入故受門稱遊即出入也謂入則自證出則利他佛及菩薩皆有二義然唯局登地已上乃至究竟不通凡位故云聖智以地前未發無漏未能親證故前科云觀智境也疏不生滅者釋上法體謂隨妄不生約治不滅又修起不生處染不滅故攝論云世間不破出世間不盡記不生下釋成也釋法體者論云心性性即體也反顯心相不妨生滅即屬後門隨妄不生者隨無明九相之妄妄生而心性不生約治不滅者約始覺反流四位治染妄滅而心性不滅此約妄生妄滅顯心性不生滅也修起不生者修行顯起大智慧光明等及十力等功德生而心性不生處染不滅者處於生滅垢染十力等功德滅而心性不滅此約淨生淨滅顯心性不生滅也世間不破者明真如流轉世間世間有破而真如不破不破即不變義故下疏云在染不破出世間不盡者謂修行故真如顯出世間世間盡而真如不盡故下疏云治道不壞也二會妄顯真記會妄顯真者意令體妄即是不須待滅也如經云色即是空非色滅空論有二初三句會妄次三句顯真也一切諸法唯依妄念而有差別若離心念則無一切境界之相疏一切下妄執者云現見諸法差別遷流云何乃言性無生滅釋云差別相者是汝遍計妄情所作本來無實如依病眼妄見空華記妄執等者謂聞前段真如是總相法門體即真如舉體作諸法若爾應知諸法生滅即是真如生滅何故乃言心性不生不滅釋意云諸法本無說何生滅如見空華本自無體說誰生滅疏若離下疑者又云以何得知依妄念生釋云以諸聖人離妄念故既無此境即驗此境定從妄生又若此境非妄所作定實有者聖人不見應是迷倒凡夫既見應是覺悟如不見空華誰是病眼記疑者下徵其所以可知釋云下正顯文意又若下反以釋成皆可解誰是病眼者須知見空華者是病眼若眼明淨必不見華楞嚴云若無翳目而能見華云何晴空號清明眼應知見諸法者是曰凡夫不見法者斯曰聖人聖人稱實既不見於諸法當知諸法凡夫妄見實無生滅也諸法既無生滅真性何曾動搖是故前云不生滅也三結真離妄是故一切法從本以來離言說相離名字相離心緣相畢竟平等無有變異不可破壞唯是一心故名真如疏是故者所執本空故真心不動故由此一切諸法皆即真如也記初標舉能離是故二字指前二段為所以也所執空即指前無一切境相心不動即指前心性不生滅也由斯之故遂得一切諸法即真如也然此二句又迭互相成乃由所執本空所以真心不動又由真心不動故得所執本空其猶萬像本空明鏡不動由此下正結真實由此二字指前所以一切下正顯真如即釋論中一切法下文也此中顯真而舉一切法者以其性不離相故一切諸相性所成故人皆執相以迷性故今約相而顯性令知相即無相唯一真如觸境對緣任運合道動靜施作無非妙門然此論中從本之言與下畢竟之言相望互成影說謂從本二字約望過去以顯真義謂非是先來不離言等諸相而今方離以從本已來便自離相影取未來畢竟如是下畢竟二字約望未來以明如義謂非是只於今日平等不變不破以盡未來際畢竟平等不變不破亦影取過去從本以來便自如此又此二義各通下三句而轉又一切法言亦通下畢竟而轉思之可見疏離言者非如音聲之所說也離名者非如文句之所詮表也此二句言語路絶非聞慧境離心者非意言分別故即心行處滅非思慧境上來離僞妄故名真自下離異相故名如又下三句展轉相釋離世間非修慧境唯正智與之相應記次正顯所離二先離妄相以顯真言語路絶者上句即音聲不及下句即名句文不及既聲名句文不及即當言語路絶也非聞慧者聲名句文是所聞故意言分別者意言即是分別也以形口曰言在意曰分別今以所分別與所言同故云意言也夫人發言皆意中之事故詩序云情動於中而形於言也心行處滅者以相是心之行處行猶緣也既離於相心無所緣所緣既無能緣亦絶無相真理何思慧之所及乎離僞等者僞則鍮似真金妄謂影如本質凡是有名相法悉皆僞妄故金剛云凡所有相皆是虗妄又楞嚴云幻妄稱相以僞妄故則非是真今既離於名相即非僞妄故名為真離異等者謂有差別有變異可破壞也今既皆離故名如也又若約的訓如者似也夫法異則不似不似即非如今既不異不異即相似似即如義也故圭山云謂此實體於未來常如過去於色中常如受中真實相如非為妄似展轉釋者為何畢竟平等為無有變異故因何無有變異為不可破壞故又不可破壞者為無有變異故所以無有變異者為畢竟平等故離世間者世謂遷流間謂墮在其中以差別變異破壞是世間法今皆反此故云離也非修慧者修即是定非定境也夫苦空無常不淨等皆是定所緣故正智相應者即如之智證即智之如除此之外莫能及焉故下文云以離念境界唯證相應故從上來下乃是通斷前後二文仍辨下段之意以對非三慧境也疏平等等者謂雖遍通染淨而性恆無二所以得無二者以在緣時始終不改變故所以在有為中得不變異者以不同有為可破壞故此則在染不破治道不壞記次離異相以顯如遍通者在染時與在淨時同謂凡夫真性的同諸佛真性如淨室空與穢室空等此約同時橫說也在緣者謂在染淨緣中過去如現在現在如未來猶昨日空與今日空等染淨雖自改變真如於此無遷異也又染緣即以生相為始業繫苦相為終淨緣即以覺滅相為始覺生相為終真如於中竟無改變此約異時豎說不同有為者是無作法故體若虗空欲何破壞在染不破等者隨流則妄染起而真體無損反流則妄染壞而真體如舊故圓覺疏序云處生死流驪珠獨耀於滄海踞涅槃岸桂輪孤朗於碧天疏是心者結歸法體故名者依義立名記後結體立名法體者一心即是法體故前文云所言法者謂衆生心諸法既無故唯心在如萬像本空唯是一鏡圓覺云諸幻盡滅覺心不動依義立名者於一心上依離僞妄變異之義以立真如之名二會執釋名二先釋次結先釋三一正會謂執二結名釋疑三約相釋遣一正會謂執以一切言說假名無實但隨妄念不可得故言真如者亦無有相疏以一下明言教非實不可如言取也但隨下釋成無實所以記先正遣名也於中二先消文言教非實等者以權設故因緣有故意令假其有言以契無言無言之理可以證悟有言之教不可取著取之即成認指亡月也十地論說隨聲取義有五過失一不正信聽既逐聲不會深意二退勇猛由不正信則無勝解不能決定三誑他由不會故或以深為淺以淺為深四謗佛執權為實或執事迷理便謂如來言成虗妄五輕法以謬解成性聞深不重釋無實者以一切境界皆從妄念所生念尚無體況所生法而是實耶故前文云一切境界唯依妄念而有差別若離心念則無一切境界之相由是一切言說皆是假名無有實體性不可得也疏恐諸凡愚聞上真如名則謂論主自語相違上文既云離名字相何故復立此真如名故今釋遣假名非實不相違也記次會執恐諸下敘外疑可見故今下以論釋不相違者假名與離名雖言異而義同也然此會執之文合在消文之前方得文便以此四句盡是釋前故名真如四字疑故疏真如無相者良以名依相立但是遍計所緣故楞伽云相名常相隨而生諸妄想故名相雙遣記次兼遣相也良以等者凡是有名皆依相立真如無相所立即空以遍計所緣不入真實故故楞伽下引證名相俱遍計也相從想生名依相立不離相故故曰相隨緣此相名又生妄想即遍計心也記此段論文亦可先釋所以從以一切下四句文通兩勢一則釋前所離相中所以問曰何以真如體上離前言說等相耶故論釋云以一切言說假名無實故也此二句釋前離言說名字二相所以謂心性真實不與虗妄相應言說名字但是虗妄假有無其實體不與真合是故離也但隨下二句釋前離心緣相所以以心緣之相但是隨彼妄念而生念無自性緣相何有故云但隨妄念不可得故真體無念念則違真是故離也二則釋前假名無實所以此如疏解譯者務簡兩意一釋此文之巧略也從言真如者下次方是釋疑難疑曰前云離言說等相以顯真如無相今復結云故名真如豈非滯於言說等相耶故此牒而標云言真如者亦無有相疑者復云顯言真如正是名相何謂無相故論釋云謂言說之極因言遣言意云非謂立此真如一名便滯於相以寄此假立之極名以遣於言相也此一釋疏外別意不唯無違亦足以發姑記之於文末然亦以疏義為正覽者詳焉二結名釋疑謂言說之極因言遣言疏言說極者立名分齊也疑云既絶名相但假立客名者何故不立餘名而唯云真如耶釋云真如者是言說之極謂此名之後更無有名則諸名之中最後邊際故攝論中十種名內真如是第十究竟名故云極也記敘疑答釋文並可知諸名邊際者如極微是色邊際等今真如是名之邊際故此名後更無名也十種名者一法名謂蘊處界三科二人名謂信等五十二位三教名謂修多羅等十二分四義名謂蘊處界等所顯義理五性名謂無義文字無所詮表不生義解六略名謂衆生等七廣名謂衆生等各有差別義名八不淨名謂凡夫等九淨名謂生滅即真十究竟名謂真如也故偈云人法及教義性略及廣名不淨淨究竟十名差別境疏因遣言者立名之意也立此極名為遣於名如以聲止聲也若無此名無以遣名若存此名亦不成遣名記立此等者先敘疑云既真如是究竟名相何前說云假名無有相耶故此釋云立此極名者為遣於名耳遣於名者遣於諸名也若不立此極名不能遣於諸名例如扣犍息喧若無此聲不能止於諸聲也若存等者若存此真如究竟名亦同不遣名以不成究竟遣故雖是極名體畢竟假存而不亡豈稱法體須知雖立真如之名名即無名無名之名故曰假名即是離名也故淨名云文字性離即是解脫是知雖因名而生解必亡名而後證耳三約相釋遣此真如體無有可遣以一切法悉皆真故亦無可立以一切法皆同如故疏體無可遣者通二釋一云外人見前文雙遣真如名相則謂真如本體亦是可遣之法即生斷見故此釋云但遣虗妄名相不遣真如實法以是妙智觀境故二云非以真體遣生滅法也以一下何以不遣以一切法悉皆真故釋上不遣也以法悉真無法可遣又以生滅門染淨等法即無自性不異真如故不待遣記通二釋者標起義相中通真如生滅二釋也一云下克就真如自體釋可知妙智等者既無名相則非心識所緣但唯微妙真智觀行所及蓋遍計所緣是假假故可遣妙智所證是實實故不可遣圓覺云諸幻滅盡覺心不動前則能所皆妄此則能所皆真也二云下會顯生滅無相釋先外難云真如本體固不可遣或以真體遣生滅法故此又釋云亦非以真如體遣於生滅法也何以下望上標義則此徵釋所以中亦通二釋也何以句疏先徵起以一二句取論文釋以法下釋有二意初約唯真無法解即依真如門釋以諸法性一一悉真但有真如更無餘法性中有何法之可遣又以下二約有法無性解即依生滅門釋雖有染淨自性本空何用更遣前如鏡體無像後如影像即空也疏亦無下外人既聞真理不遣則謂有法可立當情執取故釋云亦無可立以離妄情故又生滅等法即真不待立也以一下何以不空以一切法皆同如故真故不可遣如故不可立又生滅等法本來同如故此真如未曾不顯更何所立也記外下標義相釋所以中皆例上通二釋也有法執取即屬常見故釋下約真如門釋離妄情者謂此真如體名相俱絶也情則有理則無若使可立焉能離妄故下文云以離念境界唯證相應故又生滅下約生滅門釋先外難云真體固不可立而生滅或可立故又釋云生滅無性無性故即真真本自立故云不待又真如本立更不須待立生滅法以為真也其猶於波本自是水何須待立以為水耶何以句躡前徵起下文以一二句取論文釋上不立也真故下約真如門釋夫真者非僞非妄如者不變不易今若可遣即成僞妄以前不遣今方遣故可立即成變改以先不立今方立故又有遣則有立無立則無遣故兼前真不可遣釋也又生下約生滅門釋真如從本以來舉體成生滅生滅無性常即真如如是性相曾不捨離是以生滅顯時即如體顯也斯則真如本自顯然何須更立未曾未嘗也次結當知一切法不可說不可念故名為真如疏結離言絶慮也記離言者不可說故絶慮者不可念故以前文云離名字相離心緣相故此結也一切法名真如者然一切衆生從無始來執相迷性不能即妄會真雖終日行而不自覺故今示真而約生滅也學大乘者應須終日不食終夜不寐以思此事何曾是無聖凡依正空色等時何處真體不常顯現何有一法不是性為何有一法體不空寂又空法何嘗得離真性苟或不同此說則不墮斷常無有是處是故論中每節顯真皆言一切法也二問答斷疑二一疑真絶修問二舉真勸修答一疑真絶修問問曰若如是義者諸衆生等云何隨順而能得入疏隨順問方便觀得入問正觀也記如是義者指上不可說不可念之義衆生等者既發言違理動念乖真諸衆生等念念相續未曾離念欲得不乖如何隨順欲得契證如何造入二舉真勸修答答曰若知一切法雖說無有能說可說雖念亦無能念可念是名隨順若離於念名為得入疏若知下答方便觀也說念皆無能所者明念即無念非滅於念非滅念故故名雖念離於斷見也即無念故皆無能所離於常見也於一念間離此二見無此二故故能稱適中道隨順法性又亦可雖在於念等即觀此念等常無能所雖未能離念而順於無念故名隨順也記雖說雖念是正說正念即無分別智也可說可念即所說所念能所妄分別也下云一切衆生以有妄心念念分別皆不相應無有者圓覺云居一切時不起妄念住妄想境不加了知不起不加即無有能所分別此又為方便觀中之方便也疏云念即無念等者謂知念諸法時本無能念所念非謂滅此令無以念體本絶即無念也故圓覺云於諸妄心亦不息滅非滅下雙釋即念無念以離二邊若滅念令絶即墮斷見若不知念即空即墮常見也今既不滅復知即無故免斯過此則即言忘言非都不語即念無念非都不思故經云無離文字而說解脫文字性離即是解脫下文云衆生迷故謂心為念心實不動若能觀察知心無念即得隨順入真如門於一下結益只於一念無念已離二過二過既無乃順中道法性即不乖真如也又亦可者前則直就法體性也說念即無念此即起念之時用觀觀察修也能念所念已起未起了不可得說亦如是故云等也未離念者如是觀時粗念不起細念猶存故云未離如但得火滅火杖猶存順無念者常觀無能所故如是觀時即是順無念也如下文云若有衆生能觀無念者則為向佛智故疏若離下答正觀也如上久觀不已即能離茲妄念契彼無念真理故名正觀云得入者觀智契入也十地論云智行處故又亦可正知無能所之念亦離方入真如記如上等者以前所說但是入理之方便故前疏云答方便觀即能等者由前觀察純熟便能離此能所之念契於無念真理以真無能所想念今既離此則能契真正觀者此觀正與真如相當如匣與蓋也又正者聖也位當登地已去名為入理聖人前之方便即當地前契入即證義也以離能所念故得證真如名為契入故唯識云若時於所緣智都無所得爾時住唯識離二取相故然上所說且約一分得無漏正智名離念得入若約究竟離者唯妙覺一人而已智行處者真如是正智所遊履處明非倒惑所行之處故華嚴云甚深真法性妙智隨順入又亦可者前解約所觀念無今解約能觀亦無也觀念之心此心名為知無能所之念苟存斯念然亦不入擬心即差故故圓覺云離遠離幻亦復遠離得無所離即除諸幻荷澤云妄起即覺妄滅覺滅覺妄俱滅即是真如然則如體離念動即乖真苟能知念無念觀察不息如是隨順還有入期冀諸行人勤修妙智又準前方便亦可前解約修此解約性正知離者智都無所得也本無能所之念亦離者所緣境俱寂也離二取相純一中道真如本性不入何待然據前之問答雙明說念後答正觀中不論於說者以細況粗故心念微細尚須遠離言語粗淺豈得存焉二依言辨德以明生信境疏釋上立義分中真如相也記真如相者前云是心真如相自此之前已釋真如兩字從此向後方釋相之一字也科云生信境者以有空不空二種義相既容言說故得聞者生於信心所以說者亦意令生信也故論文云依言說分別有二種義等亦如楞伽云言說別施行分別應初業於中三一舉數總標二開章略辨三依章廣釋一舉數總標復次真如者依言說分別有二種義疏顯此二義者若離於言即惟一味今既依言故說有二即顯不可隨言執取也但為生物信解故說此文故十地論云何故不但說無言示現依言求解故記論云復次真如者問此既說真如之相何不牒云相耶答以從無相中辨相相即無相不異離言之法故又相即義也今於真體之中開說二義故云有二種義義即相也疏云一味者前云一心一法界故然且約理離諸相故強名為一而此一相即不可得法句經云森羅及萬像一法之所印一亦不為一為欲破諸數淺智之所聞見一謂為一幸諸深智者忘懷而體之有二者既容言說分別故有一二之相也不可隨言者前雖顯體離言不可執為無說以有二義故今雖分別二義不可取為有相以相即無相不異離言故故不得隨言而執取也但為下必若無言憑何信解故說二義故十地下引文可知二開章略辨云何為二一者如實空以能究竟顯實故二者如實不空以有自體具足無漏性功德故疏云何徵起如實空者此以如實之中空無妄染非謂如實自空此則如實之空也以妄空故遂能顯示真理故云顯實不空有二義一有自體者異妄無體故二具性德者異恆沙有流煩惱故故佛性論偈云由客塵空故與法界相離無上法不空與法界相隨記無妄染者以如實體中本不與九相六染相應故名為空不是真體是空也如實之空者如實是真性空是無妄染如實之空依主釋耳如言瓶空蓋為瓶中無物非謂瓶體是空涅槃經中具有此喻究竟者至極義意明立空之言至極只為顯於真實也遂能等者以妄空為能顯真實為所顯不因彼妄空焉知此真實異妄無者妄攬真有真元自有故云異也有流者有謂三有二十五有流即四流九流以彼諸有煩惱能漂溺羣物故總名流即根隨等共有二十六使此論即三細四粗如是煩惱多不可計故曰恆沙若準此論所說即過恆河沙數理實無量豈止河沙若有定數恐非了義所言異者彼曰煩惱此名功德彼染此淨彼空此有故相離者妄體本空無可相隨故下文云一切煩惱染法皆是妄有性自本無未曾與如來藏相應故無上法者即大智慧光明義等是佛所證之法故云無上此皆即性之德德皆是性不相捨離故曰相隨三依章廣釋二初空二不空初空三初略明二廣釋三總結初略明所言空者從本以來一切染法不相應故謂離一切法差別之相以無虗妄心念故疏從本下總舉能所分別皆不相應謂離下所取相也以無下能取見也又以妄境從妄念生故釋顯空無也良以倒心妄境情有理無真如之德理有情無故不相應也記能所分別者即心境也染法雖多統唯此攝故論云一切而疏云能所也謂離等者上總明此即心境別明也所取相者即境界相於中有色香味觸不同故云差別能取見者即智相相續等於中分見聞覺知不同總名能取即下分離識也此即約雙遣心境釋又以下約唯遣境界釋前二句但說境無此則出境無所以謂凡是境界皆從心念所生心念既無境從何有故前文云一切境界唯依妄念而有差別若離於念則無一切境界據此是本識中能見相也以與智相生境取境功能別故良以下通釋文意情有理無者妄情中有真理中無猶如空華翳病故見理有情無反前可知不相應者結前妄法理中既無說何相應斯則却與情為相應以從妄念生故離念則無一切法故二廣釋當知真如自性非有相非無相非非有相非非無相非有無俱相非一相非異相非非一相非非異相非一異俱相疏非有明真離妄有也惑者云既其非有即應是無故釋云非無也惑者聞上非有非無則謂雙非是真如法釋云我非汝謂有說非有非謂法體是非有非汝謂無說非無非謂法體是非無故又非却雙非也惑者云我上立有立無汝立雙非雙非若存即有無隨喪今雙非既非我有無還立釋云我非汝雙非故說非非非許雙是如何復執俱相記初釋有無四句也離妄有者謂人執有故言非有若無所執約何言非妄有之言攝一切相惑者下為不了非有之言是遣情執之有却認法體是無今此釋云上所以非者非汝執有也決不道此法便是於無矣故云非無雙非是真如者將謂真如是非有是非無之法故論破云非非有相非非無相二句皆上非字是能治之藥下非等三字是所治之病釋云下謂我最初非汝立之謂有故說非有非謂真如是非有也次又非汝立之謂無故說非無非謂真如是非無也非有非無二俱非矣故又非去其雙非也細詳之可解此中前後四箇謂字前二箇中上是計謂之謂下是言謂之謂後二例之惑者下意謂我初立有次立無汝則立雙非雙非相若存即有無隨喪我第三立雙非汝又非却雙非雙非今既非我還立有無還立者謂執第一有句第二無句同時並立為真如也釋云下意謂我若單言非有非無指論第三句應云非有相非無相則從汝雙執有無俱相我今非汝以雙非亦指論第三句如云非非有相非非無相則非有相非無相一時皆非却矣雙非既非却雙是亦非許何以迷倒還復雙執有無俱相耶故今論破云非有無俱相俱相者即有無同時也今亦皆非却之疏一異準前四句可知然執取雖多總攝不過此二四句故廣百論云復次為顯世間所執諸法皆非真實及顯外道所執不同故偈曰有非有俱非一非一雙泯隨次而配屬智者達非真彼論次第廣破四宗外道今此約展轉計執不同彼論後段破外道說記二釋一異四句也準前者但前約有無此約一異二執不同餘皆無別但如前疏配釋可知然執下結總攝別謂衆生執取無量無邊根本從此二四句起所以百非只約此說義見前文故廣下引例皆非真實者是妄計著不稱實理同此有無一異二四句也所執不同者四人各執一句有即有句是此初句所遣也非有即無句是此次句所遣也俱即亦有亦無句是此第四句所遣非即非有非無句是此第三句所遣一非一等例此配之隨次配者如上配為四句然但就彼所配非與此論相配皆是妄執故云非真四宗外道者一數論外道執有等性與諸法一即當有句故彼破云此執非真所以者何若青等色與色性一應如色性其體皆同五樂等聲與聲性一應如聲性其體皆同眼等諸根與根性一應如根性其體皆同應一一根取一切境應一一境對一切根又一切法與有性一應如有性其體皆同二勝論外道說有等性與法非一當非有句此亦非真所以者何若青等色與色性異應如聲等非眼所行緣也聲等亦爾又一切法異有性者應如兔角其體本無乃至廣破三無慚外道執有等性與彼諸法亦一亦異當於亦有亦非有句此亦非真所以者何若有性等與色等一同數論過與色等異同勝論矣一異二種性相相違而言體同理不成立一應非一以即異故如異異應非異以即一故如一乃至廣破四邪命外道執有等性與彼諸法非一非異當非有非非有句此亦非真所以者何汝此所說非一非異者為但是遮為偏有表若偏有表應不雙非若但是遮應無所執有遮有表理互相違無遮無表言成戲論乃至廣破如是世間起四種謗謂有非有雙許雙非如次是增益損減相違戲論是故世間所執非實今此下揀異後段者今但取彼論前段顯所執非真已上文不取彼論後段及顯外道已下文也中有二揀一者此是一人展轉彼乃四宗各殊二者此則為顯真如自性彼則一向治外邪執故不同也三總結乃至總說依一切衆生以有妄心念念分別皆不相應故說為空若離妄心實無可空故疏有妄者妄計塵沙難可遍歷故今總攝辨不相應此順結也離妄者反結也以對染無說真為空非無如體以為空也亦可此文是釋疑疑者聞上真空則撥無真體及恆沙功德故為此釋是則聞空不異不空也記妄計塵沙者顯妄執多也既從念生豈順無念真理故不相應然此文中但約心結而不約境者以一切境界皆從心生但說無心則知無境故略不言以對下謂如實之體約無妄故說名為空非謂真體是無名為空也亦可下通指此總結文皆是釋疑為恐聞前真如自性非有相等便謂全無自體及功德法成斷滅見故今釋云乃至等也聞空謂真無妄相不空謂自性功德清淨本然二不空二初正釋二釋疑初正釋所言不空者已顯法體空無妄故即是真心常恆不變淨法滿足則名不空疏法體無妄牒前顯後也真心舉體常常德恆樂德不變我德以離變易苦非業所繫自在故也淨法淨德不空結也記牒顯者牒前體空無妄顯下不空之法也舉體者體是所依下常等諸義皆依此說故常者三際四相不能遷故樂者三苦八苦不能害故配恆為樂德者以無生老病死故名恆此生老等正是苦法故今配此前約惑業故配四相今約果報故配老等我者是自在義為對所繫不自在故以離業行繫縛故云不變不變是離行也行即是業既非業繫則得自在故云我也淨者染而不染故滿足之言都結也謂除此四德之外所有過恆河沙數功德悉在其中即如下所說大智慧光明遍照法界等是也然法之一字亦通上淨下滿足言思之亦可常恆不變句豎顯真體三際無窮斯則釋前以有自體也淨法滿足句橫顯淨德十方無盡斯則顯前具足無漏等也自體既常不變復具無漏功德法體若然豈是空耶故結不空二釋疑亦無有相可取以離念境界惟證相應故疏惑者聞淨法不空則謂同於情執之有故此釋云無相可取也是則不空不異於空以離下釋無相所以也若妄念所緣是則有相既唯真智之境明知無妄執之相也記情執有者謂遍計所執色等諸法是妄情中有故是則等者真實法體自性功德雖無缺少然無一相可得故不異空釋無相等者夫有相者是妄念所緣今既唯以證智相應故知無相故唯識偈云若時於所緣智都無所得爾時住唯識離二取相故二生滅門二初釋生滅心法二辨所示之義初釋生滅心法記釋生滅者以立義分中云是心生滅因緣相能示摩訶衍自體相用故今此正解生滅因緣相也於中二初染淨生滅二染淨相資初染淨生滅記染法淨法各有生滅染以順流為生反流為滅淨以反流為生順流為滅又染法生時是淨法滅時淨法生時是染法滅時又染法生是發生滅是盡滅淨法生是顯生滅是隱滅雖通云生滅而義有此異也中又二先就體總標二依義別解先就體總標三一標體二辨相三立名一標體心生滅者依如來藏故有生滅心疏心生滅者牒章依如來藏有生滅者標體也謂不生滅心因無明風動作生滅故說生滅心依不生滅心然此二心竟無二體但約二義以說相依如不動之水為風所吹而作動水動靜雖殊而水體是一亦得說言依靜水故有其動水當知此中理趣亦爾宜可思之謂自性清淨心名如來藏因無明風動作生滅故云依如來藏有生滅心也楞伽勝鬘俱同此說此顯真心隨動故作生滅非謂舉所依取能依以此門中有二義故能示三大是故通攝所依亦入此門記論云如來藏者具三種義謂隱覆含攝出生義隱覆之中復有二義一者藏如來故名如來藏即煩惱為能藏如來為所藏藏於如來如來之藏依主釋也如匱中有金名為金匱匱不是金故理趣般若云一切衆生皆如來藏勝鬘及如來藏經具有此說二者如來自隱不現名如來藏法身無相不可以智知識識況眼見耶斯則如來即藏持業釋也如佛性論說含攝之中復有三義一體含用謂法身中有身土相用等二聖含凡謂一切衆生皆在如來智內亦如佛性論說三因含果謂因位已攝果位功德此則以因為藏藏果佛故前二持業釋後一依主釋出生者謂十地證真名藏能成佛果名如來亦持業釋今論於六義中除於四六餘者皆通記疏中二先正釋標體者說有通別別則唯取所依即如來藏是體通則兼取能依即如來藏與生滅心俱為體以生滅法皆依此故今通兩說然此下顯生滅與不生滅義說能依所依實無二體也但有相依之義理而無相依之法體如不動下喻顯當知下法合言思之者意令細合使法如喻皆無二體也謂自性二句合如不動水喻因無明二句合如為風吹作動水生滅與不生滅雖別而心體無二合動靜殊水體一喻此一句疏所闕者故云二句合說依靜水有動水喻楞伽下引證經云如來藏者輪轉苦樂因也愚癡凡夫所不能覺勝鬘云依如來藏故有生滅依如來藏故證涅槃世尊若無如來藏者不能厭生死苦求涅槃樂此顯下二揀濫如說依水有波意顯所依之水全起成能依之波斯則舉一法以豎論非約兩法橫說也所依能依者兩法各體也不同依母有子亦非全母成子能所別故故云非謂以此下出所以二義依覺有不覺也三大依體有相用也覺體是所依不覺與相用皆能依義說相依竟無一法何者以是所依之真起成能依之妄故得有覺不覺二義以有二義故遂以不覺妄法顯示覺義中之三大如水起成波已而動濕兩全以有動濕故遂能以動顯於濕也若言依母有子其母不在子中以其不在中故不能以子顯母是故下結成上義所依即如來藏也二辨相所謂不生不滅與生滅和合疏不生滅與生滅合者是上如來藏自性清淨心動作生滅不相離故故云和合非謂別有生滅來與真如合謂生滅之心心之生滅無二相故記釋此和合義中有三先略解非謂等者意云真如家所起生滅還與生滅家真如和合非謂別有一段生滅自外而來與真如合生滅之心者全妄之真也心之生滅者全真之妄也此明本末更互相攝非是結成六釋中依士依主義也無二相者心即是體生滅是相反覆皆一故無有二也疏心之不生滅因無明成生滅之心從本覺起而無二體不相捨離故下文云如大海水因風波動水相風相不相捨離乃至廣說此中水之動是風相動之濕是水相以水舉體動故水不離於風相無動而非濕故動不離於水相心亦如是不生滅心舉體動故心不離於生滅之相生滅之相莫非神解故生滅不離於心相如是不離名為和合記心之下二廣釋二初正釋心之不生滅即真如門無明成者若無無明生滅亦無心不生滅名相故知真因妄而成者也生滅之心即生滅門本覺起者窮妄源也然是本覺起成生滅非謂別有生滅從覺而起如水起波義例無別本覺即如來藏也無二體者前云無二相此云無二體意明只有一相一體以心是生滅體生滅是心相覺成不覺不覺與覺不相捨離故下文下二引證三先引文即隨染本覺中文此中下二釋意可知心亦下三法合神解者謂本覺不昧鑒照靈通也疏此是不生滅心與生滅合以是隨緣門故非是生滅與不生滅合以此非是向本真如門故記此下三揀濫不生滅與生滅合者謂真隨妄轉流轉門也即背覺合塵義非是等者謂息妄歸真還滅門也即滅塵合覺義然此二中隨合則體隱相現反合則相泯體彰故前門云一切法悉皆真故皆同如故此反合也此門即云依如來藏故有生滅心又云依覺故迷等此隨合也是知前義即生滅門後義即真如門非一非異疏非一異者真如全體動故心與生滅非異而恆不變真性故與生滅不一記釋非一異句中亦三初約法略明真如者即前不生滅也非少分動故云全體既全體動成生滅法何異之有雖成生滅而性不變從本便爾非適今也故云而恆生滅是變與不變義別故云非一疏依楞伽經以七識染法為生滅以如來藏淨法為不生滅此二和合為阿梨耶識以和合故非一非異記依楞下二按經出體七識是見聞嗅嘗覺知末那識也餘文可知疏非異門者有三種一以本從末明不異經云如來藏是善不善因能遍興造一切趣生乃至下云若生若滅等又經云佛性隨流成別味等二攝末歸本明不異經云衆生即如也又涅槃云十二因緣即佛性故又十地論云三界唯一心者第一義諦也又此論下文云四相本來平等同一覺故又前即末之本本無別本故唯有生滅更無別法可相異也後即本之末末無別末故唯有不生滅亦無別法可相異也三本末平等明不異經云甚深如來藏而與七識俱又經云阿梨耶識名如來藏而與無明七識共俱如大海波常不斷絶又論云唯真不生單妄不成真妄和合方有所為此則本末際限不分故云不異也記非下三據義廣釋三初離釋二義二初釋非異先標也一下二釋也於中開三然三段中皆以真如為本生滅為末初則以不生滅望生滅說次則以生滅望不生滅說後即兩門同時同處說其不異義但在能成即唯同俱六字之中隨文詳會問論云非一非異疏合順論以明何故先釋非異後解非一耶答論順依真起妄義便故先舉非一後言非異文云依如來藏有生滅心不生滅與生滅合此非一義也然此生滅既依心體不相離性故後方可言非異也疏文約法廣釋令人生解要先知體無二由無二故方成不一此則順法備明令悟本無真妄之異悟此法已任辨義異則不迷本也故下疏云此中非直不乖不異以明不一亦乃由不異故成於不一也今初以本從末釋經云即楞伽也殺等十惡為不善不殺等十為善趣生六趣四生其中兼有善與不善生滅者是捨陰取陰之義斯則如來藏是真如善不善等為生滅既言如來藏為因能造即不異也又經涅槃也文云譬如雪山有一味藥名曰樂味其味極甜在深藂下人無見者有人聞香知其地中當有是藥過去往世有轉輪王於雪山中為此藥故在在處處造作木筒以接是藥是藥熟時從地流出集木筒中其味正真其王歿後是藥或醋或鹹甜苦辛酸六味成別如是一味隨其流處有種種味喻如佛性以煩惱故出種種味所謂六道等此則佛性是真如六道為生滅既言佛性隨成即是無異之義二攝末下二初正釋今義衆生即如者淨名經也如前引然衆生是生滅如是真如既言其即當知不異涅槃者文云我於諸經說若人見十二因緣者即是見法見法者即是見佛見佛者即見佛性何以故一切諸佛以此為性善男子觀十二因緣有四種智得四菩提乃至云以是義故十二因緣名為佛性斯則佛性是真如十二因緣為生滅既說十二因緣為佛性豈曰異乎十地論等者此釋華嚴經意經云菩薩復作是念三界所有唯是一心如來於此分別演說十二有支皆於一心如是而立今疏所引是彼論牒經也第一義者是論釋也心是中道實相故云第一義諦斯乃三界是生滅一心是真如唯之一字顯不異也又此下即始覺中文四相是生滅一覺即真如既云等同欲何為異此非異義深隱難解故廣引經論證之又前下二對前重辨即末之本者重釋前科從末義也此則以末收本無本而非末如以波攝水無水而非波更有何水與波為異即本之末者重辨此科歸本義也此則以本收末無末而非本如以水攝波無波而非水更有何波與水為異前則唯末後則唯本既無二相故云非異三本末下經即楞伽文云如來藏藏識本性清淨為客塵所染而為不淨我為勝鬘夫人及餘深妙淨智菩薩說如來藏名為識藏與七識俱起令諸聲聞見法無我我為勝鬘說佛境界非外道境界此言如來藏即是真如真如是本七識是生滅生滅是末既云其俱即平等義又經亦彼經也與前文小異而意大同又論十地論也唯真不生者果佛無生故單妄不成者無有所依故然唯真之法容有單妄之法全無今以相對且作斯說此則下結也疏不一義者即以前攝末之本唯不生滅故與彼攝本之末唯生滅法而不一也依是義故經云如來藏者不在阿梨耶中是故七識有生有滅如來藏者不生不滅解云此中唯生滅是七識唯不生滅是如來藏二義既分遂使梨耶無別自體故云不在中此約不一義說非謂不和合何以故此中如來藏不生滅即七識生滅之不生滅故與自生滅不一也七識生滅即如來藏不生滅之生滅故與自不生滅亦不一也此中非直不乖不異以明不一亦乃由不異故成於不一何以故若如來藏隨緣作生滅時失自不生滅者則不得有生滅是故由不生滅得有生滅是則不異故不一也又此中真妄和合諸識緣起以四句辨之一以如來藏唯不生滅如水溼性二七識唯生滅如水波浪三梨耶識亦生滅亦不生滅如海含動靜四無明倒執非生滅非不生滅如起浪猛風非水非浪此四義中隨舉一義即融攝自體緣起義理無二相故此中且約溼性不失義邊動靜不一故說水不在於浪中豈可此浪離水之外別有體耶餘義準此思之問既云動靜不一則應云如來藏不在七識中何故乃云不在梨耶中答梨耶融動靜動靜不二是梨耶今既動靜分梨耶無別體故云不在中也問梨耶既通動靜不應唯在生滅門答為起靜以成動無別有動體是故靜性隨於動亦在生滅中非直梨耶具動靜在此生滅中亦乃如來藏唯不動亦在此門中何以故以彼生滅無別體故應思準之記不下二釋非一文四初躡前正釋四初正釋攝末之本即生滅之真如攝本之末即真如之生滅既一生滅一不生滅豈為一義是則於心不異中明不一義依是下二引證文可知解云下三釋意不在中者成敵兩立無中可在也不同二人同在一室中即如兩木成林兩木既分乃得說云一木不在林中此約下四通妨先問曰義既不一應不和合故此釋云謂於二義之中偏舉此一義說非謂壞彼和合以成不一即知正說此不一義時彼法元自和合何以故者徵意云何以不壞和合又能不一耶此中下轉釋其所以也如來藏等者謂不生滅既是即生滅之不生滅當知此不生滅與自七識生滅未曾不和合於和合中而論不一也七識等者謂生滅既是即不生滅之生滅當知此生滅與自如來藏不生滅未曾不和合而於此中以論不一也所言自者顯非別外本不相離不相離者即和合也斯只於非異處說非一義誰言破此和合耶此中下二反籍非異二初標可見何以下二釋徵意云不乖非異其義已明有何所以能成非一若如等者釋意云若如來藏隨緣時失自不生滅體即兼無生滅相以無所依故此文且顯二法若異有如此失是則不成不異義也彼義既不成兼此不一義亦不成以二義既失約於何法以明不一耶是故下明不異義今由不異故生滅起時不失不生滅由不失故生滅得存二義既存故得不一義成立豈非由不異故成得不一耶又亦由此非一義故得成彼非異義以真起成妄故得說有妄不異真妄若不起說何不異前段所不言者以未說後義故又此下三舉體相攝二初正辨中先各出其體真妄和合諸識緣起者真如來藏妄無明和合梨耶諸識七識具此四義成一緣起也餘如文可見又此以無明為非生滅者非粗相之生滅故非不生滅者以有細相流注之生滅故例如非想非非想處耳此四下次正明相收且舉如來藏者必收諸法以是在纏名故又舉梨耶由無明動真妄合故若舉七識亦由無明與藏俱在梨耶中故若舉無明無明無體依覺有故亦在梨耶故下文云依梨耶有無明又說無明滅時和合識破由是舉一即以蔽諸也緣起等者衆法和合方成一大緣起之相此中下二釋疑或問曰若然者云何前引經言如來藏不在梨耶中故此釋云此中且約溼性不失義邊故舉如來藏即攝餘三義前約動靜不一故說水不在於海風浪中會通之豈可謂此海之風浪離水之外別有體耶是則不在義說如此非事異也但疏文舉喻且約濕性對浪而說以喻藏性唯不生滅對七識唯生滅一義論即離耳對餘二義指梨耶無明理自準知記釋中該三義與疏少別詳之餘義準此思者謂餘三句義相攝不相攝疑難二則七識浪不攝海風水三則梨耶識海不攝風浪水四則無明風不攝海水浪皆難相攝並準此初句義相攝藏性水攝海風浪不相攝如來藏不在梨耶七識無明之中釋通思之自可知也問既下四問答通妨先通如來藏不在七識中妨問中既上疏云動靜不一故說水不在於浪中以喻例法則應說云生滅不生滅非一如來藏不在七識中何故前引經文乃云如來藏不在梨耶中縱謂動靜非異亦應說云如來藏在七識中不應云在梨耶中答中意云真與妄合方曰梨耶其如梨耶都無自體且約義說則真妄二法悉在其中由是梨耶為總真妄為別只合言在總中不合言在別中今既分動靜則使梨耶總義不成無中可在故云不在梨耶中疏中梨耶二句出所以兼通在梨耶中妨今既三句正釋難謂正釋不在梨耶中疑難合則既不應云在別中分則自應云不在總中也問梨下次通梨耶識唯在生滅中妨問意云今梨耶既通動靜應亦在真如門何故獨在生滅門耶答中先且說唯在生滅門意末後結令例知不在真如門也謂梨耶通動靜在生滅中者是起靜以成動靜外別無動體既不相離故靜亦隨動在此門中也非直等者非但兼動靜在此中縱唯靜亦在此不動尚在動門何況動靜兼者何以下徵釋所以離如來藏外別無生滅體故應思準者結令準此義例定知不在真如門也以梨耶雖有靜義然不在真如門者以此靜是隨動之靜非同真如門是不起之靜靜體雖同靜義且異又梨耶既動靜相帶故不在真如門也以彼門是唯靜故疏略不說此義乃云思準疏又若一者生滅識相滅盡之時真心應滅則墮斷過若是異者依無明風熏動之時靜心之體應不隨緣則墮常過離此二邊故非一異又若一則無和合若異亦無和合非一非異故得和合也如經云譬如泥團微塵非異非不異金莊嚴具亦復如是若泥團微塵異者非彼所成而實彼成是故非異若不異者泥團微塵應無差別如是轉識藏識真相若異者藏識非因若不異者轉識滅藏識亦應滅而自真相實不滅是故非自真相滅但業相滅解云此中真相是如來藏轉識是七識藏識是梨耶記又下二合釋二義二初遮一異相無相宗學人有失意者於此二中各負一過離此等者故前云依如來藏有生滅心後云無明滅故智性不壞又若下二顯和合三初正釋無和合等者一則無二異則各開故例如中論偈云染法染者一一法云何合染法染者異異法云何合此則由非一異成和合義也如經云下二引證三初雙標二喻即楞伽文也若泥下二單釋塵泥非彼成者非彼微塵成泥團也應無差者塵未和水應名泥團既成泥團應曰微塵如是下三總以法合藏識非因者非不無也因真相也既若成異則藏識不因真相所成如前泥團不因微塵又如何云依如來藏有生滅心藏識亦應滅者以無和合義故故下云破和合識相今言滅者但無一分生滅是故非真相滅者下云妄心則滅法身顯現又云心相隨滅非心智滅業相滅者舉細攝粗也解云下三釋意所引文易可知疏今此論主總括彼楞伽上下文意作此安立故云非一異也記今此下三總以結成可知三立名名為阿梨耶識疏此生滅不生滅即之義不一辨之心不異目此二義不二之心名阿梨耶識或云阿賴耶者但梵音楚夏耳梁朝真諦三藏就名翻為無沒識今時奘法師就義翻為藏識藏是攝藏義無沒是不失義義一名異也所攝名藏謂諸衆生取為我故所以然者良以真心不守自性隨熏和合似一似常故諸愚者以似為實執為我內我見所攝故名為藏由是義故二種我見永不起位失賴耶名也又能藏自體於諸法中又能藏諸法於自體內論云能藏所藏我愛執藏此之謂也此依義立名也記此下初正釋名意生滅等者再牒前文之義以說故云即論之義相不一離辨之心體不異也目此下合彼二意二義相不二體以結此名或下二廣辨名相二初對二師以辨名楚夏者謂如此方吳楚華夏言音訛轉西域五天亦爾故指彼同此又云阿陀那等此但輕重而有異耳無沒者即正與梵文敵對藏識即取名下義翻藏是下會二名也由彼我見所攝藏故遂令無始相續不斷故云攝藏不失是以義上之名雖少不同名下之義實無異也如佛性為覺為知了了分明等所攝下二約三藏以釋義於中有執藏所藏能藏之義如次辨釋謂諸下標所以下釋似一者業相初起未分王數及與外境實非一而似一也似常者生滅微細似常而非常也楞嚴云又汝精明湛不搖處名恆常者於身不出見聞覺知若實精真不容習妄故云似常諸愚者一切異生無二空智者也似為實者即法執智相執之確然不改即六七二識是能執心也內我即我執於自身內而生執故以執他身及諸法各有自性亦名為我故此揀云自內也我見下結為藏義攝即執也既為我見所執故名為藏執即藏也由是下出所以二種我見即人法也永不起位即第八地準唯識說此識有三位一我愛執藏位通一切異生二乘有學及七地已前菩薩皆起我執執第八見分為我故第八識名阿賴耶此云執藏也二善惡業果位即通一切異生至十地滿心二乘無學等位由善惡因感無記果果異於因名異熟識三相續執持位即通因果一切位以第八識執持諸法種子等令不散失故名阿陀那阿陀那義翻執持今云不起位者即第八地已上也以離我見所執不名賴耶故失斯名仍揀下位入觀之時有暫不起故云永也然不亡識體故言失名又能藏下所藏義謂此識體藏在根身種子器世間中以根身等是此識之相分故如珠在像中不同身在室中若覓梨耶識只在色心中欲覓摩尼珠只在青黃內又能藏諸法下能藏義也謂根身等法皆藏在識體之中如像在珠內欲覓一切法總在梨耶中欲覓一切像總在摩尼內然但以前義互為能所也論云下引唯識證成可知此依句三結依義立謂於二名中不依真諦就名而立乃依奘師就義以立之也二依義別解三初釋上生滅心二釋上生滅因緣三釋上生滅之相初釋上生滅心記立義分云是心生滅因緣相今則且釋心生滅也於中三初開數辨德二寄問列名三依名辨釋初開數辨德此識有二種義疏此義稍難今總括上下文略敘其意餘可至文當知記二義者開數也疏中二先標舉釋意稍難者以此一識二義之中含有多法外則包羅萬像內則能所俱成存之則生死無涯破之則涅槃有得若不分別何以了知行相幽隱故名為難然其深智於此可了故復言稍稍少也括檢也謂總檢括論之前後以釋此意然亦但齊生滅一門疏何者謂真如有二義一不變義二隨緣義無明亦二義一無體即空義二有用成事義此真妄中各由初義故成上真如門也各由後義故成此生滅門也此隨緣真如及成事無明亦各有二義一違自順他義二違他順自義無明中初違自順他亦有二義一能反對詮示性功德二能知名義成淨用違他順自亦有二義一覆真理二成妄心真如中違他順自亦有二義一翻對妄染顯自真德二內熏無明令起淨用違自順他亦有二義一隱自真體義二顯現妄法義此上真妄各四義中由無明中反對詮示義及真如中翻妄顯德義從此二義得有本覺又由無明中能知名義及真如中內熏義從此二義得有始覺又由無明中覆真義及真如中隱體義從此二義得有根本不覺又由無明中成妄義及真如中顯妄義從此二義得有枝末不覺此生滅門中真妄略開四義廣即有八門若約兩兩相對和合成緣起分相有四門謂二覺二不覺若本末不相離但唯有二門謂覺與不覺若鎔融總攝唯有一門謂一心生滅門也記何者下二依義具釋三初約真妄開合以釋義文有七一開真妄成四義然真之與妄皆依一法界心所說蓋以此心本來有體有用即用之體則蕩然空寂即體之用則了然覺知以無始迷之故於空寂之處則確然根身塵境於覺知之處則紛然分別緣慮故肇公云法身隱於形㲉之中真智隱於緣慮之內然其形㲉緣慮本來體空空寂覺知元來不變不變之真本自隨緣體空之妄元來成事非因造作法爾如斯衆生身心見今若此即約此義以明染淨緣起之義也今不別標一心者含在真字中以無二體故不變者未嘗不空寂未嘗不覺知故故論云所謂心性不生不滅又云一切染法不相應故又云所言覺者心體離念等虗空界隨緣者隨染順流而成九相故文云依如來藏故有生滅心等隨淨反末而成四位故下云覺知前念起惡能止後念令其不起等體空者遍計之法情有理無故故論云一切諸法唯依妄念而有差別等又依他之法相有性無故故論云是故一切法如鏡中像無體可得成事者成染事則三界依正成淨事則三乘因果如下所說九相二身是也此則隨緣如作夢成事如夢物體空如夢物元虗不變如內身宛爾此真下二束四義成二門初義即真中不變妄中體空由此二義成真如門此門攝妄則妄體空攝真則真不變染淨平等一相無相故有此門後義即真中隨緣妄中成事由此二義成生滅門此門攝真則真隨緣攝妄則妄成事即成染淨諸法差別等相故有此門此隨下三開生滅成四義此約生滅門中真妄相對互論自他便成四義然真中違他順自即是妄中違自順他真中違自順他即是妄中違他順自但為門不同而義則一也違順行相即見下文無明下四開四義成八義二初正示八義先且明妄中四義示性等者謂反流對染詮顯示現真性功德如下云不覺念起見諸境界故說無明心性不起即是大智慧光明義乃至若心有動具有過恆沙等妄染之義心性不動則有過恆沙等諸淨功德相義示現又說性本無慳順修檀度等知名義等者謂分別妄心順生滅時屬於無明名為染用若順真如故名淨用故下文云以有不覺妄想心故能知名義為說真覺若離不覺之心則無真覺自相可說又云無明染法實無淨用但以真如而熏習故則有淨用覆真者真理平等妄心差別差別之妄現時平等之真即隱故下云染心義者名煩惱礙能障真如根本智故無明義者名為智礙能障世間自然業智故成妄心者以無明熏習之所起故故論云以有無明染法因故則熏習真如以熏習故則有妄心等又云無明熏習義有二種一者根本熏習以能成就業識義故二者所起見愛熏習以能成就分別事識義故真如下明真中四義顯真德者反流翻染形對妄法顯此真德即下隨染本覺中智淨相文云謂依法力熏習如實修行滿足方便故破和合識相滅相續心相顯現法身智淳淨故起淨用者無明是妄恆起染用以真熏有力令彼反流順真如性故名淨用下云自體相熏習者從無始世來具無漏法備有不思議業作境界之性依此二義恆常熏習能令衆生然生死苦樂求涅槃又云以有真如法故能熏習無明乃至得涅槃成自然業等隱真者即前說真如隨緣成梨耶識既成識已隱在識中以其隱故名如來藏已見上文現妄者真體既隱妄相即現謂境界相是也下云不了真如法故不覺念起現妄境界此上下二合對四覺然此覺與不覺但以真妄相對為門不同各有四義故開成八今於真妄各分體用故兩兩相從但唯有四如疏四段前二段約淨分其體用初段合二順體成本覺次又由下合二順用成始覺後又由下二段約染分其體用初段合二順體成根本不覺次又由下合二順用成枝末不覺是以二二合論乃成染淨各分體用故合前八成四義也此生下三結指廣略然八門之廣則已極四門之略則未極以次更有為二為一故言四義者即上違順等四非取今四覺為四以此是結指上文也若約下五束八義成四門言分相者謂分齊法相也以一切淨緣分齊法相屬於二覺一切染緣分齊法相屬二不覺又於中淨法之體屬於本覺淨法之用屬於始覺染法之體屬根本不覺染法之相屬枝末不覺故合前八以成四也若本下六束四門成二義謂始覺是末不離本覺之本故下文云以始覺者即同本覺又云而實無有始覺之異乃至平等同一覺故枝末不覺不離根本不覺故下文云當知無明能生一切染法以一切染法皆是不覺相故然本始二覺但是體用之異本末二不覺但是粗細之異豈得離體有用離細有粗故唯二也若鎔下七合二義成一門以本從一生滅門展轉開成八門之義乃是據本以彰末今却收束多義以成一生滅門即是攝末以歸本也疏又若約諸識分相門本覺本不覺在本識中餘二在生起事識中若約本末不二門並在一本識中故云此識有二義也記又若下二約諸識分齊以結成諸識者即本事二識也然此二識分齊行相各不相是以本識是體事識屬用今以二本是體宜在體分以梨耶無始相續具覺不覺行相相隨是故二本皆在其中故下文云以如來藏無前際故無明之相亦無有始餘二等者始覺悟時方有六粗託境而生行相粗浮宜在粗分是故此二在生起識中此則攝四覺歸二識也若約本下攝事識歸本識以體用不二如波與水是故四義俱不離本識也此即同前一生滅門耳但前約門說今約識論也故云下結由是廣之成八攝之成二二義皆從一識中出故今論云此識有二義疏問此中一識有二義與上一心有二門何別耶答上一心中含於二義謂不守自性隨緣義及不變自性絶相義今此但就隨緣門中染淨理事無二之相明此識也是則前一心義寬該收於二門此一識義狹局在於一門問此中本覺與上真如門何別答真如門約體絶相說本覺約性功德說謂大智慧光明義等名本覺相本者是性義覺者是智慧義以此皆為翻妄染顯故在生滅門中攝以真如門中無翻染等義故與此不同也是故體相二大俱名本覺並在生滅門中故得具三大也記問此下三約問答通妨以辨異二初辨異二義問意可知答中先分別正答初辨一心二義即依一心法有二種門義隨緣即生滅門不變即真如門今此下二辨一識二義即唯約生滅門不該真如門此中理淨即覺義染事即不覺義染淨等即前生滅不生滅非一義無二相即前和合非異義廣如前釋是則下後判成寬狹可知問此下二辨異二真問意云若言同者應合俱名真如不然俱名本覺何以前後立名別耶若言異者約何論別答中約體絶相者如前云心真如者即是一法界大總相法門體乃至離言說名字心緣等相謂大等者即是所示相大中文本者下釋所以謂本性功德即是覺也今就略以立名謂之本覺約廣以顯相號性功德也以此下結揀所異謂本覺之名不於真如門中說而於生滅門中說者以約翻妄而立故是故下引所示之法證成前義能攝一切法生一切法疏上二門中云皆各總攝此中不云各者以此二義狹於二門故但明一識由含二義故攝一切不言二義各攝一切又上文中但云攝而不云生者以真如門無能生義故此識之中以不覺熏本覺故生諸染法流轉生死以本覺熏不覺故生諸淨法反流出纏成於始覺依此二義遍生一切染淨法故云能生下四熏習中廣辨此也非直相熏能生諸法亦乃生諸法已不離此心為此心所攝故云攝如上二門各攝處釋也記攝生者辨德也疏中分三初對前門以通各義先牒外難以此下次正通狹義由含下兼釋攝法一切雖多不出染淨今有覺義故攝淨有不覺義故攝染故云一切法不言下結明不同二門也以染淨相兼方成一切今覺義攝淨不攝染不覺義攝染不攝淨斯則二義共攝一切則可各攝一切則不可若一心二門之中則每門已自攝染攝淨由是不同故不言各也又上下二簡前文以釋生義先牒難以真下次釋通無能生義者文云所謂心性不生不滅等故以不覺下約順流生諸染法即三細六粗等以本覺下約反流生諸淨法即四位二身等依此下雙結下四下引說處問此門既有生義何不於二門之初便言耶答前文以生滅與真如同處標示無便言之今此獨明故得言生也非直下三躡下句以辨攝義其猶金能成像像不離金水能生波波不離水即三藏之中能藏義也音釋驪音離驪龍耀音效光耀滄音蒼海也踞音據蹲踞犍音健犍椎喧音萱喧閙乖音怪違反也森音生衆木貌瓶音平溺音逆淹沒也撥音𥁊開除也匱音愧木匱甜音田藂音蟲草木盛貌筒與桶同又音同竹筒也醋音措酸味鹹與鹽同蔽音閉覆蓋也怪音乖驚異也楚粗上聲國名訛音禾舛謬也域音玉界局也覓音滅尋也摩尼此云如意珠名也括音郭檢也包括也㲉音恪却鳥卵空也慳音謙吝惜己有也
