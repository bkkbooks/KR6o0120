front:
  text: 起信論疏記會閲序如來稱性說經即萬法以明一心經已妙矣菩薩依經造論從一心而啓萬法論何深焉欲證自性者莫若博究乎百部之經欲通經義者莫若專持乎五分之論其立理也標一心之法開二諦之門列三大之義轉二運之乘其釋教也真如則無言而言逈超於四句百非之外藏心則不覺而覺遍通於三乘六趣之中言無言也不空而空五教之旨歸莫過是矣覺不覺也無異而異十界之殊致豈有他哉由是真妄交熏習以成性因緣互具得以辦心雖三細六粗隨染緣之生起心原不動四位六離依淨緣之還滅性本凝然性凝然處豈礙發十善三心若波騰於智海心不動時無妨破五執二見如雲散於義天苟非會相入實烏能稱體起用其行行也不壞信三寶於自心堅固修五行於法界止觀二門並運於一行三昧事理二念交徹於諸佛十身其修果也頃持祕藏定紹佛種縱虗空為口萬象為舌不能美順性之功化道之德如是立理理已至矣如是釋教教已備矣如是行行行已周矣如是修果果已極矣非大乘無以起其信非起信無以大其乘信不盡於此者亦非究竟信也大不遍於此者亦非真正大也前之因緣因為此也後之勸益勸行此也佛佛說者說此法也經經詮者詮此義也是知此論為諸佛之指標作羣經之眼目賢聖之道途因果之龜鏡也故我賢首大師不以帝師稱尊釋經為貴一出譯場再思茲論遂以白毫之口廣明絶相之文金獅之辨懸敘離言之義豎約五種真如創立始終頓圓之教相橫依五重生法分開小大性相之宗乘能詮體判若彌天所被機定如劫石四釋以辨法寶三覺以揀地位在二門而示不二即非異以明非一法性統該乎佛性智身不外乎色身始覺有四相一念本覺有隨染性淨即淨恆染雖不變而隨緣即染恆淨雖成事而體空或迷真為似或執似為真那知法體無初生死之妄染違於理也則有終而無始法體無盡涅槃之真淨順於理也則有始而無終若起即止之觀體真如於生滅即觀之止會生滅於真如自然翻無量惱而成塵沙德轉衆生心而成如來藏不唯寂妄亦且離真真妄雙亡唯一心在此實蓮界分身故能智辨若爾疏既曠遠獨逗利機神非寂照叵測淵源圭山大師為中下之根更搜精要直録於論石壁法師因簡奧之注採集部函詳解其疏長水大師悟清淨本然之後驗佛祖心口之餘慶斯論疏猶豫釋文審句義之繁約勘述作之利弊詳者略其詳自不煩於神思略者詳其略則不昧於源流細為折衷命名筆削然又疏記別行未曾總帙復齊先生憫後進之難通重請分會不慧續法念前賢之心苦敢逆雅懷雖不仍而不竄亦無損而無增遂得論注同條竊比管絃之合疏記共貫宛如水乳之和以今之視昔莫不從此法界流一為無量以昔之視今莫不還歸此法界無量為一如是本末圓融闔開不二非夫悟入佛祖意也孰能信受於此法乎欲窮理者宜盡心焉康凞庚申七月十九灌頂行者續法題於慈雲丈室
