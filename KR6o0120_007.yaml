body:
  text: 唐西京太原沙門法藏述疏終南草堂沙門宗密録注宋秀州長水沙門子璿修記清錢塘慈雲沙門續法會編順天府府丞戴京曾閲定三釋上生滅之相記生滅相者以立義分中云是心生滅因緣相於中心生滅與因緣已如上釋今則分別相之一字然是生滅家之相故兼言也文分三初牒前標數二徵列略顯三廣釋其相初牒前標數復次分別生滅相者有二種疏生滅相牒前有二種標數記初明心復釋因緣次又分別相故言復次分別相也牒前者謂牒前立義分中文也二徵列略顯云何為二一者粗與心相應故二者細與心不相應故疏云何徵也一下列也六染中前三染是心相應其相粗顯經中説為相生滅二下謂後三染是心不相應以無心法粗顯之相其體微細經中説為流注生滅記相粗顯者分別染淨念慮三世人我見愛貪瞋熾然覽而可別故也經中者楞伽云諸識有二種生住滅謂流注及相相者現行體相也如根之發苗故屬粗分事識分別六塵如此無心法者心能緣心王也法之一字通於數境謂心所使法心所緣法也如前思知流注者種子相續也似平流之水望如恬靜故屬細分解深密云阿陀那識甚微細一切種子如瀑流雜心論云相似相續不知無常然此與心相應等言取義不便為有與之一字蓋譯家不細磨琢也後譯秖言一者粗謂相應心二者細謂不相應心斯言甚便若欲順文釋之亦可云緣相與知相同故故言與心相應緣相與知相不同故故言與心不相應義釋如前思知三廣釋其相二初約人對顯二辨相所依初約人對顯又粗中之粗凡夫境界粗中之細及細中之粗菩薩境界細中之細是佛境界疏粗中粗者前三染心俱名為粗於中初執相應染復更為粗凡夫境者三賢位名內凡能覺此染故粗中細者又於三粗染中後二謂不斷相應染及分別智相應染是粗中稍細者也細中粗者後三染心俱名為細於中前二謂能見能現同是不相應故名為細形後根本業識故復云粗菩薩境者十地已還所知境也細中細是佛境者根本業不相應染能所未分行相極細故唯佛了也記俱名粗者分別智等皆因外境起故更粗者貪瞋見愛執我我所取著轉深故內凡覺者其實亦是二乘境界今取文便略而不言十地等者於中初地至七地覺粗中之細八地九地覺細中之粗今就通意但言菩薩地也根本下後三染俱名細對前能見能現是為細中極細相也若非入如來地亦不能離得見心性二辨相所依二初順辨生緣二逆論滅義初順辨生緣記此中雖有因義以望真如亦是緣故從微至著顯於生起故云順辨中有二初明通緣後顯別因初明通緣此二種生滅依於無明熏習而有疏通而言之粗細二識皆依無明住地而起以根本無明動起三細依此三細轉起粗心故以無明通為其本記根本等者前云由不覺故生三種相又云以有境界緣故復生六種相如是雖即次第而生然推其根無明為本後顯別因所謂依因依緣依因者不覺義故依緣者妄作境界義故疏若別而言之依無明因生三細不相應心依境界緣生三粗相應心故也記疏開三今初略消其文所謂句標依因下釋以各自推其親所依故故因生三細緣生三粗可知疏此中文少若具説之各有二因如楞伽云大慧不思議熏不思議變是現識因取種種塵及無始妄想熏是分別事識因解云不思議熏者謂無明能熏真如不可熏處而能熏故名不思議熏又熏即不熏不熏之熏名不思議熏不思議變者謂真如心受無明熏不可變異而變異故云不思議變又變即不變不變之變名不思議變勝鬘中不染而染染而不染難可了知者謂此不思議也然此熏變甚微且隱故所起現識行相微細於中亦有轉識業識舉粗顯細故但名現識即是此不相應心也取種種塵者即是現識所現種種境界還能動彼心海起諸事識之浪故也無始妄想熏者即彼和合心海之中妄念習氣無始以來熏習不斷未曾離念故此塵及念熏動心海種種識生以妄念及塵粗而且顯故所起分別事識行相粗顯成相應心也記此中下二引經廣釋三初標指闕具論中三細闕緣三粗闕因經中現識事識因緣俱具故此標之各有二因者謂現識不相應心與事識相應心各有依生因及從住緣二種為因然後生起二識果也亦可云現識事識各有二種緣因如楞下二正引經文熏所依因也變所從緣也彼經云依因者謂無始戲論虗妄習氣所緣者謂自心所見分別境界此二是現識因現識是此二果而云不思議者若一向可熏可變即同衣等是可思議便成凡夫所見若一向不可熏變即如玉石亦可思議便成權教所説今則俱非此二故不思議取塵緣也妄想因也唐譯文云事識以分別境界及無始戲論習氣為因則知此二是事識因事識是此二果解云下三廣釋經義二初細中二因三先正釋謂無明下自性清淨心從本已來不與妄染相應又無明之法本性虗妄今以虗妄之法而能熏動性靜之體是不可熏處而熏也熏即不熏者雖熏真如而真如性且不動又此無明體全是覺一相無異將何以為能熏所熏雖無能所而現法宛然故云不熏之熏也謂真如下夫真如者是無變異義本不合變而受無明之熏成變動故變動相者即業相等是故言不可變而變也變即不變者雖動成識相而性淨無改雖性無改而全體見動如水成波而濕性不變濕雖不變而全體成動故云不變之變也勝鬘下二引證不染者即前不可熏不可變也而染者即前而能熏而變異也然此下三結屬以能熏是無明之妄所熏是真如之心心與無明俱無形相故隱微也以能起因緣隱微故所起現識行相亦細故此三種染心俱名為細也於中下舉細則未必有粗舉粗則必有其細也又此現識即梨耶之異名其中自含三相也即是此者結屬此中不相應心也取種下次粗中二因二先正釋境界即五塵境心海即梨耶心識浪即智相等故經云境風動心海種種識浪生下云以有妄境界染法緣故即熏習妄心令其念著等妄念習氣等者即枝末無明是迷似為實之類此無明就最初與真和合則名根本就至成識之後依在識中轉名枝末故此名為無始妄念習氣也此塵等者內有無明外有境界因緣具足事識生焉以妄下次結屬內熏是枝末不覺外熏是所現六塵以能起因緣既爾粗顯故所起事識亦復明著成相應者結屬此中三種相應心也疏經中欲明現識依不思議熏故得生依不思議變故得住事識依境界故得生依心海故得住今此論中但説生緣不論依住是故於細中唯説無明熏粗中單舉境界緣也記經下三經論對辨先明經具生住者彼經云諸識有二種生住滅故此對配生住滅則下自明也事識中準彼經意應云依境界故得住依心海故得生心海中無始妄想習氣生所因也心海中起諸事識取種種塵現住緣也今云依境故生依心得住乃是傳寫之誤現識若無根本不覺無明為熏習因終不自生若無自心所變境界為資助緣終不自住斯則三細隨妄因緣以生住也又真如不可熏而忽受無明熏故得生真如不變異而隨緣變諸境故得住斯則三細依真如心以生住也事識若無枝末無明為熏習因亦不自生若無六塵外境為資助緣亦不自住斯則三粗隨妄因緣以生住也又心海中無始妄念習氣熏習不斷故得生心海中所現種種塵境令其攀緣故得住斯則三粗依本識心以生住也其猶波浪無水為親因終不自生無風為助緣終不自住是故識浪依心水生從境風住也若以風為浪生因水為浪住緣無有此理當知二識生因境界住緣心識亦無此理矣詳之今此下次明論闕生緣依住者準彼楞伽經文依所依因也緣所從緣也生住滅皆有因緣經云所依因滅則相續滅所從滅及所緣滅則相續滅滅因緣既爾生住因緣例知今上疏中以依因配生無明熏發義便故從緣配住境界助長理順故但説生緣者謂但説現識依因之生事識住之從緣也不論依住者謂不論事識生之依因現識從緣之住也是故下結成無明熏三細依生因也以文云因者不覺義故境界緣三粗從住緣也以文云緣者妄作境界義故二逆論滅義記夫斷除妄染理合從粗至細今反於此故云逆也蓋直約道理不對人治故於中二初正辨二釋疑初正辨若因滅則緣滅因滅故不相應心滅緣滅故相應心滅疏若下得對治無明滅時無明所起現識境界亦隨滅此通明滅也因滅下別顯滅以三細親依無明因生故無明滅時亦隨滅也緣滅下以三粗染親依境界緣生故境界滅時亦隨滅也此依始終起盡道理以明二種生滅之義非約剎那生滅義也記得對治等者以無明為因能生三細境界是三中之一復能為緣而生六粗因既已滅緣依何立故隨滅也此依下揀濫恐有疑云如此生滅是剎那念念之生滅也故今揀之言始終者隨流以第六染為始初染為終反流以初染為始第六染為終起則六染紛然曠劫流浪盡則一念都絶究竟寂常又起盡即始終也故是一期前後斷續之生滅非同剎那念念不住之生滅也二釋疑二初問二答初問問曰若心滅者云何相續若相續者云何説究竟滅疏若境界滅時心體亦滅者無明三細既其未盡心體已亡更依何法而得相續此疑相應心也記上云依如來藏有生滅心今復云心滅心若滅者即藏性滅此則約通名心也以難別體藏性也是疑相應心體滅也若體滅者八地之中便合成佛以無心體為所依故三細則亡亡則無細可斷今何三細猶續八地未成佛耶疏若言以心體不滅令無明相續者心體既其不滅無明則常相續云何治道得究竟滅此疑不相應心也記以依心體有於無明心體既常無明亦常故能依三細則不可滅此疑不相應心永不得滅今何説入佛地能究竟滅三細心耶二答疏答中雙答前二難也文有三初法二喻三合初法答曰所言滅者唯心相滅非心體滅疏境界滅時唯心粗相滅非心自體滅又以無明滅時唯心細相滅亦非心體滅此通答二問下喻合則別説記前約心體以疑難謂心滅體亦滅此約體相以釋通謂相滅體不滅也妄相差別故論粗細真心無差故唯一體如楞伽云識真相體相也又無相之相不滅但業相行相也又可狀之相滅若真相滅者即不異外道斷見論二喻如風依水而有動相若水滅者則風相斷絶無所依止以水不滅風相相續唯風滅故動相隨滅非是水滅疏如風等者喻無明風依心體水故有動相此示無明離於心體不能自現動相也若水滅下此示若境界滅時令心體亦滅者則無明風無所動故業等三細則應斷絶以水下以境界滅時心體不滅故無明三細則得長相續良以無明滅故境界滅非以境界滅故無明滅由是義故境界滅時無明動心三細相續此答初問相應心滅義唯風下以無明盡時業等動相亦隨之滅非靜心體而亦滅也此答後問不相應心滅義記論如風下先通喻相依體立猛風喻境界緣微風喻無明因大浪動喻三粗染小波動喻三細染皆相也水喻心體藏性也疏中喻無明等者前疑心體若滅無明細相不得相續心體若不滅無明細相應常相續故今總舉風水相依有波浪相而為喻本以顯心體不滅無明粗細相有生滅也此示下上順明此反顯風離海水無波浪相顯無明依真而現生滅故前文云心與無明不相捨離論若水等次別喻相滅體存二先喻相應心滅義又二初反顯應補上三句義甚明顯謂猛風緣滅浪相隨滅非海水滅若水滅者則微風相絶細波無所依止疏中此示等者謂若境界猛風滅時三粗染心浪相隨滅而心體水不滅若心體水亦令滅者則無明微風不能動而三細波相亦斷絶無依矣論以水二句次順明疏中四先直釋以境緣滅時相應心相雖滅心體不滅以不滅故無明細相俱得相續此如猛風滅故粗浪滅非水體滅由是微風動而有細波也良以下次出意以前云因滅故緣滅非謂緣滅故因滅意云粗不該細細尚得存況心體不亡何疑斷絶由是下三結成斯則相應心相雖隨境滅而無明細相不滅此答下四指答上反顯文似乎順其所疑牒而縱之此順明文正是釋其所疑以直示也故於此結答論唯風等後喻不相應心滅義疏中先消釋其文無明等者此如微風滅故細波滅也非靜心等者以水非動性故波滅而水不滅心非動性故染相滅而體性不滅如前文云若風止滅動相則滅濕性不壞此答下次結指其答三合無明亦爾依心體而動若心體滅者則衆生斷絶無所依止以體不滅心得相續唯癡滅故心相隨滅非心智滅疏合中次第合前二種心如喻思之唯癡下上文以對不覺故名為覺則一識有二義今以對癡故名為智則一心有體相不覺癡相轉滅成於始覺則本覺不滅與始覺還源無二無別也記如喻思者亦二先合通明相依體立謂境界無明風依心體海水而有粗細染心浪波之動相也若下次合別説相滅體存亦二初合相應心滅喻義先反顯亦補上三句云境界緣滅故相應心粗相滅非心體滅若心體滅者則無明因斷絶而衆生不相應心細相無所依止此如猛風滅時令海水亦滅者則微風細波絶無依矣豈理也哉衆生即業等相如前云衆生依心意意識轉故又衆生者謂依業轉二相之衆生也克而論之唯有業轉二相以境界即是現相今已滅故而言三細者蓋通言也斯則八地已上皆依業轉得名衆生今心體既滅衆生無依故云斷絶以體下次順明謂以心體水不滅故無明微風細心波相得相續也斯則粗染滅時細染不滅故八地菩薩未得成佛此答釋初問相應心滅義也唯癡下二合不相應心滅喻謂無明微風滅故三細染心波相隨滅非真智心體海水亦滅前云若無明滅相續業相等則滅智性不壞是故佛地無明細染盡時而智體淳淨不毀失也癡即無明合風動相智即覺體合水濕性此答釋後問不相應心滅義也疏中上文等者為配釋癡智二字也上文指生滅門初文上文中識之覺義即今心之智體上文中識之不覺義即今心之癡相所以作此配釋者前論生起故於一識明二義一者覺二者不覺今約滅惑還歸終處須以二義會入一心故云不覺癡相轉成覺智體也成始覺者同前究竟覺智淨相法出離鏡等義前則迷一心以成九相今則滅九相以歸一心無不皆從法界流無不皆歸此法界也還源無二者經云生滅既滅寂滅現前始本不二唯一心在也記又喻合文亦可如法中作通答釋初七句示相依體立以顯義後三句明相滅體存以通妨先釋答初問相應心滅義云境界緣風依心體海水而有三粗識浪動相若心體水滅者則境緣猛風斷絶三粗衆生浪相無所依止以心體水不滅境界猛風相應心浪相續唯癡暗境緣猛風滅故三粗染心浪相隨滅非智體心海水滅次釋答後問不相應心滅義云無明因風依心體海水而有三細染波動相若心體水滅者則無明因微風斷絶三細衆生波相無所依止以心體水不滅無明微風不相應心波相得續唯癡暗無明因風滅故三細染波動相隨滅亦非智體心海水有滅也疏專別説者與問處甚對故為順文義深遠釋故文中具別義故記又通解者例法中疏意故為欲易明淺近釋故文可作通答故覽者任情去取二染淨相資疏亦云染淨互熏相生不斷即顯上總中能生一切法義也記相資者資取也即藉賴之義謂染法淨法自不能生以互相取假其勢力以為藉賴之緣方得生故又資者助益義謂互相資助令生染淨故以前科但明染淨當位生滅之義而未廣明染法淨法生起行相今即説之意明染淨互相資假互相助益生一切法如染助於淨淨假於染則淨法隨流生諸染法淨助於染染假於淨則染法反流生諸淨法本雖相違反成相順染法淨法遞互相假也互熏者互更互熏擊發亦即生義謂遞互相生擊發令染淨不斷相資互熏名異義同爾相生者即互熏也不斷者且各就一期所論其實淨法即不斷染法即有斷斷不斷義如下所辨能生等者即生滅門初云此識有二種義能攝一切法生一切法前科已明攝義即二覺之文是也今此正辨生義故説相資問何以先明攝義後明生義耶答攝義是正故先説之生義是彼攝義所因故居其後所以立義分中唯言能攝不言能生一或恐有疑從無而生生已方攝今則意明阿賴耶識未始不生未始不攝攝之與生竟無前後故二或可攝義非局前文但齊此生滅一門於中所有染淨以二覺之義攝之無不盡矣三文有四一舉數總標二徵列別名三染淨熏習四明盡不盡一舉數總標復次有四種法熏習義故染法淨法起不斷絶疏由此染淨相資故得起不斷絶也二徵列別名云何為四一者淨法名為真如二者一切染因名為無明三者妄心名為業識四者妄境界所謂六塵疏云何徵也一下列也此是生滅門中真如以三義故故云淨法一約體本來淨故二約體相以內熏故令反染成始淨故梁攝論云能成立者謂真如十種功德所成立者謂十種新生正行也三約用熏故應機成淨緣二染因者六染及九相皆因無明而有三妄心者通事識及業識今據其本故但言業識四妄境者事識所緣之境也此三皆是染法由此染法自性差別仗託因緣故具説三種淨法對染雖成熏義然其體用竟未曾別故但明一種記此是下或問曰前説真如是泯相顯性門不分染淨今文何故卻説真如為淨法耶故此釋之以此真如是生滅門中隨緣之義有三義故説名為淨非約前門不變義説本淨者性淨解脫此通凡聖未曾染故始淨者離障解脫此唯局聖斷染方淨故此中雙言體相者以有相則必有體有體則未必有相故又相淨則必兼體淨體淨則未必相淨故攝論下引證論云所成立境謂十波羅蜜是真如十種功德能成十波羅蜜釋曰十種功德即十地所證十真如謂遍行等新生正行即十地所起十波羅蜜行由真如中有此十種功德故能起十種正行而隨順之如下文云以知法性體無慳貪順本性故行布施波羅蜜此則不同相宗卻以真如功德為所成立兼復證有能所熏義淨緣者報應二身能與衆生為淨緣故今此三中中即智淨相後即不思議業相又於四鏡中初是前二鏡次即第三鏡後則第四鏡又前二是自體相熏習後一是用熏習亦名內外因緣熏也六染等者前云當知無明能生一切染法以一切染法皆是不覺相故通事識者即智相以資熏枝末無明令念相續起於我執造業受報故業識能資熏根本無明令起轉現故今據等者明舉細攝粗也但舉業識之細自攝事識之粗事識所緣者以此六塵能熏動心海起諸識浪增長念取生諸過故此三下或問曰此四義中何故染具説三淨唯説一耶故今釋之以染法本性自差別故仗因託緣方得生故須説三義淨法一味雖分體用用還同體無別異故故説一種仗託因緣者於此三中無明是因妄境是緣妄心是因緣所起本識事識各有因緣如前廣辨本識以不思議熏為因不思議變為緣事識以無始妄想為因取種種塵為緣體用無別者但內熏為體外熏為用用合體時非別外來融同一味故衆生心內之如來還化如來自己心中之衆生也三染淨熏習疏廣釋染淨互相熏習之義也中又二初總二別初總二先喻次合先喻熏習義者如世間衣服實無於香若人以香而熏習故則有香氣記初句牒法如下舉喻若望法合則有二説衣喻淨法服喻染法香喻熏習有可意香不可意香一者衣本無不可意香但以服上不可意香而熏衣故衣有不可意香喻淨本無染熏之有染二者服本無可意香但以衣上有可意香而熏服故服亦有可意香喻染本無淨熏之有淨次合此亦如是真如淨法實無於染但以無明而熏習故則有染相無明染法實無淨業但以真如而熏習故則有淨用疏合有二一真如下染熏淨也顯真無相隨熏現相又顯妄法無體故但云相又當相自無反流之用故云相不云用也此約隨流生滅門説此釋經中如來藏為惡習所熏等二無明下淨熏染也此是生滅門中本覺真如故有熏義真如門中則無此義由此本覺內熏不覺令成猒求反流順真故云用也此釋經中由有如來藏故能猒生死苦樂求涅槃也涅槃經云闡提之人未來佛性力故還生善根彼言佛性力者即此本覺內熏之力耳良以一識含此二義更互相熏遍生染淨故也此中佛者是覺性者是本故名佛性為本覺也記論初句總合真下別配染熏淨者合服上不可意香熏之令衣成染穢氣喻也顯真下約真釋相字現相者即九相然前説九相是不覺相者以約親生義説故今此説為真如相者就根本説故是則兼彼無明不覺亦是真如相如前云如是無漏無明種種業幻皆同真如性相也又顯下約妄解相字有二義先難云此染何不稱體而云相耶故今釋云以妄有差別可覽可別而無自體故但云相又當下次難云淨何稱用染何稱相耶故又釋云以當染法相時自不能反染歸淨用義亦無然非無染用今就反流名為無用是故但稱相也蓋此染淨二法各不無相用且迷真執妄起惑造業豈非染用智淨相法出離鏡大智慧光明義等豈非淨相今此文中意在影略故各舉一義疏之所釋且一往耳此約下顯意可知經中等者即楞伽經如前略辨然準他宗於能所熏中皆揀真如以是堅密及不生滅今此實教約不思議熏變故有斯義淨熏染者合衣上有可意香熏之令服成淨妙氣喻也此是等者以生滅是攬理成事門染淨相存故有熏習之義若真如是泯相顯性門則鎔融生滅為一真體無所敵對故無熏義由此等者若順流違真如時即是染用今以本覺熏習使反流順真乃名淨用其猶逆叛之徒既已降伏乃奉赤心於主也昔則背之為逆黨今則順之為忠臣此釋下即勝鬘經已如前引意云所以能生猒求者蓋真如之熏力也狂冠歸順者乃明主之神化也涅槃下引證彼言下會彼同此良以下結歸今意二義覺不覺也覺義即今真如不覺即今無明無明具含妄心妄境此中等者覺之與佛但唐梵異音本對於末性對於相性相本末文異義同二別二先染後淨先染記別中先明染熏者據理合然也以先成染法方反染成淨未有先淨後成染法若先説淨後説染者便有妄起無窮之過亦有悟後更迷之失故先説染也於中二初問二答初問云何熏習起染法不斷疏泛論熏習各二種一習熏謂熏心體成染淨等二資熏謂現行心境及諸惑相資等記各二者染淨皆有故習熏者自內順起後念續於前念也心體者此通染淨染熏則熏真心體淨熏則熏無明體資熏者從外反擊前念引起後念也如次文説無明熏真如起於妄心即是習熏妄心卻反熏無明令增迷倒起轉現等即是資熏餘皆例此心即業識境即現相諸惑即見愛等二答二初略二廣初略所謂以依真如法故有於無明以有無明染法因故即熏習真如以熏習故則有妄心以有妄心即熏習無明不了真如法故不覺念起現妄境界以有妄境界染法緣故即熏習妄心令其念著造種種業受於一切身心等苦疏依真如者舉能熏所熏之法體也亦可此中但舉能熏無明然必依真如故約本舉也以有無明下根本無明熏習義也有妄心者依無明熏動真如有業識心也以有妄心下以此妄心還資熏無明增其不了令其轉成轉識及現識也以有妄境下以此境界還熏動心海起諸識浪緣念彼境即起事識也上六粗中初二名念中二名著後二名同此業苦也謂依惑造業依業受報記論所謂下先總舉法體能所熏體者就此門中即無明是能熏真如是所熏若在後門即真如為能無明為所亦可下別義以無明本無自體單説不得凡欲舉之必須帶所依真體真體即無明本起之處如欲説波必須兼水也雖復雙舉意取無明或者意顯無明非實有體依他起故本來即空又或意顯染淨互熏之所以也若本抗行則不可熏故如相宗説無明真如敵體有異是故真如堅如玉石不能受熏也論以有下次別明熏義三初無明熏真如根本無明者以附真之者故非枝末本業經云迷第一義諦起者名生得惑即此無明也熏習者若對下資熏合云熏習論以熏下明是無明熏習之功真如雖是淨法被無明染法熏故而起妄心如楞伽云不思議熏變是現識因等論以有下二妄心熏無明不了下亦妄心熏習之功不了等即迷真義不覺等是起妄義以不了真如無相而妄現其相如人好眼為熱氣所逼遂成翳眼以有翳所覆故依此翳眼便見空華故云現妄境界疏以此下以是反擊故云資熏增不了者無明已是不了又為妄心所助更加不了如賊遇惡人盜心轉甚遂成盜事成轉識者念起故及現識者現境故論以有下三境界熏妄心令其下是妄境熏習之功由外境熏故令內心起念分別相續執著計名造善惡等業受三界等報三界無安故名苦也如惡人為財物等所牽引故恣行盜竊致令彰顯受於囹圄刑戮之患疏以此下識浪智識等後二同者以此望彼俱名業苦故依惑下總釋上相同之義上之三重鈎鎖相續謂無明熏真如起妄心妄心熏無明現境界境界熏妄心起念著業報此則染緣事足九相之極故止於斯也二廣疏即明前三種從後向前次第説也記上順明此逆釋者取其文勢相躡故逆次前三是乃自本之末以略標從末向本以廣釋也文三初明境界熏妄心二明妄心熏無明三明無明熏真如初明境界熏妄心此妄境界熏習義則有二種云何為二一者增長念熏習二者增長取熏習疏念者由境界力增長事識中智相相續相法執分別念也取者增長事識中執取相計名字相人我見愛煩惱也記論初二句標云何句徵一者下釋下二節例知增長念熏者即是由熏習故令念增長餘亦倣此疏由境等者由外境有違順等相熏故牽起內心愛惡等念名為智相猶像之有妍者蓋質之好惡也以境不斷故念亦不斷名相續相如響之不斷絶者蓋聲之相續也法執分別者非謂對俱生以言分別但通指智及相續俱名分別分別即念也以此二相分別染淨念念不斷故此是分別心念非分別惑也若以二惑配對智是法執俱生惑相續是法執分別惑故人我見愛者執取是我執俱生惑愛煩惱也計名是我執分別惑見煩惱也二明妄心熏無明妄心熏習義有二種云何為二一者業識根本熏習能受阿羅漢辟支佛一切菩薩生滅苦故二者增長分別事識熏習能受凡夫業繫苦故疏一者以此業識能資熏住地無明迷於無相能起轉相現相等相續令彼三乘人雖出三界離事識分段粗苦猶受梨耶變易行苦然此細苦無始來有但為揀細異粗故約已離粗苦時相顯處説二者以事識能資熏起時無明起見愛粗惑發動身口造種種業受凡夫分段苦故記論能受者合是能令阿羅漢等受生死苦文字語倒阿羅漢此云無賊賊即我執煩惱此惑無故辟支佛此云緣覺覺緣離而即真故疏迷於無相者以此業識反資無明增其不了於無相理妄生有相遂成轉現兼彼能熏共成梨耶離事識等者然有全分不同若地前菩薩及二乘人但離事識中我執粗分初地方離法執細中一分二地至七地則全離事識粗細二分若分段苦但約粗除即得遠離以無惑業即不受生故無生老等八苦變易行苦者三細生滅念念遷流故上論云動則有苦果不離因然此下出三乘人受變易所以然此梨耶細苦九類同有今獨説三乘人偏受者以約離粗苦故細苦方現處説是則一切凡夫二苦皆有三乘賢聖有細無粗凡夫雖有細苦以為粗苦所蓋都未覺知由此不説聖人已離粗苦方乃覺知今就覺知義邊故説三乘所有如人重病不知餘物所侵病愈之時方覺微痛然回心菩薩十信已來即受變易若直往菩薩約終教説在地前時即受變易始教即初地已去方受變易智增初地悲增八地悲智平等四五六地若二乘未回心者滅苦依後法爾便受變易身也以事識等者前則業識熏根本住地無明令起轉現共成梨耶使三乘聖人受變易細苦此則智識熏枝末現行無明令起念相續執取計名造業受報共成事識使六道衆生受分段粗苦也三明無明熏真如無明熏習義有二種云何為二一者根本熏習以能成就業識義故二者所起見愛熏習以能成就分別事識義故疏一者謂根本不覺熏動真如成業等諸識但今舉初故云業識二者謂枝末不覺熏習心體成分別事識上文云此識依見愛煩惱增長義故但末從本生故云所起也記根本等者即前依不覺生三種相也論不備舉故但標一亦可無明熏真但成業識業識熏無明方起轉現故但標一也枝末等者然今事識親從境起境界不亡者蓋緣枝末無明念念熏習真如之力如何熏習但是於境不了虗無定執有實名為熏習以定執故起後諸相也此則取迷前者為能成能成即枝末不覺後起者為所成所成即六粗事識如前所説睡夢之事心境已具於中取著不了是夢如能成之無明分別前境如所成之事識然不了妄即是熏真互相成也引文可知但末下釋上所起之言謂根本無明是能起故對上根本以彰枝末也後淨二初問二答初問云何熏習起淨法不斷記真如熏無明起妄心欣厭習熏也妄心熏真如離苦得涅槃資熏也二答二初略二廣初略二初正明熏習二辨其功能初正明熏習所謂以有真如法故能熏習無明以熏習因緣力故則令妄心厭生死苦樂求涅槃以此妄心有厭求因緣故即熏習真如疏所下先明真如內熏無明令成淨業以此下後即此淨用反熏真如增其勢力前即本熏後即新熏也記論所謂等者真如熏無明也真如為能熏無明為所熏真如當體真實無始本有不假他因故不同前準舉所依也以熏習下明真熏之功無明雖是隨流染法被真如淨法所熏便能反順真如起茲欣厭知昔日所愛者是苦故厭之所背者有樂故欣之如前惡人卻被善者勉諭後行君子之行疏淨業者即指妄心欣厭業也論以此等者妄心熏真如也妄心為能熏真如為所熏疏反熏者妄心本是隨流之法今卻反有益真之力也又是資熏反從外擊故增勢力者真如本自有力能熏妄心起此厭求今復被此淨用資助更增其力成始覺智如惡人既反為善故於善人每有咨詢或加之諫諍由是善者或因問而增解或因諍而除非深練仁行愈修德業也本即習熏新即資熏也二辨其功能記功能者由前內外熏力遂成信解行證以至極果也文二初因二果初因自信己性知心妄動無前境界修遠離法以如實知無前境界故種種方便起隨順行不取不念乃至久遠熏習力故疏自信者十信位中信也知心下即三賢位中修知心無境者解也修遠離法者依解成行謂尋伺等觀唯識無塵等行也如實知者初地見道證唯識理異前比觀故云如實也種種下明十地修道位中廣修萬行以顯真如云隨順也不取所取無相不念能念不生久遠者三祇熏故記自下初地前行信己性者知真本有也此即圓覺信之真正實教初心合爾如是十信中信者入道初心先信根本非同權門但信三寶及戒故下文云一者信根本所謂樂念真如法故以信是萬行初首故須言信又以真如是萬行根本故信己性也三聖圓融觀云信若不信法界信即是邪知妄動者達妄本空也此即圓覺解之真正解者十解位即十住也解業轉故言知心妄動解現相故言無前境界但是解了未能斷除然何啻十住方有問十信如何得解業等相耶答以信己真如寂然不動無有一相故知動心相境誠為妄也性本無故若不解此焉稱實教初心人耶今此不唯解真而能斷惑住法界位故當十住遠離法者法謂法行以此法行能破心境故云遠離依解成行者即十住位滿進十行位也有解無行其解必孤故須依所解處而修行也尋伺等即所行之行信解非淺其行必深大車將行軌轍寧小又此中意兼四加行謂暖頂二位以四尋伺觀觀所取名等四法假有實無即所取空是遠離境也忍世第一以四如實智印所取空觀能取空即遠離心也廣如前辨今云等者等如實觀也唯識等者了知諸法唯依妄念而有差別故行此行而隨順之故頌云唯識無境界以無塵妄見如人目有翳見毛月等事又此中意兼十回向此唯識觀行即資糧位中所修也以如下二地上行見道等者即通達位離不斷相斷染證一分真如名淨心地若準諸處説行布施波羅蜜斷異生性障及二種愚謂執著我法愚惡趣雜染愚證遍行真如住歡喜地修道者即二地至等覺以此位中如次行戒等波羅蜜行餘非不修但隨力隨分故云萬行廣如華嚴所説以此修行對治障染稱順本性令體顯現故云顯真所無能不者正同唯識見道頌云若時於所緣智都無所得爾時住唯識離二取相故然此修道證真起行一如初地俱無能所故言不取不念三祇者通前三賢為論若但取二地已去則唯有二謂二地至八地為一僧祇八地至佛果為一僧祇然三祇延促之義廣如下釋二果無明則滅以無明滅故心無有起以無起故境界隨滅以因緣俱滅故心相皆盡名得涅槃成自然業疏無明謂根本心無起者妄心盡也境隨滅者妄境滅也此上皆滅惑也即翻前三種染以因下明證理成德因者無明緣者妄境界心相者染心此並滅故心體轉依名得涅槃起不思議業用記初滅惑翻染也妄心盡者即業轉二識盡也以無無明為能熏故妄境滅者以無妄心為能熏故皆滅惑者通指無明已下之文皆是展轉滅惑翻染義如前逆論滅義中廣辨三種染者即後三種不相應染然亦逆論滅義故云翻前以因等者二證理成德也涅槃是斷業用是恩得是智德屬能證智故斯皆修行翻染相成淨德也因者下再牒躡前翻染之文以明果上所顯之德染心通六染無明滅故業等三染心盡境界滅故智等三染心盡故云心相一切皆盡如上云因滅故不相應心滅緣滅故相應心滅轉依者心體在纏依九相等名為生死今九相既滅生死已盡心體空寂名為涅槃義説其依實無能所又轉之一字義兼兩勢謂轉滅生死轉得涅槃又轉滅則無法可滅而成似滅轉得則無法可得而為真得餘有多義如別所明業用者依涅槃空寂之體隨機感現無不利益亦無心應故云自然業心言罔及故云不思議斯則翻前妄心妄境故得涅槃六染心皆煩惱礙故又翻妄心成智德得也翻妄境成斷德涅槃也翻前無明成自然業無明為智礙故又翻無明成恩德業也然此因果兩科凡賢聖果四位具足皆由真如內熏妄心外助令真有力故能始從凡夫終至果位起茲淨業也二廣二初明妄心熏習二顯真如熏習初明妄心熏習記即是妄心熏真如也妄心熏習義有二種云何為二一者分別事識熏習依諸凡夫二乘人等猒生死苦隨力所能以漸趣向無上道故二者意熏習謂諸菩薩發心勇猛速趣涅槃故疏一事識者即上意識依諸下以此識不知諸塵唯是識故執心外實有境界凡夫二乘雖有發心趣向解脫而猶計有生死可猒涅槃可欣不了唯心道理由此作意力故久後還得菩提二意者若就本而言名為業識通而論之即前五種意菩薩發心者以諸菩薩知一切法唯是識量捨彼事識外計分別既了唯心趣理速疾異前漸悟故云乃至速趣涅槃也記一下正釋文也意識者意之識也凡夫者即十信已前不了唯識而修行者以此識下先明所依之識以此粗識本是境界為緣之所起者不知諸法本依現識而生以不知故復執為實凡夫下次明能依之人且二乘不知七八二識及事識細分但修我空觀智凡夫悠悠修行不知唯識道理但依粗識起欣猒心而求佛果不能亡相由此與二乘同處而言由此下後明得道分齊作意者作發趣佛道之意即欣猒心也久後等者以趣心無輟漸能解了唯識道理如實修行還得成道以用心迂會故不速疾乃云久後菩提即無上道也菩薩十信已上了唯識者識量等者一切境界唯識所現所現境界一一如識故得識染即境染識淨即境淨等既知唯識所現終不定執實法虗妄取著故云捨彼等了唯心者有智能了諸法無性心相亦空唯一真如不生妄取念念與理相稱故得疾取於涅槃也疏問此中妄心既並熏習真如起反流行意熏既屬梨耶如何能各自發心修行答前凡夫二乘不覺梨耶但依分別事識資持力故而發心修行以不達本故向大菩提疏而且遠故云漸也此菩薩既了梨耶本識即依此識資持力故方得發心修行以了本故向大菩提親而且近故云速也此約所依相資辨熏非各自發心等此如下文證發心中説也記問下通妨難也初問中妄心並熏者五意及意之識皆熏真如令其有力遂猒生死苦樂求涅槃修反流順真行也意熏等者謂五意中前三屬梨耶識然三乘之人俱有梨耶熏真之理何故此中唯言菩薩發心勇猛速趣涅槃二乘凡夫不同此轍而疏遠耶熏既是同發心合等云何不爾二答中先正答凡夫不覺者以不聞大乘教不遇真善友故於諸法不知梨耶所變又不知能變之識真妄和合無有自性故云不覺資持力者謂依意識分別心外見有生死涅槃從此起心猒生死苦樂求涅槃資熏真如真如任持能熏之力由是發心修行也不達本者以不能了自心則生二妄想一者不了法唯心現二者執心外法為實道目前而遠覓佛在內而外求解既不正行亦迂曲故向菩提不能速疾故云疏遠也了本識者既知諸法唯心所現終不隨順粗識分別執心外法擬棄生死別求涅槃雖修諸行而無行可行雖度衆生而無生可度故經云了心及境界妄想即不生斯則了本識而修行者也既而忘緣內照稱順本性速得合道故云親而且近如下順性修檀等前云自信己性知心妄動無前境界修遠離法等即斯行也問五意中後二亦是事識此則三乘人所同有者菩薩依熏何得速疾凡小依熏何又遲滯而各別耶答凡小但覺事識粗分故漸修不疾菩薩深達事識細分故頓悟疾趣又二乘事識熏粗不該細何者彼則唯知事識不知本識迷本識故不了境從心起知事識故但覺心自境生依此修行故成疏遠菩薩意熏本能攝末何者此則二識俱知以知之故雖心緣境達境唯心故於事識而不信用但信用本識依此修行故成親近此約下次結答也所依即本事二識及真如也以三乘人等各依其識熏彼真如而起行故相資者本因真如熏妄心令起猒求然後妄心熏真如令修此行是則若依事識熏真如真如還資事識之行若依本識熏真如真如還資本識之行故相資也但緣識有內起外發之異故使行有內照外求不同遲速果因自茲而得證發心中者文云是菩薩發心相者有三種心微細之相云何為三一者真心二者方便心三者業識心廣説如下二顯真如熏習記即是真如熏無明也文中三初標徵次列名後辨相初標徵真如熏習義有二種云何為二疏有二標數也云何徵起也次列名一者自體相熏習二者用熏習疏體相熏者內因熏也用熏者外緣熏也記體相合論者如珠與光不相離故用別開者如珠現影從體起故後辨相二初別釋二合明初別釋二先體相次用大先體相二一正顯二釋疑一正顯自體相熏習者從無始世來具無漏法備有不思議業作境界之性依此二義恆常熏習以有力故能令衆生猒生死苦樂求涅槃自信己身有真如法發心修行疏不空本覺名無漏法此法冥熏衆生非物能了故云不思議此中業者是冥熏作用作境界者非直熏彼妄心令其猒求成能觀智亦乃與其觀智作所觀境界依此下顯熏功能二義者謂此心境二法亦可此體相二法冥熏衆生有力故令起猒求等行自信下依熏起修行相記論初句牒名從下釋義二初明熏習不空者不空如來藏也以有自體本具河沙性德故冥暗也物即衆生其猶衣珠潛照而貧者莫知黃金纏弊而行者罔測故非能了也冥熏作用揀異出纏應化之用境界性者此是體熏以表體相無二故標中則先體後相釋中則先相後體如何熏習以能為境界牽彼智生即是熏義非直下躡前也亦乃下正釋也前則本覺熏令起智智即始覺也此乃對智成所觀境境亦本覺也是則本覺相為能熏之心體作所觀之境一體之上義分二別如前説法有對智顯義等謂前説一本覺法對二智顯四鏡義也論依此等二顯功能心境者無漏法心也前云所言法者謂衆生心境界境也由心之所發由境之所牽雖分二法體唯本覺無二別也體相者具無漏相也作境性體也有力者妄心劣故本覺勢強熏力猛盛也昔以隨流則妄有力而真劣今既反流則真熏功盛而妄心勢衰也自信己身等者約人所説故言己身以己真如熏自妄心有勢力故遂能反照信己身中真如與佛無異但由妄惑所覆故不顯現今發直等三心修施等五行對治妄惑令體顯現二釋疑二初問二答初問問曰若如是義者一切衆生悉有真如等皆熏習云何有信無信無量前後差別皆應一時自知有真如法勤修方便等入涅槃疏初有信無信約現在信心有無次無量前後約未來信心前後內熏既齊何得如是皆應下結成難也此則執別疑通難記問有三段一指前按定如是義指上體相熏習言悉有真如者凡是有情皆具本覺無二圓滿以皆具故熏義合齊故云等也云何下二述其所疑現在等者約橫説也現今且見有信者寡無信者衆無量等者合云前後無量差別譯者回文不盡也未來等者此約豎説望未來發起信心遲速不等故云前後更有厚薄進退邪正等異故云無量差別又橫則有無差別豎則前後差別前後之言亦通過去內熏等者熏既是齊信亦合齊不合有於如是差別皆應下三結成其難一時者有二意一揀信之有無二揀起之前後自知是信解勤修是行等入是證一時之言須通此三而轉執別等者謂執有信無信前後等別便疑真如亦有等類不同也二答二初約染惑成緣明起有厚薄二約淨法賴緣成前後差異初約染惑成緣明起有厚薄答曰真如本一而有無量無邊無明從本已來自性差別厚薄不同故過恆河沙等上煩惱依無明起差別我見愛染煩惱依無明起差別如是一切煩惱依於無明所起前後無量差別唯如來能知故疏真如本一者通體明內熏不無也而有下根本無明住地本來自性差別隨人厚薄厚者不信薄者有信前後亦爾非彼內熏使之然也恆沙等上煩惱者枝末是根本上也是從無明所起迷諸法門事中無知所知障中粗分攝我見愛染煩惱者是無明所起四住煩惱煩惱障攝如是一切煩惱者雙結前二種煩惱皆依根本無明所起由是義故前後非一差別無量前後難知故惟佛了記真如句初標所疑謂標所疑之通也本一者凡聖一體平等無二也淨名云一切衆生皆如也衆聖賢亦如也至於彌勒亦如也而有等二釋所執謂釋所執之別也於中三初明所依根本差別根本等者根本無明既是生滅妄法法爾不得平等衆生具此各各不同不同真如一體平等故云厚薄前後亦爾者厚者即遲信薄者則速信上以信有無釋厚薄約現在此以信遲速釋厚薄約過未乃至信之進退邪正等例知非彼等者過在無明有厚薄不是真如成等差過恆河下二約能依二障差別二先所知障等上者意明煩惱數過河沙等之上也等指微塵等言根本上者謂是根本上之枝末也對前根本無明名為枝末對後枝末見愛即名根本迷諸法門事者謂迷俗諦門中諸事法也以不能正知不能盡知故稱無知對下我執見愛此恆沙是法執也粗分者以所知中有二分故一迷理者為細二迷事者為粗今云過塵沙等標其頭數知屬迷事粗分揀非迷真諦理無有分劑之細分也天台號為塵沙惑小乘名為不染汙無知正是此分我見下次煩惱障四住者即六粗之中二也何故不對五意以五意是所依衆生無知恆沙四住見愛是彼所有今取此二二障正障信心及諸二空觀智故偏舉也論文如是疏解亦爾何故二障俱名煩惱以此二障體皆虗妄性喧煩故非是寂靜通名煩惱如是下三結能依所依難了皆依下若據生起即次第而生今此橫論故皆依無明也非一謂二障互為前後差別則等分偏增有殊前後佛了者謂如是本末相依以成前後差別唯佛窮證降此已還各隨其分未能盡知也故前論云依無明熏習所起者非凡夫二乘所覺乃至菩薩究竟地不能盡知唯佛窮了疏云若至心源得於無念則遍知一切衆生一心動轉四相差別二約淨法賴緣成前後差異二初立理二正釋初立理又諸佛法有因有緣因緣具足乃得成辦疏若獨內因不假外緣可如所責然今外假用熏及內正因方得成辦故致前後不可一時故上開二熏習不云一也記若獨等者反縱所難也然今下順通其義也故致下結答用有差等緣有近遠故前後不一時也故上下引證二正釋二初明因緣互闕之失二明性用相應之得初明因緣互闕之失二先顯闕緣之失次明闕因不成先顯闕緣之失二初喻説二法合初喻説如木中火性是火正因若無人知不假方便能自燒木無有是處記木喻衆生火喻本覺正因喻真如無漏法種人知喻佛等知識外緣方便即鑽燧之事喻悲願説法燒木即鑽時先有火起火喻發心修行燒木喻斷煩惱此中若無及不假之言正顯闕緣也二法合衆生亦爾雖有正因熏習之力若不遇諸佛菩薩善知識等以之為緣能自斷煩惱入涅槃者則無是處疏衆生木也正因火性也不遇諸佛若無人知等也自斷煩惱能自燒木也記以為緣者即慈悲願護説法教導合正用鑽燧等入涅槃者合火出木盡灰飛煙滅義也含上燒木言中衆生二句顯因具若不三句明緣闕能自三句結無益上喻例知次明闕因不成若雖有外緣之力而內淨法未有熏習力者亦不能究竟猒生死苦樂求涅槃疏謂無明厚重之流雖本覺內熏然未有力故雖遇善友外緣之力亦不能令其得道記論初句緣具而內下因闕亦不下不成未有熏習力者如濕木之遇繩鑽濕喻貪愛等無明雖有火性而鑽之不生障者亦爾雖有本覺聞法亦不悟解不能究竟者亦有聞法信受暫時發心然鮮克有終不能永久如下所説或有見佛色相或供衆僧或因二乘或學他發心悉不決定或退凡夫二乘之地此如濕木鑽時還有熱氣然不能出火燒木如世間聞法甚衆於中不退信解修趣者實難其人良以內熏力微惑障厚重故也以喻類法昭然可見二明性用相應之得若因緣具足者所謂自有熏習之力又為諸佛菩薩等慈悲願護故能起厭苦之心信有涅槃修習善根以修善根成熟故則值諸佛菩薩示教利喜乃能進趣向涅槃道疏若因下具因緣也能起下明熏益善根者自分也以修下明勝進示示義教教行既得義利具解行故成喜記若因句標內性因外用緣相具足者如乾木之遇繩鑽也所下釋自有熏力因具也為諸佛護緣足也此則揀異二乘等以顯遇真善知識也又佛有二種加義今以慈悲願護是冥加也能起等者由冥加故起信修善也自分者創發其心始修善行此則親賴前之因緣力也以修等者躡前起後也值諸佛者是顯加謂現身説法由顯加故進行證果也然前喻但喻冥加若顯加應如加之以積薪鼓之以烈風則令前木都盡也勝進者若推其本亦是前來內外熏力今約末論並前自分又校一重故示義等者謂示義令解教行令行獲大法利故生法喜斯則自分當信位勝進當解行進趣向即十回向道即地上行涅槃佛果也然善友與行人相值誠難且如世間有欲發心者則不遇真善知識有真善知識則不見發心之人感應道交實為不易如涅槃中針芥之喻并法華中龜木之喻皆顯善友難值今之行者儻遇斯緣聞法解悟豈不思夙植德本而無欣慶乎而不求進乎又不思後世為先業所牽得如今生遇勝友乎宜勉之二用大二初指事總標二約緣別顯初指事總標用熏習者即是衆生外緣之力記用句牒名即下釋義衆生通二一謂所感遇者即三賢初地已上菩薩乃至諸佛起大慈悲智願以為外緣熏習之力經云佛者無上衆生是故佛菩薩皆名衆生二謂能被熏者即是與凡小菩薩而作外緣也衆生外緣揀上自內體相故科云指事二約緣別顯三初標徵二列名三釋義初標徵如是外緣有無量義略説二種云何為二記如是句指廣略説句結略標也云何徵也二列名一者差別緣二者平等緣疏一者為於凡小事識熏習而作於緣謂現形不同故云也亦可與差別機為緣故也謂三賢已上乃至諸佛能作此緣應衆生也二者為諸菩薩業識熏習而作於緣謂唯現佛身平等無二故云也亦可與平等心機為緣故也謂初地已上乃至諸佛要依同體智力能作此緣記為於下先約能應明差別凡小是機為被機故現形不同所謂應以佛菩薩等身得度者即現其身等隨機萬變不可一準以彼事識從境而起不了唯心隨其分別情量令其所見不同此則差別在佛差別即緣也故云者指差別言亦可下次約能感明差別三乘不同已是差別況復各有勝劣之異苦樂之殊此則差別在機緣即屬佛差別之緣也然由機之差別遂令應有差別非謂佛身有異相爾如鏡光是一像異由形也謂三賢下後出差別緣體下説十住菩薩便能現八相化利衆生況其上位豈不然乎為諸下先約能化顯平等菩薩則始從信位終至十地業識者必兼轉現但現一味佛身更無三乘之異故云唯現以此菩薩深解境界唯心不外執定有相故現平等佛身與其為緣此即平等在佛也下云以同體智力故隨應見聞而現作業故云者指平等言亦可下次約所化顯平等同發大心同信大法同解大義同修大行同無退轉故皆平等此則平等在機也不云依於三昧乃得平等見諸佛身持業差別即緣依士差別之緣亦同前説謂初地下後出平等緣體謂登地已去菩薩以無分別智證平等理知一切衆生真如平等無異故現平等佛身應衆生也三釋義二初差別緣二平等緣初差別緣二初總二別初總二先明感用因次正明用相先明感用因差別緣者此人依於諸佛菩薩等從初發意始求道時乃至得佛於中若見若念疏此人機欲之人諸佛等出外緣體發意求道明能感緣機修行時若見若念正明行者之心感用器也謂見其身形念其功德也記差句牒名此下辨相機欲人者此人是樂欲修進之機即諸求三乘人也外緣體者即三賢已上菩薩及佛皆能作此緣故修行時者謂始起猒求修習善根時也於中有發意求三乘道果之異乃至得佛者有二義一者於中有羅漢辟支故云乃至二者此中但説從始發心終至成佛中間所經劫數值遇外緣不能具敘時節故超越之而言乃至也器者喻也方圓大小各有分量三乘勝劣可以類之此則是受道之機器也見形念德如器中之水映月現彩也次正明用相二初差別之用二辨用之益初差別之用二初開總成別二攝別成總初開總成別或為眷屬父母諸親或為給使或為知友或為冤家或起四攝疏一慈愛以攝生二居卑以利物三同類以勸發四怖之以入道五以四攝法攝之記父母等者如釋迦之度羅睺父之力也又度諸母弟姪等眷屬諸親力也又如淨德與淨藏淨眼共化妙莊嚴王亦眷屬之力也彼等宜以此類化度故佛為現父母等身餘意例同給使者即供給走使涅槃經云榮豪自貴我於其人為作僕使趨走給侍淨名云見須供侍者現為作僮僕既悅可其意乃發以道心知友者知識朋友如鶖子之化目連以切磋琢磨共成其器冤家者如未生冤王弒害父母令其獲得果證又如無猒足王以殺事故令衆皆得解脫門四攝者一布施令他附己二愛語為他説法熏成淨種三利行隨彼所行方便利之令善根成熟四同事遇惡同惡而斷彼惡遇善同善而進彼善以此四事隨機曲誘攝令入道然於五中唯第四是逆行方便餘皆順也二攝別成總乃至一切所作無量行緣記若干種心皆須稱可隨時方便難以具陳不能言數故云一切無量如法華説觀音妙音現化等即斯事也二辨用之益以起大悲熏習之力能令衆生增長善根若見若聞得利益故記以起句顯能熏能令句明所熏增長下辨利益善根謂信心展轉能生解行證等枝葉華果故言增長若見者或瞻其形或覩神變如前現其差別形事令彼見者歡喜生善破惡入理四悉檀也乃至一二三四益等故淨名云或有怖畏或歡喜或生猒離或斷疑等若聞者或聞彼教勸令入道或因聞彼所誦經教尋文生解成聞慧故又或聞説自他功德而發善心故云得益二別二初就根生熟開遠近二緣二就前近遠又各開為二初就根生熟開遠近二緣此緣有二種云何為二一者近緣速得度故二者遠緣久遠得度故記此緣指差別緣有二標也云何徵也一下釋也近遠二緣者由障有薄與厚故遂令內熏有力無力由內熏故外值助緣發起善根亦有勝劣由勝劣故令根有熟不熟以此遂成利根鈍根其入道亦有速與遲也二就前近遠又各開為二是近遠二緣分別復有二種云何為二一者增長行緣二者受道緣疏一謂方便行即自分也二謂依前方便正觀相應即勝進也亦可初即四攝利他行後即三空自利行記是下躡前標數也云何依數徵相也一下約義辨名也增長行緣者諸佛為緣為令三乘行人各增自行以入正觀故方便者即正觀之方便也見道已前所修諸行皆是入理之方便故受道緣者三乘行人入見道位已去親證真如名為受道此亦諸佛為緣令其入證也四攝者謂諸佛菩薩為緣增長彼行人行四攝法以利他也三空者謂空無相無願解脫門亦是為彼作緣令其住於三解脫門以自利也非謂諸佛欲為衆生作緣先要內住三空之理故斯二種緣皆依士釋然此二緣若據論意理合遍通因果諸位如未入信前不信因果三寶真如名未受道佛菩薩等以之為緣令彼信受始為道器名受道緣既入信已所修十種信心之行亦假其緣令行增長名增長行緣如未入十解十地佛地等名未受道假其緣力而得受解入證得涅槃等俱名受道若從解位已去修地前行見道已去修地上行佛等為緣令其增長名增長行如八地菩薩得無相無功用故擬入涅槃不進九地佛為此故現身七勸然後發行進入彌速豈非增長行緣耶乃至垂成正覺亦假諸佛為緣也受道增長或先或後二俱通也問是差別緣前疏只配凡夫二乘如何此將為三賢已上耶答秪如疏配何故前論云從初發意始求道時乃至得佛於中若見若念耶應知此差別一緣通為凡夫二乘諸位菩薩也問平等一緣如疏唯配三賢已上未知前信位中亦得有此緣否答若據論意亦可通前以下文云所謂衆生依於三昧乃得平等見諸佛故如十信位正修真如三昧於中見者豈非平等緣耶應知前差別緣不約定中所見但是隨類隨宜現十界身等故名差別若依三昧見平等佛身無分劑相者即平等緣疏中前文且約依識熏習以辨二緣亦一往耳應思之二平等緣二初明能作緣者平等二明對機宜顯平等初明能作緣者平等平等緣者一切諸佛菩薩皆願度脫一切衆生自然熏習常恆不捨以同體智力故隨應見聞而現作業疏皆願度者平等心也熏不捨者常用應機也同體智釋成常用隨應現顯其用相記平等心者九類皆度不揀擇故自然熏習有二一以本悲願常熏本覺不曾捨離二無緣慈悲常熏衆生攝取不捨不待作意故曰自然常用者無作妙用有感斯應也同體智者謂此智與真如體同故又能知一切凡聖染淨同一真故此根本智也下云而現業即後得智釋成常用者亦是釋成平等所以也以真如之性平等無斷無盡故能普度常不捨離此如下信成就發心大願平等方便中説隨應見聞者隨彼菩薩位中所應見者各見佛身及與淨土可應聞者各聞説法示教利喜現作業者謂現大小化身土之業用也此之現身説法皆是起緣熏之用故疏云顯其用相也亦可文中皆願度脫即是令得滅度解脫第一心也一切衆生是廣大心常恆不捨是常心同體智是不顛倒心以有智故無人我相也已上能顯平等緣體隨應下顯用相也二明對機宜顯平等所謂衆生依於三昧乃得平等見諸佛故疏謂十住已去依三昧力悉見諸佛身量平等無有彼此分齊之相記三昧秦言正受不受諸受故即念佛三昧平等見佛即法身佛也以依三昧見佛色身即見法身以不取色分齊相故此即同真如三昧也疏云無有彼此釋前平等可知二合明二初標徵二釋義初標徵此體用熏習分別復有二種云何為二記體下略不言相者與體無二故舉體攝相故此以所起行望能熏體用以辨相應故合明也有二標其數云何徵其相二釋義二先未相應次已相應先未相應一者未相應謂凡夫二乘初發意菩薩等以意意識熏習依信力故而能修行未得無分別心與體相應故未得自在業修行與用相應故疏凡夫等約位舉人以意下明其行劣凡小意識熏菩薩五意熏並未契真如故未得下正明未相應無正體智故未與法身體相應也無證真後得智故未與應化身用相應也記明行劣者意識五意皆是妄心能所分別未稱平等真如但依信力修進而隨順之凡即未入信位菩薩即十信三賢已去此義皆如上妄心熏真如處説未得無分別智心故未與真如體相應者以地前菩薩未亡能所分別故即所起行未與能熏體合也正體智即是無分別心正能會理之智名正體智體即會合義正體即智持業得名若以正體為真如即依主釋法身體即真如也但以約人所説故云法身化身約法所説故云真如體用未得自在業者以證真之後所有起行盡是真如妙用平等之行一一行皆從真起皆稱如理是真體之業用也故云自在業今此位中未得此行故不得與用相應此則所起行未與能熏用合也以能熏用從真體起自在業亦從真起二用若合同是一體名曰相應地前闕此故云未得與相應若至地上即得相應便能與三賢等人作能熏緣也問若然者何以前説三賢起用與小乘等為外緣耶答前所説者但是依於願力及三昧力能起差別緣實未能有自然業用為平等緣耳證真後得智者謂是證真後所起之智故或可此智亦能證真以能重慮緣真作相見道故次已相應二者已相應謂法身菩薩得無分別心與諸佛智用相應唯依法力自然修行熏習真如滅無明故疏法身菩薩顯位也無分別者如理智與體相應也與佛智用相應者以有如量智故得然也唯依下約行勝翻前劣法力者證真如而修行非如前位但有信力自然者八地已去無功用行故滅無明者妄滅行成也記法下初地已上乃至十地皆名法身以得平等智證真如理以真如法為身故如理等者所起行與能熏體合也即上法身是其所合謂此菩薩以法為身人法不異故然如理即前正體之異名能證真如理之智依主釋也諸佛智用者既得無分別心與理冥會依真起行遍修一切自利利他合佛智用二用一體名曰相應此文望前有所不齊前未相應正體後得中各舉一能一所此則於前舉能於後舉所文之巧略互現而已別無他意疏文順解便成義補其理昭然如量智者即上後得之異名如彼彼衆生器量如彼彼俗諦分量悉皆知故證真等者依所證真理為軌則故所行之行皆契真如故云法力但有信力者地前既未契真但能信順緣真修行故非法力地上名真修地前名緣修即斯義也八地下諸説自發心修行已來至此地已經二無數劫自此之後任運相應如下水船不勞篙棹然猶更經一無數劫方至佛果亦可但是地上菩薩證真起行皆依法力皆是自然未必須到八地方説自然也熏習真如等者證真起行還熏真如何有無明而不除滅如日輪發照還照日輪豈有昏暗在中而能違拒哉妄滅行成者謂九相既滅萬行成就萬行成故德備河沙九相滅故妙絶塵纍問地上菩薩亦有智識等四意如何得説相應而異地前耶答相續識是法執分別初地已除故得無分別智與理相契智識雖在但是俱生不障見道又出觀雖有入觀即無況從一地已去分除七地都盡二粗之識既盡妙平二智已成內證外現於何所礙雖殘三細之識以妙智為主不乖相應故論但云得無分別心更不言三細之識由是不同地前事識現行而未相應也四明盡不盡疏即是明染淨盡與不盡之義也記上説染淨各有功能互相熏習成於世間出世間法未知究竟何勝何劣何法有盡何法不盡若俱不盡徒為進修若復俱盡則成斷滅若言一盡盡於何法故此明也中分二初明染法違真無始有終二明淨法順理有始無終初明染法違真無始有終復次染法從無始已來熏習不斷乃至得佛後則有斷記染法不斷者未入十信位前九相熾然六染相續惑業習襲報應輪綸塵沙劫波莫之遏絶故前云一切衆生不名為覺以從本來念念相續未曾離念故説無始無明下云以如來藏無前際故無明之相亦無有始是知無有初起之際然亦無有悟後更迷之人故經云覺迷迷滅覺不生迷如木成灰不重為木佛後有斷者內外熏力發猒求心始入十信苟能止業猶自未能斷除惑染從三賢位方乃覺除直至佛地始得斷盡是知斷字貫通諸位諸位即分斷漸斷佛位即普斷永斷今略下位故云乃至又得佛後斷論文語濫以斷後始得佛故非謂得佛後方始斷故下文云無明頓盡名一切種智前云遠離微細念故得見心性又云破和合識滅相續心顯現法身等此皆滅妄成佛之義是知虗妄之法不能究竟故云有終盡也二明淨法順理有始無終淨法熏習則無有斷盡於未來此義云何以真如法常熏習故妄心則滅法身顯現起用熏習故無有斷疏淨法下一正顯也此義下二釋成也以真熏妄滅淨用無盡故記正顯者亦是標也此淨法中通於因緣體用常熏習者即內因體相熏習也妄心滅者以真熏有力減却無明能起行對治妄心則滅成淳淨圓智也法身顯現者以所熏妄心滅故能熏體相顯現即破和合識內生滅之相顯此不生滅體也即在纏如來藏至此顯處名為法身即前究竟覺智淨相法出離鏡得涅槃等是也起用熏習者法身既現即能起自然業用應化衆生此即用熏習義便成差別平等二緣即前不思議業相緣熏習鏡成自然業等也故無斷者即三身並常也不斷即常義今茲實教但説二身相即無礙豈得不常然科云有始者亦一往約用熏義説耳若準體相熏習即無有始故文云以真如法常熏習故前云從無始來具無漏法備有不思議業作境界性等次云非前際生下云以如來藏無前際故今且形對妄法權作此科不可定執同不了義也二辨所示之義疏即明前法有顯義功能問何故真如門中不辨所示義生滅門中具辨所示三大義耶答以真如門中即示大乘體能所不分詮旨不別故不別辨生滅門中染淨不一法義有殊故具説三上立義分中真如門內云即示生滅門中云能示釋義在此也記前法者即指前科生滅心法也既具明染淨法相生滅不同此生滅法遂有顯於三大功能故今指之也問下具如立義分中詮旨者詮謂能詮即顯了義説文云詮者具也謂具説事理故今此真如一門門為能詮體為所詮既目門為真如真如即所詮旨故門之與體無二無別也法義殊者即一心三大法義也此等皆如立義分中已説文二初釋體相二大二別解一用大初釋體相二大二初總標二大名二別釋二大義初總標二大名復次真如自體相者疏體相謂體大相大也記立義分云能示摩訶衍自體相用又云所言義者則有體相用三種大義故此牒云自體相者二別釋二大義二初體二相初體一切凡夫聲聞緣覺菩薩諸佛無有增減非前際生非後際滅畢竟常恆疏一切下人雖就位以分優劣真體隨人未曾增減也非前際常也凡位為前非後際恆也佛位為後此三句皆顯不增減所以記一切通凡及聖凡夫謂六凡界即一切異生聲聞下即四聖界此顯平等真如從凡至聖若大若小若因若果一體無異凡迷未曾減聖悟未曾增小大因果例然又染起不增障盡不減又用隱不減德顯不增也然此體大遍通情器故經云一切因果世界微塵因心成體今且偏就有情言也記優勝也謂諸佛最勝凡夫最劣中間相望通於勝劣真體等者謂性德正因其猶太虗雖茅室紺殿有殊其中虗空豈有別異故心經云是諸法空相不生不滅不垢不淨不增不減凡位等者明此法體非謂於前凡位中從無而有亦非於後佛位中從有而無也然至而論之其實凡位與真如俱無前際非謂凡夫即有前際真性無前際佛位亦然故下文云以如來藏無前際故無明之相亦無有始以如來藏無後際故諸佛所證涅槃與之相應則無後際亦可不約位言但云窮於過去非有前際而生起也鞠於未來亦非有後際而滅盡也際時也此則不無前後際但是顯真體不於前後際中生滅也過去迷倒位不見其生真常久也未來悟證後不見其滅實恆永也又常恆一義也疏中別配亦一往耳皆顯等者亦可不增減非生滅皆是顯常恆所以又不生不滅方是不增減畢竟常恆若有生滅則有增減非是常恆又常恆句是顯不垢淨也謂在纏不垢出障不淨若不然者即有變異豈曰常恆又如故無增減真故不生滅後句總結也又此三義即是前文畢竟平等無有變異不可破壞也如次對之二相二初正顯性德二問答重辨初正顯性德二先明德相次顯立名先明德相三初總二別三結初總從本已來自性滿足一切功德記顯無有始故云從本已來揀非體外故云自性明無欠少故云滿足意在普該故云一切功能德業故云功德二別所謂自體有大智慧光明義故遍照法界義故真實識知義故自性清淨心義故常樂我淨義故清涼不變自在義故疏一本覺智明二本覺顯照諸法三顯照之時無倒四性離惑染五性德圓備六性德無遷記大智等者此有通別通則智即是慧光即是明又智慧即是光明別則以義目之名智慧以相取之曰光明智即是體慧即是用光即體之相也明即用之相也如摩尼珠體有光明以自瑩曰光照物曰明遍通凡聖名大依法所顯曰義復言自體者顯是即體之相無二別故疏云本覺智明揀非始覺慧光亦但取通意爾遍照等者即始覺也法界有二謂理及事始覺照理即如理智始覺照事即如量智理量齊鑒故云遍也疏云本覺者就體而言也即彼本覺顯照義邊便名始覺始覺之體元是本覺故真實等者依根所發了境義邊名為識知了如理事永離諸過故云真實疏無倒者即離四倒及餘執計也自性等者非假他緣故云自性在纏不染故曰清淨諸法中實乃名為心疏云離染謂性本離染自來無惑者也常樂等者常謂窮三際而無改樂謂在衆苦而不干我謂處六道而莫拘淨謂歷九相而非染此自性涅槃之四德也疏圓備者諸德雖多不過此四以此四法收一切德故性德揀非修德也清涼等者無惑之熱惱故曰清涼此顯般若也無報之生滅故云不變此法身也無業之繫縛故曰自在此解脫也即離三障成三德爾疏云無遷舉三中之一義耳三結具足如是過於恆沙不離不斷不異一思議佛法乃至滿足無有所少義故疏不離者性德塵沙不離真體不斷者無始相續不異者與體同味不思議者即不異而有恆沙之義故佛法者唯佛窮達故亦可是所覺法故乃至下若此真體無性德者如來證此不應具德既證性已萬德圓滿即驗真如本具也記過河沙者上但略顯不能具載故今總結以顯廣多也不離謂隨舉一德全攝真性及一切德不斷謂無始無終不異謂真如即德德即真如上不離如手不離腕果不離樹揀非樹不離地之不離也此不異如甜不異果醎不異水海水本來醎非水中安醎者比揀非水不異乳水中之乳亦不相異之不異也又四句揀之一離而不異如羣器盛水二異而不離如和合丸藥三是離是異如風馬牛不相及四非離非異如紅蓮華香味不思議者即一性而有多義即多義而全一性不可以定量所得心行處滅言語道斷也疏云即不異者三中舉一義以影顯之佛法者佛即是覺意明上之功德盡是本覺之法故金剛云一切法皆是佛法疏唯佛等者約始覺釋佛字謂佛是始覺之極法即前諸功德顯此諸法非因位而究了故佛之法也所覺法者約本覺釋佛字佛即法也義如前釋越彼河沙故云乃至滿足即無所少意云乃至過河沙數義理悉皆滿足無所欠少也疏若此下以修顯性此反顯也既證下順釋如海有寶餘人不知涉海者既獲傍觀豈不信乎次顯立名名為如來藏亦名如來法身疏如來藏者隱時能出生如來法身者顯時是萬德依止記如來藏具有三義一隱覆義二含攝義三出生義廣如前説隱時等者似當初後二義隱故名藏此則如來自隱不現也又因地能生果地功德故名藏也如來法身者若以應身為如來即依士釋若以真身為如來即持業釋然其身者亦具三義一者體義真如自體任持不失故二者依義為彼報應之所依故三者聚義一切功德之所集故故唯識云體依聚義總説名身顯時等者即後義謂萬德名法依止名身然德有修性若約修説即屬報應成依止義也若約性説即此法身是聚集義也其體之一義當於前段體中故此不言也問法身既屬無為且非積聚何言聚耶答功德既是無多之多何妨聚即無聚之聚斯皆義説圓回無滯非實法聚有可揀也二問答重辨二初執體疑相難二相不違體答初執體疑相難問曰上説真如其體平等離一切相云何復説體有如是種種功德記上説下躡前也前門中云從本已來離言説相離名字相離心緣相畢竟平等無有變異不可破壞唯是一心故名真如云何下起難也前説離相平等今説功德差別前後矛盾其義安在又此疑難亦可就上體相二文及前立義分中體相二大生起體中何其離相無增減無生滅相中何其具德過恆沙無所少耶二相不違體答二初明雖差別而不二二明雖不二而差別初明雖差別而不二答曰雖實有此諸功德義而無差別之相等同一味唯一真如此義云何以無分別離分別相是故無二疏雖實下實德雖多同一如味此義云何者謂多德何以唯一耶以無下釋也非能分別非所分別無能所故記答中二先正明雖實等句縱存後之差別相也而無等句不違前之平等義也等齊也即指差別之法同者諸法無性唯一真體一味喻明如水之八德一味無差一真法説謂體與相總之唯一真如心性此則法喻兼明也此義下次轉釋二先徵難以無等次釋通非能者無有體之能分別也非所者無有相之所分別也故前文云心滅則種種法滅無能所者由前心境並亡體相不異故得差別即無差別等同一味真如性也二明雖不二而差別二初略二廣初略復以何義得説差別以依業識生滅相示疏復下既其不二何以説別耶以下謂以依生滅識相恆沙染法反此表示真如淨德恆沙差別且舉染本故但云業識記初二句徵難既其等者既而能所俱亡遂令一體無二者如前差別之相畢竟依何建立而為説也次二句釋通以依等者前云是心生滅因緣相能示摩訶衍自體相用故能顯既多所顯亦廣俱喻河沙也且舉下難云對恆沙染法説恆沙淨德何故論文唯舉業識故疏釋云舉本則末自彰也攝恆沙染法可知二廣二初問對染法表示之相二舉彼染法一一對顯初問對染法表示之相此云何示記此業識相云何反之表示真如淨德過恆沙耶二舉彼染法一一對顯以一切法本來唯心實無於念而有妄心不覺起念見諸境界故説無明心性不起即是大智慧光明義故若心起見則有不見之相心性離見即是遍照法界義故若心有動非真識知無有自性非常非樂非我非淨熱惱衰變則不自在乃至具有過恆沙等妄染之義對此義故心性無動則有過恆沙等諸淨功德相義示現若心有起更見前法可念者則有所少如是淨法無量功德即是一心更無所念是故滿足名為法身如來之藏疏以一切下舉所迷理記論文分三先舉理體即真如之理義具真如門是答其不二義也疏而有下依真起妄謂細粗染心本末不覺也將欲釋淨先舉其染對以顯之下諸句例然云何顯耶下云不起等是顯也既起念即是不覺無明故不起即是本覺智明記次對顯相謂對恆沙生滅染法以顯恆沙功德淨相即答其而差別之義也於中二先別為翻配八重德相八初無明智慧對妄心者即前不如實知也不覺起念即前不覺心動名為業相見境界即前轉現相此之三相即是無明阿梨耶識又見諸境義寬亦通四粗故疏云細粗也依真下即生滅之相義具前文將欲下釋其意淨因染得故須然也真如門無染可對故無示義此生滅門染淨既分故須翻對以顯相大諸句例者下七重等隨文可見云何顯者牒難也下云下舉釋也心不起者不起念也若依疏意此二句即滅妄顯真下諸句例知既起下如前云一切衆生不名為覺以念念相續未曾離念若得無念者則知心相本來平等同一覺故故念即不覺不念即本覺也疏若心下不見妄見不周也遍照真照圓明也記二局見普照對不周者如人見東不見西近遠內外明暗等亦爾經云衆生洞視不過分寸以存能見心故故於諸境有所不見也圓明者以無見故無所不見故肇論云般若無知而無所不知初地得名真見道者以不存能所見故疏心有動者反之即顯真如無動記三妄識真知對非真識知者動則不如實知故非真也疏文亦略若具應云心動非真識知者反之即顯真如無動是真實識知也何者以心無動故則所知真實真實者離偽妄故又準上論文應補反顯文云心性無動是真識知論存略故但舉能對之妄也又從此已下至不自在一一文初應合皆有若心有動之言仍於本句之末更云心性無動等皆隨句翻對例此段思之疏無有自性明妄染無體反之即顯自性淨心記四無性有體對妄染無體者依真妄動何有自體淨心者心無動故離緣獨立獨立之體本來無染斯則不逐緣生不因境起故云自性清淨心也疏非常下明妄染四倒反之即顯真如四德記五顛倒真正對四倒者即無常苦無我不淨心動故起於有漏色心有漏色心實非常等凡夫計為常等故成四倒反之等者以不動故色心不起以不起故唯真如性常住清淨自在安樂故成四德疏熱惱者諸惑燒心是極熱惱故説真如是清涼也記六熱惱清涼對諸惑者由心動故起於貪瞋等惑煩惱熾然故成熱惱清涼者心不動故即是真如真如無惑即非熱惱既無熱惱故曰清涼疏衰變者妄染遷改反顯真如不衰變也記七變易凝然對妄染遷改者以心動故起於九相九相生住異滅老病死等故成衰變反顯等者心不動故即是真如真如之中本無九相生滅遷改故云不變也疏不自在者業果繫縛故則顯真如自在上云清涼不變自在義故記八繫縛自在對業果等者由心動故起業受報墮五趣中名為繫縛真如自在者心不動故即是真如真如之中無有業繫故云自在上云等者以此段中皆舉能顯妄染以對顯前淨德論文略故不具列之故今疏中略指後之三義也前諸句例知疏乃至具有下一一翻對故染淨皆過恆沙記次總為翻配恆沙滿足二初恆沙法既過河沙不可具述故云乃至沙等妄染總舉諸染法也對此義者河沙染法心動故成心不動時諸淨功德亦過沙數諸淨等者即指真實識知已下諸義及等餘外一切不思議佛法也一一翻對等者以心性動與無動反覆明諸染淨今要省文故以若心有動在前心性無動居後所顯諸法攝在中間於中又闕淨德之目若欲一一別對令人易解者應云若心有動非真實識知心性無動即是真實識知義故乃至若心有動則不自在心性無動則得自在如前疏文逐段反顯是也若更取類言之復應云若心有動即是繫縛心性無動則名解脫他皆倣此不可具言然前八對初之兩段各約別義言起念起見斯亦不出心動之義若欲各舉別義者真實識知等亦有別義應云心起分別非真識知心離分別即是真實識知義故乃至心起業果則不自在心離業繫即得自在等但將九相如次配對八重義無不合初起念即業次起見即轉分別境即現乃至熱惱即合執取計名二相衰變即業謂心若起業則有遷變心性離業即無衰變當知心動義通餘皆是別也如理思之疏有所少者妄心外念求之不足故故滿足者淨德性滿無假外求故記二滿足義前云乃至滿足無有所少故此亦對妄染以翻顯也妄心等者若於心外見法而生追求終不能足却有所少亦可若有一法在於心外是可念者則性中功德有所欠少如人於他求物當知家間所無淨德等者以心性無外故一切功德皆悉具足則可忘懷以契之不可起心而求之當知有所見者皆是虗妄以從分別生故此意顯異權宗所説佛果無漏功德並是修生今此論宗但即修顯不説修生性中本自有故金銀生像可以喻之疏名為下結名記後結得名雙約因果如前所明彼恆沙染法以依業識生滅相示此恆沙淨德皆依真如法身如來藏性翻對表顯故此結之以彰體相實不違也音釋恬音甜憺泊也安靜也阿陀那此云執持第八識名瀑音抱僕飛泉懸水也琢音祝治玉石者叛音伴反亂也寇音叩賊也囹圄音陵語牢獄也刑戮音形六殺也妍音延美好也音癡醜惡也愈音喻痊好也諭音遇曉示也咨音咨謀難也詢音荀徵問也轍音徹輾迹也輟音拙止歇也燧音遂取火之木磋音蹉磨治也治骨角者未生怨阿闍世王也事出涅槃及觀經無厭足王名事出華嚴劑音際分限也篙音高撑船竹篙棹音掉進船具船旁撥水者也即櫓名襲音習承嗣也遏音曷止絶也紺音甘青赤色瑩音榮信照徹也光潔也腕音宛手腕風馬牛不相及牛走順風馬走逆風喻南北相去離遠出左傳矛盾音謀鄧矛鎗屬盾甲屬昔有兼鬻二器者售矛則曰可以破堅盾售盾則曰可以禦利矛故名自相矛盾以喻自語前後相違倣音訪效也
