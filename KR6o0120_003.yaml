body:
  text: 唐西京太原沙門法藏述疏終南草堂沙門宗密録注宋秀州長水沙門子璿修記清錢塘慈雲沙門續法會編順天府府丞戴京曾閲定二正述論文二初標益起說二正陳所說初標益起說論曰有法能起摩訶衍信根是故應說疏論者揀異經律法者一心二門三大即所說法體能起句題目正依此立也摩訶衍此云大乘謂約心真如門信理決定約心生滅門信業果不亡約三大中信三寶不壞信根者謂信滿入住成根不退根有二義一能持義自分不失二生後義勝進上求故應說者論主思惟見此勝益是故須要說也記一心等者論中所說道理雖多正宗法義不逾於此故立義分中特立此等以為根本也能起下論曰能起等者大乘法是能起信根是所起也大乘之體是一心等法若依此法而起信者名大乘信如前開題處說疏曰題目等者題云大乘起信此云起大乘信但左右之語無別異也信理決定者以真如門中但唯顯理理體真實故云決定決定即不生不滅非有非無畢竟平等無有變異不可破壞為一切法平等之性不增減故信業果者業果通於染淨若無明為因生三細境界為緣生六粗即是世間染因果不亡始覺反流翻九相成四位即是出世淨因果不明隨流反流定有此事如影隨形必然之理故云不亡亡無也三寶等者以有體相二大故信法寶不壞以有用大故信佛僧不壞不壞亦即決定不亡之義然疏不說信一心者以二門三大即是心之行相但信於此即是信心故不言爾信滿入住者謂自外凡之內凡既離毛道信則決定不失不壞故云成根不退能持等者謂能任持前之信力自分不退故譬植草木根成必活生後等者信既成就即能生長後位功德漸漸勝進行向地等果故如草木成根漸生花果然大乘中信之為要具有六喻一如手華嚴云如人有手入寶山中自在取寶有信亦爾入佛法中自在取於無漏法財二如師子筋絃其聲一發一切諸絃皆悉斷絶若人發一信心一切惑障悉皆消滅三如師子乳或以一滴投餘乳中悉成清水若人發一信心一切惡魔悉皆變成清淨法流四如世間財能養色身壽命信財能養法身慧命故七財之首名曰信財五如根如前所辨六如力有力能伏剛硬強盛信力能摧惡不善法故五力之中有信力也今言根者即當第五須要說者謂聖人利見理宜說法若不說者違本誓願如何名為大慈悲人求正覺者法門既塞苦趣道開茫茫羣生飄流何息二正陳所說二初標列二牒釋初標列說有五分云何為五一者因緣分二者立義分三者解釋分四者修行信心分五者勸修利益分疏言不自起製必有由名為因緣章別餘段故名為分由致既興次宜略標綱要以為宗本宗要既略次宜廣釋令其生解次宜依解起行有解無行如貧數他寶是所不應雖示行儀鈍根懈慢次宜舉益勸修也然五中初一是序分次三是正宗後一是流通記起有由者表異常人多率爾故由即因緣也分義皆同故下不釋綱要者網上大繩曰綱能持一網故云要也宗本者凡有所為必須據本若無其本末從何生將欲廣陳故略標本宗要既略者欲張其本故攬廣以成略欲生其解故展略以為廣謂於真如門明離言依言空義不空義於生滅門說染說淨辨因辨果隨流反流是本是末令不迷真妄正解無謬也依解起行者分別諸法令解不謬者所謂要起修行故也由行成於前解由解導於所行令解不成乾慧令行不成邪倒解行相濟有所至焉故須行也如貧數寶者是華嚴經喻餘後頌云自無半錢分於法不修行多聞亦如是意云本所解者意在修行既不修行解將何用如人有目無足豈至前所行儀者四信五行等即修行之儀軌也舉益勸修者佛所說經尚多激勸菩薩造論得不然乎然五下合五為三若據大疏有其三說一約論主謂歸敬述意是行起所依為序分中間五分是所起行法為正宗後回向一偈是所起大願為流通此即約一論前後始終而對三分二約法說即不取前後二偈但約中間五分以判初是法起因緣為序分中間三分是正顯所說為正宗末分是歎法功能為流通三約法所益機說初舉所為機心為序分中間三分正受解行為正宗後之一分舉益勸修為流通後之二說但就中間五分約能被所被人法之異今疏所用是後二說也二牒釋五初因緣分至五勸修利益分初因緣分二初正釋二通難初正釋三初標牒二假問三舉答初標牒初說因緣分二假問問曰有何因緣而造此論記假問者一自作問起假為他故二實非有疑假作疑故以自問自答意令法義明了顯現故如此問也三舉答四一標數二徵起三詳釋四總結一標數答曰是因緣有八種二徵起云何為八三詳釋一者因緣總相所謂為令衆生離一切苦得究竟樂非求世間名利恭敬故疏此門通與一部論為發起之由故云因緣總相總通兼正下七則別為當機苦者苦苦壞苦行苦分段變易二生死苦樂者無上菩提覺法樂無上涅槃寂靜樂非求者非欲令其求於後世人天利樂等亦可論主自云我為益生故造斯論非為名利等故云總相記此門等者一部論文發起之意只為衆生離苦得樂此即總相明因緣也又凡諸菩薩有所作為皆為衆生離苦得樂此則非但就此一論為發起因由乃與一切論作發起因故云總相總通兼正者此即約所為機說兼被正定邪定正被不定今既合論故云通也別為當機者一則向下七段為機各別如七中第二第三為正定餘為不定聚者故云別為二則但為二聚之機不被邪定之者故云別為不同此段總為一切皆令離苦得究竟樂也斯則約法即發起一切論文約機則利樂一切羣品由是故名因緣總相苦苦者上是總報苦身下是別別苦事受有漏身已名為苦於上更加種種逼迫故名苦苦即生老等八是所加也壞即樂事已謝行即念念遷流故皆苦也準寶性論觀三界為三苦謂欲界苦苦色界壞苦無色行苦然於中欲界具三色界兼二無色唯行分段者謂三界四生身有形段命有分限時極必終也變易者謂二乘菩薩斷煩惱障者雖離分段粗苦猶有黎耶變易行苦以四相所遷轉變改易故名變易又因移果易故名變易無上等者謂轉滅煩惱生死得此菩提涅槃一得永得故論云究竟更無過者故疏云無上既其大患永滅超度四流業惑並亡適然自得不亦樂乎然上令離苦是菩薩大悲此令得樂是菩薩大慈至覺之心於焉備矣非欲令下約所化能化兩說在文可見二者為欲解釋如來根本之義令諸衆生正解不謬故疏與立義分及解釋分中顯示正義對治邪執作發起因緣以彼文中說依一心法有二種門各攝一切法即是如來所說法門之根本又生滅門中本覺名如始覺名來始本不二名曰如來此即所證本覺真理名如能證無分別智名來諸衆生未有無分別智時是如無來也今以如來依此心成故名此心為如來根本之義具釋此義令彼地前三賢諸菩薩等比觀相應故云正解即顯示正義也比觀離倒故云不謬不謬即對治邪執也記疏文二初釋如來根本二初總配下文與立義分者盡此一分論文皆為所起然此分中若克的配文止可齊於三大之處從一切諸佛下明其乘義合是第三因緣所起疏不指者蓋略故爾顯示等者從此分初文云顯示正義者依一心法有二種門去至若能觀察知心無念即得隨順入真如門對治等者文云對治邪執者一切邪執皆依我見若離於我則無邪執乃至以念一切法令心生滅不入實智故此則正顯此第二條因緣為能發起如適所引三段論文為所發起為欲解釋如來根本之義令諸衆生正解不謬故有此第二因緣文能所之說下六條因緣文皆例此以彼下二別釋今義二初約教法釋如來根本以二門是諸法之根本一心是二門之根本彼文之中正明此義佛說法門雖則無量究其根本無出於斯此乃馬鳴菩薩解釋化身釋迦如來所說法門中深奧根本之義也又生下二約證法釋如來根本二初釋如來二先正釋迷時背覺合塵是如去雖名為去而體性不動故受如稱即本覺也悟時背塵合覺名如來以如體上有淨用起反染歸淨名之為來即始覺義真如體一來去隨緣故取本覺名如始覺名來始本不二者即究竟覺也究竟覺者即如與來合無始本異名曰如來如下文云若得無念者則知心相生住異滅乃至無有始覺之異以四相俱時而有皆無自立本來平等同一覺故此即下上消文此結判故轉法輪論云真諦名如正覺名來正覺真諦名曰如來此即約自受用報身名如來也非同前文約化身說此二解中前約教則如來之根本依主釋也以能說者勝故此約證即依士釋心為根本能生如來故思之可解諸衆生下次反顯以雖有本覺而無始覺故不得名如來斯則如義寬通來義局狹故淨名云一切衆生皆如也衆聖賢亦如也至於彌勒亦如也而不言來又地前雖有始覺以比觀修行未造真理未得智無分別不名如來地上雖有此智以障纍未盡觀心有間始本二覺未得究竟冥合亦無斯稱以此推之唯妙覺一人餘皆不可然若約性德則無此揀故圓覺云衆生本來成佛又云一切障礙即究竟覺今約修論故有此說今以下二結根本即指前之一心為如來所證法之根本也良以如來依此一心而成就故是則信解行證皆依此心從微至著未嘗離此若離於心得成佛者無有是處故華嚴云若人欲了知三世一切佛應觀法界性一切唯心造故名等者然則如來即一心一心即根本三義一體方為至說但以據法名心對末稱本約人所說即號如來究體則一列義成三非三而三不一而一三一一體乃會玄文具釋下二釋正解不謬也具釋者謂於中明真如生滅二門始本二覺本末二不覺二身三大乃至二門不二等義此義盡是一心根本上之行相也三賢者謂鄰真故前異凡夫後異聖人賢者善也順也此三十人皆積善所成順於真理故受斯稱比觀等者既未親證真如但能依教比擬觀察由是隨順不相違反故云相應即此比觀便名正解以地前屬解行位故為生正解故有顯示正義之文也離倒者以正解相應順真如理無諸邪僻也以離倒故即名不謬不即對治謬即邪執也三者為令善根成熟衆生於摩訶衍法堪任不退信故疏即下分別發趣道相也以彼文中令利根者發決定心進趣大道堪任住於不退位故此當十信終心自分滿足故云成熟進入十住正定聚中使前信心堪任不退記分別等者文云分別發趣道相者謂一切諸佛所證之道一切菩薩發心修行趣向義故乃至心若有垢法身不現故此正指配也以彼下釋所以下皆例之彼文云如是信心成就得發心者入正定聚畢竟不退名住如來種中正因相應故終心者十信一位有三種心謂入住終入謂始離異生入初信位終謂信心成滿即第十信也住心即中間八信十信既爾餘住行向等例皆如此成熟約現在十信終心說不退望未來十住入心言今為信成熟者稟於分別道相之文入不退故四者為令善根微少衆生修習信心故疏即下修行信心分初四種信心及四種修行也以彼文中令信未滿者修行信心使滿足故此當十信住心以信位未滿故云微少令進向滿故云修信心也記四種信心者下文云略說信心有四種云何為四一者信根本所謂樂念真如法故二者信佛有無量功德常念親近供養恭敬發起善根願求一切智故三者信法有大利益常念修行諸波羅蜜故四者信僧能正修行自利利他常樂親近諸菩薩衆求學如實行故四修行者下文具明五行謂布施持戒忍辱精進止觀故文云修行有五門能成此信等以止觀一門別是第六因緣所發故言四種以彼下釋所以彼文云是中依未入正定聚衆生故說修行信心等十信住心者雖有八種不同更不分析通為住心也微少者即信心未熟也令向滿者謂令稟此文習前信行進向滿故五者為示方便消惡業障善護其心遠離癡慢出邪網故疏自此下四種機當信位初心以前三根勝難退不假多方便助成道力故各一此中根劣易退賴多方便故有四也四中前三為下中上三人後一䇿以勸修記初都科後四段文三先總判也四種者即指此下四段論文初心即入心也以前下次通疑也或難曰前之三根各攝論文一段何以信心初位獨用四文故此通之前位漸深望於初位故名根勝信根欲成縱遇惡緣亦少退屈故云難退然亦未必一向不退故云難也如鶖子入六住猶自退轉況十信耶根劣者謂始自異生初登信位善根微薄不異輕毛遭善難進遇惡易退故假多方以助道力由是具四也四中下後別判也只此一類劣機復有上中下異今以第五為下根第六為中根第七為上根第八總䇿勸也問據前次第皆自勝之劣何以此後却從劣向勝耶答勝根菩薩據尊卑以列之退位有情念劣者而先救故為此次由是前顯菩薩之智後彰菩薩之悲也疏今初當下品也即下修行信心分中第四修行末文是也以彼文中令業重惑多者善根難發衆生以禮懺等方便消惡業障障輕故內離頑嚚癡慢外出邪魔罥網記今初下二別釋此一文修行末文者彼文云復次若人雖修行信心以從先世來多有重罪惡業障故為邪魔諸鬼之所惱亂或為世間事務種種牽纏或為病苦所惱有如是等衆多障礙是故應當勇猛精進晝夜六時禮拜諸佛誠心懺悔勸請隨喜回向菩提常不休廢得免諸障善根增長故業重者文云重罪業障惑多者文云衆多障礙善根難發者即三障既重善不易生如鑽溼木豈即有火宜應曝以風日出以浸潤假以繩鑽引以茅艾則其火可庶幾矣故云禮懺等也內離等者由禮懺故業輕業輕故內無惑惱內既離惑外魔自消外魔即報障也故知外有障惱皆由內有惑業今之行人作善多阻為道不迭蓋內心之所感也莫嫌影曲但責形凹如勤修治必能出離左傳云心不則德義之經為頑口不談忠信之言為嚚今但通取一向癡暗慧解不生為頑嚚也六者為示修習止觀對治凡夫二乘心過故疏當中品也即下第五修行止觀門以彼文中雙明止觀遣凡小二執故云對治也記止觀者文云云何修行止觀門所言止者謂止一切境界相隨順奢摩他觀義故所言觀者謂分別因緣生滅相隨順毗𥁊舍那觀義故乃至若止觀不具則無能入菩提之道雙明等者彼文云若修止者對治凡夫住著世間能捨二乘怯弱之見若修觀者對治二乘不起大悲狹劣心過遠離凡夫不修善等七者為示專念方便生於佛前必定不退信心故疏當上品也即下修行信心分末復次衆生初學是法下勸生淨土門等以彼文中舉勝方便令彼觀解分得相應衆生恐後報遷遇緣成退故令往生使不退也記勸生等者文云復次衆生初學是法欲求正信其心怯弱以住於此娑婆世界自畏不能常值諸佛親承供養懼謂信心難可成就意欲退者乃至常勤修習畢竟得生住正定故勝方便者文云當知如來有勝方便攝護其心謂以專意念佛因緣隨願得生他方佛土常見諸佛永離惡道等觀解等者文云若觀彼佛真如法身畢竟得生住正定故既觀法身即是作真如觀觀佛純熟分得相應也後報等者以衆生夙業無量今雖發心修行其力微劣難敵強惡恐此報盡仍逐故業隨生諸趣如人負債強者先牽此報命終未知所往或經多劫遍歷三途縱得人身尤拘緣障或蠻貊受質貧窮處身或諸病所纏六根不具或王事迫己塵羈在躬或少小無知強壯凶勇方知樂善已是衰年雖悟非常難任進向況真法罔值善友莫逢縱遇此緣根性多昧儻是上智易悟法門縱辨宣揚巧開人意熾然惡習任運繁興積善既微強惡難免脫然墮落又是輪回如蟻循環何當斷絶菩薩觀此深動悲懷若非方便無能垂救故論云有勝方便攝護其心故云恐後報遷遇緣成退也往生等者文云如修多羅說若人專念西方極樂世界阿彌陀佛所修善根回向願生彼世界者即得往生常見佛故終無有退等此意欲令衆生專意念佛欣求樂欲生彼國土凡所修善盡將回向乃至有人無惡不為但能臨終至心十念乃至一念成就即得往生生彼國已見佛聞法任運修進直成菩提無諸惡緣令其退轉故云使不退也八者為示利益勸修行故疏即下勸修利益分也以彼文中舉彼損益勸物修捨即總䇿成前諸行也記勸修等者文云已說修行信心分次說勸修利益分如是摩訶衍諸佛祕藏我已總說乃至云未來菩薩當依此法得成正信是故衆生應勤修學舉彼損益者文云若有衆生欲於如來甚深境界得生正信遠離誹謗入大乘道當持此論思惟修習畢竟能至無上之道乃至云此人功德無有邊際斯舉益也又云其有衆生於此論中毀謗不信所獲罪報經無量劫受大苦惱斯舉損也修則但應仰信如說而行捨則不應誹謗免招大苦總䇿等者據前疏所判即但䇿信位初心三根之行若更以理詳之無妨兼前三賢已下總而勸䇿則於八因緣中第一第八皆總相第一總利羣品第八總䇿勸修中間六段各別所為如前所配四總結有如是等因緣所以造論記結也可知二通難二一難二通一難問曰修多羅中具有此法何須重說記具有等者如勝鬘經云自性清淨心染而不染難可了知不染而染難可了知此豈不是一心二門之義乎況二門即是真俗二諦二諦何經不說豈假論主第二因緣而發起耶如圓覺經中說信等四位豈非分別道相之義乎況其從因至果入道行位諸經多說何須第三因緣所起如華嚴云菩薩發心求菩提非是無因無有緣於佛法僧生淨信以是而生廣大心此豈不是信三寶耶況復令信三寶何經不說又如華嚴具說十地菩薩行十波羅蜜行豈唯施等行耶況施戒等是經皆說豈用第四因緣發耶道場禮懺等事經中具明又普賢行願中說十種行願此豈不是消障之方便耶亦不須假第五因緣又如華嚴云譬如有力王率土咸戴仰定慧亦如是菩薩所依賴定慧即是止觀又淨名經中說佛法身從止觀生何用第六發起緣耶如阿彌陀無量壽等經具說往生淨土之事況諸經中亦多引說亦不假其第七所起如勸讚修進勉勵慵惰是經則說何假第八不難破第一者是七因緣總相破別即破總故如是則佛經已具菩薩更明豈非繁重耶菩薩見義則行無益且止重說佛經有何義利為若此耶二通二初縱問略標二以義具釋初縱問略標答曰修多羅中雖有此法以衆生根行不等受解緣別疏中雖有者縱其問辭也根不等者或利或鈍樂廣樂略假經假論之殊也受解別者遇佛遇教之異也記或利鈍者即根不等根謂根機有利鈍故樂廣略者即行不等行謂意行所欲不同故假經即利根尋經便解不待解釋故假論即鈍根於經未曉須待論說故若其樂廣樂略之言通於經論有樂廣經而得解者有樂略經而得解者於論亦爾此乃於利鈍中各有所好不同然根不等則局於經論中各附一事故行不等則通於經論中各樂廣略故然此但約解佛意不解佛意以明利鈍不須更約文持義持細作利鈍解釋智者應思受解緣別者受謂信領教法解謂開悟佛旨遇佛教者謂與佛有緣則從佛受化生解與教有緣則遇教受化生解也此則但約於彼生解不生解說有緣無緣亦不約有見佛等細論之如佛世諸羅漢等親從佛聞而證道果此是遇佛有緣者如天親等但遇其教而得開悟此則遇教有緣者故云緣別然若據論意但約於經於論明受解緣別不須更約遇佛等說以前論中所問佛經已說何須更論今文乃是總答前問下方別釋也論意云經中雖已具說其如衆生根性利鈍不同意行好樂有異信受教法開悟聖旨因緣別故若是根利又於佛語有因緣者則樂於經而便信受得悟聖旨不須更論若是鈍根又於經無緣但於菩薩語有緣者即樂造論解釋方曉佛意故云別也根行緣三既而有異何妨經外別造論耶豈非此文已是總答訖歟疏中遇佛謂遇佛經也應上假經遇教謂遇菩薩論教也應上假論如斯意旨覽者須善會焉二以義具釋二初明餘機不假此論二明當機須造此論初明餘機不假此論三初勝機遇佛悟二自力聞經悟三劣機因尋廣論悟初勝機遇佛悟疏佛時尚無紙素之經何況須論記遇佛悟無紙墨者佛在世時但說而已滅後結集方始有經當時機勝聞說便悟尚不假經豈要造論所謂如來在世衆生利根能說之人色心業勝圓音一演異類等解則不須論疏如來世時勝衆生利根勝說人業緣勝圓演顯緣勝相等解顯根勝相不須論者結成不假論也記先總消句也如來即釋迦亦兼餘佛時勝者時無定體但約佛在彼時故言時勝根勝者但取一類當在佛世隨順言教有所證解者不取遇佛不悟之徒然佛世時證悟者多今就此說故云勝也緣勝者勝餘二乘菩薩故然說根之悟解不取教起因緣故指佛為勝緣也異類者但三乘五乘根性不同故名異類或可通於餘趣然非正意等解者等謂齊等彼諸異類齊生解故此則生解義等非謂所解是同然此根勝與前時勝相望料揀以成四句謂時勝根不勝如佛世六羣等一根勝時不勝如後五百歲持戒修福者二俱勝如舍利弗等三俱不勝即佛滅後不生解者四不假論者據此兼不須經也然準論所問但責經中已說造論為重殊不干於佛在之事今之答意欲顯佛滅度後根行不同於經於論取解各異故今先明佛在世時根緣皆勝尚不假經何須造論以顯滅後根緣皆劣故須假經於經不了復須假論以勝顯劣也由是經論各被一根不同圓音普逗多類疏色心圓音即三業矣記次別解文也初略配三業如文疏一音及圓音者有二初如來一音說一切法無不顯了故名圓音華嚴云如來於一語言中演出無邊契經海二如來同一切音故云圓音華嚴云一切衆生語言法一言演說盡無餘以一切音即一音故云一音一音即一切音故云圓音一一語音遍窮生界而其音韻恆不雜亂若音不遍則是音非圓若音等遍失其韻曲則是圓非音今不壞曲而等遍不動遍而差韻此是如來圓音非是心識思量境界耳記一音下二廣釋圓音二初釋圓音義又二先約教義正明二初約說法差別顯圓義如來等者謂佛音無別故云一音說法成異故云圓音引證可知二下二約隨類言音顯圓義如來等者合云如來一音同一切音文無一音者略謂佛音是一故名一音同彼異語故名圓音引證可知又普賢行願經云天龍夜叉鳩槃茶乃至人與非人等所有一切衆生語悉以諸音而說法斯乃如來一音隨類同時差別非如前段說法差別也以一下次結得名所以一切音即一音謂差別即無差別也一音即一切音謂無差別即差別也大意取無差即一差即為圓差即無差無差即差二義同時竟無前後兩段之中俱有此義圓融無礙方是如來之口密也但以文不纍書故成前後爾一一下二顯圓音相四初正顯遍窮生界是圓義恆不雜亂是音義又遍窮者六趣咸聞不雜者五音迥異又遍窮者三乘同聽不雜者領解各殊若音下二反明不遍等者有不聞處何成圓義圓者遍也失曲等者無所詮表何成音義且如鐘鼓之響普遍邇遐絲竹之音唯聞咫尺斯則圓音互非之義也今不下三結成不壞曲而等遍者即音以成圓不動遍而差韻者即圓以為音也是乃正遍而差即差而遍由是無不聞聲無不正解此是下四指歎非識等者佛無漏智所現圓音有漏凡夫焉能測度但可仰信不須推窮以非心識之境界故非識境者不可以識識非心境者不可以智知思量即識識之相也然華嚴中具有十喻以顯如來圓音之相不能繁引二自力聞經悟若如來滅後或有衆生能以自力廣聞而取解者或有衆生亦以自力少聞而多解者疏自力聞廣經文得解佛意不須他論故云自力此具文持義持亦以自力尋略經文而能深解佛意故亦不須他論此有義持而無文持記自力者但取不假論疏解釋只於經文披覽而自解也廣經者有二意一則於大部經中或廣尋諸部見佛始終廣說義路方始解故斯則根行劣後少聞而多解者二則如疏具文義二持隨一一文皆能解故此乃根強勝下少聞也略經者亦二意一則於略經文或一句一偈等便解如來甚深法理不假多說此則根行俱勝二則無多心力不能廣覽但於少分而得解了如疏中無文持有義持者今據論意廣略之中各取前說為正以論略中言多解廣中不言多字是以樂廣者為鈍樂略者為利若依疏意各取後說為正二釋俱可任情去取三劣機因尋廣論悟或有衆生無自心力因於廣論而得解者疏但依經文不能解意因他廣論而得解了故云無自心力此有文持而無義持記因於廣論者此有二意一則於經不解於論方解仍須假於廣部或尋諸論方解佛意此即劣於後段少文而攝多義能得解者此如疏釋二則隨彼一一解釋悉能了故此則根勝強於次文也二明當機須造此論二初機二結初機自有衆生復以廣論文多為煩心樂總持少文而攝多義能取解者疏此人不樂繁文唯依文約義豐之論深解佛經所說之旨故云總持多義然不須廣者有二意一根利不假二心煩不耐記心樂總持者亦二意一則聞少解多不假繁說故二則神根劣弱不能承受廣所說故具如疏文論文之意於廣略中各取前意為正後意為兼斯則於經論廣略得解中並通利鈍二根而文義二持四句內別得一句此亦義持無文持也二結如是此論為欲總攝如來廣大深法無邊義故應說此論疏此論文句雖少總攝一切大乘經論深旨深者如理智境廣者如量智境無邊者深廣無際記文句雖少等者文雖一軸義備河沙所宗之經並是實教所詮之旨豈容粗淺以至諸論圓實關要義理不出斯焉故云總攝等如理智境即真如門以離言說心緣等相故言深也如量智境即生滅門以染淨萬差多所該博故云廣也無際者謂理智境即沖深無際量智境即廣多無際也無際之相已見論文然此兩門攝盡一切經論之義但是說染說淨凡聖迷悟因果善惡一切名相差別等法即生滅門攝盡若說無染淨絶凡聖遣迷悟離性相等義即真如門攝盡故海東疏云開二門於一心總括摩羅百八之廣詰摩羅即說楞伽經處以百八句答大慧百八問皆下句真上句俗同此二門義也示性淨於相染普綜逾闍十五之幽致逾闍國說勝鬘經處彼有十五章大義皆說染而不染同此生滅之真如義至如鶴林一味之宗涅槃經鷲山無二之趣法華經金鼓金光明經同性大乘同性經三身之極果華嚴纓絡四階之深因大品大集曠蕩之至道日藏月藏祕密之玄門凡此等輩中衆典之肝心一以貫之者其唯此論乎既而宗旨深奧義理無邊有智之流請習無怠二立義分二初結前生後二正立義宗初結前生後已說因緣分次說立義分二正立義宗三一標總開別二寄問列名三依名辨相一標總開別摩訶衍者總說有二種二寄問列名云何為二一者法二者義疏法者出大乘法體謂自體故對智故顯義故即宗本法也大位在因通於染淨記初釋法也大乘法體者大乘之體即是於心名心為法也此中且說法為大乘體次下一文方說心為法體此乃展轉釋出其體也今言出大乘法體者恐多法字有智詳焉謂自下以三義釋名法之由夫言法者有其二義一任持自體義二軌生物解義今初一句即初義也謂本有自體真實不變非同依他從緣假立無有自性以從無始來任持不失故故下論云如實不空以有自體具足無量性功德故後二句即軌生物解義謂法者對智得名以此一心是法界理能軌於智令成無漏無分別也斯則以無相境相無緣智故云對智下論云唯證相應故復能顯於三大之義未有一義不從法顯故下文云依於此心顯示摩訶衍義義理既彰物則生解故此二句皆後義也宗本法者謂一論所宗染淨根本故或可宗即是本謂約義所依曰宗能立萬法曰本故下疏云依宗所顯差別義理又淨名云依無住本立一切法又前論云為欲解釋如來根本之義即斯法也大位在因者謂此論中所明法體大都所判屬於因位以文云所言法者謂衆生心既標衆生之言故知大槩合當因位不同佛性圓覺究竟覺不思議解脫等大位在果今約因中性德所標故云衆生心也通染淨者若隨名取義則位在於因若克論體性則通於因果因果即染淨也斯則心實通於因果以帶衆生之言故判在因也然亦有在果名心在因名覺之處如圓覺經云是諸衆生清淨覺地又云一切如來妙圓覺心故云通染淨也所以下文云是心則攝一切世間出世間法攝世間法是通染攝出世間法是通淨也疏義者辨大乘名義何故此心是大乘耶謂此心具三大義故名為大有二運轉故名為乘是故先顯法體後釋義理收義足也依宗所顯差別義理大位在果唯取於淨記二釋義也分三初釋文大乘名義者謂大乘是名名約義立故須辨義未有無義而有名者何故等者雙徵名義謂約於何義得名大乘未審大乘有於何義以雙徵故不言何故名而言何故是是之一字雙含兩勢蓋文之巧也謂此下釋三大可知二運者有兩意一則自運運他二則已運當運今此論中正唯後意故下文云一切諸佛本所乘故一切菩薩皆乘此法到如來地故於此二中皆具自運運他也以約此義名為大乘是故下二結意如文云所言法者謂衆生心是先顯法體次云所言義者則有三種等是後顯義理大乘之中唯茲法義今既法義並陳無所遺矣故云義足依宗下三彰位所依之法染淨雖通所顯之義唯局於淨體相用三各不相是故名差別離障所顯翻染得名故云唯淨故下相大文云心性無動則有過河沙等諸淨功德相義示現用大云除滅無明見本法身自然而有不思議業種種之用據此所說正唯屬乘而言大位者以體大通染淨故今約多分判在果也又體大雖通於染以彼之名亦從顯得若在因時則無體大之名至相用顯時方對此二以彰體名由是三義皆屬淨也三依名辨相二初法二義初法疏起下釋中初釋法體之文記即起下顯正義中總之一段文云顯示正義者依一心法有二種門乃至以是二門不相離故科分為二一舉法總立二開門別立一舉法總立所言法者謂衆生心是心則攝一切世間出世間法依於此心顯示摩訶衍義疏衆生心者出其法體謂如來藏心具和合不和合二門以其在於衆生位故若在佛地則無和合義以始覺同本唯是真如即當所顯義也今就隨染衆生位中故得具二門也記衆下初正釋衆生即能依心即所依所依之體從能依以彰名前劣後勝衆生之心依士釋也故下文云衆生依心意意識轉故出法體者前出大乘體名之為法此出法體名之為心從寬之狹此為至也如來藏心者謂在纏自性清淨心具足含攝如來功德名如來藏如下自釋具和合下明心之行相也和合即生滅門以彼隨緣成染淨故不和合即真如門以約體絶相顯不變故以其下釋所以此心具上二種義者以在衆生位中辨故是故論云衆生心也若在下二反顯謂此心隨染之時則云與生滅和合今在佛位純淨無垢唯不生滅故無和合義也以始下出所以顯無生滅之相故云唯是真如既無彼相但是一真約何說合故中論云一法云何合下文顯佛地云破和合識相滅相續心相顯現法身智純淨故所顯義者三大之義自此方彰生滅相無則唯局淨故無和合今就下三順結却成前義衆生即染相以真體隨緣起為衆生相不離體故名和合雖全體起相而體未嘗改變故名不和合由是在纏具二門也疏攝一切法者辨法功能以其此心體相無礙染淨同依隨流反流唯轉此心是故若隨染成於不覺則攝世間法不變之本覺及反流之始覺則攝出世間法此猶約生滅門辨若約真如門者則鎔融含攝染淨不殊下文具顯記攝下初總敘意辨法句標指餘皆正敘體即真如門相即生滅門二門相攝不相捨離故云無礙染淨同依者二門之中各攝染淨真如門是染淨通相生滅門別顯染淨通別雖殊不出一心故云同依隨流謂不覺迷真乃至造業受報反流謂始覺翻染暨乎菩提涅槃迷悟雖殊唯此心轉故經云無始時來性一切法依止由此有諸趣及證涅槃果是故萬法唯心心即是主故其迷悟皆心所為是故下二別釋相二初約生滅門釋不覺攝世間法者以不覺是世間法根本一切染法皆此所成由是所成之染皆不覺攝則三細六粗五意六染等是所攝之法也故下文云當知無明能生一切染法以一切染法皆是不覺相故攝出世法者以本始二覺是出世法本一切淨法皆覺所成由是所成之淨皆屬覺之所攝也本覺所攝即大智慧光明義遍照法界義真實識知義等始覺所攝即三明八解力無畏等然此且就相用有異分其二殊若約體同所攝無別此猶下結示可知若約下二約真如門釋鎔融含攝者謂消和包納令彼染淨差別之相無有障礙也染淨不殊者出鎔融之相也謂以一真如理融之使染即非染淨即非淨即染即淨渾為一味故云不殊故下文云一切諸法唯依妄念而有差別若離心念即無一切境界之相乃至唯是一心故名真如斯則生滅門中名為該攝如一手臂可能救人出井亦能推人落井推救相殊手該一也真如門中名為融攝猶如鍊百物金同融於一治中該攝則染淨俱存融攝則染淨俱泯俱泯故一味不分俱存故歷然差別是故二門雖皆言攝而攝義不同也下文顯者相次即辨疏摩訶衍者釋其法名謂依此一心宗本法上顯示大乘三大之義故名此心以為法也記釋法名者標指此下文也法即是名今此下文中正釋此心得名法之所以也謂依下於前體智義三中約第三顯義故名為法也其餘體智二義論各有文已如前引二開門別立二初責總立難二開別釋成初責總立難何以故疏責有二義一云心通染淨大乘唯淨如何此心能顯彼義二云心法是一大乘義廣如何一心能具示彼記一下意云心既通染不合顯得唯淨之義其猶雜礦之金豈能鑄得純金之像二下意云心既是一一則體狹大乘義多多故成廣豈能以狹而示於廣二開別釋成疏釋初意云大乘雖淨相用必對染成今生滅門中既具含染淨故能顯也以廢染之時則無淨用故釋後意云心法雖一而有二門真如門中示大乘體生滅門中具示三大大乘之義莫過是三故依一心得具示也記大乘雖淨者牒縱所問也相用下分別正答對染者謂相大則翻染成淨如云心性不動即有大智慧光明義等用大則隨緣而起如云隨諸衆生見聞得益故說為用等此上二義皆對染成故下文云當知染法淨法皆悉相待也今生滅下正明能顯既有覺不覺二義故云具含染淨以有染故方能顯淨淨既不自淨待染以成淨何怪通染之心能顯唯淨之義耶此即結答也以廢下出對染所以或問曰何故須對於染方立淨耶故此釋也故下文云若離不覺之心則無真覺自相可說又真如門中無染亦不立淨又云若離業識則無見相以諸佛法身無有彼此色相遞相見故心法雖一者牒縱所問也而有下分別正答示大乘體者真如是泯相顯實門故以泯相而相不存故唯示體也具示三大者生滅是攬理成事門故以攬理而理不失故具示三也大乘義下結成具示謂此三大義中具攝如來真應二身過河沙數德相妙用以要言之一切所有無漏功德盡不出於三大之義三大之體唯此一心是故一心能顯多義也是心真如相即示摩訶衍體故疏心真如者總舉真如門起下文中即是一法界以下文相者即是真如相起下復次真如者依言說分別以下文記總舉者盡此一門之義也一法界等者具云心真如者即是一法界大總相法門體所謂心性不生不滅乃至若離於念名為得入共有十三行文是此所起也真如相者相即義相如下文云復次真如者依言說分別有二種義義即相也不同生滅可狀之相復次下乃至終於此門共有十二行文是此所起也據此所配若言真如門則通言心真如真如相則別也是心生滅因緣相能示摩訶衍自體相用故疏心生滅者隨熏變動故總舉生滅門起下依如來藏故有生滅心以下文記隨熏變動者謂隨染淨因緣所熏令心變改動轉成生滅故總舉等者撮下一門之義在此生滅二字之中故云總也依如來藏者具云心生滅者依如來藏故有生滅心所謂不生不滅與生滅和合乃至性染幻差別故都有七十五行論文是此所起也疏因緣者生滅緣由故起下復次生滅因緣以下文記緣由者所以義起下等者具云復次生滅因緣者所謂衆生依心意意識轉故此義云何以依阿黎耶識說有無明乃至不能得隨順世間一切境界種種知故共有四十九行論文是此所起也疏相者生滅之狀故起下復次生滅相者以下文記狀謂形狀妄識所知境也揀異真如相是義相相即性也非識境界唯智所證故起下等者具云復次分別生滅相者有二種云何為二一者粗與心相應故二者細與心不相應故乃至唯癡滅故心相隨滅非心智滅共有十四行文是此起也然此立義分中所立義本即有八字謂真如相生滅因緣相下解釋分中共有一百六十三行逐段而釋如前所配從四熏習下即通明染淨生滅起動之由致也若更束八字不出心之一字更展一百六十三行論文以成百餘部大乘經此顯論主證悟心中自在之用疏能示者何故真如門中云即示生滅門中云能示以真如是不起門與彼所顯詮旨不別故云即示以是不起故唯示體生滅是起動門染淨既異詮旨又分能所不同故不云即記何故下先難何故兩門一能一即耶以真下次釋不起者以真如有二義一不變義二隨緣義今此門中但約不變以顯其體不約隨緣故云不起所顯謂體大能顯即此門能顯為詮所顯為旨真如與體蓋是一義故云即也以是下因所顯唯示體大也起動者即隨緣義以隨緣故成生滅門染淨即生滅相也即此染淨為能示之詮三大是所示之旨二義各別故云又分也能所下揀異前門也若喻顯者一心如水真如如溼生滅如波是水溼相即示水體是水波相能示水之自體溼體相八功德相用鑒像潤物故疏自體等者體謂生滅門中本覺之義是生滅之自體生滅之因故在生滅門中亦辨體也翻染之淨相及隨染之業用並在此門中故具詮耳是以下文釋生滅門內具顯所示三大之義意在於此何故真如門中直云體生滅門中乃云自體等以所示三大義還在能示生滅門中顯非別外故云自也問真如是不起門但示於體者生滅是起動門應唯示於相用答真如是不起門不起不必由起立由無有起故所以唯示體生滅是起動門起必賴不起起含不起故起中具示三大餘如下說記體謂下初別解當文本覺者即是前之真如至此門中轉名本覺以對始故名本對不覺故名覺也即此本覺是生滅家之自體也此顯生滅別無其體全攬本覺為自體故生滅因者或問若此本覺是生滅體者本覺即是真如何故說為生滅自體耶故此釋之謂生滅之相起時實賴真如為因以真如不守自性為無明熏成諸染相雖成染相其體不變以不變故熏彼無明令猒生死樂求涅槃漸起始覺成其淨法也如是染淨皆由真如是故真如是生滅體故下文云依如來藏有生滅心又云所謂以有真如法故能熏習無明乃至名得涅槃成自然業亦辨體者謂前真如門當體是體此生滅門以真如為體若無真如之體生滅終不能成故此門中須辨體也翻染下明示相用也淨相即相大謂大智慧光明義等業用即用大謂報化二身等是以下指文結示也以生滅門中文科兩段初釋能示生滅心法即生滅因緣相等後辨所示三大之義即體相用等下文具顯何故下二通前料揀先外難可見以所下後釋通也前云能示顯詮旨不一今云自體顯詮旨不異此門雖即能所有殊非謂所詮在能詮外今顯非外故云自體等斯則生滅是真如家相真如是生滅家體體相雖異而不相離也其猶波水雖異豈得水在波之外耶故知其水是波之自體也問真下三重釋妨難問意以兩門敵對而難詳之可了答中真如下二句牒門立理不必由起者真如本自立不藉於生滅也自性本常豈因他有由無下正釋謂有起必有相用無起但唯存體故前門中但只言一也生滅下二句牒前立理起必賴不起者異於前門也若無不起之真如何有起動之生滅如無其水豈有於波故須藉之起含不起下正釋真如舉體成生滅故今生滅含於真體也猶水起成波波含於水由是此門不唯示於相用亦示體也故云具示二義疏起下復次真如自體相者已下釋義之文記起下等者如論云復次真如自體相者一切凡夫聲聞緣覺菩薩諸佛無有增減乃至真如自在用義故即有六十四行論文正是此所起也文二初大二乘初大所言義者則有三種云何為三一者體大謂一切法真如平等不增減故二者相大謂如來藏具足無量性功德故三者用大能生一切世間出世間善因果故疏義者牒章有三標數云何徵起疏一下釋成體大者真性深廣凡聖染淨皆以為依故受大名不增減者謂隨流加染而不增反流除染而不減又反流加淨不增隨流缺淨不減良以染淨之所不虧始終之所不易故記真性者真謂揀非僞妄獨顯圓成性謂自體常住不變不異即揀諸法空性也深謂豎窮三際無去無來廣謂橫遍十方非中非外凡即六趣差別聖即三乘不同染即穢土極於三界淨即淨土盡於十方然凡聖染淨各通二報今約別論故凡聖屬正染淨對依也以諸法雖廣不出依正二報正中不出凡夫聖人依中不出淨土穢土故舉此四以攝一切無不盡也皆以為依者上之四法並用真如之體為所依故故華嚴云未曾有一法得離於法性下文云如是無漏無明種種業幻皆同真如性相楞嚴云一切世界因果微塵因心成體既為一切所依體大之名由此而立真如平等者謂真性於一切法中為平等體故如像中鏡非同諸法本空空故平等如鏡中像隨流等者約染淨二義顯不增減在文可見以性非染淨故染淨皆空故良以下結成上義染淨約法始終約時謂隨流為始反流為終下疏所說以衆生為前以佛為後前後即始終也或此段別約橫豎以顯平等之義染淨不虧者橫說也以現在生佛位中無虧缺故始終不易者豎說也以過去未來無改易故前約多人同時說此約一人異時說雖一多同異橫豎別論皆顯真如平等之義疏相大者即二種如來藏中不空之義謂不異體之相故云性德如水八德不異於水記二種等者謂如實空如實不空之二也空謂不與妄染相應不空謂具性功德今如後義故下文云所言不空者以顯法體空無妄故即是真心常恆不變淨法滿足則名不空不異等者謂一一德相即是體性故不異也非謂藏為能具德為所具故有性言故下文云具足如是過於恆沙不離不斷不異不思議佛法不同生滅之相定差別故性相異故可知見故如水八德者即阿耨池水具八功德一甘二冷三軟四輕五清六不臭七飲不傷喉八不傷腹不異之義合法可知疏用大者謂隨染業行然此用大是報化二身粗細之用令諸衆生始成世善終成出世善也下文顯之何故唯言善不云不善者以不善法違真理故是所治故非其用也若爾諸不善法應離於真釋云以迷真故不得離真以違真故非其用也記初釋文隨染業行者謂隨彼彼染幻衆生起利他行即是如來不思議業故云業行若將隨染門中反染之業行為此用大者恐非文中正意以彼反染業行但是能顯之淨法未可便將為此所顯報化用故若約顯真順理治妄染邊亦是用也報身即三賢已上之所見者化身即二乘十信已下之所見者粗即化身隨類各應各見不同非受樂相故細者是報體平等佛身身有無量色色有無量相好所住依果亦復無量種種莊嚴具足樂相故世善者謂有漏熏習善根力故起十善等此但有漏不逾人天故名世也出世者令猒生死樂求涅槃此皆無漏超過三界故言出世也於中雖通三乘究竟唯以一乘而得滅度下文用大廣顯其相何故下二通妨牒難可知以不下正釋若善因果內順真如外治諸惡此法若起從因至果能感勝處故得名為真如淨用以從真如內熏所起報化二用所發今茲用大宜發此法若不善因果內違真理外被善治此法若起從因至果能感苦處何名淨用以從不覺所生塵勞發現故故此文中不言不善也若爾下轉難可知釋云下重釋雖是惡法以是不覺迷真所成所成之法不離真體如水起波不離溼性故下文云以依真如法故有於無明又云依覺故迷若離覺性則無不覺以違下結成前義可知然此用大正是果上二身如下具說今疏以善為用者乃是旁義亦即以所生顯能生也然論不言滅惡者以善起必惡滅故二乘一切諸佛本所乘故一切菩薩皆乘此法到如來地故疏諸佛者標果望因以解乘也菩薩者舉因望果以成運也即始覺之智是能乘本覺之理為所乘故梁攝論云乘大性故名為大乘記標果望因者諸佛即果本即是因以諸如來本所修行因地之時無別所乘之法唯以此心為其所乘而至究竟舉因望果在文可見此中如來并前諸佛皆約自受用報身所辨非謂應化知之以成運者運即是乘二義無別但文變耳或可二義不同謂乘以運載為義蓋前段約佛本乘方有載義故疏云以解乘今文約從因至果運義始彰故論云到如來地疏云以成運也然佛是已乘菩薩是當乘今乘於中皆含自運運他之義即始下出能所乘體也始覺為能乘者即前佛與菩薩也雖滿分不同俱屬始覺能乘智也本覺為所乘者若約今文即前一心法為所乘以對始故言本覺也若約三大言之則用大為能乘體相二大為所乘然用即始覺體相即本覺大即是乘持業釋也乘大性者但證本覺是乘之大性或雙證本始也由是前來標宗但言法義不別言乘今但次於三大言之亦不別舉題目解釋分中意亦如是三解釋分二初結前生後二分門解釋初結前生後已說立義分次說解釋分記解釋分者前雖義宗略立理趣未詳若不解以廣文幽旨如何開釋此令生解故有此分二分門解釋二初標數徵列二牒名辨相初標數徵列解釋有三種云何為三一者顯示正義二者對治邪執三者分別發趣道相疏顯示者正釋所立大乘法義對治者既明正理須遣異計發趣者趣正理之階降記所立等者即前分中所立一心法二門三大之義彰顯開示令生正解由是正義解此即成正解也遣異計者非正道理妄生計著為患頗深固宜除滌趣正等者發心趣道行相差別升降不同今當分別令其修證無惑混濫也斯乃正義顯示令解邪執對治令遣道相分別令行又正義為能治邪執為所治正義為所趣道相為能趣皆為正義有後二文也二牒名辨相三初顯示正義二對治邪執三分別發趣道相初顯示正義二初總二別初總疏釋上立義分中衆生心攝一切等也記釋上等者謂釋前分之中所言法者謂衆生心是心即攝一切世間出世間法之文也於中二一依法開門二二門該攝一依法開門顯示正義者依一心法有二種門云何為二一者心真如門二者心生滅門疏顯示者牒章依一心下謂一如來藏心含於二義一約體絶相義即真如門謂非染非淨非生非滅不動不轉平等一味性無差別衆生即涅槃不待滅也凡夫彌勒同一際也二隨緣起滅義即生滅門謂隨熏轉動成於染淨染淨雖成性恆不動正由不動能成染淨是故不動亦在動中是故下文識有二義中本覺是也上文生滅門中自體是也勝鬘云不染而染染而不染等楞伽云如來藏名阿賴耶識而與無明七識共俱如大海波常無斷絶等又云如來藏者為無始虗僞惡習所熏名為識藏又云如來藏者為善不善因受苦樂與因俱若生若滅猶如伎兒作諸伎樂等此等並約生滅門說也然此二門舉體通融際限不分體相莫二此無二處諸法中實不同虗空性自神解故云一心記依一下疏文分二初釋一心具二門二門者謂一心上有其二義義具能通出入故目之為門能通者謂真如生滅互相通故又此二門通一心故通一心者正是此段以一一門皆言心故互相通者以真如門有隨緣故通於生滅生滅門有體空故通至真如也出入義者謂衆生迷惑流轉即出真如門入生滅門若覺悟修證即出生滅門入真如門既成道已即卻出真如門入生滅門開悟衆生能事既畢息化歸真即卻出生滅門入真如門安住祕藏也中又有二初標也一如來藏者以二義不分故云一也若例言之即染淨凡聖空有理事等皆一也此之一義為顯不二強名為一非是數法故經云一亦不為一為離諸數故一約下二釋中二初真如門又二初正釋約體等標立也非染下釋上絶相以顯一體謂染淨生滅動轉等皆屬於相表此俱無故言非也平等下約體以結平等約豎結以無高下故如經云是法平等無有高下一味約喻結猶如大海同一醎味性無差別約橫結淨名經云一切衆生皆如也一切法亦如也衆聖賢亦如也至於彌勒亦如也又平等一味絶相也性無差別約體也故云約體絶相義衆生下二引證此引淨名經文彼後文云諸佛知一切衆生畢竟寂滅即涅槃相不復更滅等今疏取意故文少異下皆如此二下二生滅門中三初正解隨緣等標立也謂隨下釋也謂以無明熏真如起妄心妄境成一切染法真如熏無明滅妄心妄境成諸淨法廣如下釋染淨雖成下釋妨或曰既隨熏動云何復說衆生如耶故此釋之正於動時動處元來不動明非相不動故言性顯非暫不動故言恆也或曰性既不動如何能成染淨故云正由不動能成染淨斯則反成上義謂若性自動同生滅相即當時滅不能自立尚不自立將何成於染淨實由不動故能成也是故下二結指謂以隨熏動時性未嘗變故得生滅門中有真如也故云不動亦在動門若真如門中則未必有生滅生滅門中則必有真如以生滅藉真如真如不藉生滅故略如前釋廣在下文是故下指文本覺者即生滅門初云此識有二種義能攝一切法生一切法云何為二一者覺義二者不覺義等即彼覺義便是生滅門中真如名為不動但以至此門中別約形待義邊易名為覺上文等者即立義分中云是心生滅因緣相能示摩訶衍自體相用故彼之自體亦即生滅門中真如也此上兩段正是動中有不動義勝鬘下三引證通證隨熏動轉動中有不動義不染而染即真如成生滅染而不染即動中有不動如來藏即真如無明七識即生滅阿梨耶識即上二和合也謂真如隨緣成梨耶識以成識故與無明共俱亦可如來藏即是梨耶但以通相別相而異故云如來藏名阿梨耶識故經云佛說如來藏以為阿賴耶惡慧不能知藏即賴耶識亦云如金與指環展轉無差別大海如梨耶波如無明七識水即如來藏以從無始時來真妄和合未曾捨離故云常無斷絶如來藏者即所熏之淨性虗僞惡習即能熏之染幻識藏即所成梨耶也為善不善因者謂此性隨善緣起諸善法性即為善因隨不善緣起諸不善法性即為不善因隨善受樂性在其中隨惡受苦性亦在中故云與因俱若生等者循環諸趣生死無窮藏性於中隨而遍受而其體性未嘗去來故經云生滅去來本如來藏如伎等者如人作戲變改服章體是一人初未曾易故彼文云心如工伎兒意如和伎者五識如音樂受想觀伎衆如人弄師子人入師子活人出師子死淨因無明時當知亦如是圭山云樂人本是一形軀乍作官人乍作奴名目服章雖改異始終奴主了無殊此等下結指如上所引並說真如隨緣作生滅動中有不動也然此下二攝二門歸一心也舉體等者謂真如舉體成生滅生滅無性即真如是故生滅現時全真體現真如顯時全生滅顯舉一全收故云融通以融通故真無真相妄無妄相真妄相即一體無異故云不分既而不分際限豈更存於體相故云莫二波水之喻可以比知無二處者即此真妄融通之處實性存焉此之實性為諸法主即是諸法中之實性也又表非二邊故名中離諸差別虗相故名實此上二句是約中實以解心也故經有中實理心之言不同下約靈鑒以解心謂虗空體亦無二邊亦非差別虗相然但昏鈍而無靈鑒今此實性自在靈通覺了不昧故云不同等故祖師云空寂體上自有本智能知知之一字衆妙之門大抵意云於一切染淨融通法中有真實之體了然鑒覺目之為心斯則體相不二故云一中實神解故云心二二門該攝二先立次釋先立是二種門皆各總攝一切法疏上立義分中直云攝今釋中云各攝者以一心含通別二門故今分通別又各攝故以真如門是染淨通相通相之外無別染淨故得總攝一切諸法生滅門者別顯染淨染淨之法無所不該故亦總攝一切諸法通別雖殊齊無所遺故云各攝又以此即是真如隨緣和合變作諸法諸法即無異體還攝真如門也以此二門齊攝不二故得說為一心也記上下先正釋二初對前牒文可見以一下二釋今文意三初總標其意含通別者釋前文意也前文以二門未啓但約一心通總包含而說故云攝不言各也今分下標今意謂今文中二門既開每門之中皆各自攝一切法也若無標揀將謂二門共攝一切則有攝法不盡之過故言皆各也以真下二別釋義相二初約二門各攝解二初正釋通相者以真如門不分染淨雖攝染淨皆同性故所言相者謂義相也以此門中顯示染淨融通之義故云通相以染淨等法入此門中同為一味真如之理更無差別故云無別染淨等故得下結可知別顯等者隨流反流各不相是功德塵勞歷然有異衆生諸佛凡聖宛然淨土穢土優劣不等無所不該者謂一切雖多不出染淨既攝染淨是故論云攝一切也通別下二結成謂通相別相二門雖殊所攝之法更無差異故云齊無所遣又以下次約二門互攝解前約二門各攝通別不同齊門而說攝義有異初門通相但明融攝融則染淨無別故名為通後門別相乃是該攝該則染淨不同故名為別今此文中不分通別只就一義左右說之便成二門各攝之義今文所說生滅攝一切時即是真如攝一切也以生滅無體全即理故故云還攝等又真如攝一切時即是生滅攝一切也以全事之理非別外故今此疏中猶闕後義應合更云真如既是諸法真性離真性外無別諸法還攝生滅門也若具此文於義方足成互攝也斯則生滅門攝法時真如門法亦在生滅中真如門攝法時生滅門法亦在真如中如是則真如中所攝染淨即是生滅門所攝染淨無二無別舉一全收故云二門互攝故下結云齊攝不二也問疏中何故不說真如攝生滅門耶答前文通相已含此意故不復言也以此下三結歸一心良以二門相攝理齊鎔融不二以不二故得名一心斯則二門一心體無別異若約義別說則一心是總二門是別又於別中真如約體生滅約相若克體圓融則性相無二即是一心今既二門互攝全奪兩亡唯是一心更無別法故今結成為一心也疏問二門既齊相攝者何故上文真如門中唯示大乘體不顯於相用生滅門中具顯三耶答真如是泯相顯實門不壞相而即泯故得攝於生滅以泯相而相不存故但示於體也生滅是攬理成事門不壞理而成事故得攝於真如以成事而理不失故具示三大問前既泯相相不存但示於體亦可攬理理不存應但示相用何故不齊耶答生滅起必賴於真故攬理理不失真如未必藉生滅故泯相相不存相不存故唯示於體理不失故具示於三是故攝義是齊示義別也記問下二通難二初二門示義通局難初句指定前義何故下引文正難意云真如既攝生滅門何不同彼示三大生滅既攝真如門何不同彼示一大示義既差攝法須別攝法若等示義應同如何攝法即同示義卻別耶答中初句標定其門不壞下正明行相謂染淨之相全攬理成理非可壞全理之相亦不可壞以不壞故攝生滅盡成今相攝義以泯下為即理故令染淨相亡泯不存以不存故唯真體在故成前文唯示體也生滅下標定其門不壞下明理在事中以全理而成事故事起而理不壞成今相攝義斯則事為能攝理為所攝以下成明事理俱存成前具示義成事故示相用二大體不失故示於體大問前下二性相存泯不齊難問意可知但躡前門相不存義以難後門理不失也答中前四句顯二門存泯之由各初一句所以後一句定義生滅等者事依理顯故理為事本故如波必賴於水故下文云依如來藏有生滅心理不失者理若已失則無生滅也如水失則無波故論云若無空義者則無道無果未必等者真理本有不假緣成如水不藉於波故真如門中直云真如者即是一法界大總相等不言依生滅有泯相相不存者不泯則已泯則不存入理自亡何存生滅如水澄靜豈存波在下文云以一切法皆同如故相不存下四句躡前正答相不存者相存則可示於三不存但合示於體理不失等者生滅相起理又不亡不具示三於理如何是故下結答雙示可知次釋此義云何以示二門不相離故疏云何者責云若二門各別不可相從若本唯一心未容影攝以故者答云以體相不離故如金與莊嚴具若以金收具具無所遺以具攝金金無不盡良以二門一揆全體遍收此義亦然思之可見記責中不相從者從順也事理別故其猶水火敵體相違豈能互攝未容等者若分二別可言影互相攝今唯一心影攝何法斯則二別亦無攝義一心亦無攝義也答中論云不相離者意明不一不二不一故二門各存不二故唯是一心以是一心故不相離以不相離故能影攝即反前責意也疏云以體相者體即真如相即生滅真如隨緣成生滅生滅無體即真如由是反覆言之故不相離也金具者金喻真如具喻生滅相收之義在文可見良以下結喻例法良者實也以者由也實由金具二門未曾有異故云一揆揆謂端揆即齊等也由不異故舉金時遍收具盡具全體是金舉具時遍收金盡金全體是具此義下例法也此義者即此不相離義也舉真如時遍收生滅盡生滅全體是真如舉生滅時遍收真如盡真如全體是生滅法喻正等故云亦然然猶如是也音釋植音直種也筋音斤骨絡硬音恨堅也鶖音秋鸛鷺屬嚚音銀言不忠信也罥音捐網之總名曝音僕晒乾也與鉢同娑婆此云堪忍此土名也貊音陌北方國名羈音機繫絆也凶音凶狠戾也蟻與蟻同慵音戎懶惰也六羣一難陀二跋難陀多貪財利三迦留陀夷多淫染四闡陀多愚疑惡性難共語五馬師六滿宿多瞋恚汙他家行惡行此皆豪貴種族既出家後共為朋黨故號為六羣也逗音豆投合也綜音宗機縷咫音止八寸曰咫軸音逐車之軸頭也摩羅具云摩羅耶此翻離垢或云阿跋多羅此翻無上或翻勝山名也槩音蓋大槩也礦音拱金在砂石未經銷者虧音奎缺少也軟與軟同柔和也伎音技即戲童樂人之類
