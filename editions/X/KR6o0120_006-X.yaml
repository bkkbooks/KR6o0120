body:
  text: 唐西京太原沙門法藏述疏終南草堂沙門宗密錄註宋秀州長水沙門子璿修記清錢塘慈雲沙門續法會編順天府府丞戴京曾閱定二不覺義記不覺者即棃耶識中第二義不覺無明也是即無明之別號亦名癡亦名為迷無知等斯約染法以明心生滅義然生是虗生滅亦是妄滅也文三初根本不覺二枝末不覺三結末歸本記此三段亦可初體次相後即結相同體初根本不覺二一依覺成迷二依迷顯覺一依覺成迷三初法次喻三合初法所言不覺義者謂不如實知真如法一故不覺心起而有其念念無自相不離本覺疏不覺句牒章謂下釋義不如知者不了如理一味故釋根本不覺義如迷正方也不覺起念者謂業等相念即邪方也念不離覺者邪無別體不離正方也記論云不如實知真如法一者不違逆義如實知一切覺也即能達智真如平等理也即所達境法一一法界心也即二所依體於上三法皆違逆故故云不如實知真如法一也疏云不了等者如理平等本唯一相無不覺之異今既不如理知故云不了不了即無明也由無明故妄生異相首楞嚴云無同異中熾然成異也迷正方者不了是正東故論云不覺心起而有念者不覺根本無明念即業等枝本無明謂違背上三法故不覺無明忽然生起遂有業等妄想念也疏云業等相者指三細言論云起念起即是動動即是業相也經中亦名為起故文云起為世界靜成虗空邪方者前雖迷其正方但且不了是東今於東處別作西解故云邪方前即迷真此即起似也然根本無明中有迷真執妄二義今論此段并下三細是迷真義下智相等即執妄義亦即楞嚴背覺合塵義經云迷失本妙圓心寶明妙性認悟中迷等此則具明二義也華嚴云於第一義不了名為無明此迷真也圓覺云妄認四大緣慮為身心等此執妄也然迷真必執妄執妄必迷真故此二經各舉一義也邪不離正者西處即東故不覺處即覺故次喻猶如迷人依方故迷若離於方則無有迷記依方迷者依東方故迷為西方若離正東即無邪西亦如依水起波若離於水則無有波三合眾生亦爾依覺故迷若離覺性則無不覺二依迷顯覺以有不覺妄想心故能知名義為說真覺若離不覺之心則無真覺自相可說疏於中二初明妄有起淨之功後明真有待妄之義良以依真之妄方能顯真隨妄之真還待妄顯故也記初義者即文云以有不覺等妄待真也後義者即文云若離不覺等真待妄也此即節釋其文也良以下正辨其意依真下顯初意如依金之器方能顯金反之則不可也隨妄下顯後意如隨器之金還待器顯反之亦不可也前依覺故迷則為妄之所損今依迷顯覺則為妄之所益也然論之大意明不覺與覺皆是相待以顯生滅染淨無有自相皆不可得也此中初言以有不覺妄想心者無明所起妄想分別由此分別能知名義故有言說說於真覺是明真覺之名待於妄立也若離不覺即無真覺自相可說者是反明真覺必待不覺若不相待即無自相自相既無他亦不立是顯染淨無所得義故後譯云然彼不覺自無實相不離本覺復待不覺以說真覺不覺既無真覺亦遣如下文云當知一切染法淨法皆悉相待無有自相可說故圓覺云依幻說覺亦名為幻智論亦云若世諦如毫許有實者第一義諦亦應有實此之謂也二枝末不覺疏此一段文略作二種釋初約喻說意二就識釋文初者本覺真如其猶淨眼一熱翳之氣如根本無明不覺也二翳與眼合動彼淨眼業識亦爾三由淨眼動故有病眼起能見相亦爾四以有病眼向外觀故即見空華妄境界現境界相亦爾五以有空華境故令其起心分別好華惡華等智相亦爾六由此分別堅執不改相續相亦爾七由執定故於違順境取捨追求執取相亦爾八由取相故於其相上復立名字若彼相未對之時但聞名即執計名字相亦爾九既計名取相發動身口攀此空華造善惡業起業相亦爾十受苦樂報長眠生死而不能脫業繫苦相亦爾十一皆由根本無明力也記疏有十一重翳喻法合義相昭然尋文易解又以首末比況最切者夢喻已見前說皆由無明力者即下結云無明能生一切染法一切染法皆不覺相次釋文者分二一無明為因生三細二境界為緣生六麤記楞伽云妄想為因境界為緣和合而生妄想即無明也疏中用此經句以科論文也一無明為因生三細記據下論文乃是展轉相生今但約根本而言故云無明為因中又二初總標二別解初總標復次依不覺故生三種相與彼不覺相應不離疏相不離體故末不離本故依無明起妄心依妄心起無明故記相不離體者業等九相不離不覺體故以即體之相即相之體故不相離末不離本者三細六麤之枝末不離不覺無明之根本以即本之末即末之本故不相離依無明起妄心者即不覺生三相三細相也如下云以依無明有棃耶依妄心起無明者即三相三細也與不覺相應下云以依阿棃耶說有無明其猶依水起波波相起已不離於水由斯義故名曰相應非約心王心數說相應義以此三種三細是不相應染故二別解二初徵次釋初徵云何為三疏總徵起也記何為依於不覺生三相耶次釋三一業相二轉相三現相記三相文中各有標名所依正釋詳之一業相一者無名業相以依不覺故心動說名為業覺則不動動則有苦果不離因故疏初句標名依不覺釋標中無明也即根本無明心動為業釋標中業也此中業有二義一動作是業義即此心動是也覺則不動者反舉釋成既得始覺時即無動念是知今動只由不覺也動則有苦者二為因是業義此既招苦即為因也如得寂靜無念之時即是涅槃妙樂故知今動則有生死苦患也果不離因者不動既樂即知動必有苦動因苦果既無別時故云不離也此雖動念而極微細緣起一相能所不分即當棃耶自體分也如無相論云問此識何相何境界答相及境界不可分別一體無異當知此約賴耶業相義說也下二約本識見相二分為二記論云無明業相者初標名意表此二無有異體也所以知者前說業相盡處便見心性成究竟覺但以約義故說相依顯體無別故今雙舉又揀本覺隨染業相故云無明業相顯覺不覺皆有業相而真妄不同也論中依不覺句二所依也根本無明者以是所依故當根本如夢依睡也論心動下三正釋動名業者能依也動作是業義者是無明之業用後之八相亦是動作亦是無明業用然約別義以立其名唯此最初起用之始故名為業反舉等者如不睡則無夢始覺者即始究竟時也為因是業義者然九中前八皆得名因所以不言業者亦約別義故今此初相能為苦本故名業也如得下反顯以靜是妙樂之因故反知動念即是苦因也動因苦果無別時者以一念起動即具微細四相四相之苦果不離一念之動因據此位中即是棃耶行苦若準前明四相俱時有故則四相攝於九相分段麤苦亦在其中所以次第說者文不頓書故義有因依故若約時說則一念不覺無有前後故有說云一念不覺五蘊俱生即斯義也此雖下上則別解論文今是通明行相也此乃九相之端細中之細未有轉現心境差別故云一相不分自體即自證分也如無相下引證相即自體境界即所緣當知下會彼同此二轉相二者能見相以依動故能見不動則無見疏初句標也即是轉相以依等者依前業識轉成能見不動無見者若依性淨門則無能見也反顯能見必依動義如是轉相雖有能緣以境界微細故猶未辨之如攝論云意識緣三世境及非三世境是即可知此識所緣境不可知故既云所緣不可知即約能緣以明本識轉相義也記依前下轉猶起也是前業相起為此見然餘相皆有起義不名轉者亦約別義故如依於夢而有夢心若依下約果海性淨不動則無有彼此之見應知有見者但依動故如無於夢則無夢心如是下就此一相位中以明不說境界所以以微細故且說能見以為轉相然此境界便是向下現相以論中分能見所見各為一相今此見相由內所發非託境生故名為轉依此轉相帶起所緣復立現相非謂於此能見之中又自別有微細境故攝論下引證意識即第六識智相是也三世境者諸有為法非三世境者諸無為法斯皆意識所緣之境可知者意識麤浮能所緣念可以現今分別取解也以有三世等境為可知故此識等者即第八也以無可知境故既無境可知故唯就能緣見分以明此識也如說十二因緣始不可知此亦如是唯識亦云不可知執受處既云下結意三現相三者境界相以依能見故境界妄現離見則無境界疏初句標也即是現相以依下依前轉相能現境界離見句反釋記依前等者如依夢心而有夢境反釋者應云聖人離見既無此境當知此境定從見生如無夢心則無夢境然上三相皆反以釋成者以此是八地已上所知境界非下位所覺由是以聖人不見相等比決反驗令義明了可證可信也二境界為緣生六麤疏即分別事識也如楞伽經云境界風所動種種諸識浪此之謂也問三細屬賴耶六麤屬意識何故不說末那識耶答有二義意一前既說賴耶末那必執相應故不說瑜伽論云賴耶識起必二識相應故又由意識緣外境時必內依末那為染污根方得生起是故既說六麤必內依末那故亦不別說二以義不便故略不說之不便相者以無明住地動本淨心令起和合成棃耶末那既無此義故前三細中略不說又由外境牽起事識末那無緣外境義故六麤中亦略不說亦可計內為我屬前三細計外為我所屬後六麤故略不論也楞伽經中亦同此說故彼經云大慧略說有三種識廣說有八種相何等為三謂真識現識分別事識乃至廣說經中現識即是三細中現相也分別事識即是下六麤也所以知者彼經下釋分別事識中乃云攀緣外境界起前事識等故知事識非是末那此論下文並同此說宜可記之記即下初引經指配事即是境分別六塵境事之識故名分別事識楞伽等者具云藏識海常住本識境界風所動現識種種諸識浪騰躍而轉生事識問下二問答釋妨三初問末那者具云訖利瑟吒耶末那此云染汙意謂與四惑相應故云染汙恒審思量故云意即第七也答下二答三初六八相從答二初約能執從所執故不說必執相應者謂第七種子在第八中第八見分為第七所執故曰相應況二識相依互為根耶瑜伽下引證可知又由下二約所依從能依故不說內依等者以第八第七互依第六依於七八前五依六七八及同境依故有偈云五四六有二七八一俱依但說能依必知有所故略不云二下次以義不便答二初無和合義故不說無明等者前說無明與真和合成棃耶識相末那但一向生滅無和合義若言和合自成棃耶若無和合識從何生義既不便求說不及又由下二無緣外義故不說末那無緣外者以前五唯緣外塵第八緣內根身種子及器世間第六通緣一切第七唯緣第八見分今六麤皆緣外境故不說也亦可下三約計內外答此約我我所分亦屬六八故不言第七意云第七正是執我我所今分兩處無體可言楞下三證二先引經宋譯文也經中下次釋義現識等者正配釋彼經云譬如明鏡持諸色像現識處現亦復如是所以下辨事識義也攀緣外境界等亦是義取宋云取種種塵及無始妄想熏是分別事識因唐云分別事識以分別境界及無始戲論習氣為因既云緣外塵境非六而誰由是論依經說故不復論第七識也故知下結會彼此然上多義明此論中不說第七者要異海東曉公說下智相即第七故故彼文云言智相者是第七識麤中之始始有慧數分別我塵故名智相夫人經說六識及心法智今之智相即心法智也若具而言之緣於本識內也末那細分緣者計以為我緣所現境外也末那麤分緣者計為我所今就麤現說之依境界心起分別又此境界不離現識猶如影像不離鏡面此第七識直爾內向計我我所而不別計心外有塵故餘處說還緣彼識如唯識三十頌等問云何得知第七末那非但緣內識亦緣外六塵答此有二釋一依比量二聖言量比量者量云意根是有法必與意識同境故是宗因云不共所依故同喻如眼等根異喻如次第滅意三支無過故知意根遍行六塵聖言量者一金鼓經云眼根受色耳分別聲乃至意根分別一切諸法大乘意根即是末那故知遍緣一切也二對法論十種分別中言第一相分別者謂身所居處所受用義彼復如其次第如諸色根器世間色等境界為相第二相顯分別者謂六識身及意如前所說所取相而顯現故此中五識唯現色等塵意識及意通現色根及器世間色等境界設使末那不緣色根器世界等即能現分別唯應取六識而言及意故知通緣已上皆略彼疏而說今此疏意明無第七乃是影攝無違常式意不緣外故有多義也文中二先躡前總標次立名別釋先躡前總標以有境界緣故復生六種相記此之六相雖則展轉各有所依今亦但取根本而言故云依境界緣生六相也楞伽云境界風所動種種諸識浪騰躍而轉生斯之謂歟次立名別釋二初徵二釋初徵云何為六記云何緣現境界生六相耶二釋六一起計二生受三取著四立名五造業六受報一起計一者智相依於境界心起分別愛與不愛故疏於前現識所現相上不了自心所現故創起慧數分別染淨執有定性記依於境心起者此但外由境緣牽起內根發生也於前等者不知內發謂是外來楞伽云外實無有色唯自心所現愚夫不覺知妄分別有為不知外境界種種皆自心智者悉了知境界自心現創起等者隨其心王復起心數揀擇染淨決定如此故名智也體是別境心所中慧故云慧數二生受二者相續相依於智故生其苦樂覺心起念相應不斷故疏謂依前分別愛境起樂受覺不愛境起苦受覺數數起念相續現前此明自相續也又能起惑潤業引持生死即令他相續也故下文云住持苦樂等記依前等者於順情可愛之境心與喜俱名樂受覺於違情不愛之境心與瞋俱名苦受覺不苦即樂不樂即苦違順之境既續苦樂之心豈斷略以辨麤故不論其捨受而理實有之但在苦樂之間耳自相續者當相不斷故又能等者以自相續故復能發起煩惱潤於已熟之業令受報未熟之業令成熟由是引導任持令其生死不斷不絕此則令他後四相續不斷也廣如下生滅因緣五意中釋三取著三者執取相依於相續緣念境界住持苦樂心起著故疏苦樂句上皆前相續相也起著句是此執取相也謂於前苦樂等境不了虗無深起取著故下文云即此相續識依諸凡夫取著轉深計我我所等也記論云住持者謂於苦樂境上堅固停止無有變改執持不捨也疏云上皆等者是執取相所依故具牒之是此下正是明第三相以不知違順境如空華不了苦樂心如幻化的取為實確然不改故云深取故下等者即下因緣意識中文四立名四者計名字相依於妄執分別假名言相故疏依前顛倒所執相上更立假名是分別故楞伽云相名常相隨而生諸妄想故云依於妄執等也上來起惑自下造業受報記依前下境本非善以順己之情便名為善境亦非惡以違己之情便名為惡且善惡相已自不實況於名字起諸倒情寧非是假何以故他人於此或以善為惡或以惡為善二皆不定故肇公云物無當名之實名無得物之功由此名故不待眼見違順之相但耳聞善惡之名便生喜怒是故目為計名字也楞伽下引證上來下結前生後以配三障也自此已上直至根本無明盡名為惑若準佛名經云獨頭無明為煩惱種次則別開無明以為煩惱所依其實無明是癡乃根本六惑之數也若合論之皆名煩惱開合雖異俱是惑門自下等即業苦斯則三障即三道也五造業五者起業相依於名字尋名取著造種種業故疏謂執相計名依此麤惑發動身口造一切業即苦因也記執相等者謂於我執貪瞋愛見發動身口七支造善惡不動等無量差別之業於中雖有善及不動然俱有漏不出三界三界無安猶如火宅故皆苦因也六受報六者業繫苦相以依業受報不自在故疏業因已成招果必然循環諸道生死長縛記必然者必定然是也斯有兩義一不得不受故二善不為苦惡不為樂故書曰天作孽猶可違自作孽不可逭涅槃經云非空非海中非入山石間無有地方所脫之不受報故云必然三界輪轉無有罷期故曰循環死此生彼不能脫免故云長縛如螘循環如蠶作繭終而復始不自在故正法念云如繩繫飛鳥雖遠攝即還眾生業所牽當知亦如是苟非覺悟無有解期三結末歸本二初正釋二轉釋初正釋當知無明能生一切染法疏三細六麤總攝一切染法皆因根本無明不了真如而起記染法雖多不出三界因果惑業今以三細六麤攝之罄無不盡如是染法皆由根本無明迷真所起故論云當知等也二轉釋以一切染法皆是不覺相故疏問染法多種差別不同如何根本唯一無明答染法雖多皆是無明之業氣悉是不覺之差別相故不異不覺也記問意可知答文便是解論意也業氣即別相此根本無明別相皆是不覺業用氣分然此不覺是九相之總名九相乃不覺之別號故圓覺云身心等相皆是無明即斯義也三雙辨同異記雙辨者向說覺與不覺染淨迢然又說依覺故迷不離本覺若言其異云何依覺故迷若言其同云何染淨不等又若定同定異皆無進修之門何也同則聖凡一等欣猒都絕異則染淨抗行迷悟永隔由昧二門不即不離之旨故有斯惑然於相無相宗失意者各墮一邊故今辨釋用祛迷謬中分二先標列次解釋先標列復次覺與不覺有二種相云何為二一者同相二者異相疏覺不覺雙牒有二相標也云何二徵也一者下列也記同相則以生滅望真如說以相望性明其同也異相秪就生滅一門染淨自相望以成異也詳下論釋思之次解釋二初同二異初同三一喻二合三證一喻同相者譬如種種瓦器皆同微塵性相疏初句牒名也染淨二法同以真如為性真如以此二法為相種種瓦器喻染淨法性相者器以塵為性塵以器為相記染淨等者染即不覺三細六麤淨則覺義二相四鏡以者用也緣真如是總相門故能通與二法為性又真如無相故以此二法為相斯則二相同依一性一性同生二相由是同字性相俱用喻染淨者器有精麤故器以等者器喻生滅門中染淨諸法塵喻真如門無相一理瓦器皆同以微塵為性微塵皆同以瓦器為相詳之二合如是無漏無明種種業幻皆同真如性相疏無漏始本二覺也無明本末二不覺也業幻者此二皆有業用顯現而非實有故云幻此等合種種器也皆同性相者以動真如門作此生滅門中染淨二法更無別體故云性也真如亦以此二法為相淨相可知其染相者下文云但以無明而熏習故即有染相記此二者即上無漏無明義如下說非實有者從分別生故經云幻妄稱相然幻之一喻諸教多引以喻染淨其體不實良以五天此術頗眾今依古德釋義法喻略開五種喻之五者如結一巾幻作一馬一所依巾二幻師術法三所幻馬四馬有即空五癡執為實法之五者一真性二識心三依他起四我法即空五迷執我法此等合者無漏業合精器無明業合麤器更無別體者經云其性真為妙覺明體此明染淨二法皆同以真如為性也真如句明真如亦同以染淨二法為相也淨相即智淨不思議業及後二鏡已見前文下文即熏習中文然則前三細六麤雖是染相以約不覺義說故不引用今別引下文者意證此染是真如相故文云真如之法實無有染但以無明而熏習故則有染相若前九相初標後結皆約不覺不言皆是真如相故準前末應結云此合皆同微塵性相也業幻皆同真如為性合瓦器皆同微塵為性真如同以業幻為相合微塵同以瓦器為相疏不云者例上思知三證二先正引次釋疑先正引是故修多羅中依於此義說一切眾生本來常住入於涅槃菩提之法非可修相非可作相畢竟無得疏是下依此同相門如上本末二不覺本來即真如故說一切眾生自性涅槃不更滅度故淨名經云一切眾生即涅槃相不復更滅菩提下依此同相門如上始本二覺即真如故諸佛菩提非修等也又前約不覺即如故眾生舊來入涅槃今約覺智即真故諸佛菩提無新得也非修者望前涅槃非是了因所顯非作者望前菩提非是生因所作無得者此之二果性淨本有故也記依此句即釋論中依於此義以此義一句貫於下二門故眾生即不覺也不覺無體即是真如真如之理即涅槃性性自寂滅何待更滅滅度涅槃即此彼方言也淨名下彌勒章文大品亦云斷一切結入涅槃者是世俗法非第一義何以故空中無有滅亦無所滅者諸法畢竟空即是涅槃故菩提梵音秦言云覺覺即始本二覺二覺既是真如菩提豈從修得故大品云以何義故名菩提空義故是菩提如義法性義實際義等是菩提也上約眾生不覺即真如故本來涅槃此明諸佛覺亦真如故菩提不可修作既言修作應知約果所得故云諸佛以本有故何須修作而後得耶故云非可修作又前下重以真如二字釋此二段也舊入者圓覺云始知眾生本來成佛又云一切眾生即究竟覺故云無得然舊來入與無新得義同文異但以如為涅槃真為菩提為別也又時人多謂涅槃為相所累故說不覺即如本來涅槃妄計菩提修因所生故說覺性即真亦非新得由是相即無相故約不覺說涅槃非是修生元自本有故約真性說菩提望涅槃者涅槃合是修其智了所顯以不覺即如如即涅槃豈待了因了之方顯斯則未嘗不顯何待更顯故上文云舊來入涅槃望菩提者菩提合是生因所作以菩提是覺覺性即真故不待作之始生斯則未甞不有更何作耶故上文云菩提無新得然據前云諸佛菩提非修等即將此二句獨就菩提而論今又分此修作以望兩處所說知之此之下性淨揀非離垢淨本有揀非新近生既是本有之法不合言得以體如實常不變故不同妄法無實可得斯無得法元真實故次釋疑亦無色相可見而有見色相者唯是隨染業幻所作非是智色不空之性以智相無可見故疏亦下疑云若眾生已入涅槃更無新滅者即已同諸佛何故不能現報化等色身故此釋云法性自體本無色相可見如何使現色等相耶記疑下初敘疑約聖疑凡難也故此下二釋通依體捨用釋也楞伽云真實中無物云何起分別又經云佛真法身猶若虗空此皆約無色也疏而有下又疑云若以法性非是色相可見法故不現色者諸佛何故現報化等種種色耶故此釋云彼見諸佛種種色相等者並是隨眾生染幻心中變異顯現屬後異相門非此同相門中本覺智內有此色等不空之性也又亦可本覺不空恒沙德中亦無此色故也記又下三轉難約應疑真難也故此下四轉釋依本捨末釋也謂佛果海但有大定智悲而無色相眾生見有報化色等相者是彼菩薩業識凡小事識所現屬於無明差別之相故下文云但隨眾生見聞得益故說為用也非此下約離相釋下云諸佛如來唯是法身智相之身第一義諦無有世諦可見既云是第一義無有世諦豈於此中而有色等不空性耶又下云以色性即智故色體無形說名智身楞嚴云性色真空故本覺智性內無有不空色相等也又亦下約性德釋彼是真善妙色即性之相雖名為色亦非可見之相故云智色下文云以智性即色故說名法身疏以智下問何以得知彼法體中無色相耶故此答云以本覺智非是可見之法故也記問下五隨難約相疑性難也故此下六隨釋依真捨妄釋也以本覺不空性中智慧德相亦無有相可取故前云所言覺義者謂心體離念離念境界唯證相應故後云諸佛法身無有彼此色相迭相見故二異異相者如種種瓦器各各不同如是無漏無明隨染幻差別性染幻差別故疏初句牒名如下喻也如是下合也無漏無明總指隨染下別明無漏法也性染句是無明法也以彼無明迷平等理是故其性自是差別故下文云如是無明自性差別故也諸無漏法順平等性直論其性則無差別但隨染法差別相故說無漏法有差別耳如下文中對業識等差別染法故說本覺恒沙性德又由對治彼染法差別故成始覺萬德差別也如是染淨皆是真如隨緣顯現似有而無體故通名幻也記喻中種種器譬生滅門中染淨法相各不同者譬染法內三細異於六麤淨法內二相異於四鏡別明者以無漏淨法體是覺性覺性無差但隨無明故現差別有差無差故別明也以彼下先釋性染句明無明本性自是差別若不差別則不能迷平等理也下文即真如體相熏習中文諸無下次釋隨染句先約本覺義說無漏即通指本始二覺修性功德也直論性者尅就真體說也是前門中所示真如體故但隨下約對染差別說淨差別即後門中所示本覺相也比如一月影現萬水月本無差隨水影別下文即相大文也又由下次約始覺義說由為治慳貪等染法成布施等波羅蜜無漏淨行及果上十力四無畏等萬德之義也前則待差染以成差此則治差染以成差亦可前相後用耳又以隨差別眾生以成差也二句中皆有此一義前已問答故此闕之具此三義故云隨染差別等也如是下釋染淨法皆如幻義以對待之法本不立故如經云若有一法勝過涅槃我亦說為如夢幻等金剛亦云凡所有相皆是虗妄然上所說同異之義即是真如生滅二門不相離義約生滅門即同而異約真如門即異而同苟得一心二門之旨即無惑於此二釋上生滅因緣記生滅因緣者以上立義分云是心生滅因緣相於中心生滅已如上釋今則釋因緣兩字然是生滅家之因緣故復言生滅也文分二初明生滅因緣義二重顯所依緣體初明生滅因緣義三先總標次徵問三別釋先總標復次生滅因緣者所謂眾生依心意意識轉故疏初句牒前以標也棃耶心體不守自性是生滅因根本無明熏動心體是生滅緣又無明住地諸染根本是生滅因外妄境界動起識浪是生滅緣依是二義以顯因緣所下諸識生滅相集而生故名眾生而無別體唯依心體故言依心即是棃耶自相心也能依眾生是意意識依心體起故云轉轉者起也記初下初解牒文牒前標者謂牒前立義分中之所宗標為此下論文之所釋棃耶下一重是能生三細之因緣心體即真如於中唯取隨緣一義以不守自性故根本等者以是親迷真覺故不取枝末又此唯當成事之義不取體空又無明下一重是能生六麤之因緣葢此兩重因緣正如楞伽所說不思議熏變及取種種塵無始妄想熏等廣如下說又此兩重但有三法謂真如唯因境界局緣無明望真則為緣望境則為因結文可知諸識下二解標文然此但唯約心故云諸識若云五陰和合中生斯則兼於色也而無下如波無別體唯依於水上云依如來藏故有生滅心等自相心者即前不守自性生滅因也能依等者但以約法約人立名有異意與意識即是眾生無別體也即前諸識生滅相集而生也又眾生是總意等是別總別雖殊其體一也皆從心起以心為依然此中能所依起心望意心能起意所起意望心意能依心所依意望意識依起例知下五意亦准之以心意意識相望分別有通有局思之可見心通也意識局也意望前則局望後則通楞伽亦云藏識說名心第八識思量性名意第七識能了諸境相是則名為識前六識今此心是如來藏意是五意識唯第六故不同彼次徵問此業云何疏此心作眾生義云何記既云眾生依於心體有意等起其相云何三別釋三初釋所依心二釋意轉三釋意識轉初釋所依心以依阿棃耶識說有無明疏棃耶者是上所說心即是生滅之因無明者於棃耶識二義中此是不覺義即生滅之緣欲明依此因緣意意識轉故故言以依等也上總中略指其因故但言依心此別釋中具顯因緣故說依心及無明也記先釋文也是上等者以棃耶是總覺及無明是總中別義今既說無明依棃耶有應知唯取覺義為所依也論文約總取別故云棃耶疏中釋出別義故云是上所說心即不守自性真如也餘文可知欲明等者此但指前第一重之因緣也上總下或問曰前云依心有意等轉故今兼云無明者何謂也故此釋之疏問上說依覺有不覺由此不覺力故動彼心體令起滅和合方有棃耶業相等識何故此中說依棃耶有無明乎答此有三釋一由此棃耶有二種義故謂由無明動彼真心成此棃耶又即此棃耶還却與彼無明為依以不相離故何者謂依迷起似故即是動真心成業識迷似為實故即是依棃耶而有無明也二云以棃耶有二義謂覺不覺前別就本說故云依覺有不覺今就都位論故云依棃耶有無明也此即二義中不覺之義正在棃耶中故說依也三云此中正意唯取真心隨緣之義此隨緣義難名目故或就未起說依真如有無明或約成就起已說依棃耶有無明然此二名方盡其義是故文中前後綺互言耳記次問答也初問上說舉前所說也如云依覺故迷又云依如來藏有生滅心等今此却云依棃耶有豈同前說答下二答中二初正答三初約迷真執似釋與無明為依等者如風動水成波風還依此波中故前云風相水相不相捨離又云依不覺生三種相與彼不覺相應不離故何者下重釋前義依迷者是依無明迷真而有棃耶真與妄俱似一似常故即迷真義也經云迷本圓明是生虛妄迷似等者依棃耶有無明迷似一為實一迷似常為實常經云所既妄立生汝妄能即執妄義也即此二義一識所論前後互出故不相違二云下次約總別義異釋別就本者尅就真體豎說也覺即是本依本起末故就都位者即通約真妄橫說也如風動水成波風水俱在波中也三云下後約未起已起釋唯取真心隨義緣者心有隨緣不變二義今唯取隨緣一義也難名目者隨緣中具未起已起之義難以一義目之也未起等者從未有棃耶時說起已等者據已有棃耶處說然此下二結成意云若唯取初義則似真前妄後之失亦有悟後再迷之過亦同數論冥初生覺若唯取後義則似諸法不由迷真而成但從本識建立則有真妄別體之失亦何異法相宗耶今以後義免前過以前義免後過故互言也以二義更互用之隱顯相成如綺之文故云綺互二釋意轉三初略明識相二廣辨五名三結歸一心初略明識相疏略明五種識相也記別開有五識總唯一意耳不覺而起能見能現能取境界起念相續故說為意疏不覺起者所依心體由無明熏舉體而動即是業識也前依棃耶有無明即依似起迷今熏淨心成棃耶即依迷起似此二義一時說有前後耳能見者即彼心體轉成能見是轉識也能現者即彼心體復成能現即是現識也能取者能取現識所現境界是為智識也起念者前所取境起諸麤念是相續識也依此五義次第轉成依止依止此義而生意識等故說為意故攝論云意以能生依止為義也記論中前四句明意相後一句結意義疏中依似起迷者即依妄心起枝末無明也依迷起似者即依根本不覺起妄心也此言似者即以創迷真性成此妄心微細流注似其不動似無差別故云似一似常楞嚴呼為妄覺影明斯之謂也此二下義有前後時無前後如前三義答問秖就一識一時而說故不可作前後之異餘文可知依此等者謂依依止義下准知心起生起義下例知業識乃至依智識起相續及於意識斯則後依止前前能生後次第依止及與能生也於中能所依生能生所依也前後相望有通有局如文可解初句依心起業通也後句依智起續局也中間依業起轉依轉起現依現起智三句亦通亦局以望前則局望後則通故此則以依生釋意不同常途以籌量釋意有取相宗第七末那解此意者誤矣攝論下引證可知二廣辨五名二初標徵二列釋初標徵此意復有五種名云何為五疏有五標也云何徵也二列釋五一業二轉三現四智五續一業一者名為業識謂無明力不覺心動故疏一下立名也下四準此無明根本無明即所依緣也明心不自起起必由緣心動者正明起相釋成業義起動是業義故記心不自起等者心非動性故性雖不動隨緣故動以不守自性故如水不自浪因風力也由此免於無窮之過正明起相者以覺則不動不動則無相不覺則動動則相起也起動是業者於二義中不舉為因一義亦含在其中也以動即有苦果故二轉二者名為轉識依於動心能見相故疏依於等者依前業識之動轉成能見之相轉識有二若就無明所動轉成能見者在本識中若其境界所動轉成能見者在事識中此中轉相約初義也記依前下正釋此文轉識下對下辨異無明所動者此從內起位屬本識當於三細名為轉識境界所動者此從外起位屬事識當於六麤名為智識上如泉涌之波此如風擊之浪但常途所明轉識唯取前七今說轉識在本識中恐相混濫故特揀之三現三者名為現識所謂能現一切境界猶如明鏡現於色像現識亦爾隨其五塵對至即現無有前後以一切時任運而起常在前故疏依前轉識之見起此能現之功故云能現境界以其心體與無明合熏習力故現於種種無邊境界故也明鏡現像喻可知也現識下且舉五塵麤顯以合色像而實通現一切境界故法說中云一切也若依瑜伽論中則現五根種子及器世間等今此論中偏就五塵者以此約牽起分別事識義故作是說也非如六七識有時斷滅故云常在前又為諸法本故明此識在諸法之先以是諸法所依故揀異末那識也記能現功者即前轉識能現相故就此功能便名現識以其下釋行相也故下文云以有妄心即熏習無明不了真如法故不覺念起現妄境界通現一切者謂有漏無漏色心諸法非獨五塵也法說指喻前文若依下引論對辨五根即眼等五色根及根依處一種子即善惡無記等三性種子二器世間即山河大地等三此三類境皆是第八相分然此相分皆為第八執受執謂攝義持義受謂領以為境令生覺受於中種子具三義一攝為自體二持令不散三領以為境根身具二闕攝為自體故器界唯一但領以為境故故唯識云不可知執受處亦可種子根身緣而執受器世間量但緣非執受故今此下或問若然者何故此中唯言現五塵耶故此釋也以對所牽事識故於一切境中偏舉此五論云對至即現意在此也非如下約相續不斷義以解一切時常在前也如第六識在於五無心位即有斷滅故唯識頌云意識常現起除生無想天一及無心二定二三睡眠四與悶絕五又第七識入於滅盡定時雖云淨分不斷然有盡七之言為約染分亦成斷義唯識論云此染汙意學位滅定出世道中俱暫伏滅故說無有等詳在五卷中釋又唯識論所熏四義中云若法始終一類相續能持習氣乃是所熏此揀前七轉識如風聲等既如風聲則非相續有間斷故又為下約為先義以解任運常在前也意云前者先也以迷時先有為諸法本更無有法先於此故末那無此義如唯識云是識名末那依彼第八轉緣彼第八故此揀異之也然前揀六七之文是海東意後揀第七一義是今疏意故云又也四智四者名為智識謂分別染淨法故疏即事識內微細分謂不了前心所現境故起染淨微細分別故云智識記微細分者法執俱生故迷唯心境見從外來起微細心分別染淨故云不了五續五者名為相續識以念相應不斷故住持過去無量世等善惡之業令不失故復能成熟現在未來苦樂等報無差違故能令現在已經之事忽然而念未來之事不覺妄慮疏亦是事識中細分前六相中相續相也以念等者法執相應得長相續此約自體不斷釋相續義住持下以此識能起潤業煩惱能引持過去無明所發諸行善惡業種令成堪任來果之有若無惑潤業相焦亡故也此則引生令熟復能下又復能起潤生煩惱能使已熟之業感報相應成熟無差如是三世因果流轉連持不絕功由意識以是義故名相續識能令下顯此識用麤分別相不同智識微細分別故也此上所解但屬此相續識約其功能釋相續義又為一解從住持下總辨前五意功能初住持業果是前三細功能屬梨耶從念已未之境是後二功能屬事識細分記五下初立名亦細分者此是法執分別麤於俱生故除微字但云細分此上二識皆云細者以是麤中之細故同是法執故以念下次釋義二先直明本相住持下次別顯功能二一能起潤惑初起潤業惑住謂留住持謂任持謂留住任持令業不失也此識等者謂過去無明所發業行種子未成熟者以有此識發愛取煩惱潤之使令成熟堪為來世感果之有有即業種變異也若無下如植種於土無水則焦結業待果無貪則敗經云愛水由潤業故復能下二起潤生惑又復等者謂潤已熟業令受果報善惡樂苦自然相應如印印物不相違反故曰無差現在即現報未來即生後二報如是下通收前段以結其名也斯則潤過去未熟業令成現在已熟業潤現在已熟業令招未來果報如是循環無有斷絕由不斷絕故名相續然其潤業潤生即是令他相續義也能令下二能起念慮已經者是過去追念不忘也未來事逆慮而起也現在境緣持不斷也顯此識用等者以此識既能起麤分別念慮三世與前智相微細不同非法執分別而誰此上下上則正釋當文此則通前重示也先結屬此識又為下次總通前五從住持下等者反顯從住持上別明相續識功能也三細功能者以第八識能集種子起現行故後二功能者於中但約分別不斷而分二異故攝論云意識緣三世境等即斯義也三結歸一心二初正結屬心二釋疑廣辨初正結屬心曲分二段初順結三界二反結六塵初順結三界是故三界虗偽唯心所作疏是前一心隨無明動作五種識故故說三界唯心轉也此心隨熏現似曰虗隱其虛體詐現實狀曰偽虗偽之狀雖有種種然窮其因緣唯心所作十地經中亦同此也記是下解是故二字故說等者三界不出五意五意唯依一心故三界唯心作也以現識中具有根身種子器世間故故楞伽云從於無色界乃至地獄中普現為眾生皆是唯心作現似曰虗者依他起法如麻上繩似有其相究體不實詐現曰偽者徧計所起如繩上蛇相畢竟無分別妄現唯心作者性圓成實如繩蛇無體不離麻故十地經者華嚴十地品云了知三界依心有十二因緣亦復然一切皆由心所作心若滅者生死盡二反結六塵離心則無六塵境界疏離彼現識則無塵境反驗六塵唯是一心記心起成識依識有塵究其根本唯一心作故經云由心生故種種法生又圭山云生法本空一切唯識識如幻夢但是一心然此三界六塵皆攝色心等法是故順結反結皆歸一心二釋疑廣辨三初問二答三結初問此義云何疏現有塵境云何唯心記意云若是唯心不合有境以心無相不可見故既有所見云何唯心二答以一切法皆從心起妄念而生一切分別即分別自心心不見心無相可得疏以一切法皆是此心隨熏所起更無異體故說唯心妄念而生者又疑云何以此心作諸法耶故此釋云由妄念熏故生起諸法亦可疑云法既唯心我何不見而我所見唯是異心釋云言異心者是汝妄念分別而作一切下境唯識現無外實法是故分別但分別自心此一句顯無塵唯識義爾心不見心者既塵無相識不自緣是故無塵識不生也無相可得者能所俱寂也攝論云無有少法能取少法記以下答有二先答無塵三界塵境皆是心隨染淨緣熏而起既一切法從心起故所起無體即唯一心故楞伽云心亦唯是心非心亦心起種種諸色相通達皆是心又疑下即躡所答處以起此疑也意云既唯一真淨心因何起諸染法楞嚴滿慈圓覺剛藏皆同此意釋中妄念即根本等無明也由無量妄念熏故遂有諸法其猶淨眼不見空華但以翳覆便見華相亦可下又是前疑中之別意非續次所起以二種疑釋論文皆通故但前約依他此約遍計疑意云諸法既唯是心我心中何不見而我心中所見唯有異心無法釋云下言異心者是汝種種妄念彼一切法正由汝之異心妄念分別而作如見空華是汝眼病楞伽云如愚不了繩妄取以為蛇不了自心現妄分別外境一下次顯唯心境唯識者如像唯鏡現故分別像者即是分別鏡也楞嚴云自心取自心非幻成幻法無塵唯識者如唯識頌云唯識無境界以無塵妄見如人目有翳見毛月等事心不見心者意云心是一心不合自見故楞伽云如刀不自割如指不自觸而心不見心其事亦如是當知有所見者皆是妄也既塵等者釋也意云塵境若存則可以心緣境塵既不有縱有心在亦不能自緣也是故等者結也意云以有塵故牽彼識生既無塵境識不生也故經云由法生故種種心生今法既不生心亦不生也無相得者既無他可見自亦不能見所見無故能見不成也能所寂者心無心相是能緣寂境無境相即所緣寂楞伽云能見及所見一切不可得此中大意欲顯一心本無能所能所俱寂方是真心亦非泯之令寂本自寂也攝論下引證具云所說諸法唯識所現無有少法能取少法以唯識心中離二取相故亦可從以一切下正答彼問妄念下展轉釋疑此句疑釋如疏兩意一切下疑云由分別妄念故生起諸法然起能別心必有所別境是法既無云何分別故此釋云一切分別即分別自心心不句疑云若如是者即應見心故此釋云心不見心反明分別悉皆是妄無相句疑云如何心不見心故此釋云無相可得斯則心無相故不可見心心外又無一法當知有見相者皆妄見也二取相忘唯一心在即不空門中所顯真性也故經云諸幻滅盡覺心不動三結當知世間一切境界皆依眾生無明妄心而得住持是故一切法如鏡中像無體可得唯心虗妄以心生則種種法生心滅則種種法滅故疏無明根本也妄心業識也以一切境界由此而成即現識等也若無明未盡以還此識住持境界不息此即結相屬心也鏡像喻況也此境離心之外無體又即心故無體如像離鏡之外無形鏡內復無其體唯心句又疑云既其無體何以宛然顯現故此釋云此並真心之上虗妄顯現何處有體而可得耶以心下又問何以得知心上顯現故此答云反驗唯心顯現成妄也以心生法生等故知也此中以無明力不覺心動乃至能現一切境等故言心生種種法生此則心隨熏動故云生也若無明滅境界隨滅諸識分別皆滅無餘故言心滅則種種法滅此則心源還淨故云滅也既心隨不覺妄現諸境即驗諸境唯心無體也問上說生滅結過屬無明此文辨因緣云何結屬心耶答前以無明動彼靜心令其生滅故此生滅功在無明今此因緣和合道理成辦諸法無性義顯不住義彰故結和合屬於心也記論當知下初正結先法根本揀非枝末業識揀非轉現依無明力而任持託業識心而安住故下文云以有無明染法因故即熏習真如以熏習故則有妄心以有妄心即熏習無明不了真如法故不覺念起現妄境界等故云由此而成也現識等者等下六麤皆是所現色心境界也此一切境依彼住持若無明等者以依無明故有妄心依妄心故現妄境界所以無明未盡心境不滅如風未息波浪不滅相屬心者境唯心現心外無境故是故下次喻離心無體者皆從心起非外來故即心無體者所起之法同能起故鏡喻兩意合法可知論唯心下二釋成二初正釋虗妄現者妄念熏真起諸虗妄法故此中釋前諸法無體有二所以一唯心故二虗妄故如彼鏡像一體同鏡故二體不實故由斯諸法無體可得也論以心等者二轉顯疏中二先正解今文三先略問答問中意云何知心上妄現非法自生耶答中意云法既隨心生滅即知生法皆妄疏中反驗等者此文正顯心生法亦生心滅法亦滅對上文真心有體妄法無體是反顯耳唯心成妄即上唯心虗妄二義以心生等者出反顯所以等指心滅法滅由心生心滅故知心真有體釋成上之唯心顯義也由法但隨心之生滅故知法妄無體釋成上之虗妄現義也此中下次詳解文初明生義即指前段論文也此則下顯意非謂心是能生法是所生以真心隨熏全體成動而作諸法如金生器等故云心生也若無明下次明滅義即下文因滅故緣滅等也此則下顯意明此心體返本還源獨顯性淨此但心中無其妄動寂故名滅故云心滅也上約真心顯生滅義若約妄心說者即業轉二識名之為心斯則妄心於真心中若生若滅真心不生滅也前云相續心滅智性不壞若波相滅濕性不壞如上約真約妄雖皆有生滅之義究實而論皆妄有生滅真無生滅也既心下三總結成即結上文無體義也上云以一切法如鏡中像無體可得故此結成問下次對前釋妨問意云前明九相生滅後結云當知無明能生一切染法一切染法皆不覺相今文復云唯心虗妄心生法生心滅法滅前後何不同耶答下意云前辨生滅單就不覺說故結過屬無明以功在不覺故今此下明今文意意謂此文具說真如為因無明為緣由此因緣道理和合成就色心諸法既屬因緣遂令諸法無性之義顯然可見真如隨緣不住之理煥然明矣故結下既明和合本因真如隨緣成和合義今結屬心正其宜也如水初動功在於風故前文中結屬無明動無別體則全屬於水故此文中結屬心也然不可言波無別體而唯屬於風法理亦爾知之三釋意識轉五初約人辨麤至五識起所依初約人辨麤復次言意識者即此相續識依諸凡夫取著轉深疏初句牒前以標相續識者此生起識麤細雖殊同是一識更無別體故即指前第五識也但前就細分法執分別相應依止義門則說為意此中約其能起見愛麤惑相應從前起門說名為意識謂意之識故名意識凡夫者簡非聖人意識也以前智識及相續識通在二乘及地前所起故今約凡顯其麤也取著者以無對治故追著妄境轉極麤現故云深也記生起識者謂此意之識是前第五相續識之所生故名生起識也然無異體但約麤細而分二別故云同是一識若更細論亦即是前智識也以同依境界之所起故今不指此而偏指相續者以是意識親所依故但前下對前辨異以相續識是法執分別望於我執見愛彼名細惑又約能生依止義邊說之為意此中下明今義謂依前細相之上生起此之麤分別識此識與人我貪瞋見愛麤惡煩惱相應故下文云此識依見愛煩惱增長義故即就所起義說故云從前起門即是執取計名也以是分別之中麤分別故名為意識意之識者依於五意所起之識故本疏云依意之識依主釋也簡非聖者即二乘及地前菩薩也此二種人已能遠離意之識故故約凡夫以顯麤也又以五意亦名意識恐有所濫故此約人揀之其實五意名識是持業釋故不同此取下取即執取著即計名若與前料揀之智識是法執俱生細中細也相續識是法執分別細中麤也執取相是我執俱生下云計我我所名意識麤中細也計名相是我執分別下云分別六塵名事識麤中麤也故前疏云麤細雖殊同是一識其斯之謂與無對治等者謂無始覺觀智慧也二乘三賢得人空觀既無取著當知凡夫取著深者葢無觀慧故也其猶重病既不與藥厥疾寧瘳二出其惑體計我我所種種妄執疏非直心外計境為塵亦復於身計我於塵計所種種執者顯計我之相也或執即蘊或執離蘊記論云計我我等正釋取相由計我及我所起種種執故名為深此即意識俱生愛執取相也疏中心外計境者此是法執屬前智相及相續相亦復等者正明此識屬於我執即蘊謂凡夫所執我但通執自五蘊為主宰故離蘊即外道所執神我然有三宗一數論計我體常而量周遍猶如虗空二勝論計我體常而量不定隨身卷舒猶如牛皮三無慚計我體常猶如微塵應於根門如是眾多故云種種三執所依緣隨事攀緣分別六塵疏但緣於倒境之事不了正理故名隨事等記論云隨事攀等正釋著相由彼事事攀緣塵塵分別故名轉深此即事識分別見計名相也疏中緣倒境者如執苦為樂不淨計淨無我計我無常計常等也不了理者謂不知無我等真正理也故金剛云凡夫之人貪著其事四制立其名名為意識亦名分離識又復說名分別事識疏此論就一意識義分出五識故說意識分別六塵分離者依於六根別別取六塵故分別事識者又能分別去來內外種種事相故記此論等者乃是料揀宗說不同也難云此意識中為唯一耶為兼五耶兼五不應單名為意識唯一則眼等五識何居答云略料揀之三宗不同小乘宗中唯立一意識而義說為心意識三相宗開立八識實有四分見相性宗依一藏心而義分為五意意識次又依一意識而義分出眼等五識今此論就性宗說也謂於一意識中分出眼等五識兼本成六以對六塵故上文說意識者種種妄執分別六塵則知唯依一意之識起於眼等六用也然前智相續識亦緣六塵以彼不與愛見相應故屬前意今與愛見相應故名意識前云六麤皆屬意識者智續相屬細分執計相屬麤分思之上料揀竟約義訓者依前五意展轉生起故名為意了別六塵生長見愛故名為識疏不釋者初已明故依六根等者謂依內六根發於六識緣外六塵斯則聚緣內搖趣外奔逸既以一為六六用又不同即分離義也如佛頂經云元依一精明分成六和合光明經云六情諸根各各自緣諸塵境界不行他緣等又能下去來豎窮三世也以此意識遍緣一切通三量故假實俱緣如前云能令現在已經之事忽然而念未來之事不覺妄慮內外橫量十方也謂內根外塵色心諸法亦即計我我所又以此三名配上四句計我妄執名意識也分別六塵名分離識隨事攀緣名事識也五識起所依此識依見愛煩惱增長義故疏見謂見一處住地即見道惑愛謂欲色有三愛即修道惑以此見修二惑熏於本識令生此分別事識故云增長上六麤中執取計名及起業相並相從入此意識中及後六染中執相應染亦入此攝也記見一處者五住地中之一數此是三界分別麤惑迷理起者謂迷四諦理而起也迷理隨眠通於見修見斷為麤修斷為細唯識論云諸見所斷及修所斷迷理隨眠唯有根本無分別智親證理故能正斷彼同於見道處斷故名見道惑欲色有三愛即三界俱生任運也細惑迷事起者謂迷六塵事而起也迷事隨眠對迷理言事麤理細故唯修斷唯識論云餘修所斷迷事隨眠根本後得俱能正斷於修道位中所除斷故名修道惑以此等者謂以此見愛煩惱熏於第八令彼識中第六種子有生長增益故即起現行也上六下類攝然執取計名正當此識起業一相是此所生總別報業是此識造今約所造從能造說亦此識攝故云相從入也執相應者於六染中唯此合執計二相以為一染正當此識攝也二重顯所依緣體二初略明緣起甚深二廣顯緣起差別初略明緣起甚深二初標歎甚深二出深所以初標歎甚深依無明熏習所起識者非凡夫能知亦非二乘智慧所覺謂依菩薩從初正信發心觀察若證法身得少分知乃至菩薩究竟地不能盡知唯佛窮了疏依無明者牒上所說依根本無明起彼靜心成業等識也非凡夫等者凡小非分也二乘但覺四住不了無明故此無明所起之識非其境也依菩薩下明菩薩分知初正信者十信之初發心之時即觀本識自性緣起因果之體得成正信也發心句三賢位中並言比觀故云觀察少分不能盡者地上證之未窮故以其但覺住相不覺生相唯佛者四相俱了故得窮源記牒上等者上云謂無明力不覺心動故名業識等謂心與無明和合起成業等三細也非凡下依位別歎三先凡小非分凡夫尚不知意之識況此三細耶二乘方覺事識中麤分尚不覺細分正認三細以為涅槃是以無明所起之識者非其境界也於五住地中但覺前四是前見愛所增長識也若根本無明是第五住非彼所覺依下二菩薩分知十信等者謂此菩薩雖位在外凡而能信教了知本識因緣所生無有自性決定無體唯是真如方成正信故下說十信菩薩信真如及修真如三昧以成正信之行因果體者因即無明果即本識三相體即真如也三賢等者異前位之信殊後位之證故言觀察比觀者既未親證但比度觀察即相似覺也法身即初地已去究竟即十地乃至之言攝於中八隨分覺故不能盡知然初地且約破法執故說為少知若克就識論八地方覺此識現相也唯下三唯佛能窮以覺前者則不覺後覺後者必能覺前故云四相俱了前云若得無念者則知心相生住異滅二出深所以二初徵二釋初徵何以故疏緣起妙理貫通凡聖何故說見唯在果人記真如為因無明為緣起成諸識斯則性起為相是不思議微妙理趣故云緣起妙理問意可知二釋三初即淨而染二即染常淨三結成難測初即淨而染是心從本以來自性清淨而有無明為無明所染有其染心疏性淨者一緣起體即因也無明者二發緣起之由即緣也染心者三顯緣起之相即不染而染也記因即棃耶心體是其覺義即不思議變者緣即根本無明是不覺義即不思議熏者染心即業等諸識以於不可熏變處而熏變故不染而染者即前自性心體非是染法以不守自性故隨熏成染故下云真如之法實無於染但以無明而熏習故則有染相二即染常淨雖有染心而常恒不變疏釋緣起甚深義即染而不染也記即染等者雖隨熏成染其體常淨如鏡現穢其體不動斯則正由不動而得隨緣正由隨緣顯得不動三結成難測是故此義唯佛能知疏勝鬘經云自性清淨心難可了知彼心為煩惱所染亦難可了知乃至結云唯佛能知楞伽經中亦同此說故彼經云如來藏是清淨相客塵煩惱垢染不淨乃至廣說下結云我今與汝及諸菩薩甚深智者能了分別也記論云此義指上即淨即染二義也唯佛知者欲言其淨則九相紛然欲言其染則一味無變若非佛智孰能知焉前問緣起妙理何故唯在果人故作此結答也記疏云自性難了者以能隨緣成染故所染難了者以即染而常淨故甚深智者即八地已上少分而知以覺轉現相故然從初地亦得少知以證真故前云若證法身得少分知能了別者了如來藏不染而染別煩惱垢染而不染也二廣顯緣起差別二初緣起體相二更重料揀初緣起體相三初顯上不變之義二顯上無明緣起之由三顯上緣起之相初顯上不變之義所謂心性常無念故名為不變疏雖舉體動而本來靜故云常無念顯上緣起因體也記雖舉等者如杌不作鬼繩不為蛇東處無西等無念即覺義既常是覺即無不覺無不覺故名為不變緣起體者即前自性清淨心故云因也二顯上無明緣起之由以不達一法界故心不相應忽然念起名為無明疏此顯根本無明最極微細未有能所王數差別即心之惑故云不相應非同心王心數相應唯此無明為染法之源最極微細更無染法能為此本故云忽然念起也如纓絡本業經云四住地前使無法起故名無始無明住地是則明其無明之前無別有法為始集之本故云無始即是此論忽然義也此約麤細相依之門說為無前亦言忽然不約時節以說忽然也記此顯下初釋心不相應此明無明之體初起微細未分王數心境之相應故又此無明是全性之惑故云即心亦可此惑是與真心不相應之法如前云從本以來不與妄染相應故今以不如實知故忽然而起說此以為根本無明也唯此下二釋忽然念起三初正釋今義是諸染法始起之源本故故約忽起以表其先也如纓下二引經證成四住前使者即無明使也無法起者意顯無明使外別無有法為能起無明之本也是則下三會彼同此二先正會如文此約下二結揀意明無前之忽然非有始之忽然也言無前者以此無明最微細故更無有法前於此者前即始也由無始起之本故說忽然故本疏云以起無初肇公亦云如鏡忽塵如空忽雲即斯義也三顯上緣起之相疏謂顯上有其染心之句也中三初標二徵三釋初標染心者有六種記染心六者以上云無明所染有其染心故今釋此心相有其六種差別不同也二徵云何為六三釋疏然此六染逆次配六麤中前四及後三細由此第一合彼麤中三四故但六也便借此名以科此六六中各二皆初障後治記逆次配者前說隨流生起故從細至麤為順次今明反流除斷故從麤至細為逆次前取近理為先今取易斷為先也由此下配第一染以二乘三賢同斷此故便借下將前科此免更會同也科分六者初執取計名字相至六業相初執取計名字相一者執相應染依二乘解脫及信相應地遠離故疏一下是六麤中第三第四相也亦是上意識見愛煩惱所增長義亦是上四相中麤分別執著相也但麤心外執與境相應汙其淨行故云執相應染也二乘解脫者至無學位見修煩惱究竟離也及下十解已去信根成就無有退失名信相應故地論云地前總名信行地菩薩無著論中亦同此說也此菩薩得人空見修煩惱不得現行故云遠離非約隨眠以留惑故故攝論云若不斷上心則不異凡夫若不留惑種子則不異二乘又二意留惑為自他也此約終教說若約始教初地已上方說留惑如餘論說今此菩薩非直斷四住人執亦分斷無明住地故此論下云不了一法界義者從信相應地觀察學斷故今但為顯人我麤執故不論彼也記初障也是六等者據用科名合無此說今此重對者為通前類攝故此即九相中二相見愛等即五意中意之識麤分別即異相也但麤下釋執別名外執於境與境相應內起見愛計我我所故汙其句釋染通名淨行即真如根本智也此智有二一人空智二法空智此智不起者由染心有力為能障故名之為汙若漸修此觀觀成智起即翻染心便名為治斯則敵體相違故成治義然此以對始覺名染義也若據論意則約對本覺之淨以明其染故前文云是心從來自性清淨而有無明為無明所染有其染心問障染何別答體雖無別名義有殊障則對始覺立如下文云能障真如根本智故染則對本覺立如上所引是心從來自性清淨等二乘下次治也無學等者此明見愛四住煩惱辟支羅漢悉能離故十解下二初約三賢以明行位二初正顯行位據此則三賢菩薩同受此名以皆不退失故故地下二引論證成無著論即金剛論彼論三地謂信行地淨心地究竟地也此菩薩下二對二乘以顯斷惑又二初覈劣以明麤惑二初表異凡小得人空者以此菩薩得此觀故能伏現行不同凡夫然於種子不盡除滅不同二乘言隨眠者種子異名謂隨逐有情眠伏藏識今此論中約現行說名為遠離非約種子攝論下引證上心即現行也二意者留此惑種潤於故業受分段身修習種智斷所知障即自利也兼俯就羣品攝化利益即利他也若不留惑種即同二乘獨出三界二利俱失也故圓覺云菩薩示現世間非愛為本但以慈悲令彼捨愛假諸貪欲而入生死問菩薩既留惑種後起現行受分段身與凡夫何異答前引圓覺足辨其異雖留惑種受分段身以有智故終不起過假此分段為所依故廣修種智及行大悲終不令此起於新業如禁蛇法雖不令死亦不噬人故攝論云煩惱伏不起如毒呪所害留惑煩惱至惑盡所知證佛一切智此約下二揀定權實初地下約頓悟說謂此菩薩在地前時以二空觀雙伏二障分別至見道位種現俱斷從此位去若智增者便伏煩惱現行至佛方斷若悲增者故意令生極至八地現行方伏留隨眠惑以助願力化利眾生今此論中約生起時一向豎說及至斷時從麤至細故在地前已除我執俱生分別至登地時唯斷法執分別二地已去秪斷法執俱生更無煩惱不同彼教橫說二障種子在第八中良以權實教異與此相望校一僧祗如餘論者即瑜伽唯識等廣明今此下二超勝以除細執三初正明以是實教菩薩從初正信便達真如本有無明本空隨順無念於此地前能修法空真如三昧自然令彼法執不生伏於無明與真相應故云分斷但伏故名斷也故此下二引證不了法界即無明也下說發直等三心修無住等四方便及施等六度皆此觀斷義也今但下三結意以是約執取人非約人明執故不論也二相續相二者不斷相應染依信相應地修學方便漸漸能捨得淨心地究竟離故疏二下六麤中第二也從此至六又逆配前五意中此位第五但執法續生生起不斷即是相續義也依信下十解已去修唯識觀尋伺方便乃至初地證三無性徧滿真如法執分別不得現行記障中但執等者即是法執相續生起不斷故前云相續今云不斷其義一也治中十解等者謂從三賢位中觀察尋伺分斷此染直到初地方能全離修唯識觀者即資糧位中習行順解脫分尋伺方便者即加行位中習行順決擇分初地即見道信無漏智火燒煩惱薪通達佛法名歡喜地三無性者謂遍計相無性依他無自然性圓成無前徧計我法之性故唯識云初即相無性次無自然性後由遠離前所執我法性徧滿真如者即遍行真如所言遍者唯識云謂此真如二空所顯無有一法而不在故所言證者以無分別智契無差別理能所兩亡也故唯識云若時於所緣智都無所得爾時住唯識離二取相故法執等者由修習唯識觀故至此成就無漏智相分得現行由是此執分別永得除滅三智相三者分別智相應染依具戒地漸離乃至無相方便地究竟離故疏三下六中第一五中第四以能分別世出世諸法染淨故云智也是法執修惑依具下七地已還有出入觀異故於境界有微細分別然地地分除故云漸離八地已去無出觀緣境故於七地盡此惑也云究竟離以二地三聚戒具故云具戒地以七地前無相觀有加行方便有功用故云無相方便地八地已上無相無方便功用故記障中以能下釋名可知法執修惑者所知障中俱生之分以修道所斷故名修惑治中七地等者此等已還法空觀有間斷有相有功用遂於染淨境界未免分別然從二地已來分分除斷故云漸也八地下釋得離此染所以若殘此染則不登七地豈況至八故至七地門中都盡此染也以二地下釋二地名謂攝律儀善法眾生三聚具足名具戒地又以遠離微細破戒垢故亦名為離垢地準華嚴說十地如次修十波羅蜜此正當戒波羅蜜餘地非不持戒以約增勝說故以七下釋七地名斯則八地名無相七地名方便謂與無相地作方便故乃是無相之方便也八地下反顯可知四境界相四者現色不相應染依色自在地能離故疏四下三細五意中皆當第三此即依根本無明動彼淨心令現境界也依色下以八地中得三種世間自在色性隨心無有隔礙故云色自在地能離也以色不自在位現識不亡故此位中遣彼相也記初句障根本等者無明動心成業轉現相現相即現境界也今當現相依句治色性無礙者以色自心生故心能變色故由是能毛容剎海芥納須彌色心不相妨自他無分隔也本業經云所謂無相大慧方便大用無有色習無明亦盡百萬劫事無量佛土事以一念心一時行現如佛形現一切眾生形以一念心中一時行已無功用故三世間自在者謂此菩薩觀此三種麤細之色無不通達無分別智任運相續相用煩惱不能動故以色下舉下位以反顯意云七地已前現識不亡故色不自在今得自在者葢現識亡也然於七地觀斷至八地盡前後皆然應知之五能見相五者能見心不相應染依心自在地能離故疏五句三中五中皆當第二以根本無明動令能見上文云依於動心成能見故依心下以九地中善知眾生心行十種稠林故云心自在此於他心得自在又以自得四十無礙智出華嚴經有礙能緣永不得起記障文可知治中善知下於他心得自在也十稠林者華嚴云此菩薩以如實智慧知眾生一心稠林二煩惱三業四根五解六性七樂願八隨眠九受生習氣相續十三聚差別一一皆云稠林者此等諸法稠密如林故以喻之淨名云善知眾生往來所趣及心所行此歎九地菩薩本業經云一切功德行皆成就心習已滅無明亦除也又以下明於自心得自在四十無礙智者準華嚴說有十種四無礙智四者一法二義三詞四樂說十者世親判為十相一自相二同相三行相四說相五智相六無我相七業相八因相九果相十住持相一一具四故成四十廣如彼說有礙下結所離之染礙即障染能緣是智起即不自在不起即如前云心習已滅也六業相六者根本業不相應染依菩薩盡地得入如來地能離故疏六句三中五中皆當第一以無明力不覺心動故菩薩下十地終心金剛喻定無垢地中微細習氣心念都盡故上文云得見心性心則常住故記障中心動業也治中盡地即究竟地如前云乃至菩薩究竟地有本多云地盡義亦有在不如地字在下義順以前後皆結云地故此即第十地也如來即妙覺斯則從九地觀斷佛地方盡無垢地即如來地與十地終心竟無有異然本業經中等覺為無垢地彼即別開今此所明等妙二覺合為一位也餘可知二更重料揀三初辨上無明約治料揀二釋上相應不相應義三舉上染心及無明約境成二礙義初辨上無明約治料揀記如上六染但是無明所起之法已分配因果諸位明斷竟然上云不達一法界故名為無明未知此使依何位人能遠離耶故今辨之不了一法界義者從信相應地觀察學斷入淨心地隨分得離乃至如來地能究竟離故疏不句標也從下初麤者至初地離後細者至佛地盡故也此即是上染心所依無明住地能染真如成染心故上文云破和合識者滅無明故滅相續心者斷染心故今無明與染心雖說有前後然治滅並一時也記麤者枝末無明從初地漸離至七地方盡細者根本無明從八地始斷現相至十地盡業佛地滅不覺也此即下上說自性清淨心為無明所染有其染心當知無明是染心之所依染心是無明之所起也上云者即智淨相文然此六染位中各有三分一分屬於無明一分屬於染心以皆有和合及相續義故但約與前和合迷執不改即是無明約展轉起後相續不斷即是染心由是地前便有斷無明義也今言初地方離者以約破法執位明其斷義不乖諸說故標此位也今無明下明生起時義說前後以論因緣和合義故若除斷時則無前後以能依所依不相離故二釋上相應不相應義記以上六染中有相應不相應言義猶未顯今此特顯之於中二初釋相應二釋不相應初釋相應言相應義者謂心念法異依染淨差別而知相緣相同故疏相應者六染中前三是相應此有二釋一約王數釋此三種皆是麤心故二約心境釋以此三種依境生故心念法異者心謂心王念法謂心所王數不同故云異也迦旃延論中名為心及心所念法故又心念謂能緣心法謂所緣境異謂心境不同差別者是所依分別境同者若心王知染心法亦同心王緣淨心法亦同知相即能知同緣相即所緣同又於染境作染解於淨境作淨解故云同也記初句標也皆麤心者以是前六緣總別相行相麤顯故依境生者既依境生則與境為相應也謂下釋也二初約法辨異心謂下約王數釋心王即前六識心王心所即遍行等六位心所然六識中心所多少不同今此總名念法亦可舉一蔽諸故言念即別境之一心所法也迦旃下引證即通指心所俱名心所念法然論王數相應總有五義一同所依根二同緣一境三同一行相謂同作青色等解四同一心事王所同一事體故五同一時王所同一剎那故由是故得相應又心下約心境釋可知所依等者識依此境所引生故又是彼識所分別故以有此染淨為所依故遂起心王心數令相應也以有此境為所分別故遂與能分別為相應也而句二正顯相應先約王數釋同義如師往資隨其事不異然雖云王數相應理須約境以辨能知同者此體有二以王數相應故名為同也所緣同者此唯一境以望王數故名同也斯則能所雖皆云同而同義有異也又於下次約心境釋同義此即心隨於境名之為同同即相應也二釋不相應不相應義者謂即心不覺常無別異不同知相緣相故疏不相應者六染中後三及無明皆名不相應心亦二釋一約王數此顯根本無明動彼靜心之體即此動心是不覺相更無王數之別故云即心不覺常無別異此翻前心念法異也既無王數之別何有同知同緣翻前可見以此三種依不覺起不異不覺故云即也上文云依不覺故生三種相與彼不覺不相捨離者是此即心之不覺故云不離非是相應而不離也下文亦云無明滅故不相應心滅二亦約心境釋中言即心不覺等者謂此無明即此染心而無別體不約與外境相應方為此不覺但在本心之上故云即心等也不同知相等者揀前相應也此不相應心既是棃耶識於中不分王數義及不與外境相應義并有覺不覺義等並與諸論相違和會如別記中說記不句標也無明者以前云不達一法界故心不相應名無明等故今指也謂下釋也疏中二先正釋論文又二初約王數釋二先顯無別異即此等者心是真心由動故成不覺不覺與覺一體無異故云即也尚無覺不覺異豈有王數耶既無下二正遣相應二初正釋翻前義如單己一人與誰為同故無相應義也以此下二重釋前即義三初正釋然前說不覺即動心今說染心即不覺有斯異耳上文下次引證既展轉相即動無動相元即靜心也非是下三揀濫此中言不相離者以染心即不覺故非謂有於王數相應而言不離以相應不離二義別故下文引證是下生滅相文此則雙證二義一證不相離義二證不是相應義思之二亦下次約心境釋亦二先顯無異意云染心即無明無明是不覺不覺依於覺覺即是本心都無外境相應故云即心不覺此言即心亦即本覺真心也文中通於真妄二心詳之易見不同下次揀相應既無境為相對約何以明其相應耶此不下二指陳違妨以相宗說此第八識有遍行心所又與器界外境相應仍不說有覺義故諸論唯識瑜伽等也和會如別說者尋檢未見所出今且略會二宗所說者如法相宗說第八識能緣三境以彼秪據現在成就位中橫說八識不明根本始起元由但言一切眾生法爾皆具八種識從自種生皆能緣慮自分境界以同是識了別義故故能緣境又說此識從自種生雖從自種而假境為所緣緣故方得生起故須緣境雖能緣境微細難知不同前七執我執法今此論中豎說諸識迷真所成從細至麤不說種生故第八識但有生境之功而無緣境之義以從無明內熏習起非外境界牽故令生故經說為流注生滅者是此內起也由是故無緣境之義今若會彼同此論者彼宗既言此識緣境微細難知當知密同今論之意以彼宗說從種生故同是識分不得不說緣境界也又若會此同彼說者此論所明前六緣境即是第八麤分功用由於境界熏彼本識起此分別斯則本識有緣境義以是麤故隔為事識不名第八又彼宗說第八心王有遍行五心所相應者由說此識能緣境界是故有王所相應如正緣境時須有作意能警其心引心趣境以趣境故根境識三分別變異令心觸彼以觸境故四種和合領納違順以領納故於境取像施設種種名言之事以取像故遂令其心造作驅役此五皆由緣境故得是故第八有五相應今論既不說此緣境亦無心所與之相應故不同彼又彼宗中不說第八生起元由從真起妄但據現在成就位說故無覺義然亦說有無始本有菩提種子而不即是本覺真如以未了故且隱密說今論所明依如來藏有生滅心以迷覺故成於不覺雖成不覺覺性不變故有覺義以依實教顯了相說故不同彼若彼已說有覺義者如何彰此二教淺深知之崔傳云原疏兩卷別記一卷會通文詳彼記三舉上染心及無明約境成二礙義記舉上六染之心以及無明對於所障之境束為二礙以一切障染不離二種所謂煩惱及以所知今此染心及以無明二障分別如何收攝故此明之中亦二初標立二重釋初標立二初惑障後智障初惑障又染心義者名為煩惱礙能障真如根本智故疏染心者六染心也能障下顯其礙義謂照寂妙慧如理之智名根本智即上文智淨相也染心諠動違此寂靜故名染心為煩惱礙以煩惱動故今此且依本末相依門以無明所起染心為煩惱礙能起染心之無明名為智礙不約人法二執以明二礙記初二句標法定名也六染心者各取於中一分相續義故以此一分諠擾動亂不寂靜故名為煩惱能障句顯礙釋義也先釋文照寂下釋所障智名復名真智證體智實智等以能證如實理故名如理智能生後得故名根本智上文下出所障智體也染心下釋成礙相可知今此下次通妨或問曰如諸處說依於二執起於二障與此何別又前秖將六麤前四以配二障何故此中六染俱名煩惱耶故此釋之彼依二執起二障者依五意上起所知意之識上起煩惱今此則以染心所依無明為所知能依染心為煩惱故不同也應知若約二執說二障即局此依染心說二障即通有斯異也後智障無明義者名為智礙能障世間自然業智故疏無明根本無明也能障下顯其礙義謂後得如量智即上不思議業用以無明昏迷無所分別違此智用名為智礙從所障得名此明聖智用如月頓應於水無心不同外道自然記無下亦標法定名也根本無明者若取諸識中之一分亦兼枝末以末從本故作此標能障等者亦顯礙釋義也初釋文後得下釋所障智名復名徧智俗智權智等以根本智證真如後方得起故名後得智如其事量而知名如量智也即上下出所障智體以無明下釋其礙相從所障得名者智之礙故依主釋也不同煩惱即礙是持義釋此明下二通妨或問此言自然與外道自然何別故此釋之此心無心應物任運現化為自然不同外道撥無因果之自然斯則言同而義異也二重釋二先徵次釋先徵此義云何疏先問云既此無明動靜心體成於染心則無明是細應障理智染心是麤應障量智何以不然記先問等者約麤細以成難也秖合細法障細法麤法障麤法方是其宜何故不爾耶次釋二初釋煩惱礙二釋智礙初釋煩惱礙以依染心能見能現妄取境界違平等性故疏能見能現者獨約後三細前二染妄取境者通攝前三染心以同依境起故違平等性者釋成礙義以此染心能所差別乖根本智能所平等所以障於理智記前二染者以業相微細未分能所欲成礙義難見相違故今偏約轉現二相以酬前難然雖不言意亦含攝以依動心說能見故可以意知前三染即分別智染已前三者皆是事識故依境起以此等者以理智無能所染心有能所敵體相違故成礙義二釋智礙以一切法常靜無有起相無明不覺妄與法違故不能得隨順世間一切境界種種知故疏法靜相者舉無明所迷法性與法違者正顯無明迷前法性以不了如法寂靜妄有起滅與法乖違故也不能得者正釋障如量智義也記所迷法性者此是即真之俗故常靜無起無起即真故云法性前文云一切法離言說相乃至無有變異不可破壞唯是一心等不了等者正釋違義法性寂靜而無明起動動靜相反故成違義正釋等者本疏云以內迷真理識外見塵故於如量之境不能隨順種種知也如人動目天地傾搖故不能得如實知也然前則約麤細而難問今則約相違而通釋也故下文云無明頓盡名一切種智音釋熾音翅火勢盛貌末那此云意第七識名騰音滕奔飛也環音寰圓轉也孽音逆罪惡也逭音換逃迭轉也蠶俗作蚕吐絲蟲繭與蠒同音簡抗音慷相乖也涌音永水涌出也悶門去聲氣掩不通也焦音椒火傷也煥音喚光明也逸音葉奔游縱放也杌音厄木無枝也汙音烏同汙垢染也噬音示也稠音柔叢密也迦旃延此云文飾檢音簡尋覓也警音景誡䇿也驅音區遣使也崔傳崔致遠翰林所撰賢首國師傳也諠同喧諠譁傾音輕搖動也
