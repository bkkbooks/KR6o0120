body:
  text: 唐西京太原沙門法藏述疏終南草堂沙門宗密録注宋秀州長水沙門子璿修記清錢塘慈雲沙門續法會編順天府府丞戴京曾閲定二法二先開章次釋義先開章一約法生起本末顯分齊謂依此論所詮染法從本起末略有五重以對諸宗顯其分齊記前以能詮為門故云約教此以所詮為門故云約法法者權實義也先生為本後起為末依詮染者以淨法是攝末歸本義今明從本起末故唯取染列別不攝曰種等而升進曰重今約法義生起故不云種而曰重也略五重者廣即十四今於十四之中類束為五即一心二門二覺三細六粗之法故云略也對諸宗者即前五教也次釋義二初正明二別示初正明五初一心次二門三二覺四三細五六粗初一心五重者初唯一心為本源即華嚴經一真法界然華嚴所宗雖四法界而彼疏云統唯一真法界謂寂寥虗曠沖深包博總該萬有即是一心正當此門體絶有無相非生滅莫窮其始寧見中邊即下心真如門迷之則生死無窮解之則廓爾大悟即下心生滅門記五重者五中二三以略分真妄故云開云明後二唯約妄論具顯次第生起故言生也一心為本源者為是也謂此一心是一切染淨法之根本其猶水源為萬流之本更無有法為心之本故云唯一心本即源也經云諸法所生唯心所現一切因果世界微塵因心成體法喻雙顯故云本源華嚴下配教此是圓教之所宗故準下四段應云初唯一心為本源所言法者謂衆生心是心則攝一切世間出世間法即華嚴經一真法界心圓教分齊也四法界者如前所列然四種皆稱法界而界義不同謂理法名界界是性義謂與一切染淨諸法為體性故事法名界界是分義一一事法分限別故後二法界具性分義可知義雖有四而體是一故混四為一一外無四故云統唯一真也謂寂寥下總萬有以出體彼曰法界此曰一心謂此一心是法之性故曰法界隨義立名體元無異故以一心為法界體初二句顯德相寂謂無聲寥謂無色虗則中無妄染曠謂寬遍十方沖即是深豎通三際包即容受一切無餘博則能入一切咸遍總該下明該收萬有者一切法也萬有不出一心是故一切全為心性心性無外攝無不周也此但意在出體不在收於萬法恐存心外之見故云總該等也然諸教中皆説萬法一心而淺深有異今約五教略而辨之一愚法聲聞教假説一心謂世出世間染淨等法皆由心造業之所感推徵則一心之義不成故云假説二大乘權教明異熟賴耶以為一心三界萬法唯識變故三終教説如來藏以為一心識境諸法皆如夢故四頓教泯絶染淨以説一心顯體離言絶諸相故為破諸數假名一也五圓教總該萬有以為一心事理本末無別異故如上所説前二教淺後三教深於三教中義有淺深體唯真性今之所辨即第五也注云正當此門者指此初重一心本也下云依此一心有二種門則知此論所詮理極於是故上指陳即華嚴經一真法界但彼以性相俱融名為法界此約克指法體故曰一心以此為異也體絶有無者肇公云欲言其有無狀無名欲言其無聖以之靈故下文云非有非無等相非生滅者非不也相謂無相之相相即性也論云非前際生非後際滅般若亦云不生不滅莫窮其始者莫無窮鞠始初也既非生滅有為之法則無能尋鞠盡其初際然不唯無始抑亦無終此但影略故云無始此則覆釋前來相非生滅以非生故無始非滅故無終寧見中邊者邊謂二邊中即中道二邊既泯中道不存故云寧見寧何也此則覆釋前來體絶有無也有無即是二邊前則略舉但言有無今則具顯故云中邊注云真如門者彼疏所説即是此中真如門義然但因以指配未是正開次下即明迷之下即序中逐迷悟而升沈之義解即初悟悟即證入也故經云無始時來界一切法等依由此有諸趣及涅槃證得即斯義也注文生滅門者如前可知二二門二依一心開二門記依心開門者以論云依一心法有二種門也一者心真如門即頓教分齊也始教中空義亦是密説此門記真如門者於中有離言依言依言之中復有空不空二具如下説頓教分者以此門中説心性不生不滅乃至離言絶慮等義故當此教密説者如心經云是諸法空相不生不滅不垢不淨不增不減等即是真如之相雖明其相而不克顯真如體性故云密説理實無異故今配之但空宗人不知如來遣相處以為顯真性故此一門非彼分齊也二者心生滅門謂依如來藏有生滅心所謂不生不滅與生滅和合非一非異名為阿黎耶識即終教分齊也以始教相宗不知佛説如來藏以為阿賴耶故非彼分記依如來藏下全引論文顯生滅相也終教者詮法窮極非同始教是衍初門故名終教今起信論正明此義以始教下揀顯以始教中亦説賴耶而不説是藏性所成今説性成故非彼分故密嚴云佛説如來藏以為阿賴耶惡慧不能知藏即賴耶識則分教中識義亦是密説此門也三二覺三依後門明二義一者覺義前真如門但明心體不變此門覺義但顯染中淨相及反流還源並非起末倫次二者不覺義前生滅門及此不覺即是生起次也記後門謂生滅門也二義者論曰此識有二種義能攝一切法生一切法云何為二一者覺義二者不覺義等故依此明也覺義者論云所言覺者謂心體離念離念相者等虗空界即是如來法身等於中有始覺本覺本覺復有隨染性淨之異具如論説注前真如等者通前後妨難或曰前真如門及此覺義為何不明開義生法唯於後門後義明生起耶故此釋之不變非隨緣淨相是本覺反流即始覺也此上三義並不可説生起末中染法倫次之理以義不順故唯此生滅及不覺義即可言其生染次也故前標云依染法從本起末而不言淨法從末向本由是前門前義不言生起也不覺義者論云所言不覺者謂不如實知真如法一故不覺心起而有其念等於中有根本枝末之異枝末復有三細六粗如次所引注文前生滅等如上可知若無相宗齊此覺義以彼宗未明空相即真如心性故説諸法無不是空縱有一法勝涅槃者我亦説為如幻如夢凡所有相皆是虗妄離念相者即是法身依此法身説名為覺故空宗詮法唯齊覺義疏不説者準上二門分判推故例下唯識分齊知故四三細四依後義生三細一業相賴耶自體分二轉相見分三現相相分即唯識宗齊此業相以為諸法生起之本以彼宗未明此等與真如同以一心為源故説真如無知無覺凝然不變不許隨緣但説八識生滅縱轉成四智亦唯是有為不得即理故詮法分齊唯齊業識記後義者即不覺也依此不覺起業等相此三屬本識位對後事識六粗名之為細故論云復次依不覺故生三種相與彼不覺相應不離等業相者約動作為因二義得名故論云一者無明業相以依不覺故心動説名為業覺則不動動則有苦果不離因故轉相者前之業相轉至此位為能見故故論云二者能見相以依動故能見不動則無見現相者以依能緣之心帶起所緣之境故論云三者境界相以依能見故境界妄現離見則無境界注自體等者以唯識説有漏識自體生時轉似二分似能緣相名為見分似所緣相名為相分雖文異而義同故今注配自體即自證分也即唯識下配教齊業相者彼説諸法生起但依賴耶以為其本故名此識為總報主一切種子根身器界皆此識變仍獨説此以為所熏熏成種已後起現行皆依此識故云生起本也以彼下出所以此等者指三細二覺生滅門也緣以彼宗未説一心是真如生滅二門之源以留之於終教説故若盡説已何分權實耶故説等者以不知真如即心故説無知無覺凝然不變者説此無知覺體堅如玉石不可受熏以不是可熏性故既不受熏焉能隨緣由是但執真如不變不許隨緣也但説等者既不許真如隨緣成諸染淨故説賴耶為生滅本由是明法生起但齊業相也縱轉等者以彼所説轉第八為大圓鏡智第七為平等性智第六為妙觀察智前五為成所作智根本既唯生滅成智亦是有為理是無為不得相即如鎔金範土各成其器豈得相即耶故詮法下結成可知五六粗五依最後生六粗一智分別境界二生苦樂受三著苦樂四計名字五造業六受報二乘所明諸法唯齊第三人乘天乘唯齊第五記最後者即現相也六粗是事識位涉於外塵其相顯著總名為粗故論云以有境界緣故復生六種相智分別境界者智相也以有外境牽起內心令其分別是好是惡等故論云一者智相依於境界心起分別愛與不愛故生苦樂者因前分別遂起苦樂覺心故論云二者相續相依於智故生其苦樂覺心起念相應不斷故著苦樂者執前苦樂取之為實故論云三者執取相依於相續緣念境界住持苦樂心起著故計名字者以執取實故聞名總相便生瞋喜等故論云四者計名字相依於妄執分別假名言相故造業者以貪瞋盛故發動身口造諸善惡不動等業故論云五者起業相依於名字尋名取著造種種業故受報者謂業纍既成牽至苦果如繩所繫不自在故故論云六者業繫苦相以依業受果不自在故初是俱生法執次是分別法執三是俱生我執四是分別我執皆惑道五業道六苦道思之二乘下對教淺深第三者是我執俱生二乘教中説斷此者名為我空故人天等者以彼教中但別善惡業緣受報好醜故當造業而不知業從何生故詮法分齊不到第四二別示若取血脈相承一向躡前起後以明生起略有八重一以一心為本二不覺一心成業相三能見相四境界相五分別相續法執六取著計名人執七造業八受報記血脈相承者但約迷本一心邐迤生起不斷絶義更不旁説真如本覺故云一向等略八重者廣則十四故以真如門及覺義非是生起倫次故生滅門不覺義全體是業相故智相相續皆法執故執取計名皆我執故由是相從略成八也若約教乘判初即圓頓二通終始六則小乘七乃人天例前思之四被機二初標門次釋義初標門四明教所被機者次釋義三初總明所被二重辨兼正三別指下文初總明所被一切衆生皆有佛性無非所被不同法相宗唯被菩薩性及不定性記一切下顯實教此約畢竟兼正合論故皆被也故涅槃經云凡是有心定當作佛圓覺云有性無性齊成佛道又云譬如大海不讓小流乃至蚊虻及阿修羅飲其水者咸得充足金剛經説發菩提心人令度四生九類皆入無餘涅槃若其定有不成佛者何勞發此心耶以一切衆生皆本有佛性但得聞之無不獲益謂宿機深者悟入淺者信解都無宿種者亦皆熏成圓頓種子如華嚴經食金剛喻不同下揀權教彼説定性二乘以性定無改況至無餘位中身智俱盡誰為修行又無性之人無其善種善種既無憑何修進以此判之俱非所被然彼但約即今長時而論故不統收亦是留在實教中説也二重辨兼正二初約三聚辨二據五性説初約三聚辨然一切衆生三聚統收此論正唯為不定聚故下文云依未入正定聚衆生故説修行信心兼為邪定作遠因緣兼為正定令增妙行記然下三聚有三説如小乘即以五無間業衆生為邪定以聖位中學無學人為正定以餘凡位中漏無漏七方便人為不定權教以無種性人為邪以菩薩為正以不定性人為不定終教以一切異生為邪三賢為正十信為不定今依後説此論下正為可知兼為邪定者但得見聞自然成種他時顯發必至解脫故法華繫珠涅槃毒鼓華嚴有八難頓超之説又云設有不生信樂亦成善根無空過者乃至究竟入於涅槃此明雖謗墮惡由聞歷耳終醒悟故下論云為令衆生離一切苦得究竟樂皆此類也兼為正定者論云為欲解釋如來根本之義令諸衆生正解不謬故疏配三賢故當正定也二據五性説準此義例則五性中正被菩薩性及不定性令修信心兼為餘性作遠因緣記準下例辨五性也五性之説權實共出前教義中判為未了者約彼定執三無二有故名為權今説被教故須約性性雖説五俱為所被非同權宗定執有無也正被下可知兼餘性者二乘又無種性也以二乘人實無定性雖亡分段然有變易之身但得聞斯教決定回心涅槃説四果及緣覺極遲經八六四二萬十千劫如次回心猶如醉人醒有遲速三昧酒醒亦復如是故楞伽云三昧酒所醉乃至劫不覺酒消然後覺得佛無上身無性之人但無善性若聞斯教善種自成遇緣發起必當成佛楞伽經説二種闡提一大悲菩薩二斷善根者佛説二中永不入者唯大悲菩薩應知斷善根者聞經獲悟後必得入涅槃經中具有此説今此論云謂示修習止觀對治凡夫二乘心過故其中義含定性無性故下文云對治二乘不起大悲狹劣心過遠離凡夫不修善根且不起大悲豈非定性耶不修善根豈非無性耶當知實教雖説五性然非定五俱為所被三別指下文又因緣分中別明所被至文當辨記別明所被者一論所被不出三根説有通別通則不分論文但上中下根依之總入別則立義解釋兩分被上根悟入修行信心分被中根勸修利益分被下根然上根不必聞中下之法下根必兼聞中上之法中根可知此説猶是別中之通若更細論兼約地位所配則立義分及解釋分中顯示正義對治邪執被三賢菩薩為上根悟入分別發趣道相被十信滿心為中根修行信心分已下論文被十信住心入心為下根又就十信位中自有三根之異謂以十信滿心為上根此則如上所配以十信住心為中根此依第四分中四種信心及四種修行悟入以十信初心為下根就此下根復有三種謂以四行之後止觀之前一段論文被下根悟入以止觀一門被中根以勸生淨土一門被上根其勸修利益一分總䇿前三因緣一分但明論起由致故於此分不別明被如下疏配五詮體二初總標二別釋初總標五論能詮教體者略作四門記能詮教體者通明諸佛教法乃至此論以何為體而能詮顯無量事理今且略以四門解釋二別釋四一隨相二唯識三歸性四無礙一隨相一隨相門於中或唯名句文謂能詮諸法自性差別二所依故或唯音聲離聲無別名等攝假從實故或假實雙取四俱為體又遍於六塵一切所知境界總有生解之義悉為教體記隨相者謂約六塵境相以出體故於下中有四義初名句文名句文者即聲上屈曲詮表是假非實屬不相應行所攝故論云一名二名多名是曰名身一句二句多句名曰句身一字二字多字名曰文身能詮諸法自性者名也名是能詮諸法自性是所詮如言色言心言水火等各各詮表法自性故差別者句也句是能詮諸法差別是所詮如言形色顯色真心妄心等諸法例然一一法中揀令別故二所依者文也二即名句文即是字以此通為名句二法所依止故由是名則次第行列句則次第安布文則次第連合此等親能詮表義理由是取之以為教體或唯下二唯音聲以聲是教主言音謂佛唱詞評論語音語路語業語表故云音聲離聲下釋以名句文三雖親能詮表義理但是聲上屈曲之相從假建立無有自體聲是色法色法是實名等是不相應行非色非心但約色心分位假立由是實外無假所以攝假從實但取聲為教體故云離聲無別名等婆沙論云佛教以語業為體假實下三通四法也如上兩説各有理教為定量故不可偏取今悉收之以唯音聲則不能詮義唯名句文則別無自體四法皆取始成教體如水與動方能運舟於此二中不可趣一如人泛然發聲不吐詞句何所詮表若無聲者名等何依故今雙取也故俱舍云牟尼説法蘊數有八十千彼體教體語音聲或名名句此色音聲行名句蘊攝又遍於下四遍一切也一切雖多不出六塵境界但能生於物解即為教體豈獨在於聲名句文故淨名云有以光明而作佛事有以菩提樹衣服臥具乃至八萬四千諸塵勞門衆生謂之疲勞諸佛即以此法而作佛事楞伽云大慧非一切佛土言語説法有佛國土直視不瞬口無言説乃至有佛國土動身名説法等且香積世界餐香飯而三昧顯極樂國土聽風柯而正念成絲竹可以傳心目擊以之存道既語默視瞬皆説則見聞覺知盡聽苟能得法契神何必要因言説如楞嚴經二十五聖於十八界七大性各從一門而得圓通此中六塵猶且約境餘者例知天台云手不執卷常是讀經口無言聲遍誦衆典佛不説法常聞梵音心不思惟遍照法界皆此義也二唯識二唯識門謂説者淨識所現文義為增上緣令聞者識上文義相現故下文云若離自心念則無一切境界之相是故一切聲名句文皆是自心之所顯現記唯識者約妄心以出體今先約本影相對對於諸教總成四句一唯本無影即小乘教以不知諸法唯識所現皆影像故二唯影無本即終教也以佛果無別色聲功德唯有如如及如如智獨存但以大悲大智為增上緣令彼根熟衆生心中現佛色聲説法是故佛教但是衆生心中影像故華嚴云諸佛無有法佛於何有説但隨其自心為説如是法三亦本亦影即大乘權教謂以佛自宣説若文若義皆是妙觀察智相應淨識之所顯現名本質教若聞者識上所變文義為影像教諸佛衆生互為增上緣方有所起教故唯識云展轉增上力二識成決定四非本非影即頓教也非唯心外無佛色聲衆生心中影像亦空以性本離故相本絶故即無教之教耳故淨名云其説法者無説無示其聽法者無聞無得今此所明即第二句唯影非本也説者淨識等者此中語勢似於本影具足一句然意明唯影非本雖云淨識所現意顯大悲大智為增上緣又此但言佛為衆生增上緣而不言衆生為佛增上緣者意在唯影也又佛淨識即是衆生真心佛現即衆生現二俱影也引證文則明矣豈可見云淨識所現為增上緣便作本影雙取同於權教須以意通不以文局學者思之故下文具云一切諸法唯依妄念而有差別若離心念則無一切境界之相是故下結意言自心者即是妄識非謂真心下文云三界虗偽唯心所作離心即無六塵境界三歸性三歸性門此識無體唯是真如故下文云是故一切法從本以來離言説相乃至唯是一心故名真如記歸性者約真心以出體也此識等者則前門中已收差別之境但唯能變識心今又攝前識心但是一心一心即真如性也名為歸性故云此識無體也其猶人睡作夢見種種物物不離夢夢不離人即展轉推尋教法真實之體極至於此古人云心即是經即斯義也言一切者即色心等法非今方爾故云從本已來超過離名字相離心緣相故云乃至然離言説則非前音聲離名字則非前名句文離心緣則非前唯識一心真如則成此歸性門也亦同圓覺疏云生法本無一切唯識識如幻夢但是一心楞嚴云見與見緣似現前境元我覺明也四無礙四無礙門謂於前三門心境理事同一緣起混融無礙交徹相攝以為教體以一心法有二門故二皆各攝一切法故記無礙者約三門無礙以出體也謂於下正釋心即唯識門境即隨相門理即歸性門事即一二門以對理成句故重牒之同一緣起者上之三門同為一大法界緣起謂境不自境由心故境心不自心由境故心未有依真之妄不從真生未有隨妄之真不依妄顯如是則境是心境心是境心真即妄真妄即真妄互相依倚互相資假隨有所闕則皆不成故云同一緣起也混融等者即無障礙法界也謂若心若境若理若事一多即入俱無礙故斯則動止縱橫無非教體也以一下出所以如上心境理事得無障礙者以一切法不離二門二門唯一心故以歸性即當真如門前二即當生滅門二門不二即是一心以此一心融之故得同一緣起無礙自在也六宗趣二初標章二列釋初標章六示所詮宗趣者當部所崇曰宗宗之所歸曰趣有二記所詮宗趣者前辨能詮文體此明所詮義趣義中可尊可重可崇尚者故名為宗歸向往詣故名為趣當部等者如法華宗一乘涅槃宗佛性華嚴宗法界維摩宗不思議解脫等然宗有多種若約立敵相對以明宗者即語之所表曰宗此則但取一期所論之義如言聲是有法定無常為宗等若約修習行人以明宗者即心之所尚曰宗如各隨所習經律論等今明一部所崇尚者為尊為主目之為宗宗於此者終歸何義謂令信解行此法故必至證入也故曰宗之所歸二列釋二初諸宗二此論初諸宗三初正辨明二指此論三會五教先正辨明二先總次別先總初總辨諸宗一切經論通大小乘宗途有五記總開如文次別五初小乘宗二破相宗三立相宗四法性宗五法界宗初小乘宗一隨相法執宗即小乘諸師依阿含等經所立以造諸部小乘等論記一下隨相法執者標名也宗於事法故云隨相計法定實語云法執小乘諸師者宗主也根本即上座大衆展轉分成二十部阿含等者所依經也等於正法念佛本行等經以造下所造論也即婆沙俱舍等論下諸門中例有此四二破相宗二真空無相宗即龍樹提婆依般若等經所立以造中觀等論記真空無相者即色即空空病亦空故言真空離一切相故云無相般若等等於八部及諸空經中觀等等於百論十二門論之類三立相宗三唯識法相宗即無著天親依解深密等經所立以造唯識等論記唯識法相者唯遮境有識揀心無一切諸法唯識所變宗相法故名法相宗唯識等等於對法百法之類四法性宗四如來藏緣起宗即馬鳴堅慧依楞伽等經所立以造起信等論記如來藏緣起者即如來藏心隨染淨緣起成諸法也楞伽等等於勝鬘密嚴等經起信等等於佛性寶性等論五法界宗五圓融具德宗謂事事無礙主伴具足重重無盡即華嚴經記圓融具德者圓謂圓滿性相周遍融謂融和理事無礙具德者重重無盡一塵一毛無不稱性無不包遍如前圓教中明二指此論今此論宗當其第四門也記第四者即如來藏緣起宗以論所詮明如來藏不生不滅與生滅和合名阿黎耶等廣辨染淨諸法緣起故三會五教然此五宗對前五教互有寬狹教則一經容有多教宗則一宗容具多經隨何經中皆此宗故記然但佛説成教人尚曰宗宗教不異由是本疏隨教而辨今則以經料揀故有寬狹不同也一經容多教者如華嚴中具説十惡十善即人天教也説四諦十二因緣即小乘教具列地位即分教三天偈云法性本空寂無取亦無見性空即是佛不可得思量即始教如心佛亦爾如佛衆生然心佛及衆生是三無差別即終教初發心時便成正覺即頓教一切無礙即圓教也餘經之中或五四三二多少不定宗具多經者如此一論宗中宗百餘本大乘經也隨何等者但是諸經了義皆此所宗又如一切經中空義皆是三論所宗餘皆倣此此上所明但約宗教俱寬義説若約狹義如前五教各詮一義互不相通如一經只詮一義此名教狹宗隨教説亦復如是此名宗狹也二此論二先總次別先總後唯明此論又有總別總以一心法義為宗信行得果為趣記一心法義者以此論中所詮義理雖則廣多然所宗尚者皆為顯示一心法三大義也故為其宗宗此法義者意在何也為令生信正解不謬依解修行行成入證證極得果歸此一心故名為趣然若信一味空理則厭欣都絶若信一向法相則聖凡懸隔斯皆不能起行趣證今令信一心是凡聖之源但由迷悟使之有異則必能起修庶幾果證矣次別二初列釋二結示初列釋別者有五對一教義對教説為宗義意為趣如下文令捨言取意等二理事對舉事為宗顯理為趣如從生滅門入真如門等三境行對以真俗境為宗止觀行為趣四證信對以成信不退為宗登地入證為趣五因果對以因為宗克果為趣記教説等者以言詮義義顯言亡如乘筏渡河至岸捨筏如下文者具云當知如來善巧方便假以言説引導衆生其旨趣者皆為離念歸於真如理事者先宗後趣合云事理下有倣此舉事等者廣説生滅染淨者皆為歸於真如理故如從等者文云復次顯示從生滅門即入真如門所謂推求五陰色之與心六塵境界畢竟無念乃至若能觀察知心無念即得隨順入真如門以真俗等者真理一味向即心絶俗境萬差觀則智起因此以成止觀二門故下文云所言止者謂止一切境界相隨順奢摩他觀義故所言觀者謂分別因緣生滅相隨順毗鉢舍那觀義故成信即十信位緣不退即三賢已上地前比觀未造真如意在登地親證聖性以因等者地上所行十波羅蜜意在尅證佛果菩提二結示此五是從前起後漸漸相由矣記相由者初由教故得義二由義中事故顯理三由事理為境故以成止觀行四由止觀故入證地位五由入證故得果斯則展轉相因從淺至深傳論宗趣也二隨文注解二初解名題二釋文義初解名題三初論題目二造論主三譯論人初論題目大乘起信論疏大者當體為目包含為義乘者就喻為稱運載為功大乘即所信之境起信即能信之心心境合目也此則大乘之起信又亦起大乘之信記論題中二初釋前四字四今初總釋四字言當體者不同權教解大者揀小為義大外有小可揀豈成至大今以心性體無際畔絶諸分量心行處滅言語道斷無以名之強名為大然大有二義一是常義謂豎通三世無始無終無有一法先之唯此先於諸法故名大也涅槃云所言大者名之為常二者偏義謂橫該十方十方窮之無有邊涯涅槃又云所言大者其性廣博猶如虗空包含者以論云是心則攝一切世間出世間法又經云心精遍圓含裹十方等體若不遍寧曰包含若不包含豈名為大由是包含是大之義也運載等者然乘有五種謂人天聲聞緣覺菩薩雖則皆有運載之功總名為乘且義有大小而載有近遠人乘者謂三歸五戒運載衆生越於三塗生於人間其猶小船才過溪澗天乘者謂上品十善及四禪八定運載衆生越於四洲達於上界如以次船渡小江河聲聞乘者謂四諦法門緣覺乘者謂十二因緣法門皆能運載衆生越於三界到有餘無餘涅槃成阿羅漢及辟支佛皆如大船越大江河菩薩乘者謂悲智六度法門運載衆生總越三界二乘之境到無上菩提大般涅槃之彼岸也如乘大舶過於大海法華云若有衆生從佛世尊聞法信受勤修精進求一切智佛智自然智無師智如來知見力無所畏愍念安樂無量衆生利益天人度脫一切是名大乘菩薩求此乘故名為摩訶薩此乃由能乘有利鈍故所乘有勝劣令所越有廣狹俾所至有近遠今言乘者則第五菩薩乘也然上所説但約常塗以六度萬行為所乘體今此論中明所乘者直約體相二大故下文云一切諸佛本所乘故一切菩薩皆乘此法到如來地故等由是亦名佛乘一乘最上乘今就通稱但言大也言雖不異其義不同由是此文逈異常説常塗又説須待能所相契方得名乘今論直目衆生心以為大乘法豈得須具能所耶故涅槃云佛性者名為一乘大乘下舉所信以明能信謂由有此一心三大為勝境故緣此勝境而發忍樂之心名為起信若不然者信何法是何信耶信憑何起耶是故心境合為目也大乘之起信者謂由大乘為所緣境故而發得能緣信心此則緣大乘以起信心非起餘心也所緣勝而能緣劣大乘之起信依主得名此約境以顯心也又亦下對宗以別行謂信通大小理宜揀之今起大乘之信非起餘信即以別揀通亦依主釋也疏又大者就義謂體相用乘者就人謂菩薩等記又大下二別釋大乘也就義等者論云所言義者則有三種云何為三一者體大謂一切法真如平等不增減故二者相大謂如來藏具足無量性功德故三者用大能生一切世間出世間善因果故就人等者論云一切諸佛本所乘故一切菩薩皆乘此法到如來地故準本疏説於三大之中體相是所乘用大為能乘三大之中唯一心轉是故亦大亦乘持業釋也疏又依雜集論由與七種大性相應故名大乘一境二行三智四精進五方便善巧六證得七業記又依下三別釋大字也七種相應者此皆約人而説境大性者以諸佛所説廣大教法為所緣故行者自利利他二利行故智者我空法空二無分別智故精進者三祇修行無疲厭故方便者不住生死及涅槃故證得者佛地功德悉圓滿故業者應現十方化衆生故上六如初皆言大性然於七中前五是因後二是果果中之二前體後用體即智淨相用則不思議業相亦即四鏡之後二也莊嚴瑜伽顯揚等論並同此説疏起謂發起以有本覺內熏為因善友聞熏為緣於此勝境發希有信能令心淨如水清珠何故但明信而不言餘行以是行本故論為初機故故下文云自信己性知心妄動修遠離法又華嚴云信為道源功德母等記起謂下四別釋起信二初正明以有本覺等者約因緣以明發起也夫有為法起必因緣力因緣互闕皆不成立今信所起須具因緣故論云自有熏習之力自體相熏又為佛菩薩等慈悲願護故用熏能起厭苦之心信心乃能進趣向涅槃道勝境者如下所説信真如及佛法僧以信真如是萬法本佛是報身法是六度萬行僧是地上菩薩并餘三寶四諦最為勝故希有信者以所信之境勝故令能信之心則為希有也若信釋迦彌勒是佛等則為易有今信衆生心中真如是凡聖通依迷之則六趣無窮悟之則三資不斷此為難有如信皇后王胎貧女聖孕難易可知此上五句解起字也能令下釋信字水清珠者清水珠也謂衆生心如水疑如濁信如珠珠投濁水水必澄徹信起疑心心必清淨故唯識云於實德能深忍樂欲心淨為性如水清珠能清濁水金剛亦云信心清淨則生實相信即清淨心也何故下二通防問意云從因至果有無量行門何故此中獨明於信又信是最淺之法望於解行證果未足為奇如何題中唯明此耶行本者答前問也信之一法為入道之弄引河沙善品因之而起苟無其信安能起行而至證果為初機者答第二問初機即十信菩薩位居外凡未入劫數今論正被此輩故下文云是中依未入正定聚衆生故説修行信心然是初機之上根也根若稍下則先入小乘漸次之大自信己性等及華嚴文並證行本之義此義前未説故故偏引證初機之義懸談已明故此不説餘文可見疏論者建立決了可軌文言判説甚深法相道理依決判義名之為論又論者集法議論也謂假立賓主往復徵析論量正理故名為論記論者下二釋論字然論有二類謂宗釋也釋論即隨解佛經猶如章疏即智度金剛法華論等皆此類也宗論即宗經建立如瑜伽唯識婆沙俱舍等建立下此約宗經解論字謂建立決定顯了可為軌則文句言辭判斷宣説佛經之中深妙法義行相理趣也依決下結名為論者是決判義也又論下約立理解論字謂纂集教法商議論量自問自答往復徵詰開析道理發揮真趣令正理成立邪宗摧破也此上二解前釋後宗或可俱約宗論非釋論也然此五字之中有法有喻約理約行體用心境因果教義總為題目也如前開題處説又此一論五分之文亦不出題中五字謂解釋分中顯示正義對治邪執是大分別發趣道相是乘修行信心分是起信初後二分義當於論立義分中即通大等四字二造論主馬鳴菩薩造疏名馬鳴者此菩薩初生之時感動諸馬悲鳴不已又善能撫琴以宣法音諸馬聞之咸悉悲鳴中印土月氏國王將欲試驗以行正法取馬七匹絶其水草已經六日至第七日宣告集衆王躬禮請升座説法令於衆中以草穀等飼其餓馬馬皆不食唯悲鳴垂淚諦聽法要於是遠近敬伏從化故名馬鳴言菩薩者具云菩提薩埵此云覺有情亦有三釋一約境所求所度二約心有覺悟之智餘情慮之識三約能所所求能求三皆如次配覺及有情造者製作佛滅度後六百年內所造也故摩訶摩耶經云如來滅後六百歲已諸外道等邪見兢興毀滅佛法有一比丘名曰馬鳴善説法要降伏一切諸外道輩記名下初釋馬鳴初生等者一義又善等者二義中印等者三義咸皆也躬身也餘並如文二釋菩薩具云等者以此方時俗不貴秦音故存梵語厭繁好簡又削提埵二字由是但云菩薩亦者例前義也例前馬鳴之三義故所求是佛佛即是覺所度是生生即有情也此即全取所求所度之境以彰能求能度之人即有財釋覺悟智者即始覺之智情慮識者即六染等識此亦全取所有覺智情識以立能有者名亦有財釋所求是佛智佛智即是覺能求是自身自身即有情此即求菩提之薩埵以勝顯劣依主釋也此三義中初唯約境次唯約心後雙約心境又初約悲智二約真妄三約人法由是約心境悲智真妄人法以明菩薩理無不盡也又智度論云菩提為無上智慧亦名為覺亦名為道薩埵云衆生或云大心或云勇猛心小品云是為覺一切法無障礙故名為菩薩當為大衆作上首故名摩訶薩道行云是人於一切法悉了知故名菩薩天上天下最尊勝故名摩訶薩三釋造字製作者揀非撰述也佛滅等者明造論時二五百初解脫者少故造此論以被入證也摩耶等者準摩訶衍論説有六馬鳴前後異出一者勝頂王經説佛成道十七日有一外道問難於佛名曰馬鳴二者摩尼清淨經説佛滅後一百年有一菩薩出世名曰馬鳴三者變化功德經説佛滅度後三百年有一菩薩出世名曰馬鳴四者如疏所引五者常德三昧經説佛滅後八百年有一菩薩出世名曰馬鳴六者莊嚴三昧經説過去有一菩薩名曰馬鳴具説有六今當第四矣然準大論所説此菩薩道成先劫號大光明佛今乃助化示居八地父名盧伽母名瞿那又名功德日菩薩如別處明輩流類也三譯論人真諦三藏譯疏總有二譯一西印度優禪尼國沙門波羅末陀此云真諦梁元帝承聖三年於衡州建興寺譯成一卷二十四紙月氏國婆首那王子譯語沙門智愷筆授沙門慧顯慧旻曇振等并黃鉞大將軍太保蕭勃證義然此三藏梁陳二代敕譯經論總三十四部一百四十一卷其博解神異具如譯經記二于闐國沙門實叉難陀此云喜學大周則天時於東都佛授記寺譯成兩卷亦二十四紙沙門波崙玄軌筆授復禮綴文弘景法寶法藏等證義今解前譯記波羅末陀亦名拘那羅陀此云親依梁元帝等者以此三藏是梁武帝太清二年戊辰歲見帝於寶雲殿帝敕譯經自太清二年迄元帝承聖三年歲次甲戌於正觀等寺譯金光明彌勒下生等經起信論等一十一部合二十卷此論乃是其年九月十日與京邑英賢慧顯智愷等於衡州建興寺譯并翻論旨玄文二十卷屬候景作亂遂欲泛舶西歸遇風飄還廣州刺史留住制止寺請譯經論自陳永定元年至太建元年己丑更譯佛阿毗曇論及俱舍論等總梁陳二代共譯經論三十四部一百四十一卷博解者羣藏廣部罔不措懷藝術異解例素諳練神異者或敷座以憑河或當暑而無汗餘如疏文大周者以則天初載二年九月九日改國號為大周改元為天授元年故曰大周則天也懈前譯者以後譯之本是疏主證義恐涉情黨故解他本二解文義三初歸敬述意二正述論文三總結回向初歸敬述意二初歸依三寶二述造論意初歸依三寶疏歸三寶者略有六意一荷恩德故二請加護故三令生信故四為儀式故五表尊勝故六顯益物故記歸依三寶諸論具闕不同有具歸者如智論等有唯歸佛者如地持論等有唯歸人者如十地論等有並不歸者如十二門論等此乃各隨作者之意今所歸者具也荷恩者佛大慈悲故垂之以教教不自闡傳之以僧使我於苦不至於樂有得即知三寶於我大有恩德為感荷故而歸命之加護者將欲造論摧邪顯正先歸三寶請以冥資助增智慧使其通曉故云加也恐其魔嬈有成難事假以威力防外障緣故云護也生信者論主示居因位種智未圓所述論文恐鮮有信承力而作必信無疑儀式者夫臣子之道欲有所作必先告於君父今遺法弟子將造論文必先歸命三寶為後代儀式也尊勝者三寶尊重首出衆物為世良田論初歸之表殊勝也益物者然佛法僧能益庶品其利博哉凡愚迷倒莫有知者故伸歸命以顯於物有大利益也科中分二初能歸分齊二所歸三寶初能歸分齊歸命盡十方疏歸命二字顯能歸至誠也歸者是依投趣向義命者總御諸根一身之要人之所重莫不為先舉此無二之命以奉無上之尊又歸者是還源義衆生六根從一心起而背自源馳趣六塵今舉命根總攝六情還歸一心一心即一體三寶厭能歸之體必具三業欲顯佛有天眼天耳他心故又圓滿三業善故成就三輪因故或見不聞處聞不見處不見不聞處則身語意如次歸依在見聞處則三業皆歸今云歸命是意意業最重矣記歸者下先釋文二初事相釋依投等四字共成歸義謂歸依歸投歸趣歸向故御根下約能連持色心種子不斷功能名之為命由命御之使根不壞即不相應行法所攝一身下命在身存命終身壞人之所重無以加焉舉此下約所歸以明能歸也命可重者由無二故佛可重者由無上故今以可重之命歸於可尊之境是所宜也又歸下二觀行釋也衆生下且明迷源也雖言六根兼取六識俱從一心分湛所起以本是純元之一心背之遂成六種根識識不自起由塵所發念念奔逸莫能自反即背覺合塵之義故佛頂經云元依一精明分成六和合今舉下正顯還源義總攝六情者情即根也以命能總御諸根故今舉總攝別但言歸命以命還於一心之時餘皆隨合故經云一根既返元六根成解脫又云一處成休復六用皆不成然上所説但派一為多即是背義攝多為一即是歸義實無能背所背能歸所歸也一心下謂有覺照為佛可軌持為法具萬德和合無違為僧一心之上而辨三義故云一體然能下二出體二一通約三業也能歸體即馬鳴身口意也業即三用欲顯下釋具三業所以疏有三意一顯佛勝德二圓自善根三為彼來果以身業歸顯有天眼見以口業歸顯有天耳聞以意業歸顯有他心知圓滿下昔以三業悉皆不善謂殺等十支今既歸佛即三業皆善以身禮口讚心緣即殺盜淫等自然不生三輪因者三輪是果謂神通正教記心也因即三業善三輪之因依主釋以因中身業歸果獲神通輪謂如意天眼天耳通也此能引邪歸正故因中口業歸果獲正教輪謂宿命漏盡通也此能觀根説法令解脫故因中意業歸果獲記心輪謂他心通也此令未信者信未修證者修證或與記莂等俱名輪者以能摧輾衆生惑障故或見下明歸之儀式此乃不論三業前後但隨見聞等處則用三業對而歸之此有四句如疏列配然上二句且約一期句數配屬則可若細推之就佛就機恐無此理如佛得自在豈有見而不聞等處耶若就機者如見佛身不聞説法豈只以身作禮而不意敬口讚耶如聞説法不見形相豈只口讚而不運意作禮耶又雖不見聞如專意念佛之人豈無身口耶況身口由心所使意業不行身口不動若如此所配豈約一期今云下二結屬意業以身口皆由意使故意為根本餘二為末況三界唯心萬法唯識誠為可重故但意業疏盡十方三字明所歸分齊也非直一方三寶每方非直一二等剎中三寶顯三寶普遍故歸心廣大故揀異小乘故然三寶又有住持別相同體之殊為福之田皆可寶重今所歸者意歸別相理該同體也記非下初明處所分齊非直者不但也謂不但於一方三寶而展歸命此解十方也每方下釋盡字然有兩意謂每方不但一剎兩剎每剎不唯一佛二佛顯三寶下釋所以也普偏者經云毗盧遮那遍一切處此法身遍也法身是理報身是智理智不二報身亦遍法報是體應身是用即體之用應身亦遍餘二寶例知此約所歸廣大者約能歸由所歸普遍故能歸廣大能所相稱如函與蓋也簡小者約教釋也亦是通約能所以小乘中不信有他方佛今言盡十方故揀異彼也然三下二明三寶分齊也住持者雕鑄塑畫等像佛也經律論三藏教文法也比丘等五衆和合僧也依如是法而住持故別相者五教淺深不同佛即三身十身法即教理行果僧即三賢十聖八輩上人以五教不同三寶各異故同體者雖有本性觀行融通之異並以覺照為佛軌持為法和合為僧皆約一法體上説故為福下通釋寶義蓋能生福利故喻之以田咸可尊重故褒之以寶由是三皆可寶故云三寶帶數釋也然泛論田有三種一敬田即三寶恭敬生福故二恩田即父母報恩生福故三悲田即貧病悲愍生福故此約一期別義而説然亦非可局定如三寶豈無恩耶智度論説令傳法修行報佛恩故疏中六意之初以荷恩德故又父母豈不敬耶如論語子遊問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以別乎貧病豈無恩耶佛因衆生方得成道故佛化身名為恩德故華嚴云因於衆生而起大悲因於大悲生菩提心因菩提心成等正覺又云若無衆生一切菩薩終不能成無上正覺是故菩提由於衆生又此悲境豈得不敬乎故禮記曰毋不敬孝經云敬其父即子悅敬其君即臣悅敬一人而千萬人悅所敬者寡而悅者衆又佛法中一切恭敬又於父母豈無悲耶且悲能與樂孝經云養則致其樂又於三寶豈無與樂之義苟能供養即斯義矣故知三田各通三義今約別説故以三寶獨稱福田今所歸下結簡該同體者以今法寶中體相二大正是同體三寶故云該也別相是正同體是兼在文可見疏中不配住持者以住持佛法二俱色收全用此中體大為性故下云謂一切法真如平等不增減故又彼僧寶不離五衆此亦體大所攝故下文云真如自體相者一切凡夫聲聞緣覺菩薩諸佛無有增減等此中同體便攝住持故不言也二所歸三寶三初佛二法三僧初佛最勝業遍知色無礙自在救世大悲者疏佛寶也最勝者過小曰勝超因曰最業者總舉三輪業用謂意遍知身無礙語能救世也記最勝業總標也過小有兩意一佛果三身三德過於小乘之果故羅漢辟支佛二菩薩所歸之佛報身過於小乘所歸之佛化身超因亦二意一佛果妙覺超於菩薩之因故等覺已下二真應無礙自受用身超於菩薩所見他受用身故然若據馬鳴所見合是他受用身今以意業歸之不取眼見眼見則隨其功力意歸則極至真身故當自受用爾上各二義中前義為正業者下標謂意下釋也意明業之一字通身口意如疏所配然最勝之言亦通三業謂遍知是意業最勝等亦可救世利他餘當自利即自利利他悉圓滿也若配三德即如次為智斷恩也疏遍知有二一真智遍知心真如門恆沙功德二俗智遍知心生滅門緣起差別理量齊鑒無倒遍知記遍知下別釋中四初明佛意業真智下亦名實智根本正體智等此智證理之時盡真如際無不圓極故名遍知即如理智證真義俗智下亦名權智後得等此智分別緣生染淨等法無不明了亦名遍知即如量智達俗義理量下雙結也謂此二智緣二境時不前不後亦不一時智體無二境亦無二智無二者其體不異其用有殊約知真處名為真智約知俗處名為俗智境無二者謂色即是空為真境空即是色為俗境由是證真時必達俗達俗時必證真證真達俗竟無前後況無心外之境何有境外之心心境渾融為一法界強分能所故曰智境了無能所方曰無倒遍知無倒即正也如理如事故疏色無礙自在者如華嚴説乃有多種今略舉四一大小無礙謂一一根皆遍法界而不壞諸根之性又不雜諸根之相二互用無礙謂諸根相作三事理無礙謂現色炳然而不礙舉體性空四應機無礙謂圓回之身十方齊應多機頓感身亦不分記色無礙下二明佛身業也華嚴等者即不思議品中一一根遍即大也不壞根性即小也性即體性不壞見聞之體故謂眼見耳聞對境不錯不雜等者正遍之時根相宛然各有區別不相渾雜所謂度量則不見邊涯覩對則未嘗移易捨以極至梵天不見丈六之頂遍滿法界不起寂滅道場大小無礙為若是也相作者謂一一根皆能見聞覺知非同凡夫眼唯見色等炳然者謂分明無亂之義斯即事也性空即理也謂所見之空全性而起色正起時即是性起也斯則事不礙理本疏復云妙理常湛而不礙業用廣大此句即理不礙事此乃性起為相一多緣起而無邊相得性融千差涉入而無礙其猶鏡像水月思之可知華嚴云佛身無去亦無來所有國土皆明見又金剛云三十二相即是非相又下論云色性即智智性即色遍一切處等皆斯義也圓回下然通兩意一約一會之中各見佛面二約他處遍應同時十方下約處顯遍無有一處而不有佛故多機下約機釋疑聞説十方齊現將謂分身赴感今云多機頓感應雖一時而其佛身寂焉不動如一月影千萬人見各隨其人東西而去影且不分佛亦如是故華嚴云佛身充滿於法界普現一切衆生前隨緣赴感靡不周而常處此菩提座疏世者三世間中是衆生世間即所救也大悲者三緣之中是無緣悲即能救也無緣最勝故云大悲佛性論云悲者暫救不能真救大悲者能永救濟恆不捨離然萬德之中如來唯用大悲為力故偏舉之記世者下三明佛口業中三今初所救三世間者智正覺世間衆生世間器世間正覺為能化衆生為所化器界為化處以器界是無情正覺是佛故唯衆生為所救也大悲下二能救也三緣者謂四無量心皆具三緣一衆生緣緣於衆生如父母眷屬等二法緣緣於衆生俱是衆法合成三無緣不見衆生及與法相今雖言悲必具四無量心無緣下釋大字於三緣中此最勝者謂與法性同體故名為大也佛性下引證暫救等者反顯也謂暫起緣心好行小惠見貧苦者或施以金帛濟以衣食見危難者或施以無畏致之安樂不忘我人衆生之見有厚薄親疏之心此則必不長久不唯不久抑亦不普以見衆生及以我相生疲勞故由是佛法訶為愛見也永救等者順明也謂見衆生本成佛道如我無異傷此迷倒妄處輪回若返其源定當作佛是故為化一衆生於微塵處經無量劫難行苦行於一既爾於多亦然此乃不唯久永兼能普救方曰大悲故下文云所謂發願盡於未來化度一切衆生使無有餘皆令究竟無餘涅槃以隨順法性無斷絶故法性廣大遍一切衆生平等無二不念彼此究竟寂滅故然萬下三通妨也或曰佛具無量功德何以唯舉大悲故此通之萬德者謂三明八解五眼六通十力四無所畏十八不共法等佛德無量今言萬者舉大數爾以本性功德無量故果顯之德亦無量也大悲為力等者準阿含説凡力有其六種謂孩子以啼女人以瞋國王以憍慠沙門以忍辱羅漢以精進佛以大慈悲如佛垂登正覺魔兵大至佛入慈定魔即退敗況大慈悲是佛心體故經云佛心者大慈悲是今請加護理合稱之疏者者結德屬人即遍知色無礙救世之者記者下疏牒論文故重言者德即上説三業功德人謂遍知者色無礙者救世者者謂人也二法及彼身體相法性真如海無量功德藏疏法寶也然四種中教淺理深行分果圓今取深圓唯歸理果故約彼佛身以明法寶是果法也顯身之體相是理法也記法下先出體四種即教理行果教淺者能詮粗顯是假名故理深者所詮真實智所證故行分者因位功力未究竟故果圓者智斷二德悉成就故今取下去取初二句標故約下正配論文約佛明法即當果法顯身等者身是用大依體相起由佛證得體相二大然後起用既為所證即當理法疏初句標及者有二義一揀前義顯是二事二合集義非但歸佛亦及法也此中及言顯佛與法是非一義彼身體相顯佛與法是非異義體謂體大相謂相大以用大中辨佛報化二身是故體相二大自是法身屬法寶攝以彼用大依體相起會用歸體故云彼身體相記初下次釋文二先解初句二初單解及字揀前者明法不是佛如言彼子及父即知子父不同也合集者明佛法皆歸如言請子及父即知非獨一人而已此中下二通釋此文二初正釋文非一義者彼佛及法二不同故非異義者此法離佛非別有體即是彼身之體相故當知佛法不即不離也以是一心義説佛法也以用下二通伏難初正通也難曰既云彼身體相合配屬佛其義則順何以却云法寶耶故此釋之以佛有三身用大之中已攝報化即屬佛寶體相二大正是法身配歸法寶於理甚宜以彼下二轉釋或曰此句既屬法寶何故復言彼身彼身豈非佛耶故此釋之謂依體起用用不離體故今約用以標體相會用歸體故云彼身非謂都屬佛寶疏次二句釋上句釋體大法性者明此真體普遍之義非直與前佛寶為體亦乃通與一切法為性即顯真如遍於染淨通情非情深廣之意故智論云在衆生數中名為佛性在非衆生數中名為法性言真如者此明法性遍染淨時無變異義真者體非偽妄如者性無改異海者約喻釋疑疑云真既不變云何隨於染淨既隨染淨云何不變釋云如海因風起於波浪波雖起盡溼性無變無變之性不礙起浪浪雖萬動不礙一溼是故動靜無二法準思之記次下後解餘句二初正釋體相二初體中三初釋法性上句釋體大者即法性真如海一句釋上標中體之一字法性下略標意謂顯真性平等頓周情與非情共一體故染淨因果皆此性故故云普遍非直下釋也若言佛性即但局於果不通諸法若言法性則無所不該不唯於佛也一切法即色心染淨等性謂真性即體大也即顯下結也染謂世間法淨謂出世法情通凡夫聖人非情通淨土穢土深則豎窮三際廣即橫該十方故華嚴云法住遍在一切處一切衆生及國土三世悉在無有餘亦無形相而可得智論下引證今則一往隨名定義故有斯文若知三名一體情與非情俱佛性也只是真如一法隨相異名既名隨相異則法性語通佛性語局也以佛亦即是法以法未即是佛由此佛性法性同而不同故金錍云然雖體同不無小異凡有性名者多在凡在理無性名者多通凡聖等應知名雖有異其體元同故圓覺云與一切法同體平等論下文云一者體大謂一切法真如平等不增減故言真下二釋真如此明下標意也以無變異故名真如真者下釋義偽謂詐偽鍮如真金妄謂虗妄影如本質今明法性悉無此事故名為真無改異者過去如現在色中如受中染處如淨處等故經云不生不滅不垢不淨不增不減無有變異故名為如又真者不可遣如者不可立故下文云無有可遣以一切法悉皆真故亦無可立以一切法皆同如故法性若此故曰真如海者下三釋海字疑意釋意如疏可知法準思之者應云真如隨緣成於染淨染淨雖成真如不變無變之性不礙染淨染淨萬差不礙一性是故性相無二也由是海之一字以喻真如隨緣不變疏下句釋相大謂此法身如來藏中含攝蘊積無邊恆沙性功德故或此句亦攝教行二法教含所詮之德行攝所成之功當知此中通四法寶俱有含藏之義記下句下二相二初正釋相大即無量功德藏一句釋上標中相之一字法身者約果如來藏者據因以體不二故雙舉也藏約含攝身名積聚所攝所積皆性功德如下文云二者相大謂如來藏具足無量性功德故所謂自體有大智慧光明義遍照法界義真實識知義乃至云無有所少義故名為如來藏亦名如來法身或此下二却收教行初兩句標即是前來所揀淺分者今約義却收表無所遺謂教及行俱有含攝悉名為藏教含下釋也教為藏者以能含藏所詮無量事理之勝德故此乃所詮名德能詮名藏德之藏也教義二法不相捨離故華嚴云文隨於義義隨於文是以能詮之教名為藏者即德藏也行攝等者釋行名藏也以行能攝藏所成功故此則所成名功能成名藏功之藏也然功行二法亦不相離但修習名行成就曰功是以能成之行名為藏者即功藏也下文云如來功德皆因謂波羅蜜等無漏行熏之所成就當知下結也然理中含藏唯是性德果中含藏兼修生德教含義德行攝功德由是四種皆名藏也雖通四法但教行是兼理果是正宜善分別疏又海之一字通喻體相永絶百非如海甚深包含萬物如海廣大無德不備如海珍寶無像不現如海現影也記又下二重釋海喻此有四義體相相半前二喻體後二喻相體則豎窮而橫廣相則具德而現法亦可體相皆具四義以此二法不相離故只是一體而有二名也故皆具四百非者此於一異有無等四字上明之謂一非一亦一亦非一非一非非一為一四句異等例此共成十六又過現未來各有十六成四十八又已起未起各四十八共成九十六并根本之四都成百非然過雖無量總而言之不出一異等四是故約此以明百非此等俱無仍非暫爾故名永絶故下文云當知真如自性非一相非異相非非一相非非異相非一異俱相非有相非無相非非有相非非無相非有無俱相等若以此十句一一能生十使煩惱亦成百非也是則言語路絶心行處滅不可識識不可智知深中更深故云甚深故智論云智度大海唯佛窮底包含物者如下文云是心則攝一切世間出世間法諸法雖多不踰世與世出今皆攝盡此即大中又大故云廣大如楞嚴云外洎山河虗空大地咸是妙明真心中物無德不備者如前所引相大中文結云乃至無有所少義故無不備者蓋言備也無像不現者隨染緣即現三細六粗等染像隨淨緣即顯十力四無畏等淨像故下文云謂如實不空一切世間境界悉於中現不出不入不失不壞等楞嚴云色心諸緣及心所使諸所緣法唯心所現汝身汝心皆是妙明真精妙心中所現物華嚴云譬如深大海珍寶不可盡於中悉顯現衆生之形影甚深因緣海功德悉無盡清淨法身中無像而不現更有八奇特十勝相皆喻真性也三僧如實修行等疏僧寶也僧通凡聖寶唯聖位也聖通大小菩薩為勝是故此中唯歸地上大菩薩僧記初總相簡辨也凡聖者凡謂內凡三賢外凡十信及未入位者但方袍圓頂亦名凡僧聖謂小乘四果大乘十地寶唯聖位者以能發無漏智斷障染證真理故菩薩為勝者以行二利除二執斷二障證二空比對小聖此為勝也是故下結揀大揀地前菩薩揀小若據馬鳴所歸合是九地已上今約地上同是如實行故所以歸之疏謂證理起行名如實修行下文云依法力熏習是地前行如實修行是地上行滿足方便是地滿位此中舉中等取後也又依寶性論就地上菩薩約正體後得説二修行彼論云一如實修行了如理一味二遍修行備知一心有恆沙法界今此文中舉正體等取後得故云等也記二正釋當句也二今初依本論證理起行者謂地上菩薩發無漏智證真如理所起之行一一契真無不如實實即實相也行如於實名如實行下文即隨染本覺智淨相文彼文但云依法力熏習如實修行滿足方便今疏隨文配位故有是地前等言也地滿位者以地滿行絶故言位而不言行今舉如實以等地滿故云舉中等後二又依下依寶性也前約地位豎論故以地上等取地滿今約智行橫説故以正體等取後得了如理者此依真如門修其止行亦是離相行亦即證真義故名如實備知等者此約生滅門修其觀行亦是隨相行亦即達俗義故名遍修如下文云謂觀一切法自性無生離於妄見不住生死觀一切法因緣和合業果不失起於大悲修諸福德攝化衆生不住涅槃等此同淨名經云能善分別諸法相於第一義而不動然此二説約位約智雖則有殊俱就地上而論故皆取之然據論主示迹因地合歸一切聖賢若以此而言等字通於下位即以聖等賢以大等小自然合前歸心廣大理該同體之言也疏又解次上一句亦屬僧寶上句舉德取人謂地上菩薩隨修一行萬行集成其一一行皆等法界積功所得故云功德人能攝德故名為藏下句即正歎行德也據後譯云無邊德藏僧勤求正覺者即符後解也然菩薩雖屬僧寶修行所成之德則屬法寶由是前解攝屬法也亦如體相是佛法身而攝入法寶故知此句文通上下記三兼取上文三初正釋舉德取人者如名人為三藏等隨修一行等者謂此菩薩修一行時具一切行以此一行如理起故理體具足無不攝故故云集成等法界者此之萬行既依理起故一一行皆契於理理遍行遍故云等也所謂非真流之行無以契真即斯義也積功所得者德者訓得也即地上菩薩所修等法界之行名之為德由地前久積功力至於地上而獲得故此乃功力為因是能得實行屬果是所得今因果合論故言功德人能攝德者功德多少屬於一人若無其人約何言德人有此德則人是功德之藏也正歎行德者是前積功所得之行即如實等法界行也據後下引證可知然菩薩下二通妨或曰此句既屬於僧何以前文指云法寶故有此釋如前教理行果俱名為法今此是行故屬法寶也亦如下三引例此則前於佛中取體相後於僧中取功德共成法寶若使體相歸佛功德還僧則何有法寶而歸敬之通上下者在上為法在下為僧如前體相之文在上為佛在下為法故引為例也二述造論意為欲令衆生除疑捨邪執起大乘正信佛種不斷故疏述造論意也亦是歸敬意記初顯意疏出兩意上正下兼爾疏初句舉所為機所為機者已如前辨記二釋文中二初總釋此偈三初釋初一句所為機者唯衆生二字餘皆能為屬菩薩也衆生通於三聚五性於中為有兼正如懸談所辨故云如前疏次二句明所成益上句令離過由疑故迷真失於樂也由執故起妄種於苦也十地論中菩薩三種觀於衆生起大慈悲一遠離最上第一義樂二具足諸苦三於彼二顛倒解云真樂本有失而不知妄苦本空得而不覺故云顛倒故令菩薩興悲造論故解釋分中文有三段一顯示正義即除疑也令悟真樂二對治邪執即捨邪執也令離妄苦三分別發趣道相即此下句起大乘正信也意令成行既於真不疑於邪不執未知於何起行謂於大乘以一心三義是究竟根本法故未知於大乘起何行謂起正信以信是衆行之本故即翻疑云信翻邪執云正記次下二釋中二句二初釋上句明離過二初正解此句言離過者過即疑執也由疑下釋疑執之相迷真者雖有如無謂之迷也故下文云所言不覺義者謂不如實知真如法一故不覺心起而有其念等既迷一真即菩提涅槃二無上樂棄之如遺故云失樂起妄者妄即五蘊色心認虗為實謂之執此則因迷起似執似為實從微至著展轉發生故圓覺經云妄認四大為自身相六塵緣影為自心相等既起於妄則三苦八苦自此而生故云種苦故下文云動則有苦果不離因故十地論即天親所造解華嚴十地品也遠離等即前迷真失樂義具足等即前起妄種苦義彼二即失真樂具妄苦於此不知不覺故名顛倒失不知者如法華説窮子於己庫藏以為他物雖付主執而不希取一餐之意斯則日用而不知也得不覺者亦如法華説火宅諸子戀著嬉戲了無出心亦復不知何者是火云何為失但東西馳走視父而已然此三種不出於二以顛倒無體只就前二約不知覺便成顛倒合為三也故令下結歸聖意以菩薩觀彼衆生有如是過是故造論故解下二通對下文一者正義既顯疑情自除真常二樂因茲永悟二者邪執雖多治之則捨無涯妄苦由此永離三者諸佛菩薩所證道相分別令知使發心趣向即成信行也然此後段因配論文未是正釋既於下二解後句明成行二初釋大乘既於等三句躡前成問引起論文謂於下一句正以論答以一下釋所以此中二句初句是出大乘體大乘之體只是一心為萬法本德相具足應用無盡故説心義也次句正明於彼起行之由究竟者是決定無上義謂若説若解約行約證皆以此為究竟決定之法根本者揀非枝末法也此是所説法門之根本故又一切染淨等法皆從生故故下文云一者信根本所謂樂念真如法故等又云謂欲解釋如來根本之義令諸衆生正解不謬故此即皆以一心等為根本也若於此起行方名正行未知下二釋正信也初亦躡前問起次亦論答也以信下釋所以衆行雖多皆以信為根本故十一善內五位之中皆信居首華嚴云功德母者即斯義也即翻下結配前句謂以正翻邪以信除疑是正敵對也疏後一句明成益意謂令衆生離過求行使信成滿入住不退堪受佛果故云佛種不斷故下云信成就發心者畢竟不退入如來種中正因相應等記後下三釋後一句必使衆生離疑執之過求正信之行者意欲令其信滿入住趣證大果即是佛種不斷也信滿即十信位極也入住即三賢之初十住位也不退者通説則既入十住正定聚中信已成根根深難拔故云不退別則十住中第七名不退住也堪求佛果者信既不退決定成佛不同十信位中毛心未定故既入十住行願漸成功德增長唯進無退堪能紹繼的趣菩提佛種豈斷耶引文可知疏又解除疑者泛論疑惑乃有多途求大乘者所疑有二一者疑法障於發心二者疑門障於修行今立一心法以遣前疑開二種門以遣後疑記又下二別釋除疑也此是海東疏義此義稍切故引用之多途者謂疑佛疑法疑因疑果一多空有等疑有無量故曰多途求大乘者是決定求趣大乘之人故無率爾之疑但有茲二疑法等者疑云大乘法體為一為多法體若一彼此無異我即是佛何用更求衆生本成何須復度悲智既息願約亦止三種發心由是不為故云障於發心也法體若多彼此成異彼自成道我自沉淪如何發心求彼佛道我既如此衆生皆然何須發心度令成佛又若多者如經所説十方世界唯有一乘心佛衆生三無差別一心一智無畏亦然如何會通由此猶豫不能發心上求下化疑門等者疑云進趣之門合有無量未知於此依何等門若使總依如何頓入若取一二何是何非由是遲回不能修行立一心等者謂大乘之法唯是一心一心之外更無別法但由無明迷自心海起成六道波浪波浪雖起不出一心之海約相即不妨上求下化約性則不礙彼此體同大悲大智由此發起故無疑也開二門等者謂行雖無量不出二門依真如門修於止行依生滅門起於觀行若止觀雙運萬行斯備入此二門諸門皆達由是解之疑心自息必修行也故圓覺云方便隨順其數無量圓攝所歸循性差別當有三種即是依此二門修止觀及俱行也論本為此故立一心法開二種門矣音釋鞠音菊窮究也鎔音容銷也邐音里拖連接也虻音盲蚊虻評音平較論也婆沙此云廣解亦云種種説論名俱舍翻藏含攝義論名牟尼此云寂默佛名瞬音巽動目也餐與餐同吞食也柯音軻枝柯也牒音蝶躡前文而起者曰牒阿含翻無比教經名也楞伽此云不可往山亦經名狹與狹同音洽陜隘不廣也筏音伐編竹以渡水也又船也奢摩他華言止定也毗鉢舍那華言觀慧也裹音果包也船同船音然舟也舶音迫海船纂音鑽與纘同集治也詰音吉問難也撫音府按摩彈擊也匹與匹同音僻配合偶也又單亦曰匹飼音寺以食餧飼也迄音乞至也製音制造也愷音慨旻音明鉞音越闐音田崙音輪綴音醉聯也例素例類也槩也素謂平索素嘗也諳音暗曉也歷練也譯音易翻梵語為華言也嬈音饒擾亂也莂音筆草繫以記之也輾音輦車輾函音咸盒函傘函等雕音凋木雕塑音素泥塑鑄音注銅鑄炳音柄皎明也錍音悲批箭鏃也鍮音偷鍮石銅似金踰音魚超出也躡音業蹈也
