body:
  text: 唐西京太原沙門法藏述疏終南草堂沙門宗密錄註宋秀州長水沙門子璿修記清錢塘慈雲沙門續法會編順天府府丞戴京曾閱定次廣釋三初止二觀三俱初止五初修方便二顯勝能三辨魔事四簡真偽五示益勸初修方便二初明勝人能入次顯障者不能初明勝人能入二初託靜息心修止方便二止成得定除障不退初託靜息心修止方便二初約外緣二安內心初約外緣若修止者住於靜處端坐正意疏住靜者若具言之有五緣一者閒居靜處謂住山林及諸閒靜等處若住聚落必有喧動二者持戒清淨謂離業障若不淨者必須懺悔三者衣食具足四者得善知識五者息諸緣務今略舉初故云靜處也記閒居等者不作眾事名之為閒無憒閙故名之為靜意令心寂當須離喧若欲離喧宜去聚落居阿練若繁塵不對止則易成此有三處可修禪定一深山絕人處二須阿蘭若處離於聚落極近三里即放牧聲絕無諸憒閙三者遠白衣舍清淨伽藍之中皆名閑靜處故當第一戒淨者欲盛妙饌必資淨器戒若不淨定則不生若知先所曾破戒者當宜依法懺悔令戒如故以戒不淨者即有業障令修止不成便感邪魔病事等以為侵撓也衣食等者一衣具足以根有三故上者如雪山大士隨得一衣蔽形而已中者如迦葉糞掃三衣不畜餘長下者如多寒國土及忍力未成之者許三衣之外百一資身二食具足者此有四類上者隨得充飢而已中者常行頭陀受乞食法下者阿蘭若處受檀越送食下下者僧常食及受請除此異求多積長貪妨道今須衣食者若闕一種心有所慮得定無由善知識者有三一者辦力資緣二者同行勸發三者教授法門如鼎三足闕一不可息諸緣務者有四一生活二人事三工巧伎術四學問讀誦隨有一事即有所妨令不得定疏端坐者調身也先安坐靜處每令安穩久久無妨次當正脚或全跏或半跏若全跏者先以左脚置右髀上牽來近身令脚指與髀齊次解緩衣帶使周正不令坐時脫落次以左手置右手上壘手相對頓置脚上牽來近身當心而安次當正身先挺動其身并諸支節作七八反如自按摩法亦勿令手足差異正身端直令脊骨相當勿曲勿聳次正頭頸令鼻與臍相對不徧不邪不低不昂平面正住次以舌約上齶次閉眼不令全合廣如天台山顗禪師二卷止觀中說也今略總說故言端坐也記正脚等者押一脚為半跏於中以右押左為降魔坐以左押右為吉祥坐若兩脚相押為全跏此坐能令儀相端好廣如智論說故偈云見𦘕跏趺坐魔王尚驚怖何況入道人端身不傾動緩衣帶者恐坐久氣滿不安故不令脫落者儀相不妙或恐風寒故約上齶者禦風閉氣免神散心馳故然欲閉口先且吐𮌎中穢氣吐時開口放氣而出想身百脉不通處教悉開通出氣令盡然始閉口鼻中內清氣然閉口時但得脣齒纔相拄耳眼不全合者全開則掉全合則昏故但令斷外光而已二卷止觀者即彼初學坐禪止觀本只一卷開應成二也彼有十門以修止觀第一具緣略如疏明第二呵欲謂色聲香等五欲所言呵者了知此五惱惑眾生因之受苦不得解脫深生厭離不復追攀乃名呵也第三棄葢葢謂貪欲睡眠恚掉悔疑也所言棄者覺知此五葢覆眾生心性不得解脫如日月為烟雲等翳不得照明今皆遠離即名棄也第四調和者謂調飲食不饑不飽調睡不節不恣調身不寬不急調息不澀不滑調心不浮不沉令此五事和暢得所故也第五方便行者謂欲進念慧一心以能志樂修諸禪定出離世間晝夜精勤進諸善法念世無常可輕可賤禪定智慧可貴可重於漏無漏揀擇苦樂虗實之相一心決定修行止觀以此名為方便行也第六正修止觀於中有坐時修歷緣對境修並如彼文第七善根發即同下文現報十益等第八覺知魔事如下文說第九治病者先須知病所起起有四種一從四大起二從五藏起三鬼神所作四業因所感既知病已即以止觀治前二以呪力治第三修福懺悔治於第四第十證果即入住不退並如彼說略知大況若要備見可尋彼文疏正意者調心也末世行人正願者少邪求者多詐現寂靜威儀苟求名利心既不正得定無由離此邪求故云正意意欲令其觀心與理相應自度度他至無上道名正意也記調心者心即是意調伏心意令趣向真正故末世下出不正相然戒定慧學及諸雜行多有是患菩薩戒疏云佛法內人多約四位起行謂三學及雜行初約戒學者有二類一矯異者謂雖不破戒性非質直依邪思計現異威儀眩耀世間以求名利本無片心以求出離然普抑餘人無異威儀者悉為無德此是沙門賊亦是威儀賊也如迦葉寶積等經說二淺識者謂性非深智恃己戒行將為出離陵他乘急戒緩之眾聞諸法空便生恐怖此是佛法怨賊也出佛藏經二約定學亦二類一約貪狂者謂性樂名利久在山中心少澄靜現得定相眩耀世人招大名聞普抑餘人無此相者悉以為非此是阿蘭若賊也出華手經二約邪慢者謂性非多聞依山習定鬼神加力心定有見既不善覺知即恃此起慢當大名聞陵滅餘人悉以為非毀傷佛法此是魔黨大賊也出起信論及華手經三約慧學者亦有二類一約淺者謂性少聽誦學無次第為名利衝心急預講說己見臆斷非毀古今唯求利名元無出意恃自無行亦輕侮戒定此是賣佛法賊當招大苦出華嚴魔業及楞嚴等經二約深者謂性雖明辯於二乘三藏文義少通然猶未得佛意既當傳法唯讚名利以勸後學非毀古今顯自獨絕恃此為德起慢陵人但誦持法藥而不自滅病己負深愆況更法中起病甚不可救奇哉水中出火以何滅之此是害佛法之賊也出佛藏十輪等經四約雜行者亦二類一約福行者謂性非質直苟為姦計共崇奇福眩耀世人招引重䞋意在以少呼多用此活命既遂其所求即恃此起慢陵蔑餘人無利養者悉以為非利養既爾名聞亦然此亦販佛法賊出迦葉經二約餘行者謂性非慧悟隨學一法即便封著眩此所學以招名利撥餘修者皆非究竟此亦愚人蠧害佛法賊也行人苟沾一患宜深戒除去之離此下明今意皆可解二安內心二初約坐時修止二約餘時修止初約坐時修止二先離境次除心先離境不依氣息不依形色不依於空不依地水火風乃至不依見聞覺知疏息謂數息觀境形謂骨鎖等色謂青黃赤白四相地等五相皆是事定所緣之境見聞覺知是識一切處通前為十一切處亦可見聞等是舉散心時所取六塵於此等諸塵推求了達知唯自心不復託緣故言不依記皆事定者兼前數息等不唯此五也十一切處者即青等四空等五及識為十言一切處者觀一一法皆徧一切處故由此亦名十徧處觀亦可等者謂不依心散亂時眼所見色乃至意所知法等六塵聞謂耳鼻覺謂舌身知即是意攝六略盡今舉能取所也於此下釋意以推此等唯識所現無別有體既知心外無塵豈合將心外託若不然者豈名修止耶已上諸定所緣皆是權小教中之所施設蹔令制心漸發無漏今此實教故並不依即直賜寶乘不與羊鹿也次除心一切諸想隨念皆除亦遣除想以一切法本來無想念念不生念念不滅亦不得隨心外念境界後以心除心心若馳散即當攝來住於正念是正念者當知唯心無外境界即復此心亦無自相念念不可得疏一切下除前諸境更有餘心皆亦遣也亦遣除想者所遣既無能遣不立泯然寂靜方名止也以一下問何故能所心想並不存耶故此答云以法本無想欲順於法性故能所皆不存也念念下轉釋成法性無想所以良以想無自性窮之則空故無生滅自體可得此乃即生無生即滅無滅故也如陽炎水本自乾耳亦不得下若心外有實境心緣此境時抑令不緣不可得故後以心除心者今既心外無塵即所取無相所取無相故能取自然不生何勞後心方更除耶心若下初習多馳故攝令住正是正念下何者正念故云外境唯心是為正念即復下妄境既無唯心亦寂記論分二初遣妄想中三一正遣餘心皆遣者此有二義一除見聞覺知外更有心想隨何等念悉皆除遣二除前數息骨鎖十遍處境觀想之外更有九想八背等一切事定觀想悉皆不依以今心心向理故揀去事想故云皆除所遣等者依幻說覺亦名為幻若說有覺猶未離幻說無覺者亦復如是故亦須除是則幻心滅故幻滅亦滅也以一切等二釋成順法性者雖言一切法意在真性以一切法悉皆真故皆同如故廣如真如門說斯則離心緣相也轉釋等者科指此文良以下釋此文意前言法性本無想者實由想體自空本自不生今則無滅此葢本空非推之使空也此乃下會釋文旨非謂待無念時方始不生不滅以念念生處即是無生念念滅時即是不滅如經云初生即有滅不為愚者說又經云當處出生隨處滅盡陽𦦨喻明可見亦不等者三重揀若心等者先反縱意云外境若實有體抑心不緣終不可得以不可不緣之故後得以心除心此即縱其可除也然剩者之一字復詳此文似剩不故者之三字但只可言抑令不緣可得後以心除心也義方彰顯今既下次正明既知無境心自不生豈得放心外緣後更除遣豈非自徒勞耶如人令子為非又復譴責斯何理耶心若等者二住正念二初正顯初習等者此與前為異前則不放心外緣此乃任運馳散外境等者本無境界妄起攀緣是名不正今則觀境無境知心無心唯一實相實相外更無別法當爾之時分別不生故名正念即復等者二離相唯心寂者此唯心之相亦不可得前則離能所分別唯一實相名為正念今則正念亦無自相以凡所有相皆虗妄故斯則亦不知知寂亦不自知知自性了然故不同於木石也二約餘時修止若從坐起去來進止有所施作於一切時常念方便隨順觀察疏非直坐時常修此止餘威儀中一切時處常思方便順於法性不動道理記餘威儀中者即同天台歷緣對境修也謂歷行住坐臥作語等六緣對色聲香味觸法等六境且如欲行便自思惟我今何故行有利則行無利則不行然於行時了知行心及行中一切事皆不可得不可得故妄念自息名為修止即觀上不可得行心行等事法一一空寂因緣故有名為修觀住等例此又於見色時修止觀者見一切色如鏡像水月悉不可得不生分別想念名為修止色等因緣故有畢竟空寂名為修觀聲等例此順法性理者若止若觀俱順法性以法性常寂常照故然天台修止自分三止觀亦復然以約三諦境修故也今此文中約真如生滅二門而修止觀皆順一心即是雙運雙運即是息二邊分別中道第一義諦止觀也方便隨順者以真如法性舉心即錯動念即乖故凡有思念觀察皆為隨順方便也二止成得定除障不退久習淳熟其心得住以心住故漸漸猛利隨順得入真如三昧深伏煩惱信心增長速成不退疏久習下一止成以心下二明止力附心猛利得定深伏下三明伏惑入位即信滿入住記止成者止前方便成也未是即觀之止附心者以久習故隨心成止以隨心故即成三昧即真如三昧也真如三昧方是即觀之止為奢摩他梵語三昧此云正定故伏惑等者伏四住見修煩惱未能斷故故云伏惑然此亦有伏無明義論言深伏意含此也此當信位若更增進速入初住故云信滿入住入住即不退次顯障者不能唯除疑惑不信誹謗重罪業障我慢懈怠如是等人所不能入疏一於理猶豫二闡提三外道四五逆四重五恃我自高六放逸不勤是六種障隨有一種即不能入記理猶豫者於上甚深義理是非不定如圓覺經二十五輪云一念疑悔則不能入闡提者阿闡提此云無信此則一向以為不是故不同疑惑外道者為宗習邪法故誹謗正道此乃非唯不信更加此過故異前也五逆者弑父弑母弑阿羅漢破和合僧出佛身血四重者殺盜婬妄問前疏文云有業障者但令懺悔今何除之答此中所除約不懺者懺則能入不同小乘有定業故涅槃經云未入我法業則決定若入我法則不決定恃我者一恃我故不修二修之存我相二皆不入故圓覺云彼修道者不除我相是故不能入清淨覺放逸者或貪放逸故不修或修之不勤亦不得入學如不及猶恐失之況此類乎是六下非謂具此六障方不得入但於六中或有一障便能障道不得三昧二顯勝能二初能生一行三昧二能生無量三昧初能生一行三昧復次依是三昧故則知法界一相謂一切諸佛法身與眾生身平等無二即名一行三昧疏復下一標立謂下二釋相即名句三顯名記佛法身與眾生身無二者有三意一者意取眾生法身故二者法身流轉五道名曰眾生故三者眾生相空即法身故於此三中初後為正故淨名云如自觀身實相觀佛亦然平等即無二無二即一相也一行三昧者即真如三昧也謂住真如境故名真如三昧以真如無異相故但行造此法故名一行三昧此乃由境一故使智行亦一也前則從境得名此則通於法行科云能生者其實即是義說為能生也二能生無量三昧當知真如是三昧根本若人修行漸漸能生無量三昧疏以此真如三昧能生無量三昧故名三昧根本也若人下文殊般若經云何名一行三昧佛言法界一相繫緣法界是名一行三昧入一行三昧者盡知恒沙諸佛法界無差別相乃至廣說是名上皆一行三昧入一行下明無量三昧記當知下初躡前生起若人等二正明本義以此真如等者由真如是一切法根本故修此三昧亦與一切三昧為根本也修行漸能生者此三昧既是根本若入此者則能生長一切三昧以末從本生故諸三昧自此成也文殊下引證法界一相者所緣之境也繫緣法界者能緣之心也停心諦理與境冥合故諸佛法界者諸佛所證法門河沙無量隔別不同然亦一一不異法性入此三昧者皆悉得知無有差別也是名下消釋彼文上義證前文下義證今文如理會通三辨魔事梵語魔羅此云殺者謂能奪行人功德之財殺智慧之命而言事者葢佛以功德智慧度眾生令入涅槃為事魔不如是常以破壞眾生善根令流轉生死為事以魔樂生死故三界羣品盡屬於魔今修行之人志欲出離三界又發弘誓廣度眾生魔懼減少眷屬故來撓之令其退墮行人要須辨識而降伏之然有四種之異一煩惱魔二蘊魔三死魔四鬼神魔前三在內以內修伏之鬼魔在外呼名相降之故今甄辨於中二初略二廣初略二初魔事二對治初魔事或有眾生無善根力則為諸魔外道鬼神之所惑亂若於坐中現形恐怖或現端正男女等相疏魔天魔也此云障礙鬼堆惕鬼也神精魅也如是鬼神嬈亂佛法令入邪道故名外道如是三種能變作三種五塵壞人善心三種者一示可畏之身怖之以失志二現可愛之形惑之以生染三現非違非順平等五塵動亂人心記障礙者障入道人礙令退墮故堆惕精魅並如下說如是三種者魔鬼神也外道同人故不說之能變三種下一者違情五塵或大或小恐怖萬端故令失志文云現形恐怖是也二者順情五塵對男現女對女現男令其生染文云端正男女是也三者平等五塵揀去前二即是此境文云等相是也以魔鬼神之三種各能現違順平等之事也二對治當念唯心境界則滅終不為惱疏一切境界尚唯自心何況坐中此等諸境是故觀察唯心魔境隨滅不能嬈亂以此唯心非彼所知故此是通遣之法記先略釋論旨以明通遣也何況等者如上所現但是坐中一切境內之少分故若能觀心無境不滅故前云若離心念則無一切境界之相又云心生則種種法生心滅則種種法滅等以此下唯心之義方便教者尚不能知豈彼魔外能解此理大論云蠅能緣一切物唯不能緣熱鐵若緣熱鐵蠅則成火魔能緣一切境界唯不能緣實相若緣實相魔亦成實相也通遣者凡所見聞但用此法而治如天甘露是病皆除故圓覺云除彼所聞一切境界皆不可取此皆通遣法也疏別門遣者治諸魔者當誦大乘般若及治魔呪默念誦之治諸鬼者堆惕鬼者或如蟲蝎緣人頭面鑽刺熠熠或復擊攊人兩腋下乍抱持於人或言說音聲喧喧及作諸獸之形異相非一來惱行者則應閉目一心陰而罵之作如是言我今識汝是此閻浮提中食火嗅香偷臘吉支邪見喜破戒種我今持戒終不畏汝若出家人應誦戒律若在家者應誦菩薩戒本或誦三歸五戒等鬼便却行匍匐而出也治諸精魅神者謂十二時狩能變作種種形色或作少男女相或作老宿之形及作可畏身相等眾多非一惱亂行者其欲惱人各當十二時中本時來也若其多於寅時來者必是虎兇等乃至若多於丑時來者必是牛類等行者恒用此時則知某獸精魅說其名字訶責即當謝滅此等皆如禪經中及天台止觀中廣說記次廣引經書以出別治也先別出對治中初治魔當誦大乘者如諸藥草各有功能般若者金剛摩訶之類呪者諸陀羅尼其數非一默念者恐彼聞之而解使呪等無力如授藥令服不可與知治諸下二治鬼堆惕者禪病經云羅旬逾長者子初出家時迦葉佛所教數息觀靜處見一鬼面如琵琶四眼兩舌舉面放光以手擊攊人兩腋下及餘身分口言堆惕堆惕如旋火輪似掣電光或滅或生或作鼠形或作馬聲或作鬼吟或復竊語種種惱亂令行人發狂佛言此鬼是拘那含牟尼佛時有一比丘垂向初果犯邪命故為眾擯出瞋恚命終自誓為鬼惱亂四眾堆惕者以口云也臘吉支者禪經云此起尸鬼也而言偷者或是此鬼愛偷死屍故或是連下梵語且兩存之非謂因偷夏臘也故經云諸臘吉支手捉鐵棒等戒律即聲聞戒諸部律文歸戒可知治諸精魅下三治神少男女者即順情境謂作父母兄弟諸佛形像等可畏身者或為虎狼師子羅剎之形種種可畏之像來怖行人如嵬禪師所見或無頭師見之曰善哉汝無頭痛之患或無腹五藏等皆以言戲之又見年少女人師曰貧道身如枯木心若死灰無以革囊見試此鬼即時飛空而返仍有偈云大海可竭須彌可傾彼上人者秉志堅貞兕者有說似牛青色一角重千餘斤牙爪銛利能伏千虎乃至者若多於卯時來者必是兔麈鹿等辰時來即龍鼉魚等巳時即蛇蚓鰍等午時即馬驢駝等未時即羊鴈鷹等申時即猴玃猨等酉時即雞烏雉等戌時即狗狼豺等亥時即猪㺄豕等子時即鼠燕蝠等丑時即牛鼈蟹等此等下二總指經書以證其出處也二廣二初魔事二對治初魔事五初現形說法至五食差顏變初現形說法或現天像菩薩像亦作如來像相好具足若說陀羅尼若說布施持戒忍辱精進禪定智慧或說平等空無相無願無怨無親無因無果畢竟空寂是真涅槃記或下現形也如掬多令魔現佛形八部翌從不覺禮拜等若說下說法也陀羅尼此云遮持謂持善遮惡故然有多字一字無字魔所說者應唯前二也以不知唯心故不能說無字空無相無願即三解脫門亦名三平等門無怨下顯無相願空義可知此魔但能說而不能證天台云魔能說別異空假中不能證也二得通起辨或令人知宿命過去之事亦知未來之事得他心智辨才無礙記或下先得通也魔得有漏五通故令行人亦得此通此中過去是宿命未來是天眼現在是他心前現形即神境唯不顯天耳舍在其中也辨才次起辨也三起惑造業能令眾生貪著世間名利之事又令使人數瞋數喜性無常準或多慈愛多睡多病其心懈怠或卒起精進後便休廢生於不信多疑多慮或捨本勝行更修雜業若著世事種種牽纏記能下先起惑以正定令人滅惑魔定令人起惑由行人善根微少故修三昧引此邪相也或捨下次是造業也四據定得禪亦能使人得諸三昧少分相似皆是外道所得非真三昧或復令人若一日若二日若三日乃至七日住於定中得自然香美飲食身心適悅不飢不渴使人愛著記初據定得自然下二得禪自然飲食身心適悅者禪悅食故或於禪中得人間上妙飲食五食差顏變或令人食無分齊乍多乍少顏色變異疏五對皆如文可見記初是食差顏句是顏變五對等者先寄別總指也總上魔境共有五對十事故疏問如現佛菩薩像說甚深法或是宿世善根所發云何揀別定其邪正答此事實難所以然者若是魔所作謂是善相而心取著則墮邪網若實是善根所發之境謂為魔事心疑捨離則退失善根終無進趣是故邪正實難取別今且依古德相傳略以三法驗之一以定研磨二依本修治三智慧觀察如經有言欲知真金三法試之謂燒打磨行人亦爾難可別識若欲別之亦須三試初則當與共事共事不知當與久處久處不知智慧觀察今借此意以驗邪正第一以定研磨者謂定中境相發時邪正難知者當深入定心於被境中不取不捨但平等住定若是善根之所發者定力逾深善根彌發若是魔所為者不久自壞第二依本修治者且如本修不淨觀禪今則依本修不淨觀若如是修境界增明者則非偽也若以本修治漸漸滅者當知是邪也第三智慧觀察者觀所發相推驗根源不見生處深知空寂心不住著邪當自滅正當自現如燒真金益其光色若是偽金即自當焦壞此中真偽當知亦爾定譬於磨本治猶打智慧觀察類之以燒以此三驗邪正可得知也記問下次約通料揀也先問宿世等者如前所說三賢已上乃至於佛能與二乘凡夫作差別緣故今定中所現聞見既同寧知邪正答下二答二初歎難解墮邪網者以邪為正故楞嚴云若作聖解即受羣邪退善根者以正為邪故由是取之捨之二俱有過是故難也如蹈火受焚見寶不取二皆有失失故無進趣之日也今且下二正揀辨四初標依古法一者深入禪定二者勿移舊志三者察其本末如經下二引經為據三試等者若燒之益粹打之彌堅磨而不磷可謂真矣共事者若蹔會聚當共與之從事從事則體其情性也情則易變性則不改故可知之如或未辨久則見之仁者則久而彌芳不仁者不可以久處約也而又未辨當用善巧觀察視其所以觀其所由察其所安自然可見其邪正矣今借下三依法正揀經中三喻以驗行人真實虗偽故文云行人亦爾也故以共事等三法試之今文將以騐於定境不同經意故云借此但借其喻非取法也不淨觀者隨看當初所修何觀或數息或不淨等今於此禪發其境界即却依本時修習便驗其邪正也如燒下四合顯經喻三先喻也但舉一喻餘則例知故不言也此中下二合定譬等者據義順合可知以此下三結三驗等者既以定石磨之行槌打之慧火燒之邪正鈆金足可彰矣二對治以是義故行者常應智慧觀察勿令此心墮於邪網當勤正念不取不著則能遠離是諸業障疏行者下依自隨分所有覺慧觀諸魔事察而治之若不觀察則墮邪道三種驗中此當第三智慧觀察當勤下邪不干正自然退故若取著者則背正入邪若不取著則因邪顯正是故邪正在著不著也不取著故無障不離如智度論云除諸法實相其餘一切皆是魔事偈云若分別境相即是魔羅網不動不分別是即為法印此之謂也斯則總顯三中前之二法以此大乘止門唯修理定更無別趣故初定研磨并依本修治更無別法所以合說但依本止門故記以是義者指前五對依自等者隨己所有慧力觀彼境界不妄領受當觀諸法實相無邪不破以知境界唯心本自不生終不信任妄有取著墮於邪網若不等者以隨彼境界而生取著想其心則亂以心亂故失於正受正受者不受諸受也今既受彼即名為失以失正故師墮於邪無所疑矣邪不干正者以邪法虗妄正法真實真實若立虗妄自壞以修行者深住真如三昧故自然退也若取等者魔所現境意在令人取著念心纔起墮彼無疑若深入唯心是邪則滅是正則存耳是故等者不著則迴邪作正著之則變正為邪不取下然天台治魔不離三種一止治謂凡見一切外境好惡等事悉知虗誑不愛不怖亦不取捨亦不分別息心寂然彼自當滅二觀治謂若見如上所說種種魔境用止不去即反觀能見之心不見處所彼何能惱如是觀時尋當謝滅若遲遲不去但當正念勿生恐怖不惜身命正心不動知魔界如佛界如一如無二如魔界無所捨佛界無所取即佛法自現魔境自滅今此論中前是觀治此是止治止觀二治皆在不取也智度等者以生心取境境便成魔境惑其心即為魔事且如色等諸法取之則成塵賊不取則成妙境今觀一切唯是實相實相之外更無諸法是故見有法者皆是魔也况於定中所見境界可不是魔耶偈云等者如經中說有一比丘魔欲惑之經七千歲竟不得便何以故以是比丘不起心故其猶密室風不得便風得入者由孔隙故魔得便者由起念故斯則下示此節當勤等論文以對三試之中當以定研磨及依本修治之二也以此下釋所以或曰準論正念之言但當其定云何得有依本修治耶故此釋之故前云不依氣息形色地水火風等此則揀去餘事觀想也又云是正念者當知唯心無外境界即復此心亦無自相可得又云久習淳熟其心得住以心住故漸漸猛利隨順得入真如三昧等故知深入此定即是依本修治更無別法以為本修也問據前所說但是魔境及至結文何故乃言離業障耶答此有二義一則行人內有業障故外感魔境若離業障則無魔事今就本言故云業障也二則若墮魔網則成業障以魔樂生死起愛見貪著世間名利恭敬由是造業故成業障今離魔事即是離業障也四簡真偽二初舉內外二定以別邪正二對理事二定以明真偽初舉內外二定以別邪正二初邪二正初邪應知外道所有三昧皆不離見愛我慢之心貪著世間名利恭敬故疏皆不離者我見我愛我慢之使常相應也貪著者內著邪定外貪名利又但一切禪定不能減損煩惱者皆不可據也記我見等者迷此三惑即名為癡即我癡等是未那中俱生四惑以是俱生故云常相應皆是無明住地所攝故名為使不減煩惱等者修定本為除斷煩惱既不能斷何用定為如服藥病增則知非藥安可更服據依仗憑託之義不可據者不可憑仗而行也二正真如三昧者不住見相不住得相乃至出定亦無懈慢所有煩惱漸漸微薄疏真如三昧者謂在定時而不味著也不住見以忘心故不住得以忘境故無懈慢者出定亦無恃定之慢也煩惱薄者貪瞋癡漸薄即正定之相也記不唯著者不同外道有見愛故此通指下二句別出忘心境者絕能所故即不味著相也出定等者本不以懈慢故入定所以出定時亦得如此不同外道有我慢故貪瞋等者意本斷惑故得漸薄不同外道貪名利等如服藥病除是為良藥既知是良藥不可不服也二對理事二定以明真偽二初真二偽初真若諸凡夫不習此三昧法得入如來種性無有是處疏修大來菩薩行者要依此真如三昧方入種性不退位中除此更無能入之路種性者約位在十住以去不退位中辨記論文反明疏意順釋要依等者以真如是如來之性故修此三昧方成如來之種如人生於王家必繼王業此亦如是除此等者楞嚴云十方如來一門超出妙莊嚴路又云十方薄伽梵一路涅槃門十住已去者謂六種種性之初即習種性也不退位者不退有四一信二位三證四行今即位也二偽以修世間諸禪三昧多起味著依於我見繫屬三界與外道共若離善知識所護則起外道道見故疏諸禪謂四禪四空定等世間諸定及不淨安般等但取境相定皆名世間定也依於下以味著定境故不離於我故云與外道共共者同得此事定故若離下以其共故若得善友護助之力得入佛法若離善友則入邪道記四禪即色界亦靜亦慮故謂之禪四空即無色界有靜無慮故唯云定不淨即觀身五種謂種子住處自體自相究竟不淨廣如下說安般者梵語安那般那此云出息入息上二即五停心觀之二也等者更等後三及四無量六妙門十六特勝通明禪等一切事定也取境相者以非理定但緣彼息等諸相不稱真如不出三界故名世間定也然天台明諸禪定總為三種一世間禪二出世間禪三出世間上上禪世間復二種一世間味禪即四禪四無量四空定也二世間淨禪即六妙門十六特勝通明禪也二出世間禪有四一觀禪謂九想八背捨八勝處十一切處二鍊禪謂九次第定三熏禪謂師子奪迅三昧四修禪即超越三昧也三出世間上上禪有九謂自性禪一切禪難禪一切門禪善人禪一切行禪除惱禪此世他世禪清淨禪行相廣如次第禪門略如法界次第須者撿之味著等者不同真如三昧不住見相及得相故同得等者三乘人及凡夫外道皆修此定然凡夫多味著外道帶異計所修雖同修心有異故得果各別也若離等者前說知識緣中須教授善知識要知邪正辨真偽以差之毫𨤲失之千里故如此善友豈合辜恩故法句經中重重顯讚然修行禪定不易其人欲具諳其門須遍覧諸教唯天台三種止觀明諸禪修證行相廣在彼文今略依初學禪觀明邪正發相邪定發相者或身手紛動或時身重如物鎮壓或身輕欲飛或逶迤睡熟或煎寒壯熱見諸異境或其心闇蔽或起諸惡覺或念外散善或歡喜躁作或憂愁悲思或惡覺觸身身毛驚豎或時大樂昏醉如是種種邪法與禪俱發名為邪偽此之邪定若人愛著即與九十五種鬼神邪法相應多好失心顛狂或諸鬼神等知人念著其法即加勢力令發諸深邪定智慧辨才神通感動世人見者謂得道果皆悉信服而內心顛倒專行鬼法若不值佛及善知識所護是人命終還墮鬼神道中若更生來多行惡法即墮地獄行者修止觀時若證如是等禪有此諸邪偽相即當却之若知虗誑不愛不著當即謝滅若起念著即墮群邪正禪發相者若於坐中發諸禪時無有如上所說諸邪法等隨正禪發即覺與定相應空明清淨內心喜悅澹然快樂無有覆葢善心開發信敬增長智鑒分明身心柔輭微妙虗寂厭患世間無為無欲出入自在是為正禪發相此二種相如人與惡人共事常相觸惱若與善人共事久久愈見其妙斯亦如是行者宜深察之故須善友教授五示益勸二初總標二別解初總標復次精勤專心修學此三昧者現世當得十種利益疏後世利益世量無邊現世利益略陳十種記後世等者妄盡習除證真起化德充法界應用無窮現益亦多且舉十種故云略也二別解三初善友攝護益二離內外障益三行成堅固益初善友攝護益記當十中第一也云何為十一者常為十方諸佛菩薩之所護念疏以修此真如三昧故諸佛菩薩法應護念令得勇猛勝進不退也記云何徵一下釋以修等者略同金剛所說持經之者為如來知見護念等如王世子修德進業堪紹國位特為君之所寶也為佛所念理合如此故云法應二離內外障益記當十中二之五也文分為二初離外惡緣二離內惑業初離外惡緣二者不為諸魔惡鬼所能恐怖三者不為九十五種外道鬼神之所惑亂疏一離天魔現形二離外道邪惑記現形者身被其惱害也以知諸法實相故不為恐怖邪惑者心墮於迷網也當念唯心無境故不為惑亂二皆如上所治九十五者華嚴中說有九十六謂六師各有十六種所學法一法自學餘之十五各教十五弟子師徒合論故成此數今減一如餘處說二離內惑業四者遠離誹謗甚深之法重罪業障漸漸微薄五者滅一切疑諸惡覺觀疏一除業也不起新業舊業輕也二滅惑也記甚深者即般若妙慧深達實相故今既入此深定故不誹謗也罪障薄者已達罪性福性非內外中間我心自空罪福無主三昧漸深罪業漸減故云微薄也疑者謂於理猶豫覺觀謂語之加行今達諸法唯心無外境界內離尋伺於理決定何所疑耶故皆滅之三行成堅固益記當十中後五也六者於諸如來境界信得增長七者遠離憂悔於生死中勇猛不怯八者其心柔和捨於憍慢不為他人所惱九者雖未得定於一切時一切境界處則能減損煩惱不樂世間十者若得三昧不為外緣一切音聲之所驚動疏一於理增信二處染不怯三不為緣壞四無世滋味五得深禪定記增信者信欲成根必務增長漸入不退故不怯者知法如幻故無所怯繩蛇非毒杌鬼無心何所怯耶故下文云若修止者能捨二乘怯弱之見既不怯弱則非同二乘不壞者了他如己故得柔和柔和故不憍慢不憍慢故人則不惱不惱故不壞不壞行也無世滋味者世人不學此法則愛見深固貪著世間今既知三界虗偽誑人六根焉可貧而樂之不樂則離愛離愛即減煩惱也故下云若修止者對治凡夫住著世間得禪定者真如三昧成也論云外緣者即通舉六塵音聲即別指耳所對也故楞嚴云純音無塵根境圓融無對所對又云不自觀音以觀觀者能令眾生觀其音聲即得解脫斯則同諸法無行經入音聲慧法門何所動耶今於六塵中唯舉聲塵者阿含說此以為禪刺也二觀三初明修觀意二辨觀行相三結觀分齊初明修觀意復次若人唯修於止則心沉沒或起懈怠不樂眾善遠離大悲是故修觀疏不樂眾善失自利也下初觀治之第四觀成之遠離大悲失利他也下第二觀治之第三觀成之記心沉沒者以真如無相向即心絕分別不起故云沉沒此如二乘取空為證也由沉寂故遂成二失或起下正顯二失也初觀即法相觀於中復有苦無常無我不淨之異以見不淨故不可愛苦故不可忍無我故不自在無常故不可保由是深厭世間而求出離樂修眾善以備將來夙興夜𥧌無敢怠惰第四即精進觀勝心既發念念精勤敏則有功故能成辦第二即大悲觀謂見諸眾生漂沉苦海無有福慧不知苦本躭樂生死不求出離故起大悲哀愍之意如法華云見六道眾生貧究無福慧入生死險道相續苦不斷不求大勢佛及與斷苦法為是眾生故而起大悲心第三即大願觀悲心既發以願要期不擇怨親勝劣皆令脫苦逮得涅槃眾生界盡我願方盡故能成矣二辨觀行相四初法相觀二大悲觀三大願觀四精進觀初法相觀疏明四非常觀也記非常者謂非𠩋彼常情所執之四境故文四一無常觀二苦觀三無我觀四不淨觀一無常觀修習觀者當觀一切世間有為之法無得久停須臾變壞疏修句總標四觀當觀下所觀也無得下能觀無常也記一切有為者除六無為外餘之四位並是有為無久停者諸法既生生已即滅如露如電不可久留故戒經云壯色不停猶如奔馬人命無常過於山水今日雖存明亦難保無常經云假使妙高山劫盡皆散壞大海深無底亦復有枯竭大地及日月時至皆歸盡未曾有一事不被無常吞二苦觀一切心行念念生滅以是故苦記一切心行者如經中說一念有九十剎那一剎那中九百生滅既速生速滅誠為苦也故前云動則有苦果不離因然苦者逼迫為義五苦八苦種種不同略而論之不離三種謂苦苦壞苦行苦三苦之內行苦最通不唯五趣皆有抑亦三乘悉具今就通義故標一也三無我觀應觀過去所念諸法恍惚如夢應觀現在所念諸法猶如電光應觀未來所念諸法猶如於雲歘爾而起疏過去則無體難追現在則剎那不住未來則本無積聚但緣集歘有不從十方來記恍惚如夢者念過去法恍恍惚惚似有而無如存若亡徒有言說實不可得故云如夢何啻過去現在亦然故淨名云是身如夢虗妄見也難追者非謂有體而求之不易故曰難追以全體自空但有言說故云無體也如電光者應念諸法前屬過去後屬未來於二中間無體可住終不可取故云如電故淨名云是身如電念念不住也剎那者時之邊際也不住者經云初生即有滅不為愚者說又經云剎那剎那念念之間不得停住如雲等者雲起晴空何曾有本法生真界寧見所從以生時無有來處故滅時亦無去處淨名云是身如雲須臾變滅也緣集等者兼能集之緣亦無來處並同於雲此文亦是空觀今科云無我者以要對破常等四倒故三世既空則無有法法尚不可得豈更存乎我耶若法有實我則不如雲夢矣故曰無我四不淨觀應觀世間一切有身悉皆不淨種種穢汙無一可樂疏上來四觀除於常等四倒配釋可知記不淨等者淨名云是身不淨穢惡充滿然有五種一種子不淨父精母血之所成故二住處不淨生熟二藏中間住故三自體不淨三十六物共和合故三十六物者外相三四醜謂髮毛爪齒眵淚涕唾垢汗便利身器二六成謂皮膚血肉筋脉骨髓肪膏腦膜中含十二穢謂脾腎心肺肝膽腸胃赤痰白痰生熟二藏四自相不淨九孔常流諸穢惡故五究竟不淨身壞命終真不堪故形骸若斯復何可樂疏云上來等者總為結釋也除四倒者常樂我淨是凡夫所執四種顛倒故今以無常等四觀一一對治如以四藥治於四病也二大悲觀如是當念一切眾生從無始時來皆因無明所熏習故令心生滅已受一切身心大苦現在即有無量逼迫未來所苦亦無分齊難捨難離而不覺知眾生如是甚為可愍疏不覺知者無心厭背故使苦無限也甚可愍者深發悲心也記如是當念等者以悟自身非常既爾當念眾生亦復如是無明迷故不自知故起大悲也三界九類故云一切從無始下窮其苦源葢是無明所作故前文云以有無明染法因故則熏習真如以熏習故則有妄心乃至造業受於一切身心等苦已受下明三世皆苦也難捨等者無明未盡已前不能免故如法華云一切眾生為生老病死憂悲苦惱之所燒煑亦以五欲財利故受種種苦又以貪著追求故現受眾苦後受地獄餓鬼畜生之苦若生天上及在人間貧窮困苦愛別離苦怨憎會苦如是等種種諸苦眾生沒在其中歡喜遊戲不覺不知不驚不怖亦不生厭不求解脫無心厭背等者反知厭背苦則有邊故前文說染法得佛後則有斷十地經云有無數身已滅今滅如是生滅不能於身而生厭離轉更增長機關苦事隨生死流不能還反深發悲心者眾生與己性無二源真樂本有而背之不求妄苦本空而愛之不捨迷頭認影枉此艱辛行者觀之必生悲濟三大願觀作是思惟即應勇猛立大誓願願令我心離分別故徧於十方修行一切諸善功德盡其未來以無量方便救拔一切苦惱眾生令得涅槃第一義樂疏作下因悲立願也心離分別願體也盡未來者長時心也救拔一切廣大心也令得涅槃第一心也記因悲立願者思惟眾生三世之苦難捨離故猛立希欲要結之心樂具德行濟度彼苦也願體者若有分別則不能普度永度便成顛倒不稱法性以法性離分別故然此亦是不顛倒心也長時心者於中初之徧十方三句且明內修德本若自無德行焉能化人先利其器必善其事也華嚴疏云川有珠而不枯山有玉而增潤內無德本外豈能談又淨名云若自有縛能解彼縛無有是處自若無縛必能解彼縛也後之盡其一句正是長時廣大心者文云一切則九類四生無不攝盡故成廣大初句即是能度方便若無方便焉令發心故以漚和善巧令悉從化也第一心者高出人天二乘之境更無過此故稱第一也又今文中具有四願心離分別即誓斷煩惱徧修諸善即誓學法門救拔一切即誓度眾生令得第一即誓成佛道既令彼得功歸於己即是自希證也四精進觀以起如是願故於一切時一切處所有眾善隨己堪能不捨修學心無懈怠唯除坐時專念於止記以起等者既發如是希欲之心應行是事而無怠惰斯則以思無益不如於學故一切善法勤而行之苟能無處不修無時不作勤勇匪懈心不厭捨自然成就自利利他益也惟除下難云此屬觀門何又念止耶答葢此精進觀中無法不欲其精無行不欲其進止乃六度門中一法行耳但餘處與施等眾善相應坐時與禪定相應故云專念止也況觀是即止之觀念止何妨又可此二句屬下分齊科文三結觀分齊若餘一切悉當觀察應作不應作疏應作者順理也不應者違理也記餘一切者一謂除此四觀之外所餘一切諸法行觀或順或違皆應審察二謂燕坐則唯專於止若從坐起餘諸威儀中應當思察利害之事以便去取難云坐是止之齊相餘是觀之齊相坐中無有觀耶答觀有二一事觀通餘時處一切善行然亦即止之觀也二理觀則通坐時奢摩他行便成即觀之止也豈有坐中無觀去來無止者乎今順初心一往言之故云坐時專止餘時修觀也記順理者一切善德諸行法門外違妄染內順真如故云應作即作持門也前云若人修行一切善法自然歸順真如法故違理者一切惡法諸非律儀內與法性相違外能招報諸苦故不應作即止持門也三俱三初總標二別辨三總結初總標若行若住若臥若起皆應止觀俱行疏上來始習未淳故動靜別修今定慧終成故能雙運也記若行等者此約四儀六緣之中皆須止觀雙修定慧俱運動靜別修者動則修觀靜則修止也雖云初且別修亦須習其雙運如前文云去來進止一切時中常應觀察其心得住隨入真如三昧文雖先止後觀次第別辨然至修時豈得相離以文不累書故成前後耳今此文中說俱者亦是重辨前文恐人修時各自習故故特重為勸誡皆應止觀俱行也以因時俱行果方雙運如有足無目有目無足皆不到清涼池獨輪之車豈免覆轍故經云因地心與果地覺無二無別方曰始終不相離也二別辨二初約法明俱二對障明俱初約法明俱二初即止之觀二即觀之止初即止之觀所謂雖念諸法自性不生而復即念因緣和合善惡之業苦樂等報不失不壞疏所謂下約非有義以明止而復下約非無義以明觀此二不二故云即也此順不動真際而建立諸法良以非有即是非無故能不捨止而修觀也記自性不生者中論云諸法不自生亦不從他生不共不無因是故知無生今舉四中之一故云自性此即無我無造無受者也下即善惡之業亦不亡非有義者徧計全空故言非有依他不泯故不言無若言無者則墮斷過以非同兔角畢竟無故即念因緣等者經云諸法因緣生諸法因緣滅又云因緣和合虗妄有生等非無義者依他宛然故言非無徧計全空故不言有若言有者即墮常過以非同妄情有所得故此二者性相有殊不二者體用常俱此順等者有二義一順教即此所引是佛聖言二順理謂不動真際是性不變建立諸法即性隨緣一法二義故云即也前疏云不變性而緣起染淨恒殊良以等者經云法身流轉五道名曰眾生中論云以有空義故一切法得成也故能等者約境修心以成觀行境既即亡而存心亦即止成觀也然前段即真如門後段即生滅門二門不二但是一心故得止觀雙運也二即觀之止雖念因緣善惡業報而亦即念性不可得疏此順不壞假名而說諸法實相良以非無即是非有故能不捨觀而修止此說時有前後然在行心鎔融不二不二之性即是實性理味在此宜可思之記雖念因緣等者即前非無以明觀也而亦下即前非有以明止也疏不分配者以前影後故此順下先正釋文旨故疏序云不捨緣而即真凡聖致一此乃即隨緣而不變故良以等者經云一切眾生皆如也前云以一切法即真實性故故能下亦同前文約心契境以成止行心既即亡而存境亦即觀成止也配歸二門反前可見說時下二通示用心有前後者文不累書言不頓發故觀之與止前後而辨若在行人修心之際須止觀鎔融無前無後謂即止而修觀寂而常照也即觀而修止照而常寂也寂照之體即是一心一心名為實性故云法性寂然名止寂而常照名觀此中不唯止觀不二抑亦心境一如謂以無緣智緣無相境以無相境相無緣智境智一如如水與水唯一實相更無別法方名圓頓止觀真如三昧二對障明俱若修止者對治凡夫住著世間能捨二乘怯弱之見若修觀者對治二乘不起大悲陋劣心過遠離凡夫不修善根疏初修止治於二過謂正治凡夫人法二執貪樂世間兼治二乘執五陰法見苦生怖以止門無生除此等執次修觀亦治二過謂正治二乘陿劣之心令普觀眾生起於大悲兼治凡夫懈怠之心令觀無常䇿修善行記止治二過者凡夫不知諸法自性無生見有人法而起貪愛樂住世間今修正道令知法本不生今則無滅自然見三界虗妄如虗空華不樂住著也二乘得之見法無我於苦不怖豈欲速取寂滅涅槃耶以上下釋所以可知正治二乘者以二乘一向沈空以空為證怖懼生死但求自利不起利他不成佛法今修觀道知一切法因緣和合虗妄有生因緣別離虗妄名滅知病識藥即起諸幻以除幻者變化諸幻而開幻眾此則自然離於狹劣之見而起大悲普能救濟也若凡夫得之則能知無常苦空無我不淨而修諸善行以修觀門不壞緣法能除此障三總結以是義故是止觀門共相助成不相捨離若止觀不具則無能入菩提之道疏止觀不離者如凡夫人非不樂世間無以勤修善行約二乘人非不怖生死無以起於大悲是二行不相離也止觀不具者謂止觀相須如鳥之兩翼車之二輪二輪不具則無運載之功一翼若缺則無凌虗之勢記是義躡前對障離過以說如凡夫下意云不樂世間方能修善斯則止成於觀約二乘下意云不怖生死方能起悲此乃觀成於止二行不相離者猶如合繩乍似相違究竟相順也故襍阿含經說佛在瞿師國阿難問上座若比丘於空處樹下閑房思惟當以何法專精修習上座云當以二法所謂止觀阿難曰多修習已當何所成上座曰修習於止終成於觀修習觀已終成於止止觀俱修得諸解脫阿難復問五百比丘亦作是說阿難歡喜問佛佛深印可止觀相須等者亦如於繩合之方用故涅槃說二乘菩薩修不均故不見佛性無明邪見自此而生無上菩提由之難入如能具足修習不相捨離則能疾到薩婆若海故涅槃云定慧等學明見佛性法華云如其所得法定慧力莊嚴以此度眾生自證無上道由是菩薩行門雖多總攝不過定慧故華嚴云譬如有力正率土咸戴仰定慧亦如是菩薩所依賴天台宗於止觀深意在此故彼文云涅槃真法入乃多途論其急要不過止觀止乃伏結之初門觀乃斷惑之正要止乃養心識之善資觀則照神解之妙術等若人成就定慧二法斯乃自利利人法無不備也今之學流焉可偏習又如天台說若行者如是修止觀時即能了知一切諸法皆由心生因緣虗假不實故空以知空故即不得一切諸法名字相貌爾時上不見佛果可求下不見眾生可度是名從假入空觀亦名二諦觀亦名慧眼亦名一切智若住此觀即墮聲聞辟支佛地故法華中諸聲聞等自歎言我等若聞淨佛國土教化眾生心不喜樂所以者何一切諸法皆悉空寂無生無滅無大無小無漏無為如是思惟不生喜樂當知若見無為入正位者終不能發三菩提心此即定方多故不見佛性若菩薩為度一切眾生成就一切佛法故不應取著無為爾時應修從空入假觀即當諦觀心性雖空對緣之時亦能出生一切諸法猶如幻化雖無實體亦有見聞覺知等相差別不同行者如是觀時雖知一切諸法畢竟空寂能於空中修種種行如空中種樹亦能分別眾生諸根性欲性欲無量故則說法無量若能成就無量辨才即能利益五道眾生是名從空入假觀亦名平等觀亦名法眼亦名道種智住此觀中智慧力多雖見佛性而不明了菩薩雖復成就如此二觀猶是方便非是正觀故纓絡云前二觀為方便因二空觀得入中道第一義諦觀雙照二諦心心寂滅自然流入薩婆若海菩薩欲於一念中具足一切法者應修中道正觀若能諦觀心性非空非假而不壞空假之法若能如是照了即於心性通達中道圓照二諦若能於自心見中道二諦即見一切諸法中道二諦亦不取中道二諦以決定性不可得故是名中道正觀如中論云因緣所生法我說即是空亦名為假名亦是中道義此偈非唯是分別正觀亦是兼明前二種方便觀門當知中道正觀即是佛眼即是一切種智若住此觀即是定慧力等了了見於佛性即是安住大乘行步平正其疾如風入薩婆若海即行如來行入如來室著如來衣坐如來座以如來莊嚴而自莊嚴獲得六根清淨入佛境界於一切法無所染著即一切諸佛皆現在前成就念佛三昧安住首楞嚴定普現色身能入十方佛土教化眾生嚴淨一切佛剎供養十方諸佛受持一切諸佛法藏具足一切諸波羅蜜即入頓悟大菩薩位即與普賢文殊共為等侶即常住法性身中為十方諸佛稱歎授記能八相成道於十方國究竟一切佛事具足真應二身是名初發心住菩薩然上所說依經明其三觀行相似成別異若在行人即須三智一心中得不縱橫並別方是圓修也天台空觀即此止門假觀即此觀門中觀即此俱運門也大約如此四防退方便二初明可退之人二明防退之法初明可退之人復次眾生初學是法欲求正信其心怯弱以住於此娑婆世界自畏不能常值諸佛親承供養懼謂信心難可成就意欲退者疏復下先標行劣以住下舉處釋成以其內心既劣外缺勝緣信行難成故欲退也記眾生者十信初心之上品也怯弱等者謂於生死中創起覺悟惑業則無始積集善行則方將修學境強心弱障重力微在於觀心寧無恐怯娑婆者此云堪忍具足五濁實不可居故經云此濁惡世地獄餓鬼畜生充滿多不善聚唯佛如來堪忍住故亦可修忍勝餘方故不能常值等者以穢土之中雖有佛出然不久住即入滅度動經多劫空過無佛行者或生佛前或生佛後皆不得值以不值故不能供養親近承受聖旨懼謂等者其猶孤子未及成人便失恃怙寧不憂慮將無所損行人亦爾無佛為勝緣內心又微弱況茲穢境五濁混然期心上求實為難進擬退聖道二明防退之法二先通舉聖意次別引經證先通舉聖意當知如來有勝方便攝護信心謂以專意念佛因緣隨願得生他方佛土常見於佛永離惡道疏當知下標聖善巧專意下釋顯巧相記勝方便者即念佛三昧十六觀門及佛願力等餘門學道名豎出三界念佛往生名橫出三界如虫在竹豎則歷節難通橫則一時透脫故云勝方便也一心不亂謂之專意即信也憶想無間謂之念是行也誓求往見謂之願願也三心是因佛名相好緣也又專意念佛因也得生常見果也前云因緣具足乃得成辦則值諸佛示教利喜然念佛有多門一稱名二觀像三觀想四實相又華嚴疏出五種一稱名緣境念佛門二攝境唯心念佛門三心境無礙念佛門四心境俱泯念佛門五重重無盡念佛門五教如次配知隨願得生他土者如隨願往生經所說十方皆有淨土若欲生者隨願往生既與佛同住即登不退豈有還墮於惡道乎次別引經證記上則泛明念佛隨願生方而已此則的指求生極樂淨土故別引經以證令其一心稱念彌陀佛也如修多羅說若人專念西方極樂世界阿彌陀佛所修善根迴向願求生彼世界即得往生常見佛故終無有退若觀彼佛真如法身常勤修習畢竟得生住正定故疏若人下引經常見下釋文若觀下引住正句釋但往生之人約有三位一如蓮華未開時信行未滿未名不退但以處無退緣故稱不退二信位滿足已去華開見佛入十住位得少分見法身住正定位也三者三賢位滿入初地已去證徧滿法身生無邊佛土如佛記龍樹菩薩等住初地生淨土等也此中見佛無退是初一位畢竟住定是後二位記修多羅下分二先依生滅門事念佛謂依意意識心念報化佛也修多羅即指阿彌陀無量壽瑞相十六觀及餘諸淨土經若人等六句因即得句果專念信行願求願也回向回因向果也西方極樂者如小彌陀經說從是西方過十萬億佛土有世界名曰極樂其土有佛號阿彌陀樂事極故毫無苦相名為極樂梵語阿彌陀此云無量光明壽命弟子國土莊嚴境界悉無量故其國土清淨嚴美佛身功德微妙人天殊絕賢聖難思俱廣彼經不能具述往生者謂往生極樂土也都有九品由因行有勝劣故往生有升降華開有遲速成道有前後上上品者發三種心謂志誠心深心迴向心具足戒行讀誦大乘一日乃至七日即得往生佛及菩薩親來迎接觀音菩薩執金剛臺等至行者前其人乘此隨佛之後如彈指頃即生彼國生已見佛聞法開悟經須臾頃徧至十方於諸佛前次第受記還至本國得無量百千陀羅尼門乃至下下品者五逆十惡具諸不善以惡業故合墮地獄經歷多劫臨命終時遇善知識教令稱佛名號於念念中除八十億劫生死重罪具足十念乘華往生佛及菩薩共來迎接生彼池中蓮華之內滿十二大劫蓮華乃開觀音勢至而為說法聞法歡喜滅罪除障發菩提心等如要備覽請檢觀經問準隨願往生經說十方皆有淨土云何偏指西方答因易緣強勝餘方故因易者十念為因故緣強者彼佛願力故以彼佛因中有四十八種廣大誓願於中云若有眾生欲生我國十念成就不得生者不取正覺有茲所以故偏指也餘具如瑞相經一問云何七日乃至十念便得生耶答佛力不思議故猶如蜾蠃摙土作房取彼桑虫負之於其中教祝七日化為己子況彌陀大聖豈無有轉物成己之功起死回生之力乎又行人念力熏心亦不思議故苟能用心念佛七日晝夜無間必得革凡身心為佛之身心矣亦如桑虫隨類我呪過七晝夜變成蜾蠃形矣又大本云信樂不疑乃至一念念於彼佛亦得往生佛名經云一聞佛名滅無量劫生死之罪所以然者一心朗念積妄頓空喻如一盞燈能滅千年室暗一星火能燒百輛車薪況乘如來本願功德若船之遇順風豈有不滅罪生淨土乎一稱尚爾十念者可知二問大本云唯除五逆觀經云五逆得生二義云何答大本云唯除五逆誹謗正法則知五逆而兼謗法者乃在所除如不兼謗者未必除也良由謗則不信不信則不生所謂疑則華不開者是觀經但言五逆不言謗法則知雖具五逆不謗法者必定得生如兼謗者亦不生也良由信則不謗不謗則華開所謂信則決定生者是三常見二句論主會釋義也謂住此娑婆或值三災八難不吉祥事或見十惡五逆諸不善人或自身多諸惑業病苦牽纏修行信心不能成就若生彼樂土一見佛時信必成就終無退轉矣故慈雲懺主以彼此較量則有十種苦樂不同謂此娑婆有不值佛不聞法惡友纏羣魔惱受輪迴墮惡趣塵緣障道壽命短促修行退轉塵劫難成之苦彼樂國有常見佛常聞法聖賢會離魔事息輪迴無惡趣勝緣助道壽命無量得不退轉一生行滿之樂問云何一生便不退耶答有五因緣一如來大悲願力攝持二佛光常照三水鳥樹林皆演苦空四純諸菩薩以為親友五壽命永劫故疏釋云處無退緣名不退耳彌陀經言眾生生者皆是阿䟦致勢至章言去佛不遠不假方便自得心開如染香人皆是此意也一問上云見佛菩薩皆為魔事今何又求見彼佛耶答上修真如三昧唯心無境故見佛說法悉為魔事以因果殊感故此之念佛三昧托境顯心故見有佛現名善境界以因果相符故勢至章云憶佛念佛現前當來必定見佛豈可將此佛境作魔境耶二問設有魔現云何辨別答若得見佛了唯心現切莫取著勿向他說然念佛者在於如來大光明中必無魔事或宿障深厚及不善用心容有魔起固未可定如經論說辨之有二一不與修多羅合者是為魔事二不與本所修合者是為魔事三問真如三昧不與念佛三昧同耶答無同無不同以念佛三昧於自心中立佛為境托彼佛境顯自真心而真如三昧即心為境不立彼佛唯一真心無能所相故無同又念佛三昧即念自心中本覺法身佛而真如三昧觀諸佛與眾生法身平等無二故無不同所以二種三昧念佛名勝方便何者念佛具三力一本有佛性力二新修觀念力此二自力也三如來攝取力此一他力也本如舟念如帆佛如便風三事周圓速登彼岸若夫真如三昧唯憑自力設遇逆風舟便覆矣四問古謂真佛本無去來云何有佛現令見耶答感應道交不妨不來而來無見而見以法身佛雖無生滅從真起應接引迷根則於生心見佛來迎猶如水澄月自現也五問今有專心念佛於定夢中不能得見又有一生念佛及臨終時亦不生方何也答專心稱念定夢不能見者由其過去業障重故現在善力弱故又佛有二加一無障則顯加令其親見二障重則冥加暗令得益一生念佛不生方者持念不精誠故生疑不篤信故無有往生願故不能斷貪愛故六問復有臨命終時遇諸障難如偏風失語狂亂失心水火雷擊虫噉鬼害藥毒陣亡怨賊王難若爾云何正念得往生耶答應當預懺必蒙佛護禮拜持誦即懺法也葢禮念佛者有六種勝益一諸佛住頂二天神冥加三惡鬼不害四八難消除五無有諸橫六臨終佛迎故知日常一心禮念即為預備不虞法矣如人入城幹事須先覓下安處抵暮昏黑則有投宿之地先覓下處者預修淨業也抵暮昏黑者大限到來也有投宿地者生蓮花中不遭障難也七若觀下次依真如門理念佛謂依無分別智心念法身佛也初三句因畢竟句果謂阿彌陀唯是法身第一義諦無有應化世諦境界彼佛法身即行者心以諸佛心內眾生之智觀眾生心中法身之佛故不用事念而以觀觀也常勤修者葢無時無處不一心觀佛也觀經云諸佛正遍知海從心想生是故常當一心繫念諦觀彼佛竟得生者心一觀也佛土全彰佛一舉也身心頓入由此因緣生自性之淨土見本覺之真佛觀經云諸佛如來是法界身入一切眾生心想中是故汝等心想佛時是心即是三十二相八十隨形好是心作佛是心是佛雖然法性佛土無一眾生不具若不觀念亦不得生住正定句亦論主會釋也因修念佛三昧果得住正定聚如影響相符定無差舛故況依如來大智願海豈有不正定耶故第十一願云國中天人不住定聚者不取正覺又四十二願諸菩薩眾聞我名字皆悉逮得清淨解脫三昧四十五願云皆悉逮得普等三昧常見不可思議諸佛又頌說云至彼嚴淨國便速得神通必於無量尊受記成等覺又觀經下品下生文云至心令聲不絕具足十念稱彼阿彌陀佛名故命終之時如一念頃即得往生極樂世界觀音勢至以大悲音聲為其廣說諸法實相下品下生既爾餘八品生可了故知生西方者無有不住如來種中入正定聚正因相應也前之事念於四種念佛中當稱名觀像五種念佛中當緣境此之理念四種中觀想實相五種中唯心至於無礙俱泯無盡事理俱通也如理思之記疏中若人等先別消文但往下次總釋義三位者料揀往生之人正是說於己生彼者若觀經中具明九品天台所判上三品人始從習種終至解行菩薩中三品是十信已下以能持戒孝養等而求生故下三品是今時悠悠凡夫以作眾惡重罪臨命終時遇善友勸方願生故上上品見佛聞法便證無生故是道種人上中品位當性種上下品位當習種一得道有遲速二所乘有勝劣得道遲速者上上品如前生已便證無生上中者生經七日得不退轉經一小劫得無生忍上下者經三七日能游十方過三小劫得百法明門住歡喜地乘勝劣者初金剛臺次紫金臺後金蓮華今之三位但就九品中前六品說初位即彼中三品人也第二位即彼上下品人第三位即彼上中上上品人也以是料揀不退義故作此判也無退緣者以彼壽命長遠又無女人無三塗無寒暑無饑渴無冤親無老病所欲隨心常與聲聞大菩薩等而為伴侶常見佛聞法水鳥樹林皆演苦空無常無我念佛念法由是善業則自然增長塵勞則任運消滅直至菩提更無退轉故彌陀經云若有人已發願今發願當發願欲生阿彌陀佛國者皆得不退轉於阿耨菩提與此穢土修行霄壤有隔猶如二人共至前所一則徒步一則乘載如是二人難易可見彼此二境修行等差亦復如是然今有人不審利害於兩土察因緣之勝劣說空行有數寶受貧往往窮理以無西沉空而謗教信鄙俚於後代非方便於先覺恃己為是何是之有謂我情忘何情之忘及乎讚喜謗瞋惑之盛矣殊不知存我入覺覺思遠焉而罔信安養為息肩脫屣之地者吾為其傷之弗能已也佛記等者楞伽經說龍樹比丘住初歡喜地能破有無見往生安樂國後二位者即十信滿足及三賢位人以觀真如法身勤修習故願生彼國即是九品中上三品人也初一位者即未滿十信位以下者專持佛名修行迴向求生淨土即是中三品等人也則事理二念可謂攝盡一切利鈍機矣五勸修利益分記勸修利益者即流通分也槩陳法義廣示修行圓頓之根必依悟入今總舉前說勸令受持聞思修習得利益故文中具說三慧益相仍舉不信毀謗之過今但云勸修利益者何也謂舉深該淺故不言聞思因勸而修故自無疑謗由是但云勸修益焉文中三初結前生後二信謗損益三結勸修學初結前生後已說修行信心分次說勸修利益分如是摩訶衍諸佛祕藏我已總說疏已說句結前信心章次說句生後此一分如是下通牒前三大章記如是者指前三分所詮法也謂一心二門二覺二不覺四位二相三細六麤五意六染二礙四熏習三大二身二見三心四方便六度三心相四信五行二種念佛等並已說了然此等諸法盡是大乘中差別法義故云摩訶衍也諸佛祕藏者即大涅槃內甚深三德是諸佛所證非因位能窮故名祕多所含容而無積聚故名藏此之祕藏具足三法謂摩訶般若解脫法身一一皆具常樂我淨故名為德雖有三名而無三體如天面三目不縱橫並別非一二三而一二三故名祕藏然上所說差別法義以此三法往收罄無不盡或難曰收盡之言何謂也答曰如上一心是總舉祕藏體具足三大義故二門不離真俗二諦真中泯相即空是般若顯實是法身生滅是俗諦正是解脫二覺中本覺是法身始覺是般若始本不二是解脫四位中隨一一位皆有能證智是般若所證理是法身離障處即解脫二相中智淨是法身般若不思議業是解脫四鏡中如實空是法身因熏習是般若後二是解脫又初是法身二是般若解脫後二鏡中三是般若法身四是解脫九相中前七屬煩惱是般若造業是解脫受報是法身五意六染二礙攝入九相可以意得四熏習中染熏中不離無明妄心境界起成惑業流轉生死如九相所配淨熏中真如是法身熏起始覺是般若離障處即解脫三大中體是法身相是般若用是解脫二身中真身屬般若法身應身是解脫對治邪執中能對是般若二見無處即解脫正理顯處即法身三心中直即法身深即般若悲即解脫六度中皆具三種如云以知是般若法性是法身本無慳貪是解脫三心相中真即般若法身方便業識即解脫四信中信真如即法身信佛即般若信法與僧即解脫五行中前四即解脫止即法身觀即般若或一一行皆具三種二種念佛中能觀念是般若事念報化是解脫理念真如是法身以此三法統收一切靡不皆盡此三不離前之一心斯則十方三世一切佛法皆此論攝故云諸佛祕藏我已說也二信謗損益二初信受福勝二謗毀罪深初信受福勝二先總舉三慧利益次別顯三慧益相先總舉三慧利益若有眾生欲於如來甚深境界得生正信遠離誹謗入大乘道當持此論思量修習究竟能至無上之道疏持論聞慧思量思慧修習修慧記甚深境者一心二門三大也一心則法甚深三大則義甚深二門則理事甚深皆是如來所證之境界故正信者以此為實不信諸法故既生正信故離誹謗離誹謗故入大乘道道即因義能通佛果故持此論者教是大乘之門欲入大乘故須持教或讀或誦總名為持視聽所知悉名聞慧思慧者思惟其義修慧者如說修行究竟等者始因聞思終得佛果故又一得永得故云究竟佛果圓通名之為道次別顯三慧益相三初聞時益二思時益三修時益初聞時益若人聞是法已不生怯弱當知此人定紹佛種必為諸佛之所授記記是法者謂是心是佛是心作佛之法也故前云所言法者謂眾生心是心則攝一切出世間法一切諸佛本所乘故一切菩薩皆乘此法到如來地故不怯為授記有二意一者但能如此不怯他時必得如來授記如寶藏佛說釋迦後時必得然燈佛記二者景行若斯義合得記如圓覺經清淨慧章末云若人聞此法門不生驚畏是則名為淨覺隨順汝等當知如是眾生已曾供養百千萬億恒河沙諸佛植眾德本佛說是人名為成就一切種智義同此也又如法華經說如來滅後若有人聞妙法華經乃至一句一偈一念隨喜者我亦與授阿耨多羅三藐三菩提記二思時益假使有人能化三千大千世界滿中眾生令行十善不如有人於一食頃正思此法過前功德不可為喻記假使者實無此人假以設立故三千大千者俱舍頌云四大洲日月蘇迷盧欲天梵世各一千名一小千界此小千千倍說名一中千此千倍大千皆同一成壞配亦可知十善者化人令行十善果招天上雖即數多不離三界不成無漏不如下若思此如來藏心本覺之法是成佛因超出世間無漏無為究竟令得無上佛道時雖不多功不可喻豈可將世間善而為並耶三修時益三初時少德多二校量多相三徵釋所以初時少德多復次若人受持此論觀察修行若一日一夜所有功德無量無邊不可得說記若有眾生初勸能修者若人次番勸今當第三番勸故云復次也受持者謂領受法義任持在心也觀修者謂於真如三昧中觀察諸佛法性也一日夜時猶少也無量邊德甚多也較前思益中食頃之際散心思惟功不可喻況一日一夜定心觀察歟所獲功德誠無邊量也一日一夜尚爾反顯累月經年乃至盡形觀察則時長行勝其功德尤不可思議也二校量多相假令十方一切諸佛各於無量無邊阿僧祇劫歎其功德亦不能盡記此中校勝文雖不多義則甚廣以能歎之人是無上大覺具一切智有無礙辯凡所歎說無不究竟今則不獨一佛所歎仍舉十方一切諸佛是人勝而復多也又非於少時間仍各於無量無數劫中是稱歎時最長也以十方一切明處橫遍無量祇劫顯時豎久故又非謂多佛於長時中歎其功德令得邊際而又復言亦不能盡是知此義豐文約之教比餘處校勝之文實為盡矣三徵釋所以何以故謂法性功德無有盡故此人功德亦復如是無有邊際記何句徵也果人無量劫數無邊於爾所時經爾所佛歎所不及實有何所以耶謂下釋也性無盡故功德如性亦復無盡性德無盡故從性起修德亦無盡今修習斯論者即是深入法性之所獲也法性功德既橫無邊涯豎無底際而全修即性豈有邊際者乎二謗毀罪深其有眾生於此論中毀謗不信所獲罪報經無量劫受大苦惱是故眾生但應仰信不應毀謗以深自害亦害他人斷絕一切三寶之種以一切如來皆依此法得涅槃故一切菩薩因之修行得入佛智故疏其有下一謗成罪重也是故下二誡勸止謗也以深下三釋罪重意也以一下四轉釋斷絕三寶之義也於中二句一約果人依之得涅槃二約因人依之得菩提菩提涅槃即是法寶佛僧可知也記罪重者受持既若福多毀謗合招罪重準大般若經說謗法眾生入阿鼻獄經無量劫遇此境壞則寄餘界地獄如是展轉徧歷十方還至本處罪猶未盡今言無量大苦是此類也亦如法華經說謗經之人其人命終入阿鼻獄具足一劫劫盡更生如是展轉至無數劫從地獄出當墮畜生等誡勸者但應勸也不應誡也止謗者亦是誡勸其起信獲罪如斯謗則宜可止之故勝鬘說若自有智則仔細體會若不解處則仰推如來非我境界苟能如此則何患殃及於後世耶釋重意者或問曰以何義故不信毀謗者獲罪若是故此釋云一者害自身心二者害他善根三者斷三寶種故招罪報極為深重如法華云斷佛種故受斯罪報是也轉釋義者又難曰但謗此論如何乃言斷三寶種成自他之害耶故此釋之果人得涅槃因人得菩提者此但約人互顯影略而言據理則一得俱得故非別證如心經說菩提薩埵依般若得涅槃三世諸佛依般若得菩提此亦如是法寶等者以如來是佛寶菩薩是僧寶若不信此法則無菩薩修行即僧寶斷絕若無修行則不證菩提涅槃是法寶斷絕若不證果即無如來是佛寶斷絕三寶斷絕皆由不信毀謗是故獲罪經無量劫受大苦也將知大罪莫大於謗法耳三結勸修學當知過去菩薩已依此法得成淨信現在菩薩今依此法得成淨信未來菩薩當依此法得成淨信是故眾生應勤修學疏三世菩薩同行此法更無異路故勸修學記先舉示過去即釋迦之流現在即馬鳴等類未來即今之行者楞嚴文殊歎觀音圓通云過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法我亦從中證非唯觀世音是故下次結勸此當第四番也無異路者經云此是微塵佛一路涅槃門又云十方如來一門超出妙莊嚴路問彼明圓通法門此說淨信法門云何將彼證此答圓通者圓通如來藏心也淨信者淨信如來藏心也圓通淨信門雖異如來藏心法無殊不妨引證問信是眾行中初一門何唯成此而不具餘諸行一難縱成淨信位亦初住非證二果可比二難前歎功德何太深耶三難答信既為眾行本本成餘行亦辦故前云為令善根成熟眾生於摩訶衍法堪任不退信故釋初難也又信若成滿入住不退堪受佛果故前云信成就發心者畢竟不退入如來種中釋二難也況信該果海果徹信源因果位殊信心無二清凉疏云啟明東廟智滿不異於初心初心即信心也華嚴云若離信根如是法性理趣如是法門所行如是所住境界皆悉不能又賢首品云信能必到如來地信能專向佛功德信能生長菩提𡬾信能示現一切佛若得信心不退轉則獲灌頂而昇位既涅槃佛智皆生信心則信根本之功德豈可量耶釋三難也再四勸勉其意遠矣三總結迴向諸佛甚深廣大義我今隨順總持說迴此功德如法性普利一切眾生界疏諸佛下先結上所說也於中上句結義下句結文迴此下次迴向利益也於中上句明德廣下句辨遐霑記諸佛者謂能證能說之人也甚深下即所證所說之法也此中深廣是總指三大深約豎論大約橫說二皆絕待故加甚廣之言謂深中之深非對淺之深故云甚深大中之大非對小之大故云廣大或可深廣大三字別對體相用之三義深是體大謂實相真法非因位能窮唯佛究盡故大論云智度大海唯佛窮底又法華云深固幽遠無人能到此則約過去無始未來無終不生不滅故云深也廣是用大謂過河沙之妙用潛興密應無有休息無有窮盡此無盡之用一一同於覺性無有邊涯無有分限故楞嚴云我以不滅不生合如來藏而如來藏本妙圓心周遍法界是故於中一為無量無量為一小中現大大中現小不動道場遍能含受十方國土坐微塵裏轉大法輪等故云廣也大是相大相謂義相即前所辨大智慧光明義遍照法界義等過於河沙無漏性德與真如體不離不斷不異不思議非深非廣能深能廣故受大名所言甚者通貫三字謂甚深甚廣甚大俱絕待故此之三法遍能含攝一切佛法亦攝一切眾生法含攝雖多俱不離一心一心者是諸佛所證之極致是諸佛所說之根本故前文云謂欲解釋如來根本之義令諸眾生正解不謬故今論主以少言句隨順此法略而說之言雖約略理無不備故云總持說也前云如是此論為欲總攝如來廣大深法無邊義故應說此論如法性者法性遍滿圓無際故造論功德如性廣大亦無有際法性甚深無窮盡故造論功德如性甚深亦無有盡法性無漏離諸染故造論功德如性無漏非垢非染法性無為離有作故造論功德如性無作非有為相不可破壞盡於未來如是功德無量無盡無漏無為欲何所利由是論云普利一切眾生界然利眾生不出二種一令離苦謂離分段變易二生死故二令得樂謂得菩提涅槃二無上樂以眾生有三乘五性四生九類差別不同故云一切今迴如性功德普霑利之令彼隨自根性咸得其益終至究竟無上覺道耳音釋伽藍此云眾園即眾僧居處也阿蘭若此云空寂閑靜處遠離處無諍饌音撰餚膳飲食也頭陀此云抖擻苦行者名檀越此云施主跏音加趺坐也髀皮上聲又音彼脚股骨也同䯗壘音累疊起也挺㕔上聲直而不曲貌脊音積背脊頸音景項也聳送上聲高聳也臍音齊肚臍齶音壑寉齗也又齒內上下肉也顗音以莊謹也押音鴨壓也拘管也拄音主牚也支持也澀音塞不潤澤也矯音絞詐也妄也眩音衒惑亂也侮音父輕欺也姦音間奸詐也䞋音寸財施也蔑音滅陵慢也販音泛販賣蠧音妬蛀虫又白魚蹔同暫譴音遣訶責也甄音今揀別也蠅音英蒼蠅蝎音歇螫人毒虫也熠音亦火光熌爍貌攊音立擊也腋音揖兩腋匍匐音蒲薄伏地貌兕音祀野牛摩訶大般若經名琵琶音皮杷琴類掣音尺曳也吟音嚀叫也拘那含牟尼此云金仙佛名擯音柄驅逐也棒音蚌杖也羅剎此云速疾亦云可畏嵬音回僧名銛音尖利也麈音主麋屬鼉音陀水虫也類魚有足者蚓音引蚯螾也亦名曲蟺鰍音秋泥鰌玃音脚老母猴猨音元似猴長臂雉音稚野雞豺音才狼也㺄音于獸名蝠音福蝙蝠蟹音駭螃蟹掬音菊蹈音導踐也磷音陵薄石也處約居處貧困也槌音垂同椎擲也鈆同鉛逶迤音委夷衰行貌又衺去也躁音灶粗暴也恍惚音慌忽失意也又昏忘而不能明憶也歘同倏忽也啻音涕但也止也眵音紙目汁凝也唾音土口涎肪音方脂也膜音模莫肉間膜也脾音皮在胃下腎忍任二音水藏也凌音陵飛騰也首楞嚴此翻究竟堅固亦云徤相三昧蜾蠃音果羅細腰蜂也摙音斂般運負擔也祝音卓呪祝也輛音亮車輛阿䟦致華言不退轉帆音凡舟上汎風布幔也噉音談同啖吞也食也餌也陣音潤軍陣虞音俞慮也憂患也抵音底至也俚音里鄙俗也屣音洗履也罄音磬空也蘇迷盧此云妙高山王也阿鼻此云無間地獄名殃音央禍也菩提薩埵此云覺有情略言菩薩啟明東廟謂善財於福城東際娑羅林中大塔廟處在文殊所聞佛功德即是啟智明也潛音前藏也謬音茂差誤也霑音占濡洽也
