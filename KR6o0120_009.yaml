body:
  text: 唐西京太原沙門法藏述疏終南草堂沙門宗密録注宋秀州長水沙門子璿修記清錢塘慈雲沙門續法會編順天府府丞戴京曾閲定二發心之相三初牒章以問二標徵列釋三問答除疑初牒章以問復次信成就發心者發何等心記復次句牒章也發何句問起也前之所說但是能發之因緣未知所發之心作何行相故此徵問也二標徵列釋略說三種云何為三一者直心正念真如法故二者深心樂習一切諸善行故三者大悲心欲拔一切衆生苦故疏三種標也云何徵也一下釋也直心者謂向理之心無別岐路故即二行之本深心者備具萬德歸向心源即自利行本大悲心者廣拔物苦令得菩提即利他行本妙行雖廣三行統收故標云略說三也以此即是三聚戒故三德三身皆由此成故亦即是彼三回向故謂初向實際次向菩提後向衆生皆應相配釋之記向理等者真如妙理體離有無一異凡聖染淨等一切邊邪之相若欲造詣必須正念正念即正慧正慧即是直心也斯則理無別故向心必直故占察經說真如能成行人質直心故如蛇行性曲入筒則直三昧調心亦復如是此中正念即真如三昧也二行本者此直心通與二行為本也下之二心別為行本所以此通與二行為本者謂念真如具無漏功德一切衆生同有此性皆當作佛以知具德故能起自利行以知性同故能起利他行行所依本又以念真如非前際生非後際滅故能令二行究竟無有疲厭行不斷本又知此性離言說分別畢竟平等故能令二行離相成無漏因行相應本故此一心通為二本也樂集等者樂謂希欲專注決定之謂也由是知之不如好之好之者不如樂之者也備萬德者六度萬行一切皆修所修之行一一翻對妄染以顯性上河沙功德如以智慧翻破無明顯成性上大智慧光明義等是知修行蓋為顯德故約所成以解修行據此則不唯名深心亦得名廣大心以萬行齊修故廣也皆徹心源故深也今標之以豎故曰深心釋之以橫故云一切意以二文相顯也疏中亦兼此二義若有深而不廣徹理之一行或復廣而不深多行於世善皆非大乘之行今此兼明以成菩薩之大行矣自利行本者深心願樂故若不願樂安能行之是故為本欲拔等者欲謂希望與樂字義同可以互言廣拔物苦者廣大心也三界普度無怨親故令得菩提者第一心也逈出人天及二乘故若不爾者寧曰大悲然拔物苦正是大悲令得菩提是大慈也以菩提是樂果慈能與樂故今論但舉大悲拔苦必有大慈與樂故疏兼而釋之也若無此心焉能度脫故云行本妙行下顯略攝廣文雖三種義包一切理事兼行自他俱利攝無不盡也以此下正配諸行三聚戒者直心即攝律儀戒正念真如離諸過故深心即攝善法戒悲心即攝衆生戒三德者直心成斷德即法身深心成智德即般若悲心成恩德即解脫三身即如次配法報化是彼者即指信成就發心之人回自己心趣向三處故名回向實際者真如即是真實際故菩提者以一切善行皆以大智為其首故衆生可知據此則三中初一為離相行後二是隨相行離相是總隨相是別說雖前後行即同時以前一具後二故雖觀空而萬行迢然後二同前一故雖涉有而一真寂爾苟或互闕即二乘斷空凡夫有漏初後相濟方為大乘中道妙行也由是諸行雖多此三攝盡更有三法三寶三菩提三涅槃等一切三法類此配之故淨名說此以為淨土之行經云直心是菩薩淨土菩薩成佛時不諂衆生來生其國深心是菩薩淨土菩薩成佛時具足功德衆生來生其國四無量心是菩薩淨土菩薩成佛時成就慈悲喜捨衆生來生其國等三問答除疑二初問二答初問問曰上說法界一相佛體無二何故不唯念真如復假求學諸善之行記上說下引前所說以為義宗即前云所言覺義者謂心體離念離念相者等虗空界無所不遍法界一相等又真如門及真如體相中具說何故下對以成難意云衆生真如即同佛體但念真如便可得道何用別更修諸行耶斯乃但可只用直心不合更說後二二答二初正答所問二重顯方便初正答所問二初喻二合初喻答曰譬如大摩尼寶體性明淨而有礦穢之垢若人雖念寶性不以方便種種磨治終無得淨記摩尼體相本來明淨今為垢染體性雖淨而相不淨故須治之二合三先正合次委釋後順真先正合如是衆生真如之法體性空淨而有無量煩惱垢染若人雖念真如不以方便種種熏修亦無得淨記真如心法合摩尼寶珠而云衆生者是在纏染穢真如揀非諸佛出纏純淨真如也空淨合明淨明即智照淨即空寂也而曰體性者是本性明淨揀非離垢明淨也煩惱合礦穢若人指信成就發心者合若念寶人熏修合磨治謂內起厭求熏習因力如彼以身手雕治外假師教聞修緣力如彼以沙石蕩磨故云種種方便亦無淨者不能得離垢淨也合寶染塵約體雖本來空寂約相則現有塵勞若不起行對治無以得同諸佛將知佛與衆生但體同而相不同也衆生相則六染熾然諸佛相則衆善普會霄壤之遠何可雷同故前明三覺五覺覺則性同三五位別性同不須修位別應斷證又天台圓教具明六即即故真如平等六故行位元殊豈同暗證但理而已故宜進修蠲去塵惑若其但念未免沈空止觀相須方為佛法目足之喻宜可思焉次委釋以垢無量遍一切法故修一切善行以為對治疏釋須修衆行所以記難云真如寶性唯一修治何必衆行故此釋云衆生從無始來背覺合塵於色聲等一切法上起貪瞋等無量煩惱諸垢染法今既覺知過患修行對治所治之垢既多能治之善寧一其猶病多藥非一種故修一切行也金剛亦云以無我無人修一切善法則得阿耨菩提等後順真若人修行一切善法自然歸順真如法故疏以諸善行外違妄染內順真如故記難云無量善行原為對治無量垢惱何能與一真如體性相順耶故此釋云諸不善行既違真理一切善行自然順真復由種種對治善行除去污穢方能令一真如寶珠得明淨故外違等者如行布施外違慳貪內順無慳乃至般若外違無明內順明體等也二重顯方便記前答問云不以方便熏修終無得淨故今重明所修方便也前但發心未行其事今此所說正是所行則前為能起之心此為所起之行故前疏標皆言行本應知前文但顯發心相此明修行相也文二初標徵二別釋初標徵略說方便有四種云何為四疏有四標數也云何徵起也記方便者泛論有四種一進趣方便二權巧方便三修行方便四集成方便此文正當一三兼於二四也二別釋疏四門各有三一標名二釋相三明意如文可知今合四門文分為三初一不住道次二自利行後一利他行記文分為三者如次是前三心所起之行對文思之此又是疏家科出論中隱奧意也初一不住道疏不住道者具兩意一者不猶無也道即因也無住之因行故故本疏云無住行二者道即真如性此性本無住故二意合顯方契論旨蓋以性本無住故以無住之行而隨順之也一者行根本方便謂觀一切法自性無生離於妄見不住生死觀一切法因緣和合業果不失起於大悲修諸福德攝化衆生不住涅槃以隨順法性無住故疏不住生死智也不住涅槃悲也記一者下先標名目行之方便即根本故以此與後二利行而為其根本耳謂觀下次示義相性無生者諸法從本來常自寂滅故不住生死者若住生死則輪轉不休既言離於妄見當知不住即是依真如不變義修止行也疏云智者若見諸法有生滅即成凡夫妄識是住生死當知反此宜稱為智因緣等者若染因緣和合即惡業苦果不失若淨因緣和合即善因樂果不失斯則染惡等唯三途淨善等通人天二乘及佛道也起大悲者既見因緣和合善惡果報故可翻迷成悟轉凡為聖乃起大悲咸欲濟度修福等者具修施戒忍進禪定以攝衆生謂布施攝貧窮持戒攝毀禁等以此五行是福德門故斯則為化衆生而修福德因利他而自利也故淨名云衆生之類是菩薩淨土等不住者若住涅槃則一向寂靜既言化生修福當知不住即是依真如隨緣義修觀行也以隨下後明所以法性本來非有故今不住生死本來非無故今不住涅槃又以性不變故不住生死隨緣故不住涅槃乃至凡聖斷常一異等諸二邊法不可盡言離此二邊方名隨性今以即觀之止隨順無生法性為不住生死大智行本以即止之觀隨順緣起法性為不住涅槃大悲行本又以即悲之智為自利行本以即智之悲為利他行本又此一文初名自性無生止次名因緣不失止後名法性無住止亦可初名不住生死觀次名不住涅槃觀後名隨順法性觀若總之初可名離於妄見大智止觀或名真如止觀次可名攝化衆生大悲止觀或名生滅止觀後可名隨順無住平等止觀或名一心止觀若與楞嚴會之初即空如來藏心止觀次即不空如來藏心止觀後即空不空如來藏心止觀又與圓覺經會之初即奢摩次即三摩後即禪那又與台宗一心三觀義同謂觀法無生即空觀觀真諦也觀因緣和合即假觀觀俗諦也隨順法性即中觀觀第一義諦即三而一即一而三不縱橫並別諦觀皆然故此名為行根本也次二自利行二初斷德二智德初斷德二者能止方便謂慚愧悔過能止一切惡法不令增長以隨順法性離諸過故疏能止者謂勤斷二惡止持門也記二下先標名也勤斷二惡者已起之惡斷令不續未起之惡斷令不起止持者以約惡法而論故止名持作名為犯謂下正示義也慚愧者即善十一之二數慚謂尊貴增上宗重賢善羞恥過罪息諸惡行愧謂訶厭增上輕拒暴惡羞恥過罪息諸惡業悔過者梵語懺摩此云悔過謂陳露先罪改往修來於中能止一切惡法六字通已起未起餘皆局於已起也是惡皆止故云一切此說已起之惡既令不增未生之者自然不起矣以隨下出所以也性本離過起過則違今既止之故當順理過盡性顯名為法身法身即是斷德故今以此名科二智德三者發起善根增長方便謂勤供養禮拜三寶讚歎隨喜勸請諸佛以愛敬三寶淳厚心故信得增長乃能志求無上之道又因佛法僧力所護故能消業障善根不退以隨順法性離癡障故疏發起者勤修二善作持門也勤供養等約緣修行也以愛下辨修利益也愛敬四句一愛而非敬如母於子等二敬而非愛如僕於主等三亦敬亦愛如修行人於三寶等四非敬非愛如冤家等記三下先標名勤修二善者已起之善修令增長未起之善修令發生故云發起增長是標二義也作持者謂約善法以論作故名持止故名犯也謂下正示義供養者然有三種謂財法觀行禮拜者勒摩三藏說有七種一我慢禮二唱和禮此二非儀三恭敬禮敬從心發運於身口五輪著地四無相禮深入法性離能所相五起用禮觀身與佛同一緣起如幻如影普運身心遍禮一切六內觀禮但禮身內法身真佛不緣他佛七實相禮若內若外若凡若佛同一實相見佛可禮亦是邪見觀身實相觀佛亦然始名平等禮敬故文殊偈云不生不滅故敬禮無所觀準離垢慧所問禮佛法經總有八重一供養二讚歎三禮佛四懺悔五勸請六隨喜七回向八發願八中正意禮佛餘七皆是禮佛緣由謂供讚是禮佛流類懺勸隨喜是禮佛之意七是都回禮等功德向於三處八是敘陳意所希望然此八重各能除障供養除慳貪障感大財富讚歎除惡口得無礙辨才禮佛除我慢得尊貴身懺悔除三業煩惱報也四加見也障得依正具足勸請除謗法得多聞智慧隨喜除嫉妬得大眷屬回向除狹劣成廣大善發願除退屈總持諸行今此文中具有五法前有懺悔後有發願然闕回向影在文中也緣修者約三寶勝緣修入住正行利益有二先敬則道增愛敬四句可知若準儒教說母唯愛君唯敬父兼愛敬故孝經云資於事父以事母而愛同資於事父以事君而敬同故母取其愛而君取其敬兼之者父也然此且約多分而說今以事父之心奉於三寶故兼愛敬淳厚者鄭重厚也之心而無雜亂淳也亦有四句一淳而不厚謂暫時誠懇二厚而不淳謂長久渾雜三俱謂沒齒無乖四不俱謂輒無虔想今取第三也信增等者從十信位遷入正定也又因下次護則業消上則內因修行力此則外緣加護力亦可前名生智益此名滅障益消業等者前禮讚等各能除障已如前配復能成善如下第四分中所說以隨下明其意性本離其癡障今以修智斷障豈非順性此行成就即顯報身報身即智德故此為科後一利他行四者大願平等方便所謂發願盡於未來化度一切衆生使無有餘皆令究竟無餘涅槃以隨順法性無斷絶故法性廣大遍一切衆生平等無二不念彼此究竟寂滅故疏盡未來長時心也度一切廣大心也令究竟第一心也以隨下一正顯順法性法性下二明起大願意亦即常心也記四下標名所下釋相發謂䇿勵運意願謂希求樂欲然有四種要約其心故名誓願今即四中之一也餘之三願已在前文謂能止方便及消障離癡即無邊煩惱誓願斷發起善根增長方便即無量法門誓願學行此二法皆為菩提即佛道無上誓願成也長時心者度盡為期不限劫數故盡來際廣大心者無有揀擇四生九類悉皆度故第一心者超過人天二乘之境令得無上寂滅樂故以隨等者明意謂次第釋前三心所以也初二句釋長時心謂法性常住無始無終故今度生盡於未來無有疲厭而隨順也疏文可解法性下三句釋廣大心謂性遍滿平等無二故今化度無有揀擇平等濟拔而隨順也不念下二句釋第一心謂性本無彼此分別常寂靜故故今化令咸至寂滅究竟涅槃是順性也然後之二段文但初標法性後結故字而不逐段一一標結隨順等言者譯人之巧略也亦常心者意明此有究竟寂滅之言故名常也三發心利益記顯發心益者由前發心行諸妙行故得入初住見於法身起用利益也於中四初顯勝德二明微過三通權教四歎實行初顯勝德菩薩發是心故則得少分見於法身以見法身故隨其願力能現八種利益衆生所謂從兜率天退入胎住胎出胎出家成道轉法輪入於涅槃疏十解菩薩依比觀門見故云少分亦可依人空見八種利益者初發心住中能作此事記比觀見者以於人空得自在故若約法空但相似見未是證故名為少分亦可下若依人空此即已證但未得法空故云少分是依人空見也前是正意此約兼明發心住中作此事者隨其悲願之力能作八相成道利樂衆生同今釋迦化儀也此如華嚴所說又是文中有自利利他之異詳之可見若前後相望說者由護法故發深心行自利行得見法身由大悲故發大悲心行利他行八相利生由佛菩薩教故發直心行無住行見法身而現八種隨願利益也二明微過然是菩薩未名法身以其過去無量世來有漏之業未能決斷隨其所生與微苦相應亦非業繫以有大願自在力故疏未名法身者異地上也以未證真但依信力見於少分以其過去下釋異所以亦非業繫者異凡夫也菩薩於報修短自在不由惑業大願自在者以留惑益生悲願之力故記未證等者但比觀相應未離分別故釋所以者此明先世所造世間業因通於善惡斯往業不亡也微苦有二意一者變易行苦二者隨業有分段苦以得自在不同凡夫故云微也修短等者變易之身願智所資無定齊限能變粗身為細質易短命為長年故云自在留惑等者以有大願故留煩惱不斷潤生受報以有大智故能自在隨意長短不為惑染非同凡夫為煩惱所使不能斷也斯則未名法身故異地上以其下是所以亦非業繫故異凡夫以有下是所以既上異聖人下殊凡品故當賢位三通權教如修多羅中或說有退墮惡趣者非其實退但為初學菩薩未入位而懈怠者恐怖令彼勇猛故疏如修多羅下一舉教也非其實下二釋通也文皆可見如纓絡本業經中言七住已前名為退分若不值善知識者若一劫乃至十劫退菩提心如淨目天子法才王子舍利弗等各入第六住其間值惡知識因緣故退入凡夫不善趣中乃至廣說今釋此意是權語非實退但恐怖彼初入人令不慢故也記七住前退者第七方名不退住故然彼經中但說淨目等各至第六住遇惡知識故退而不詳彼所值因緣行相待檢續入論云未入正位通二意一未入初住二未至七住正因不退之位故云正位前意為正四歎實行又是菩薩一發心後遠離怯弱畢竟不畏墮二乘地若聞無量無邊阿僧祇劫勤苦難行乃得涅槃亦不怯弱以信知一切法從本已來自涅槃故疏又是下一於下不戀也若聞下二於上不怯也以信下釋不怯所以也此即顯彼經文是權非實記於下不戀者謂於二乘凡夫果報不生著故若聞等者如法華云佛道長遠久受勤苦乃可得成於上不怯者於菩提涅槃有勤勇心修諸苦行不生畏故釋所以者亦釋前不戀所以以知自性涅槃終非外得遲速由己何定劫時故雖聞是經劫勤苦乃得涅槃之言而無怯懼斯則於上不怯故於下不戀是故疏中但釋不怯所以也又由信知一切自他自性涅槃縱在輪回亦常入滅由是為諸衆生志求佛道廣修福德雖不樂於有亦不墮於空故聞生死苦界生多難化之言並無怯弱斯則於下不戀故於上不怯故能兼釋前之不戀所以也由此兩文之內皆有不怯之言但前之不怯悲也不畏衆生難化故後之不怯智也不懼佛道難成故此即下據此以𠩋彼此明其實非權說故初發心住尚無退墮況入六住豈有退耶二解行發心二初總標歎勝二顯其勝相初總標歎勝解行發心者當知轉勝疏前位信滿入解今此行滿入向更深發心故也記今此下謂依住行位滿發深解行入十向位非同前信故云轉勝二顯其勝相二初時勝二行勝初時勝以是菩薩從初正信已來於第一阿僧祇劫將欲滿故疏一劫滿者鄰初地故記鄰初地者從初住至初地為一僧祇今十回向與初地相近是鄰真故也二行勝二先總次別先總於真如法中深解現前所修離相疏深解解也離相行也下六度中皆明此二記解徹真如故云深解分明顯了更無暗昧故云現前又超前故云深異後故云解也離相行者真如無相順真如故所修行行一一無相如金剛不住色布施不住聲香等布施諸行皆然故云所修離相此二指解行言次別以知法性體無慳貪故隨順修行檀波羅蜜以知法性無染離五欲過故隨順修行尸波羅蜜以知法性無苦離瞋惱故隨順修行羼提波羅蜜以知法性無身心相離懈怠故隨順修行毗黎耶波羅蜜以知法性常定體無亂故隨順修行禪波羅蜜以知法性體明離無明故隨順修行般若波羅蜜疏以知法性下顯上深解現前也隨順修檀者顯上所修離相也下五一一準此謂離三輪等相以十行已去菩薩得法空故能順法界修六度等行即發心所依之解行以垢障乖真故修離障之行以順如也記無慳貪者慳謂吝惜己物輒不與人貪謂希欲他財以將入己知法性之中本無此事故疏云解也檀波羅蜜者具云檀那此云布施波羅蜜此云到彼岸彼岸即是涅槃涅槃即是真如之理今離相行施與理相應即是到彼岸義餘皆倣之然則輟己惠人名之為施但順無慳以此亦順無貪之義何則己物尚與他人他物固應不取以深況淺也謂離下明所離相三輪即施者受者所施之物達此三相體不可得故名離也苟能離相則因成無漏果證菩提有運轉義故名為輪復能摧輾一切惑障有摧輾義號為輪也以十下釋離相之由得法空者但約深入此觀未是證得然此由是約教道說若其實說十信位中便能深入如下信心修真如三昧豈非法空也所依解行者解即十住行即十行斯則十向為能依住行為所依又住行為能發十向為所發謂依此解行發回向心故以垢下釋順真之由謂慳等是障常乖背其性性本無慳等常不與障合故行布施等行外違慳貪等障內順無慳等性也五欲者色聲香味觸等五境此五能令衆生起欲心故故前云以有妄境界染法緣故即熏習妄心令其念著造種種業受於一切身心等苦又無常經云常求於欲境不行於善事於境生欲故名為過過即是染知法性中本無此染也尸者具云尸羅此云戒戒謂防非止惡即離五欲過也瞋惱者因他惱觸生瞋恚故亦可因惱生瞋瞋故熱惱熱惱即苦知性本無此苦也羼提此云忍辱忍彼辱境即離瞋惱懈怠等者為執身心遂成懈怠今既性淨不見身心為誰懈怠故云離也毗黎耶此云精進精謂精純一心無雜進謂進趣勇猛不退即離懈怠常定約顯體說無亂約離過說禪者具云禪那此云靜慮即慧之定定即無亂離無明等者本覺明中本無不覺故般若此云智慧智即是明明即離無明也即定之慧故此與第五是自性定慧本是一法但約體用義分異爾然準華嚴經說十地菩薩如次行十波羅蜜行者以彼是證真之後如實修行此中六度是隨順修行淺深有異也又此雖順性是漸修彼稱法界一行一切行是圓修亦偏圓之不同也應詳之三證發心三初明發心體二明發心相三明成滿德初明發心體三初標地依二明行體三明勝用初標地依記地依者以文云證何境界所謂真如此則真如是十地所依境也然地者就喻彰名以喻真智能生聖法今約真如是智所依故名地依也證發心者從淨心地乃至菩薩究竟地證何境界所謂真如記證句牒章從下辨相先徵問所謂句次答釋謂此十地菩薩雖斷障有分數多少行行有差別淺深隨其位次一一皆證其所證者同一真如但有滿分之殊而無差別之體故此通標真如為所證境界也華嚴十地品中亦同此說故彼出體偈云如來大仙道微妙難可知非念離諸念求見不可得二明行體疏行體根本也記根本者即根本智證真諦理是真見道也以依轉識說為境界而此證者無有境界唯真如智名為法身疏境界即是現識必依轉相起故而此等者然本智正證之時實無能所豈可得說以為境界今但約後得智中業識未盡故轉現猶存假就此識說正證中定有真如為所證境也以後得智反緣正證亦有現似境故說轉識現也而實真證能所平等記以依等者先問曰真如離心緣相又若證者離於能所何以言真如為境界耶故此釋之必依轉相起者即此轉識約現境處便名現識竟無別體但據次第義說相依斯則依能見心有所見境故前論云以依能見故境界妄現本智證者智與理冥心與神會一相一味平等平等實無能所之異故頌云若時於所緣智都無所得爾時住唯識離二取相故今但下對此重解依轉識說為境界之意此有二義一約菩薩未離業識猶有見相入觀雖與無分別智相應不分能所出觀則與此識相應約此識上說前證時以為境界二約後得智中相見道內重慮緣真變起影像倣正證時說真為境此但似境非謂實有然亦不離是轉識現故疏雙標後得智中業識未盡也然至釋相但約業識未盡義說故云轉現猶存等也此是初一義以後得下出第二義或問曰如上所說業識未盡已聞命矣後得智中如何分別故此釋之意明根本實證之時但是一心真見道無分別能所之相若後得智中以能見心反緣所證以有此能緣心故便有真如影像當情為所緣境界像雖不實還似真如秪據此義說後得智中依於轉識名境界也如人飲水正飲之時不能說其冷暖飲水之後方能說之說時雖不得水體其如所說之水還似所飲之水也而實等者真如是所證智是能證能所無二方名法身以法身本具理智理智本無二故斯則住唯識理離二取相也三明勝用疏勝用後得也記後得者權智達俗出假化物也文中四初攝法上首德二隨根延促德三實行不殊德四應機殊行德初攝法上首德是菩薩於一念頃能至十方無餘世界供養諸佛請轉法輪唯為開導利益衆生不依文字疏此下有二一供養等正明請法二唯為等顯其請意記一念至無餘世界者若準華嚴說初地菩薩能至百佛世界二地千佛世界乃至十地不可說不可說阿僧祇世界此蓋隨其分位勝劣不同今此文中意在通論十地故以無餘之言而通貫之也請法者於彼彼世界彼彼衆中勵己率先為衆導首請佛說法請意者新譯論云唯為衆生而作利益非求聽受美妙言辭夫請說法誠在所顯修證義意令其衆會如聞攝取思而行之兼冀展轉遐益衆生豈在徒聽言辭而已耶即如圓覺十二菩薩各伸請問皆言願為此會及為末世等二隨根延促德或示超地速成正覺以為怯弱衆生故或說我於無量阿僧祗劫當成佛道以為懈慢衆生故能示如是無數方便不可思議疏或下一促也於中先舉用以下後顯意或說下二延也亦先舉用以下後顯意能示下三結也記促者謂有一類衆生根性怯弱聞說佛道長遠久受勤苦乃可得成却生退屈不肯修進是故菩薩為此衆生示現超越地位不經劫數證於佛果令彼思齊發心進趣如釋迦六年修行便成正覺是茲倒矣又如善財一生龍女一念等延者為有一類衆生亦欲進趣將謂佛果容易而成懈怠因循不能勤勇若復示其超果轉令懈慢終不成就是故菩薩為彼說言我於無量劫中修行方成佛道以茲警䇿不令懈怠使其勤進故法華云智積菩薩言我見釋迦如來於無量劫難行苦行積功纍德求菩提道未曾止息即其類也然促中云示延中但云說者促在一生可令現見延歷多劫但可說令知也結者根器既多方便非一口不可說心不可測故云無數等法華云佛知衆生有種種欲深心所著隨其本性以種種因緣譬喻言辭方便說法如此皆為得一佛乘一切種智故是諸衆生從佛聞法究竟皆得一切種智三實行不殊德而實菩薩種性根等發心則等所證亦等無有超過之法以一切菩薩皆經三阿僧祇劫故疏此下有四一種性因等二發心行等三所證證等四三祇時等記種性根等者等謂齊同同是一乘種性非三五等乘性故根謂信等五根有上中下今同是上根非中下故此約夙昔所論故疏云因等也行等者同發菩提心行二利行故若克就地上則同得無分別智行如次同行十波羅蜜行然此發心之言通於前位所說證等者同證二空理故若克就地上則同證遍行真如乃至十地同證業自在所依真如等無有超過法者此明菩薩因行證既等同更無別有超越殊勝之法可為行證也亦可此是位等即三賢十聖皆須歷故無有超過以一切下是時劫等易解總上言之意云若此一類是菩薩種性根器則發心修行斷證位次始終劫數竟無差別也又此一段亦似通明上諸等之所以以彼皆經三大阿僧祇劫所修來故因行果證無有不等同也所言阿僧祇者若準本業經初以忉利天衣仍用彼天時分三年一拂盡四十里石為小劫次以梵天衣拂盡八十里石為中劫後以淨居天衣拂盡八百里石為大劫雜阿含中與此有異又劫章頌云風災為一數乃至不可知此極長遠時名一僧祇劫謂以此風災為數數至不可數更若數時心則狂亂齊此數不得處名一阿僧祇劫若以此等計三僧祇方成佛道則百千萬人中無有一人發心修進縱有懼於三途苦者但修人天戒善或有畏於三界生死亦但修二乘之行焉敢希冀佛果修菩薩行蓋為作此長久而解有是大失彼為一類懈慢衆生故說長久一也今所會通則特異於彼何者且梵語劫波此云時分大劫小劫長時短時下至剎那皆名時分阿僧祇此云無數無數之言亦不定久近如人經年不相見便云無數時竟日不見亦云無數時修行時分意亦同此若此所解方有修行佛道之人此為一類怯弱衆生故說短近二也若處中而論三祇是定延促則不定謂始從具縛凡位發心初信心位修進住行等也法爾經無數時方得親證真如名為見道初地是第一無數時從見道已去漸斷執障法爾又經無數時方得不假功用自然相應至第八地是第二無數時從此任運進趣消遣餘纍法爾又經無數時方得成佛是第三無數時斯則三無數時是定有然延促不可定也此明三祇延促隨人悲智願耳無定局也況時無定體唯心所現心樂長則時長心樂短則時短亦無定限也又心本無際時寧有分此約理說三也故法華說日月燈明佛說法華經六十小劫時會聽者謂如食頃又論釋經劫數之言或云年歲或日月等又攝論云處夢謂經年覺乃須臾頃故時雖無量攝在一剎那今此三祇宜依後說四應機殊行德但隨衆生世界不同所見所聞根欲性異故示所行亦有差別記衆生世界者或唯有情或分情器不同者以世界衆生各有無量差別謂生有善惡豎窮於九界也界有染淨橫遍於十方也見有邪正聞有疑信過去所成名根現在所欣名欲未來種子名性又根機有利鈍樂欲有大小種性有高下示行五乘教行也謂為彼彼界生根欲性異故示所行業用亦復千差乃至現身說法亦各隨彼彼見聞而成萬別也例如觀音妙音品說二明發心相又是菩薩發心相者有三種心微細之相云何為三一者真心無分別故二者方便心自然遍行利益衆生故三者業識心微細起滅故疏一者下根本無分別智二者下後得智三者下二智所依阿梨耶識也理實亦有轉現但今略舉根本細相此非發心之境但顯此菩薩二智起時有微細生滅之纍不同佛地純淨之德是故合為發心相記又是下標徵一者下列釋二智所依等者以此二種智本從彼識之所顯生故說為依非謂現今能與二智為體問二智是淨梨耶是染云何淨智依染識生耶答以有染心故翻此染心得成淨智若本無染淨亦不生故前云以有不覺妄想心故能知名義為說真覺若離不覺之心則無真覺自相可說廣如隨染本覺二相中明又梨耶是染淨和合淨智依生故無疑也又若隨相所明謂梨耶本有二智種子從無始來以本識為依止處故云所依也理實等者既言梨耶合通三細今但言業識者意在舉細攝粗舉本攝末也亦可現相八地盡轉相九地盡業相十地盡業相最通故標通者斯則於諸菩薩無所屈矣此非下或問曰二智是淨從來未得今始開發可名發心相生滅業識無始來有何故至此名發心相耶故此釋之意明此菩薩亦能證真亦能達俗亦有生滅以證真故揀異地前以有生滅不同佛位其猶鍊金光色漸顯粗礦已落細礦猶存欲顯此時應云幾分是金幾分是礦斯則不同粗礦亦異純金故且通說金已顯發此亦如是三明成滿德二初正顯勝德二問答除疑初正顯勝德二先總次別先總又是菩薩功德成滿於色究竟處示一切世間最高大身疏又下有二一功德滿因位窮也故地論云一者現報利益受佛位故二色究竟果位彰也故地論云二者後報利益摩醯首羅智處生也何故他受用報身在此天者一義云以寄十王顯其十地然第十地菩薩寄當此天即於彼身示成菩提故在彼天餘義如別說記有二者望下別中亦可因位即自利行滿亦即自受用報也果位即利他德圓亦即他受用報也因位窮者將出菩薩因位以成究竟果也現報等者即以此身成正覺故即自受用身功德圓滿也果位彰者將入妙覺果位以施究竟益也後報等者依前報體方起此故即他受用身功德亦圓滿也然其因窮果顯但義說二相時無前後現後二報亦復同時譬如夜盡即曉豈分前後摩醯首羅此云大自在智處者一切智人所起智處故經中說摩醯首羅於一念中能知三千界中雨滴之數論云色究竟處示高大身者色界之頂是色邊際故名色究竟處色究竟天身量一萬六千由旬自在天王身量三萬二千踰繕那十地菩薩示為自在天王身量倍增故云最高大也色身之大莫過此天故何故下牒難一義下釋通十王等者準仁王經說十信菩薩鐵輪王王一閻浮提十住菩薩銅輪王王二天下十行菩薩銀輪王王三天下十向菩薩金輪王王四天下初地菩薩閻浮王王百佛土二地菩薩忉利王王千佛土三地菩薩夜摩王王萬佛土四地菩薩兜率王王億佛土五地菩薩化樂王王百億佛土六地菩薩他化王王千億佛土七地菩薩初禪王王萬億佛土八地菩薩二禪王王百萬億佛土九地菩薩三禪王王百萬億阿僧祇佛土十地菩薩四禪王王不可說不可說佛土如來法界王王無量佛土說一切法門彼經除信佛有十三法師兼信十四及佛十五今疏不論地前及果位故但十王然第十下正明十地寄報當此天王利他因行滿也此是一意即於下兼顯最後身菩薩示於彼天成佛之相即轉第十地菩薩身以為佛身成菩提果揀餘地王菩提尚遠若準真實成佛但當前云功德成滿即無方所亦不可見今為應於十地菩薩故示在彼天說成正覺此又一意也第一義中具是二意餘義者指第二義謂此菩薩將成佛時於第四禪色究竟頂自在天上有妙淨土出過三界十地菩薩當生其中菩薩坐於大寶蓮華其座縱廣百萬三千大千世界於蓮華外有十三千大千世界微塵數小蓮華座以為眷屬各有菩薩而坐其上是大菩薩放十種光謂於足下出百萬阿僧祇光明照十方世界一切地獄乃至第十頂上放若干光明照十方世界所有諸佛光繞十匝住於空中成光明雲網臺高廣嚴淨於光明中悉雨寶香寶珠瓔珞諸莊嚴具供養諸佛光明入諸佛足下爾時諸佛一時同放白毫相光照大菩薩其光即入大菩薩頂又放阿僧祇眷屬光照眷屬華座諸小菩薩其光各入諸菩薩頂已應時得佛無量三昧應時得佛無量智慧即得佛位墮在佛數上義指他受用此義指實報也如別說者心地觀云自受用身三僧祇劫所修萬行利益安樂諸衆生已十地滿心運身直往色究竟天出過三界淨妙國土坐無數量大寶蓮華而不可說海會菩薩前後圍繞以無垢繒繫於頂上爾時菩薩入金剛定斷除一切微細所知諸煩惱障證得阿耨菩提如是妙果是真報身唯識論云謂諸異生求佛果者定色界後引生無漏彼必生在淨居天上大自在宮得菩提故此皆實報成佛義也復有五意故在彼天一以二乘人執化八相為真佛不信別有聖人一又不知即心是佛二又信彼第四禪中是聖人生處三今且同與二乘在彼天處攝示令知樹下八相非真故在此天二緣三災不及故當此天三緣欲界色質粗重是有無色界都無色質是無今此天中表離有無契於中道故在此天四為摩醯首羅天王面有三目不縱不橫表證涅槃三德亦爾故在此天五為下界慧多定少上界四空定多慧少此天定慧平等故在此天以禪者言翻云靜慮靜揀於下慮揀於上楞伽偈云欲界及無色佛不於彼成色界中上天離欲中得道問疏中何以不出此第二義耶答唯識論等為引二乘令知樹下佛相非真且指彼為實報權也今起信等既云示高大身即他受用如下文云能現十方利益衆生豈唯色究竟處成佛說法而已又前文云隨心能示十方世界無量報身又云菩薩從初發意乃至究竟地所見報身即無有邊不可窮盡離分齊相皆實也此既是權非實故不出耳餘詳華嚴玄談次別記前但直顯德滿位彰今則具明二智滿相及顯無明頓盡等即是明前心相中二心真方便也圓滿一心業識除滅也謂以一念相應慧無明頓盡名一切種智自然而有不思議業能現十方利益衆生疏相應者謂一念始覺至心源時契於本覺也種智者無明盡故顯照諸法也亦可一念等皆無間道名種智是解脫道即顯上真心於此成也上皆自利行滿自然下利他德顯顯上方便心不待功用也又亦可初智淨相後不思議業相皆是本覺隨染所成也記始覺等者此始覺慧與本覺心源最初契合之時名為一念此約究竟相應發始之一念不是暫時相應謂之一念又此一念前則屬因後則屬果其猶曙色在朝夕之端矣無明等者無明未盡既有所不知無明若盡則無所不照即大智慧光明遍照法界也一切諸法種類若干無不知之故云一切種智大般若云煩惱不生名一切種智若具言之得三種智謂一切智道種智一切種智準天台說因修一心三觀果得一心三智謂修即空觀得一切智修即假觀得道種智修即中觀得一切種智今此論中依真如門修奢摩他即是空觀果得一切智依生滅門修毗鉢舍那即是假觀果得道種智依一心法雙運此二不相捨離為禪那即是中觀果成一切種智今論舉中所成以攝空假故但云一切種智亦可等者謂此始覺慧至心源時約斷惑邊名無間道約證理邊名解脫道即顯等者謂前發心三種相中真心彼有業之所纍猶為菩薩至此業識永盡無餘唯真獨存更無所纍故名佛也上皆下同上二報利益但前標此釋異耳非別有所說也顯上方便者即前發心相中後得智至此圓滿也問前後皆言自然則因果何別耶答前是有心自然以帶業識故此是無心自然唯真獨存故疏云不待功用兼揀上之自然也又亦下類攝前文前約法說此約人說理無別也皆是下釋類攝所以以前文是本覺隨染之文今顯果位亦即本覺隨染二文既同故應相攝其實亦同四鏡中之後二也雖約性淨隨染為門之異而法體一無別焉二問答除疑二初除一切種智疑二除自然業用疑初除一切種智疑二先問次答先問問曰虗空無邊故世界無邊世界無邊故衆生無邊衆生無邊故心行差別亦復無邊如是境界不可分齊難知難解若無明斷無有心想云何能了名一切種智疏問下有二一且陳疑謂有虗空處皆有世界有世界處皆有衆生有衆生處皆有心行如是境界分齊難知也若無明下二正設難難云非直外境無邊分齊難知亦復內盡心想云何得了也記陳疑可解設難中非直等者意云所知之境既甚多無量縱有心在早自難知豈況永斷心想却能了別而名一切種智耶次答三初直立正理二舉非顯失三舉是彰得初直立正理答曰一切境界本來一心離於想念疏意云只由內盡妄想心故能外廣知也境雖無邊不出一心既證心源何不能了真心之境離於妄念故盡想念方始能知也記意云下先總敘答意即反於所問義在次下之文也境雖下次別釋論文文中立二正理一元是真心故論云一切境等也謂諸法唯心無外境界今證心源是合了知誠無疑慮二本來無念故論云離於想念也謂既本是心元來離念唯是真實今以離妄方了此更無疑故下論文但反此二意為失合此二意為得也今疏中先釋其前意真心下次釋其後意並可知之然此論中且是立理未顯能了能知疏中要意圓備故預結之云了知也若於此中體悉論旨下文逐段自然無惑仍更隨釋彌為彰顯二舉非顯失以衆生妄見境界故心有分齊以妄起想念不稱法性故不能了疏以衆生下一妄見有限之境以妄起下二釋成不見所由即明為妄見故有所不見記此論文中亦有二反前正理故成不知之失一迷本真心故論云以衆生等也諸法本來唯心以衆生迷本唯心妄見有境以妄見有齊限故遂令境有分齊所以不能遍知也此即對前第一本來唯心以顯其失疏云見有限者境即無限但能見之心有限故論云心有分齊不言境有分齊也二妄起想念故論云以妄起等也謂一真心本來無妄常住法性以衆生妄起想念違於無妄不稱真性所以不能遍知也此即對前第二離於妄念以顯其失疏云釋成等者據論二段總是對前釋成失義詳之可知即明等者性本離念妄起想念即是乖真以乖真故不能了知不了知言貫通前段義則顯矣三舉是彰得諸佛如來離於見相無所不遍心真實故即是諸法之性自體顯照一切妄法有大智用無量方便隨諸衆生所應得解皆能開示種種法義是故得名一切種智疏無不遍者無妄見故無所不見心真實者佛心離妄體一心源無始覺之異故即諸法性者然此本覺在生滅門中為妄法之體故顯照一切法者一切妄法並是本覺佛心之相相既現於自體之上以體照其相有何難了而不知也故云自體顯照等也故上文中辨佛報化之用則在於衆生心中今辨衆生妄法則在於佛心之上良以心源無二故得然也華嚴云如心佛亦爾如佛衆生然心佛及衆生是三無差別此之謂也有大智用等者以同體智力起勝方便攝化有情也記論分二初反前彰得即雙反前非合初正理也中又二先總顯謂總反前非以彰其得也離見相句具含二意離見故反前妄起想念之失合初離念之得離相故反前妄見境界之失合初一心之得既合正理即能遍知故云無所不遍以上問云若無明斷無有心想即一心想念云何能了故此答曰諸佛離於見相故無不遍知也疏云無妄見者釋前離見也離見即能離相故但舉一義也論心真實下次別結初一句結離見也既離妄見即是一心心即真實也疏文可見次諸法一句結離相也既離妄相唯是於性性無不遍也既無二非之失即成合理之得正理既合不了何待由是科云舉是彰得也然此下釋法性義以本依如來藏有生滅故生滅是法如來藏是性今從生滅門入真如門故離見相即顯法性性即本覺立義分中指為自體也論自體下二約義結名二先顯義相二初體能照法性相即實智照理一切智義相也一切下貼釋其文義一切妄法即虗空世界衆生心行等並是本覺出法之性也佛心之相出法之相也以體照其相相依性有照相即照性也故上下引因以證果即用大中文前則因心現果法今則果心現因法因果雖殊心體是一故金錍云阿鼻依正全處極聖之自心毗盧身土不逾下凡之一念良以下釋所以生佛體同無二相故猶如父子共有一鏡若照子時子在父鏡中亦在自鏡中若照父時父在子鏡中亦在自鏡中鏡是一體攝屬二人各成自鏡互照互現無別有體以喻真心生佛各具雖云各有而理不可分故云無二是斯意也華嚴下引證心是總相生佛是別相何者悟心名佛成淨緣起迷心名生成染緣起緣起雖有染淨心體不殊如心既具淨染二緣則佛亦爾從心造也故云如心佛亦爾是知佛報化用在於衆生心矣如佛既從心造則生亦然從心造也故云如佛衆生然是知衆生妄法在於諸佛心矣心佛生三無差別者謂衆生心即佛心佛心即衆生心又衆生是佛心中衆生佛是衆生心中佛以生佛相同一心體無差別故清涼疏云三法各有二義心二義者一染二淨佛二義者一應機隨染二平等違染衆生二者一隨流背佛二機熟感佛各以初義成順流無差各以後義為反流無差並全體相收成一緣起故云三無別也論有大智下二用能隨生開示即權智鑒機道種智義相也衆生中攝虗空世界得解是心行種種法義不出五種教乘是故下次正結名以上問云云何能了名一切種智故此答曰總上二智得名一切種也疏云以同體者意云匪但心體照法而已復能起大神用利樂衆生斯則依智淨相起不思議業相依法出離鏡作緣熏習鏡義也二除自然業用疑二先問次答先問又問曰若諸佛有自然業能現一切處利益衆生者一切衆生若見其身若覩神變若聞其說無不得利云何世間多不能見疏又問下亦二一且陳疑云何下二正設難記陳疑中若諸佛至衆生者是牒前文也一切至得利者是按定也餘皆可解神變通他心意業也如來三輪不思議化遍於時處故一切衆生無不沾益設難中多不見者非全不見故云多也又聞說者必見身見身者未必聞法今約局所標故但言不見尚不能見何況得聞及神變耶次答答曰諸佛如來法身平等遍一切處無有作意故說自然但依衆生心現衆生心者猶如於鏡鏡若有垢色像不現如是衆生心若有垢法身不現故疏答下有法喻合先法也以法身普照遍衆生心中但有厭求機感即顯粗細之用非由功用也上文中已顯此義衆生心下次喻如是下後合衆生心有垢者明無感佛之機非謂煩惱現行以善星等煩惱心中得見佛故法身不現者法身能現報化之用今據本而言故云法身不現也如攝論中十二甚深皆是法身之德顯現甚深彼中言由世尊不現如月於破器中釋曰諸佛於世間不顯現而世間諸佛身常住云何不現譬如破器中水不得住水不住故於彼破器實有月不得顯現如是諸衆生無奢摩他軟滑相續但有過失相續於彼實有諸佛亦不顯現水譬奢摩他軟滑性故此中依定得見佛者是過去修習念佛三昧乃於此世得見佛身非謂今世要依定心方得見佛以散心中亦見佛故彼攝論中約過去定習為因非約現在此論中約根熟為因非約無惑有此左右記法中諸佛下據前所問即問報化今約法身體遍故報化是即體之用亦遍一切據本而言但云法身也遍衆生心者論云一切處故一切之言意說情器亦如華嚴云法性遍在一切處橫說一切衆生及國土別顯情器三世悉在無有餘竪說亦無形相而可得泯迹據此則不唯遍於衆生心今且約所問之處故但言遍衆生心也但有等者此則功過在機佛無私應故華嚴云菩薩清涼月游於畢竟空衆生心水淨菩提影現中上文等者即用大中七重問答廣明斯義喻中猶如鏡下應更說云諸佛之身猶如色像論舉一隅故不具耳合中明無等者垢有多種一障善垢二起惑垢三造業垢四受報垢障善垢中復有多種所謂不見佛塵障垢不聞法障礙垢不遇善知識執障垢等今但是障見佛之垢即是無機非謂煩惱等也善星下引例此人生於佛世是佛弟子常見佛身然有煩惱現行以起惡故生墮地獄如涅槃說法身下疏文三初約本論以通能現然據義合云報化不現而言法身不現者以約本說故如言鏡不現者謂像不現也此同圓覺云由寂靜故十方世界諸如來心於中顯現心即法身皆是據本說也又應化亦名法身本業經云法身有二種一法性法身二應化法身謂第一諦法流水中從實性生智故實智為法身法名曰自體集藏名身一切衆生善根感此實智法身故能現應無量法身所謂十種身等如攝論下二引他論以明不現三初引本文十二甚深者一受生甚深二安立數三現等覺四離欲五蘊六成就七顯現八示現等覺涅槃九住十自體十一斷煩惱十二不思議甚深今言顯現甚深即第七也合移彼字安顯現字上文即順矣餘如次釋釋曰下二引釋文此亦論中釋文今疏隨便引為解之初標也而世間下次徵譬如下後釋中先舉喻如是下次合法奢摩他此云止也軟滑者是柔和善順非粗惡過失故而云無者具云不得禪定靜心意不得禁戒淨身口不得佛慧照本覺過失者謂有破戒垢故散亂垢故無明垢故水譬奢摩等者具云戒如器定如水慧如月戒能生定如器住水定能發慧如水現月今有貪欲破戒垢故無奢摩他無佛智身顯現如衆生破戒器中定水不停佛月不現也華嚴經中亦同此說此中下三會文意初牒前文是過去下正顯意以散下出所以如阿難唯好多聞何曾有定不妨給侍如來後遭石室之訶亦緣無定不能斷結又諸菩薩例皆定少慧多得見佛者無限如彌勒求名而值燈明火頭貪欲而遇空王皆斯類也彼攝論下三對辨其兩文之意定習因者念佛三昧因也根熟因者厭求感佛因也此義如因緣分中已說是知不修念佛三昧為垢非約心散為垢若能念佛必定見佛也不起厭求感佛為垢非約惑惱為垢若厭求根熟法身必現也欲令佛身顯現宜在衆生自心求矣左右者二論意旨雖別而見佛不見佛一也故引彼以證此四修行信心分四初結前生後二就人標意三約法廣辨四防退方便初結前生後已說解釋分次說修行信心分疏來意者以上來明其大乘今為正明心信故有此來分也記已說結前次說生後修謂學習行謂進趣所行五種如下自辨信心者起忍樂意境有四種亦如下辨來意等者此約論題所配大結前正義中三大乘結前分別發趣中乘義皆所乘境也心信者即能信之心或起大乘心上之正信故云心信能乘心也若準立義分中所立此與分別發趣道相並當乘義二就人標意是中依未入正定聚衆生故說修行信心疏不定聚人有二一者修信滿足為說發趣道相令入正定是前勝人也二者修信未滿是前劣人即此文所為以四信五行令其修行使信成滿信成滿已還依發趣入正定也記勝人即前發直等三心行不住等四行入正定者劣人即前見佛色相或是二乘發人天等心却退失者以四信等者意不令唯信佛僧等色相起人天二乘等劣行也還依等者信既成滿應如前文發直等三心修無住等四行入於十住乃至獲利更發解證等心也斯則前雖揀退今即教修也三約法廣辨二初興二問二還兩答初興二問何等信心云何修行記信是衆行之本故先信次行二還兩答二先答信心次答修行先答信心二初標徵二列釋初標徵略說信心有四種云何為四疏有四標數即四不壞信也云何徵起記四不壞信者信彼四事皆不可壞不壞即常住也以所信之境不可壞故使能信之心亦不可壞能所相稱俱名不壞故經云妙信常住是也二列釋一者信根本所謂樂念真如法故二者信佛有無量功德常念親近供養恭敬發起善根願求一切智故三者信法有大利益常念修行諸波羅蜜故四者信僧能正信行自利利他常樂親近諸菩薩衆求學如實行故疏根本者真如之法諸佛所師衆行之源故樂念者非直就起信心亦乃樂念觀察三寶中各二一標所信之勝德二起勝因以願求記佛所師者約人顯根本也謂佛因地本於真如起於信解又依真如軌則修行又乃證極真如方得成佛故華嚴云以諸如來尊重法故以如說行出生諸佛故約此義邊故云真如是佛師也故經云諸佛所師所謂法也以法常故諸佛亦常既是佛師故名根本衆行下約法顯根本謂一切行門皆從真起圓覺云無上法王有大陀羅尼門名為圓覺乃至流出諸波羅蜜教授菩薩等所以前標直心為二利行本是知非真流之行無以契真何有契真之行不從真起此乃為信等諸行之根本也問何故不約僧顯根本耶答約佛顯時已攝僧故因地信解軌則修行即是僧寶今文雖唯二義必兼三故約能為三寶名為根本也又是所信法中之根本故以終教所宗唯此真法萬緣所起起自真如會緣入實入於真如菩薩發心先緣真如起信發解修行契證咸歸真如故於所信法中為根本也信若不信真如信則名邪故寶性論云不信真如有五種失謂自輕輕他執人執法起惡見是知反此則為五得由是發心先令信此非直等者不但起信亦乃樂觀樂觀即行也然此行是即信之行行所成信方為實信故問云何是信真如之相耶答唯信一寂滅心不信一切諸法是信真如之相也以真如心性中本無諸法若見諸法為有是信一切法不信真如理今則不信諸法是信真如理也亦可樂念觀察方名為信如世間人觀彼所作彼順所勸方名為信若不爾者焉為信耶信則所言之理順順則師資之道成矣故以樂念釋成其信信佛等者是信報身謂身語意業法門辨才色相具足依報莊嚴故云無量功德如前論云身有無量色色有無量相相有無量好所住依果亦有無量種種莊嚴常念等者以信佛有功德故願成此身具一切智以願求故而念恭敬供養起於善根修佛因也信法等者此是行法此法能除慳貪毀禁等障是有大利益也常念等者略則施等六度次則十度廣則八萬四千波羅蜜行以信有益故復勤而行之信僧等者僧通凡聖此是登地已上聖僧故云能正修行聖通大小此是上乘大菩薩僧故云自利利他常樂下揀非二乘故云菩薩衆揀非地前故云如實行然常途四信謂信三寶及戒此即人天乘中之信今之四信乃是終實教中信也不唯真如與戒不同亦乃三寶淺深有異問前說善根微少者亦遇佛見僧求法與此何別答前以未信真如故所見三寶皆不稱實由是遇緣却成退失今以先信真如故得所信三寶悉皆如實由是增進使信成滿也斯則信真如為佛本信佛為所成信法為所依信僧為所學又此四種即是教理行果前三如次是理果行信僧即教也僧能轉教就彼求學故疏中各二等者三段中信佛等下初標德也常念樂下二起求也又例前一中亦二信根本句是初標所信之勝境所謂下即次起觀念以樂證次答修行三初舉數標意二徵起列名三依門牒釋初舉數標意修行有五門能成此信疏有信無行則信不堅不堅之信遇緣便退故修五行以成四信之心令不退也記有五舉數成信標意也有信等者信若無行非實信也以信是順義順而行之乃為真信將知此行是成信之行信是即行之信此信則決定不退也如前所退者不能如此故二徵起列名云何為五一者施門二者戒門三者忍門四者進門五者止觀門疏止觀合修定慧雙運二門不二故唯五也記云何徵也一下列也疏云止觀等者以諸經論皆說六度此中唯五者以後二修時不得相離故初修為止觀修成為定慧但時異而體不異也問何故止觀合修耶答若不雙修皆成邪故涅槃經說定多慧少不見佛性慧多定少見性不了定慧等學明見佛性又諸處說不見佛性無明邪見自此而生故今合修免招二過下文自釋三依門牒釋五初施至五止觀初施云何修行施門若見一切來求索者所有財物隨力施與以自捨慳貪令彼歡喜若見厄難恐怖危逼隨己堪任施與無畏若有衆生來求法者隨己能解方便為說不應貪求名利恭敬唯念自利利他回向菩提故疏一若見一切下資財施也二若見厄難下無畏施也三若有下法施也記云何句徵也若見下釋也來求索者即受施人也不同善德局七種人故云一切則不擇冤親老幼病健高下貧窮遠近等所有下是所施物也隨力之言似有兩意一隨貧富之力二隨捨施之力若隨其力必不強為免生惱也以自下即行施意也自捨慳貪者隨性行檀是自利行令彼歡喜者濟物垂惠是利他行故知菩薩雖舉一行二利已兼此則以布施攝貧窮也資財施者資身之物故亦名外財身外物故亦名資生財資於生命故準正法念經說十二種垢施一於衆生不平等施二為男女欲因緣故施三有所怖畏施與王者而求救故四以癡心施如外道齊會等五不知業果但學他施六乞者苦求方與七知他有物施之令信後得侵損八施物囑之令破和合共為一友後與衰惱九與男女物令使成親或令男與女或令女與男或即反之十賤買諸物於齊會日貴價賣之少分饒之十一為名稱故施十二妻子饑貧與物離此十二即名淨施除此復有十二種具足施不能繁述優婆塞戒經菩薩行施應離五法一施時不選有德無德二施時不說善惡三施時不擇種姓四施時不輕求者五施時不惡口復有三事施已不得勝妙果報一先多發心後則少與二選擇怯物持施與人三既行施已心生悔恨離茲三事其果勝妙厄難危逼者受施人也隨己堪任者所施力也盡力所及不惜不吝施與無畏者正行施也亦是行施意或縲紲之難或水火之災或狼虎之殃或冤家之怖如是一切衆生凡有所畏之事皆護令安樂得無所畏來求法者即受施人三乘五乘或請或問皆名求法也隨已下所施法不能不解者輒不與言於能解處即與說之方免誤人亦免尤難孔子曰知之為知之不知為不知是知也又云多聞闕疑慎言其餘則寡尤方便說者要以種種言辨巧便引勸使其信受不得直置令其誹謗故法華云有問難不瞋隨順為解說不應下明行施意不貪名利等反明其非以誡止也故前論云所謂為令衆生離一切苦得究竟樂非求世間名利恭敬故惟念下順明其是以勸行也自既如此令他亦然準智論云佛說施中法施第一何以故財施有量法施無量財施欲界報法施出三界報財施不能斷漏法施清升彼岸財施但感人天果法施通感三乘果財施愚智俱能法施智者方能財施惟能施者得福法施通益能所財施愚畜能受法施唯局聰人財施但益色身法施能和心神財施能增貪病法施能除三毒由是比校法施第一願諸學者審而行之回向菩提者願令自他同圓佛果種智此為法施之宗本亦為前二施之旨歸若不回向同於有為有漏法矣二戒云何修行戒門所謂不殺不盜不淫不兩舌不惡口不妄言不綺語遠離貪嫉欺詐諂曲瞋恚邪見若出家者為折伏煩惱故亦應遠離憒閙常處寂靜修習少欲知足頭陀等行乃至小罪心生怖畏慚愧改悔不得輕於如來所制禁戒當護譏嫌不令衆生妄起過罪故疏一不殺下攝律儀戒也二若出家下攝善法戒也先行善戒相從乃至小罪下次明護戒心三當護下攝衆生戒也記論所謂下如次是其十善則離身三口四意三之惡也不殺者普該蠢物不唯於人不盜者一針一草不但五錢已上不淫者觸身即犯不論道與非道兩舌者鬪搆兩頭之說惡口者無稽難聽之聲妄言者虛誑不實之語綺語者粉飾巧僞之談此等並無故皆言不貪謂惡欲嫉謂妬忌欺謂陵犯詐謂虛僞諂謂罔冒曲謂違理其嫉欺恚是瞋之分諂曲是貪之分邪見者亦名惡見即身邊等五見也今言邪者五中之一此等並無故云遠離然菩薩以慈悲愍物故殺戒為先小乘以厭離生死故淫戒為首旨趣有異故教儀不同若據十善本是人天因緣今菩薩所修趣果則異準華嚴經說有五等人皆修十善感果不同謂凡夫聲聞緣覺菩薩及佛淨名云持戒是菩薩淨土菩薩成佛時行十善道滿願衆生來生其國十善是菩薩淨土菩薩成佛時命不中夭大富梵行所言誠諦常以軟語眷屬不離善和諍訟言必饒益不嫉不恚正見衆生來生其國故知十善不異修心不同也然行十惡準俱舍說各招三種果一異熟二等流三增上異熟可知略辨餘二殺生中一等流果者壽命短促二增上果者光澤鮮少偷盜中一財物匱乏二多遭雷雹邪淫中一妻不貞良二多諸塵埃妄語中一多遭誹謗二多諸臭穢兩舌中一親友乖穆二所居險曲惡口中一常聞惡聲二田多荊棘稼穡匪宜綺語中一言無威肅二時候變改貪中一令貪熾盛二令果少遂瞋中一令瞋熾盛二令果麁疏邪見中一令癡熾盛二令果空無此皆初是等流二是增上也攝律儀者此殺等十是惡律儀止之不行即成善法攝取不捨即名為戒出家等者前律儀戒即通在家出家此善法戒唯局出家者為折伏下處靜之意若處人寰難斷煩惱故須脫俗離塵燕居林藪遺教經云於間靜處思滅苦本念所受法勿令至失月藏經中廣有此說且釋迦如來捨王宮詣雪山因行六年果圓萬德垂斯範者蓋為此也少欲等者見得思義故云知足財無苟得故云少欲頭陀此云抖擻謂抖擻三界煩惱業報故然有十二種謂衣三食三依處六處說六者一住空間處謂離衆憒閙居阿練若身遠離故心離欲蓋益諸善故二端坐不臥謂若行若立心動難攝然亦不久應受常坐若欲睡時脅不著席三樹下坐謂順佛法故如佛成道轉法輪入涅槃皆在樹下此能治房舍貪易入道故四冢間坐謂冢間常有悲哭聲死尸狼藉無常不淨觀道易成五露地坐謂樹如半屋愛著猶生又雨濕鳥喧污穢不淨若露地處光明遍照令心明利空觀易成六隨有草坐謂隨心所得而坐其上離所愛著不惱他故食中三者一常乞食謂依法乞當制六根不著六塵亦不分別男女等相得與不得若好若惡不生憎愛若請食者或得不得貪恨易生若同僧食處分使人心則散亂不入道故二節量食謂念身中八萬戶蟲蟲得此食皆悉安隱我今以食攝此諸蟲後得道時以法攝彼又雖一食恣貪極噉腹脹氣塞妨廢行道隨所得食三分食二身則輕安名節量食三一坐食謂若重食者失半日功不為養身斷數數食即四分律不作餘食法頭陀經中云中後不飲漿衣中三者一唯畜三衣謂白衣好畜種種衣外道苦行裸形而已今佛弟子應捨二邊但三衣也又離多求及守護故二糞掃衣謂拾糞掃物納作衣故以此覆寒障露離貪遠賊無奪命難故三毳衣謂或三衣或長衣一切皆用毛毳而作不畜餘衣故然此十二蓋是知足之行涅槃智論瑜伽俱明其義故知惡貪多欲出家者是所不宜應深誡之乃至等者以小況大意云小罪尚須生畏大過豈得安然超越之言故云乃至欲作即怖已作即畏畏墮苦故慚天愧人故云慚愧又慚謂崇重賢善愧謂輕拒暴惡改悔者改於往過別修善業悔前所作憶恨在心不得輕戒者如菩薩戒說於十重戒中犯微塵許罪便不得發菩提心失比丘位國王位乃至佛位仍二劫三劫墮三途中不聞父母三寶名字何況具足犯十戒也故戒序云莫輕小罪以為無殃水滴雖微慚盈大器剎那造罪殃墜無間故涅槃中有浮囊之譬則知佛所制戒豈得輕而犯之攝善法者依此戒約則一切善法自然攝取護戒心者謂夕惕若厲造次弗離護之若珠纖毫無犯也攝衆生戒者此當涅槃所說息世譏嫌戒也謂行非律儀及受畜非法之物招人譏謗即生他罪他罪所生本由於己故須護之護之即不謗不謗即自然發心發心即受化受化即成攝取義也三忍云何修行忍門所謂應忍他人之惱心不懷報亦當忍於利衰毀譽稱譏苦樂等法故疏應忍句一他不饒益忍也亦當下二安受苦忍利等八者財榮潤己曰利損耗侵陵曰衰越過以謗曰毀越德而歎曰譽依實德讚曰稱依實過論曰譏逼迫身形曰苦心神道悅曰樂記云何徵起所謂釋義他不饒益者亦名耐怨害忍謂被冤家惱害是他不饒益忍耐彼苦無懷報心然所不報有其二意一為解冤結故如律中長生王偈云以怨報怨怨終不止唯有無怨怨自息耳智度論中亦同此說二為證佛果故以有智慧知彼此境空無所有能忍是事彼疑有瞋現同伴侶與其偕和因之得證無上菩提此如瑜伽論說又行人若遭他苦時應作三思五想以忍彼事三思者一責業牽殃思謂菩薩若遇他害應作是思此我先業應合他害今若不忍更增苦因便非愛己成自苦縛是故須忍二性皆行苦思又自他身性皆行苦彼無知故增害我身我既有知寧增彼苦是故須忍三引劣況勝思二乘自利尚不苦他我既利他應忍斯苦也五想者一親善想二唯法想三無常想四有苦想五攝受想廣如彼說又金剛忍辱仙人亦同此意論語中說以直報怨以德報怨今耐怨忍同以直報怨若準上怨與上樂義即以德報怨仁人與菩薩優劣可知故此亦名為生忍是忍外障者也安受苦忍者亦名自能安受忍於違順境安然忍受不動念故財榮潤己者不論多少但取一切潤己之事盡名為利損耗侵陵者此亦不論多少但取一切損己之事皆名為衰越過謗者如有小過毀之言大越德歎者如有片善譽令其廣依實讚者如有一德亦言一德依實過者如有一過亦言一過逼迫形者打擲寒熱飢渴蚊蚋等但是一切有不安者盡名為苦心適悅者清凉飽暖視聽香味等凡是一切暢快之事悉名為樂有說得財名利失財名衰談惡為毀談善為譽對面談善為稱對面談惡為譏苦樂即二受也與此所說各是一意於利譽稱樂忍之不喜於衰毀譏苦忍之不瞋是故論中通言忍也然境界雖多總攝不過違順之二又於二中各有四義收盡二四合說以成八風謂之風者能擊衆生心海起貪瞋煩惱浪故今令忍之則八風不能動也然於中違則易忍順則難忍不唯難忍抑亦難防如賊與子盜於家財防之難易可以比知故天台說為強軟二賊不能安忍無生聖智何以現前且如令尹子文三仕三黜無喜無慍況行菩薩之行焉得於違順境而不忍乎故此亦名為法忍是忍內障者也更有諦察法忍但於忍境體法無生唯心所現三輪空寂唯一真實即是觀察無生忍也故清凉云耐怨害忍是諸有情成熟轉因能忍他人所作怨害勤修饒益有情事時由此忍力化生雖苦而不退轉安受苦忍者是成佛因寒熱飢渴種種苦事皆能忍受無退轉故諦察法忍者是前二忍所依止處堪忍甚深廣大法故今行忍時隨順真如法性為本即是此忍義也四進二先正顯修行進門次別明除障方便先正顯修行進門云何修行進門所謂於諸善事心不懈退立志堅強遠離怯弱當念過去久遠已來虛受一切身心大苦無有利益是故應勤修諸功德自利利他速離衆苦疏於諸下一勤勇精進立志下二難壞精進當念下三無足精進念己長淪虛受大苦以自勸勵修善無厭是故下總結勸修記云何先徵起也所下次正顯中初別明也諸善事者前三施等後二禪等一切方便等善法心不懈者身由於心故但言心懈謂懈怠不能敏行退謂退墮中道而廢勤勇精進者勤恪勇猛也勤故不懈勇故不退斯則於有義事勇往而前進也如子路問孔子曰君子尚勇乎子曰義以為尚君子有勇而無義為亂小人有勇而無義為盜又云見義不為無勇也又勇之相者如淨名云譬如勝怨乃可名勇此即唯識論中攝善精進也難壞者志堅不怯決定取辦詩云我心匪石不可轉也我心匪席不可卷也所以然者以知生死定為苦故佛果必為樂故衆生與己無異足可度故由是千化不變其慮萬境順通其道乃至喪身致命決不捨菩提心故寶藏論云決歸者不顧其疲決戰者不顧其死決學者不顧其身決道者不重其事此其難壞相也即唯識論被甲精進義故論云堅強不弱無足者修諸二利善行意中總無厭足表異二乘得少為足則欲而不貪也以念等者正釋論義可知此即唯識論中利樂精進也又同唯識三練磨文彼云修勝行時有三退屈而能三事練磨其心於所證修勇猛不退一聞無上正等菩提廣大深遠心便退屈引他已證大菩提者練磨自心勇猛不退二聞施等波羅蜜多甚難可修心便退屈省己意樂能修施等練磨自心勇猛不退三聞諸佛圓滿轉依極難可證心便退屈引他粗善況己妙因練磨自心勇猛不退由斯三事練磨其心堅固熾然修諸勝行初練是三進義次練同初進三練成二進無性頌云汝已惡道經多劫無利勤苦尚能超少行苦行二練義得菩提初練義大利三練義不應生退屈論云是故等者二結勸從來為不修身心常苦惱如今若不修依前是苦惱由是尅己造修於行無墮也則善人行善唯日不足故遺教經云汝等比丘若勤精進則事無難是故汝等常勤精進譬如小水常流則能穿石若行者之心數數懈廢譬如鑽火未熱而息雖欲得火火難可得是故精進總結勸者修諸功德結攝善勤勇自利利他結利樂無足速離衆苦結被甲難壞故論云應勤修也次別明除障方便二初障二治初障復次若人雖修行信心以從先世來多有重罪惡業障故為邪魔諸鬼之所惱亂或為世間事務種種牽纏或為病苦所惱有如是等衆多障礙疏復次下此下有二一以從下內有業障即因也二為邪下外感報障即緣也記論若人者此指十信初心之下品也業障者亦有煩惱障今但舉粗也邪魔等者邪謂六師外道魔謂一切天魔諸鬼謂堆惕魑魅等如下所說事務者世間一切公私之事其數甚多故曰種種如是指上因一業也緣三魔事病也等者該餘障礙報障者由內有業障故前說善根熏習便見佛身今明惡業因緣乃見魔鬼將知外境皆由內心非有無因而妄緣果如形端則影直源濁則流昏矣二治是故應當勇猛精勤晝夜六時禮拜諸佛誠心懺悔勸請隨喜回向菩提常不休廢得免諸障善根增長故疏此下有二一應當下總明除障方便如人負債依附於王則債主無如之何如是行人禮拜諸佛諸佛所護能脫諸障二誠心下別對滅除四障一懺悔除惡業障二勸請除謗法障三隨喜除嫉妬他勝障四回向除樂三有障常不廢者總結能治得免障者總結所治善根增者結益由此四障能令行人不發諸行不趣菩提故四行治盡善根長也又初一治業障以止持故後三長善根以作持故記總明除障者準華嚴行願疏中禮佛亦是別除一障即我慢障也與今疏文各是一意如人下喻如是下合行人合負人罪業合負債禮佛合依王佛護脫障合魔鬼病務遠離無礙誠心者以諸障起時心皆猛惡故今除遣必在虔誠故智論云身精進為小心精進為大外精進為小內精進為大猶如赫日可以消堅冰烈風可以摧巨木苟有至誠必有動天地感鬼神使所作事決不違於願也懺悔者懺則陳露其先罪悔則改往以修來也除惡業者謂除十惡業也廣則三障業障煩惱障報障四障加一見障得依正具足故勸請者於中有請轉法輪請佛住世之異今通而言之但云勸請除謗佛法障者得多聞智慧故隨喜者三乘四生所有片善皆隨順稱揚歡喜讚歎除嫉妬障者得廣大眷屬故向菩提者亦合回向實際及與衆生意含此二除樂三有障者成廣大善故謂回因向果成菩提大善自不樂於欲有回自向他成利生廣善自不樂於色有回事向理成實際廣大善自不樂於無色有也論常不下通結能所治益也常不休廢謂念念相續無有間斷也能治者謂行此四行皆不廢故對障稱能也得免諸障謂不論內障外障皆潛消也所治者即上之四障皆脫免故對行稱所也善根增長謂信心漸進無有退轉也結益下懺治業盡則進根增勸治謗盡則慧根增隨治妬盡則念根增向治有盡則定根增四障既滅四行既成四根既長則禮佛功德從此圓顯而修行信心亦從此成滿矣然此障盡善生行成根長豈非進修之利益哉又下上之一釋通明也此之一釋別說也謂常不句總於四行得免句別約初一善根句別約後三故云又也初一等者謂先由迷倒不知罪福妄行十惡今由懺悔畢故不造新故云止持也後三等者以勸請隨喜等是行善故應作須作故云作持也廣如行願疏鈔五止觀二先略明次廣釋先略明二初徵二釋初徵云何修行止觀門疏寄問以標記止觀門者此被十信初心之中品也二釋三初止二觀三俱初止所言止者謂止一切境界相隨順奢摩他觀義故疏謂下先由分別依諸外塵今以覺慧唯識道理破外塵相塵相既止無所分別故云止也此是方便隨下奢摩他此云止但今就方便存此方語約正止即存梵言也以雙現時方名止觀故今但言隨順記所句牒門謂下釋義先由二句此明未修行已前心境俱不止也今以下正明修止謂以如覺覺知諸塵境界唯識所現無外境相塵境既寂分別不生心境俱止也即破塵相為止境無分別為止心心境兩亡寂常心現此同禪宗無念義謂一切善惡都莫思量言下自絶念想圓覺云應當正念遠離諸幻方便者謂上是修止之方便未是正修相也故先德云趣寂之前萬境俱泯發慧之後一切皆如但今下料揀奢摩止意先難曰文中何不竟云隨順止觀義故而又標梵音耶故疏通曰意在顯別故雙標唐梵謂以正修名奢摩他前修方便名為止也下觀亦準此知以雙下釋出隨順觀義雙現者揀前方便中單有止也隨順有二義一揀方便內初修止時未得隨順二揀正修中奢摩觀時雙現前故今且約後義既言隨順將知未是正止也以即觀之止方名正止今既一向止息但是止之方便未得名為止行故論但云隨順奢摩他也問此行既亦是止云何復言觀耶答正修之時止觀雙運止若無觀不名真止是故正修止亦名觀奢摩他觀名義以此故圓覺中名為靜觀然雖名觀而今言止者以就泯相觀於真如真如無相向即心絶心絶則成止義亦是即空觀也下觀中並例此思之二觀所言觀者謂分別因緣生滅相隨順毗鉢舍那觀義故疏依生滅門觀察法相故言分別毗鉢舍那此云觀如瑜伽論菩薩地云此中菩薩即於諸法無所分別當知名止若於諸法勝義理趣及諸無量安立理趣世俗妙慧當知名觀是知依真如門止諸境相無所分別即成根本無分別智依生滅門分別諸相觀諸理趣即成後得智然此二門唯一心是故雙運方得名為正止觀也記所句牒行門謂下釋義相依生下疏文分二先別釋文義依生滅者前依真如門泯相絶心照而常寂故名為止今約生滅門觀諸法相隨流反流染淨因果凡聖色心差別不同寂而常照故名為觀分別即觀之別名也此則能善分別諸法相前則於第一義而不動也然亦方便相耳未是正修此云觀者亦就方便故存華言云觀約正修即依西音毗鉢舍那以即止之觀方名正觀今既一向分別但是觀之方便未成觀行故今但言隨順毗鉢舍那揀異正修現前時也問既言毗鉢舍那云何又言觀義答有三意一正止中即止之觀名為觀境故云奢摩他觀揀方便內但止境界相未得成觀境也正觀中即觀之觀名為觀智故云毗鉢舍那觀揀方便內但觀因緣相未得成觀智也二觀中兼止名真正觀觀若無止不名真觀故正修雙運時始與毗鉢舍那觀義相應也三方便則單止單觀正修則具足四句一寂而常照名止觀即奢摩他觀義二寂之又寂名止止即奢摩他止義三照而常寂名觀止即毗鉢舍那止義四照之又照名觀觀即毗鉢舍那觀義知此觀觀之意止止不須說矣故於一心四句之中隨舉一句餘句皆具實教止觀妙在於是此於圓覺中名為幻觀亦是即假觀也如瑜伽下次通證止觀三先正引論文菩薩地者彼論有十七地此是菩薩地中文無所分別即根本智因也勝義真諦理安立俗諦理世俗妙慧即後得智因也是知下次會入二門會彼二諦二智入今二門真如生滅以成二行止觀也然此下三結出所以謂依一心上開二種門依此二門起於止觀今止觀雙運入於二門會通二門還歸一心是故止時即觀之止觀時即止之觀如此方得契心契心始名真止觀矣此乃以修止觀契性止觀上且釋成雙運所以也又二門唯一心故一心止觀方為正修若單止單觀並名方便斯則起後俱修義也具此二意一結前二生後故於是處綴之三俱云何隨順以此二義漸漸修習不相捨離雙現前故疏以此等者此下有二一顯能隨之方便雙現句二明所隨之止觀隨相而論止名定觀名慧就實而言定通止觀慧亦如是如梁攝論云十波羅蜜通有二體一不散亂為體謂止定二不顛倒為體謂觀慧也記云何句先躡前徵起難云前止觀中何不竟言得入而言隨順耶以下次釋成俱義通云前之單止單觀屬方便非正修故言隨順今止時具觀觀時具止寂照雙流定慧均等二門俱在一心中得方可名得入也俱義以此二義者即前止一切境界觀生滅因緣也漸漸不相離者然此止觀初首方便行人修時雖未雙現漸漸習至久後須相資而行不可孤運輒相捨離即是隨順方便相也雙現前者止觀雙運習純熟時靜必有明未有明而不靜者也明必有靜未有靜而不明者也如是止觀雙現前時即正修中得入相也上之一心四句正於此俱門攝餘可例知疏一顯下消文隨相下明義由隨相義故有單修方便由就實義故有雙運現前如梁攝下引證通有二者此二通與十度為體其猶於水澄而復清方能鑒像以二門於一心開焉可定慧而不俱耶此俱修門圓覺中名為寂觀寂滅止觀二邊相故亦是即中觀也又總上三門皆有止觀初止門中離相止無生觀統名真如止觀門二觀門中隨相止因緣觀統名生滅止觀門三俱門中法性止不二止唯心觀無住觀統名一心止觀門餘如前行根本方便中說音釋筒音同竹筒逈凶上聲高出也諂音剷面諛曲從也蕩音蕩磨也滌也蠲音捐除去也阿耨菩提此翻無上覺道鍊音戀謂煅煉治金也踰繕那舊曰由旬四十里也忉利此云三十三夜摩華言時分兜率華言知足繒音情帛也曙音署旦也曉也縲紲音雷悉索繫也憒音愧喧閙訟音頌諍辨雹音薄雨冰稼穡音嫁色種曰稼斂曰穡荊棘音京急凡有刺者燕居私居靜室也藪音叟大澤詣音異至也抖擻音斗叟抖去其塵擻除其垢也阿練若華言無喧雜脅音歇勒左右腋下也脹音脹膨脝裸音魯袒肩露形也毳音翠獸毛縟細者惕音鐵敬懼也諧音涯偶合也擲音直拋也蚋音芮蠅虻也黜音尺罷退也慍音蘊含怒意恪音却端謹也六師一富蘭那二末伽黎三刪闍夜四欽婆羅五迦旃延六若提子赫音黑日曝火炙也摧音崔挫折也
